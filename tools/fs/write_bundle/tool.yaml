name: fs.write_bundle
description: Write a bounded bundle of UTF-8 text files relative to a repository or workspace root.
source:
  type: cli-tool
  command: node
  args:
    - ./run.mjs
inputs:
  files:
    type: json
    required: true
    description: Array of objects shaped like { path, contents }.
  repo_root:
    type: string
    required: false
    description: Repository or workspace root; defaults to project, fixture, RUNX_CWD, or the current working directory.
scopes:
  - fs.write
mutating: true
runx:
  artifacts:
    wrap_as: file_bundle_write
