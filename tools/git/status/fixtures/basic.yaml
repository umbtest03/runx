name: git-status-basic
lane: deterministic
target:
  kind: tool
  ref: git.status
workspace:
  files:
    README.md: |
      original
  git:
    initial_branch: main
    dirty_files:
      README.md: |
        changed
inputs:
  repo_root: $RUNX_FIXTURE_ROOT
expect:
  status: success
  output:
    matches_packet: runx.git.status.v1
    subset:
      clean: false
