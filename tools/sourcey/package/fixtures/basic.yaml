name: sourcey-package-basic
lane: deterministic
target:
  kind: tool
  ref: sourcey.package
inputs:
  discovery_report:
    schema: runx.sourcey.discovery.v1
    data:
      discovered:
        brand_name: Acme
        homepage_url: https://example.com
  doc_bundle:
    schema: runx.sourcey.doc_bundle.v1
    data:
      files:
        - path: docs/index.md
          contents: "# Acme"
      summary: Drafted Acme docs.
  sourcey_build_report:
    schema: runx.sourcey.build_report.v1
    data:
      output_dir: /tmp/acme-site
      index_path: /tmp/acme-site/index.html
      generated_files:
        - index.html
  evaluation_report:
    schema: runx.sourcey.evaluation.v1
    data:
      quality:
        verdict: pass
      findings: []
      recommendations: []
  revision_bundle:
    schema: runx.sourcey.revision.v1
    data:
      files: []
      summary: No revisions needed.
  sourcey_verification_report:
    schema: runx.sourcey.verification.v1
    data:
      verified: true
      output_dir: /tmp/acme-site
      index_path: /tmp/acme-site/index.html
      contains_doctype: true
expect:
  status: success
  output:
    matches_packet: runx.sourcey.packet.v1
    subset:
      data:
        verified: true
        contains_doctype: true
