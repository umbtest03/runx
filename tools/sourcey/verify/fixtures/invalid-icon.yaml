name: sourcey-verify-invalid-icon
lane: deterministic
target:
  kind: tool
  ref: sourcey.verify
workspace:
  files:
    site/index.html: |
      <!doctype html><html><head><title>Acme Docs</title></head><body><main><h1>Acme Docs</h1></main></body></html>
inputs:
  output_dir: site
  sourcey_build_report:
    icon_validation:
      checked: true
      status: invalid
      icon_count: 1
      invalid_count: 1
      invalid_icons:
        - icon: book
          path: introduction.md
          line: 6
          column: 31
          suggestion: book-open
expect:
  status: failure
  output:
    subset:
      verified: false
      error: invalid_sourcey_card_icons
      icon_validation:
        status: invalid
        invalid_count: 1
