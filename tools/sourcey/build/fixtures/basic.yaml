name: sourcey-build-basic
lane: deterministic
target:
  kind: tool
  ref: sourcey.build
workspace:
  files:
    project/sourcey.config.ts: |
      export default {};
  executable_files:
    bin/sourcey.mjs: |
      import { mkdirSync, writeFileSync } from "node:fs";
      import path from "node:path";
      const outputIndex = process.argv.indexOf("-o");
      const outputDir = outputIndex >= 0 ? process.argv[outputIndex + 1] : path.resolve(process.cwd(), ".sourcey/runx-docs");
      mkdirSync(outputDir, { recursive: true });
      writeFileSync(path.join(outputDir, "index.html"), "<!doctype html><html><head><title>Acme Docs</title></head><body><h1>Acme Docs</h1><p>Fixture docs.</p></body></html>");
inputs:
  project: project
  homepage_url: https://example.com
  brand_name: Acme
  docs_inputs:
    mode: config
    config: sourcey.config.ts
  output_dir: site
  sourcey_bin: $RUNX_FIXTURE_ROOT/bin/sourcey.mjs
expect:
  status: success
  output:
    matches_packet: runx.sourcey.build_report.v1
    subset:
      brand_name: Acme
      generated: true
      index_title: Acme Docs
