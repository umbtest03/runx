name: sourcey-build-invalid-icon
lane: deterministic
target:
  kind: tool
  ref: sourcey.build
workspace:
  files:
    project/sourcey.config.ts: |
      export default {};
    project/introduction.md: |
      ---
      title: Introduction
      ---

      :::card-group{cols="2"}
      ::card{title="Valid" icon="book-open"}
      Valid icon.
      ::
      ::card{title="Invalid" icon="book"}
      Invalid icon.
      ::
      :::
    project/node_modules/heroicons/24/outline/book-open.svg: |
      <svg><path d="M0 0h1v1H0z"/></svg>
    project/node_modules/heroicons/24/outline/bell.svg: |
      <svg><path d="M0 0h1v1H0z"/></svg>
  executable_files:
    bin/sourcey.mjs: |
      import { mkdirSync, writeFileSync } from "node:fs";
      import path from "node:path";
      const outputIndex = process.argv.indexOf("-o");
      const outputDir = outputIndex >= 0 ? process.argv[outputIndex + 1] : path.resolve(process.cwd(), ".sourcey/runx-docs");
      mkdirSync(outputDir, { recursive: true });
      writeFileSync(path.join(outputDir, "index.html"), "<!doctype html><html><head><title>Acme Docs</title></head><body><main><h1>Acme Docs</h1></main></body></html>");
inputs:
  project: project
  homepage_url: https://example.com
  brand_name: Acme
  docs_inputs:
    mode: config
    config: sourcey.config.ts
  output_dir: site
  sourcey_bin: $RUNX_FIXTURE_ROOT/bin/sourcey.mjs
expect:
  status: success
  output:
    matches_packet: runx.sourcey.build_report.v1
    subset:
      generated: true
      icon_validation:
        checked: true
        status: invalid
        icon_count: 2
        invalid_count: 1
