name: orchestrator-handoff-n8n-basic
lane: deterministic
target:
  kind: tool
  ref: orchestrators.build_handoff_context
inputs:
  platform: n8n
  event_id: evt_n8n_demo_001
  handoff_scope: orchestrator.n8n.workflow.invoke
  handoff_audience: n8n:workflow:runx-governed-effect
  execution_context:
    caller: runx-cli
    workflow_ref: self-hosted-n8n-demo
    environment: local-dogfood
  payload:
    hello: workflow
  receiver:
    workflow_id: runx-governed-effect
expect:
  status: success
  output:
    subset:
      status: ready
      platform: n8n
      event_id: evt_n8n_demo_001
      idempotency:
        key: evt_n8n_demo_001
      handoff:
        scope: orchestrator.n8n.workflow.invoke
        audience: n8n:workflow:runx-governed-effect
      receiver_validation:
        require_bearer: true
        reject_duplicate_event_id: true
