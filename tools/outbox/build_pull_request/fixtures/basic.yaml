name: outbox-build-pull-request-basic
lane: deterministic
target:
  kind: tool
  ref: outbox.build_pull_request
inputs:
  task_id: task-fixture
  thread_title: Improve docs
  thread_locator: issue://fixture/123
  target_repo: acme/widgets
  handoff_markdown: |
    # Handoff: Improve docs

    Status: completed
    Next: none
  build_result:
    status: review
    passed: 1
    failed: 0
  review_result:
    verdict: pass
  completion_result:
    status: completed
    title: Improve docs
    review:
      verdict: pass
  current_branch:
    branch: docs/fixture
  base: main
expect:
  status: success
  outputs:
    draft_pull_request:
      matches_packet: runx.outbox.draft_pull_request.v1
      subset:
        task_id: task-fixture
        push_ready: true
    outbox_entry:
      matches_packet: runx.outbox.entry.v1
      subset:
        entry_id: pull_request:task-fixture
        kind: pull_request
        status: proposed
