name: outbox-build-feed-entry-basic
lane: deterministic
target:
  kind: tool
  ref: outbox.build_feed_entry
inputs:
  task_id: task-fixture
  thread_title: Improve docs
  thread_locator: issue://fixture/123
  target_repo: acme/widgets
  harness_context:
    harness:
      schema: runx.harness.v1
      harness_id: harness_task_fixture
      state: running
    signal:
      schema: runx.signal.v1
      signal_id: sig_task_fixture
      title: Improve docs
      body_preview: Fixture signal is ready for a bounded docs change.
      source_ref:
        type: github_issue
        uri: issue://fixture/123
      fingerprint:
        algorithm: sha256
        canonicalization: fixture
        value: sha256:fixture-123
        derived_from:
          - type: github_issue
            uri: issue://fixture/123
    decision:
      schema: runx.decision.v1
      decision_id: dec_task_fixture
      choice: open
      justification:
        summary: Fixture decision selected issue-to-pr.
  build_result:
    passed: 2
    failed: 0
  review_result:
    verdict: pass
    blocking_count: 0
  completion_result:
    status: completed
    title: Improve docs
  pull_request_outbox_entry:
    kind: pull_request
    locator: https://github.com/acme/widgets/pull/42
    metadata:
      repo: acme/widgets
      branch: docs/fixture
      base: main
  push_result:
    status: pushed
    pull_request:
      url: https://github.com/acme/widgets/pull/42
expect:
  status: success
  outputs:
    feed_entry:
      matches_packet: runx.feed_entry.v1
      subset:
        thread_locator: issue://fixture/123
        milestones:
          - kind: signal
          - kind: decision
          - kind: spec
          - kind: build
            status: passed
          - kind: review
            status: passed
          - kind: pull_request
            status: ready
          - kind: merge_gate
            status: ready
    outbox_entry:
      matches_packet: runx.outbox.entry.v1
      subset:
        entry_id: message:task-fixture:merge_gate
        kind: message
        status: proposed
        metadata:
          workflow: issue-to-pr
          milestone_kind: merge_gate
