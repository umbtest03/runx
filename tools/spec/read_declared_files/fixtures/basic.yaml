name: spec-read-declared-files-basic
lane: deterministic
target:
  kind: tool
  ref: spec.read_declared_files
workspace:
  files:
    src/index.ts: |
      export const value = 1;
inputs:
  repo_root: $RUNX_FIXTURE_ROOT
  spec_contents: |
    ## Context

    Files impacted:
    - `src/index.ts`

    ## Phase 1: Fixture

    Changes:
    - `src/index.ts` (all, exclusive) - Update fixture source.
expect:
  status: success
  output:
    matches_packet: runx.spec.declared_file_context.v1
    subset:
      declared_count: 1
