name: spec-read-declared-files-basic
lane: deterministic
target:
  kind: tool
  ref: spec.read_declared_files
workspace:
  files:
    spec/flow_executor_spec.rb: |
      describe Flow::Executor
    src/index.ts: |
      export const value = 1;
inputs:
  repo_root: $RUNX_FIXTURE_ROOT
  extra_files:
    - path: spec/flow_executor_spec.rb
      reason: Targeted regression coverage.
  spec_contents: |
    ## Context

    Files impacted:
    - `src/index.ts`

    ## Phase 1: Fixture

    Changes:
    - `src/index.ts` (all, exclusive) - Update fixture source.
expect:
  status: success
  output:
    matches_packet: runx.spec.declared_file_context.v1
    subset:
      declared_count: 2
