skill: icey-server-operator

runners:
  operator-plan:
    default: true
    type: agent-step
    agent: operator
    task: icey-server-operator-plan
    inputs:
      request:
        type: string
        required: true
        description: "The icey-server maintenance, release, packaging, runtime, or docs task to plan."
      target_surface:
        type: string
        required: false
        description: "Optional explicit surface: server, web, docker, packaging, release, docs, or runtime."
    outputs:
      classification:
        type: string
      evidence_to_inspect:
        type: array
      command_plan:
        type: array
      validation_plan:
        type: array
      safety_notes:
        type: array
      operator_plan:
        type: object
    runx:
      scopes:
        - repo:read
      tags:
        - cpp
        - operator
        - release
        - packaging
      category: code
      source:
        upstream:
          repo: nilstate/icey-cli
          path: SKILL.md
          commit: ee9aa1cc05055c2490537e762c81c9f28451f578
          blob_sha: a1e1de7b5ea8b32c164d61fecc3c7ae4401b4c97
      sandbox:
        profile: readonly
        cwd_policy: workspace
    artifacts:
      named_emits:
        operator_plan: operator_plan
    execution:
      disposition: completed
      outcome_state: complete
      outcome:
        code: icey_operator_plan
        summary: "Agent-mediated operator plan produced from upstream SKILL.md context."

harness:
  cases:
    - name: operator-plan-classifies-surfaces
      runner: operator-plan
      inputs:
        request: "Plan a safe change to the browser smoke workflow after adjusting the bundled web UI."
        target_surface: "web"
      caller:
        answers:
          agent_step.icey-server-operator-plan.output:
            classification: "web"
            evidence_to_inspect:
              - "README.md"
              - "web/package.json"
              - ".github/workflows/ci.yml"
            command_plan:
              - "Inspect the web package scripts and existing browser smoke gates."
              - "Build the Vite bundle before touching runtime claims."
            validation_plan:
              - "Run the web build."
              - "Run the browser smoke path described by the repo when available."
            safety_notes:
              - "Do not claim Safari support from Linux WebKit smoke alone."
            operator_plan:
              surface: "web"
              summary: "Inspect and validate the bundled web UI smoke path without widening browser support claims."
      expect:
        status: sealed
        receipt:
          kind: harness_receipt
          status: sealed
          skill_name: icey-server-operator

    - name: release-plan-preserves-pins
      runner: operator-plan
      inputs:
        request: "Plan an icey-server release package update."
        target_surface: "release"
      caller:
        answers:
          agent_step.icey-server-operator-plan.output:
            classification: "release"
            evidence_to_inspect:
              - "VERSION"
              - "ICEY_VERSION"
              - "CHANGELOG.md"
              - ".github/workflows/release.yml"
              - "packaging/README.md"
            command_plan:
              - "Read VERSION and ICEY_VERSION before making release claims."
              - "Keep package-manager manifests tied to generated archives and checksums."
            validation_plan:
              - "Run release metadata validation."
              - "Run package-manager checks when publication metadata changes."
            safety_notes:
              - "Do not float the pinned nilstate/icey dependency during release work."
            operator_plan:
              surface: "release"
              summary: "Preserve VERSION and ICEY_VERSION provenance while validating release packaging metadata."
      expect:
        status: sealed
        receipt:
          kind: harness_receipt
          status: sealed
          skill_name: icey-server-operator
