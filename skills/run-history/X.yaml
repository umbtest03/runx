skill: run-history
version: "0.2.0"

catalog:
  kind: skill
  audience: operator
  visibility: public
  role: canonical
  execution: read
  completion: runtime_receipt
  requires_adapter: false
  approval: none

harness:
  cases:
    - name: reports-native-history-and-catalog-coverage
      inputs:
        objective: Show how Runx behaved over the supplied window.
        scope: workspace
        period: 30d
        history_receipts:
          - id: rcpt_1
            name: release
            status: closed
            created_at: "2026-07-01T00:00:00Z"
          - id: rcpt_2
            name: release
            status: blocked
            created_at: "2026-07-02T00:00:00Z"
        catalog_items:
          - name: release
            status: ok
            fixtures: 2
            harness_cases: 1
          - name: untested
            status: ok
            fixtures: 0
            harness_cases: 0
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: filters-one-skill
      inputs:
        objective: Review release runs only.
        scope: release
        history_receipts:
          - id: rcpt_release
            name: release
            status: closed
            created_at: "2026-07-01T00:00:00Z"
          - id: rcpt_other
            name: research
            status: failed
            created_at: "2026-07-01T00:00:00Z"
        catalog_items: []
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: empty-history-stops-for-evidence
      inputs:
        objective: Show how our skills are doing.
        history_receipts: []
        pending_runs: []
        catalog_items: []
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

runners:
  report:
    default: true
    type: cli-tool
    command: node
    args:
      - run.mjs
    outputs:
      history_report: object
    artifacts:
      wrap_as: history_report_packet
      packet: runx.history_report.v1
    inputs:
      objective:
        type: string
        required: true
        description: The bounded history question.
      scope:
        type: string
        required: false
        default: workspace
        description: workspace, all, or one skill/subject name.
      period:
        type: string
        required: false
        description: Relative lookback such as 7d or 30d, or an RFC 3339 lower bound.
      limit:
        type: number
        required: false
        default: 1000
        description: Maximum receipt and pending-run rows to inspect; must be from 1 to 10000.
      history_receipts:
        type: json
        required: false
        description: Explicit receipt rows for deterministic replay; live runs use native runx history.
      pending_runs:
        type: json
        required: false
        description: Explicit pending-run rows paired with history_receipts during replay.
      catalog_items:
        type: json
        required: false
        description: Explicit catalog rows for replay; live runs use native runx list skills.
