skill: weather-forecast
version: 0.1.0
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
runners:
  normalize:
    default: true
    type: agent-task
    agent: analyst
    task: weather-forecast
    outputs:
      decision: string
      location: string
      horizon: string
      forecast_packet: object
      provider_evidence: object
      safety_notes: array
      stop_conditions: array
      receipt_notes: object
    artifacts:
      wrap_as: weather_forecast_packet
      packet: runx.context.weather_forecast.v1
    inputs:
      location:
        type: string
        required: true
        description: Place, coordinates, gridpoint, or provider location label.
      forecast_evidence:
        type: json
        required: true
        description: Raw provider response, forecast periods, source refs, receipt refs, or sealed branded skill output.
      horizon:
        type: string
        required: false
        description: Time range to interpret.
      purpose:
        type: string
        required: false
        description: Planning context for the forecast packet.
      freshness_requirement:
        type: string
        required: false
        description: Maximum acceptable age or timestamp policy.
