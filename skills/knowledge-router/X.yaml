skill: knowledge-router
version: "0.2.0"

catalog:
  kind: graph
  audience: operator
  visibility: public
  role: context
  execution: plan
  completion: runtime_receipt
  requires_adapter: false
  approval: none

harness:
  cases:
    - name: knowledge-router-validates-source-owner-and-skill
      inputs:
        question: Can API keys be scoped to read-only campaign analytics?
        available_sources:
          sources:
            - id: auth-docs
              kind: docs
              summary: Authentication and API key scopes.
            - id: campaigns-docs
              kind: docs
              summary: Campaign analytics fields and export limits.
          owners:
            - id: security-team
              domains:
                - authentication
            - id: growth-team
              domains:
                - campaigns
          skills:
            - id: research
              purpose: Resolve a bounded source-backed question.
      caller:
        answers:
          agent_task.knowledge-router-propose.output:
            route_proposal:
              verdict: routed
              route:
                domain: authentication
                rationale: The question joins API-key scope policy with analytics access.
                source_refs:
                  - auth-docs
                  - campaigns-docs
              source_matches:
                - source_ref: auth-docs
                  matching_signal: API keys scoped to read-only
                  reason: Defines key scope behavior.
                - source_ref: campaigns-docs
                  matching_signal: campaign analytics
                  reason: Defines the requested read surface.
              owner_recommendation:
                owner_ref: security-team
                rationale: Authentication scope ownership is primary.
                escalation_required: false
              next_skill:
                skill_ref: research
                rationale: Resolve the bounded answer from both validated sources.
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
        steps:
          - propose
          - validate

    - name: knowledge-router-rejects-invented-reference
      inputs:
        question: Where is the retention policy documented?
        available_sources:
          sources:
            - id: policy-docs
              kind: docs
              summary: Product policy documentation.
          owners: []
          skills: []
      caller:
        answers:
          agent_task.knowledge-router-propose.output:
            route_proposal:
              verdict: routed
              route:
                domain: policy
                rationale: Use the retention documentation.
                source_refs:
                  - invented-docs
              source_matches:
                - source_ref: invented-docs
                  matching_signal: retention policy
                  reason: Invented source must be rejected.
              owner_recommendation: {}
              next_skill: {}
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
        steps:
          - propose
          - validate

    - name: knowledge-router-needs-sources
      inputs:
        question: Where should this go?
      expect:
        status: failure

runners:
  route:
    default: true
    type: graph
    inputs:
      question:
        type: string
        required: true
        description: Question, source event, or thread summary to route.
      available_sources:
        type: json
        required: true
        description: Explicit sources, owners, and skills collections.
      constraints:
        type: json
        required: false
        description: Allowed sources, sensitivity, excluded systems, and preferred owners.
    graph:
      name: knowledge-router
      steps:
        - id: propose
          label: propose bounded knowledge route
          run:
            type: agent-task
            agent: router
            task: knowledge-router-propose
            outputs:
              route_proposal: object
          instructions: >
            Route the question through only the supplied knowledge catalog.
            Return route_proposal with verdict, route, source_matches,
            owner_recommendation, and next_skill. Every selected source_ref,
            owner_ref, and skill_ref must exactly match a supplied id. Choose the
            smallest useful source set. Use needs_more_context with no selected
            refs when the catalog cannot support a route. Use manual_review for
            consequential legal, billing, security, privacy, or destructive
            decisions, not merely because the topic belongs to those domains.
            Do not answer the question or perform the follow-up skill.
          artifacts:
            named_emits:
              route_proposal: route_proposal
            packets:
              route_proposal: runx.ops.knowledge_route_proposal.v1
        - id: validate
          label: validate all catalog references
          inputs:
            available_sources: $input.available_sources
            constraints: $input.constraints
          context:
            route_proposal: propose.route_proposal.data
          run:
            type: cli-tool
            command: node
            args:
              - ./validate_route.mjs
            outputs:
              knowledge_route: object
          artifacts:
            named_emits:
              knowledge_route: knowledge_route
            packets:
              knowledge_route: runx.ops.knowledge_route.v1
