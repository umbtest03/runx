name: over-reach-flagged
kind: skill
target: ..
runner: audit
inputs:
  receipt_id: rcpt_doc_bot_5582
  receipt_summary: "Sealed run of a docs bot. Authority proof granted repo.read only. Acts: one observation that read files, and one act that exercised repo.write to push a commit. No approval gate recorded for the write. Material referenced by hash."
  granted_scopes: '["repo.read"]'
  objective: Audit whether the run exceeded its grant.
caller:
  answers:
    agent_task.audit-receipt.output:
      receipt_audit:
        decision: ready
        run_ref: rcpt_doc_bot_5582
        granted_scopes:
          - repo.read
        exercised_scopes:
          - repo.read
          - repo.write
        refusals: []
        findings:
          - id: receipt.authority.over_reach
            severity: error
            message: "The run exercised repo.write, which the authority proof did not grant (granted: repo.read)."
          - id: receipt.mutation.ungated
            severity: error
            message: The repo.write mutation ran with no approval gate recorded in the receipt.
        verdict: anomaly
        rationale: The receipt shows repo.write exercised against a proof that granted only repo.read, and the mutation has no approval gate. Both are governance violations recorded in the run's own evidence.
        recommendations:
          - Revoke this run's grant and investigate how repo.write was exercised against a repo.read proof.
          - Require an approval gate on any mutating act before re-enabling the skill.
        success_checkpoint:
          milestone: audit_anomaly
          description: A sealed run flagged for over-reach and ungated mutation, with remediation named.
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
    state: sealed
    disposition: closed
metadata:
  public_skill: audit-receipt
  source_case: over-reach-flagged
  source: skills-fixture
