name: missing-receipt-needs-evidence
kind: skill
target: ..
runner: audit
inputs:
  objective: Audit the last run.
caller:
  answers:
    agent_task.audit-receipt.output:
      receipt_audit:
        decision: needs_more_evidence
        run_ref: ""
        granted_scopes: []
        exercised_scopes: []
