skill: audit-receipt
version: "0.2.0"
catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical
  execution: read
  completion: runtime_receipt
  requires_adapter: false
  approval: none
runners:
  audit:
    default: true
    type: graph
    inputs:
      receipt_id:
        type: string
        required: false
        description: Exact receipt id to resolve through the native ledger.
      receipt_summary:
        type: string
        required: false
        description: Sanitized authority, act, approval, refusal, and material-reference summary.
      granted_scopes:
        type: json
        required: false
        description: Granted authority when it is not present in the bounded summary.
      objective:
        type: string
        required: false
        description: Operator intent focusing the audit.
      receipt_rows:
        type: json
        required: false
        description: Explicit native-projection rows for deterministic replay only.
    graph:
      name: audit-receipt
      steps:
        - id: evidence
          label: resolve and verify receipt evidence
          skill: ../ledger
          runner: read
          inputs:
            question: Resolve the exact receipt referenced by this governance audit.
            receipt_ids:
              - $input.receipt_id
            proof:
              verify_chain: true
            receipts: $input.receipt_rows
        - id: audit
          label: audit authority against bounded receipt evidence
          run:
            type: agent-task
            agent: reviewer
            task: audit-receipt
            outputs:
              receipt_audit: object
          instructions: >
            Audit one run for authority over-reach, ungated mutation,
            unrecorded refusal, or exposed material. Native ledger evidence
            proves receipt identity, status, and verification posture; detailed
            authority and act claims must be grounded in the supplied bounded
            receipt_summary and granted_scopes. If a receipt id is supplied but
            not resolved, or the detailed evidence is insufficient, return
            needs_more_evidence rather than clean. Do not repair the skill or
            mutate the ledger.
          context:
            receipt_evidence: evidence.ledger_answer_packet.data
          artifacts:
            wrap_as: receipt_audit_packet
            packet: runx.receipt_audit.v1
