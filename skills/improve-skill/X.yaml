skill: improve-skill

harness:
  cases:
    - name: improve-skill-produces-regression-fixtures
      inputs:
        receipt_id: rx_failed
        receipt_summary: harness failed because required context was flattened
        harness_output: needs_resolution
        skill_path: skills/objective-to-skill
        objective: Preserve structured review data in builder chains
      caller:
        answers:
          agent_step.receipt-review.output:
            verdict: needs_update
            failure_summary: The review payload was consumed from stdout instead of an artifact envelope.
            improvement_proposals:
              - target: skills/improve-skill/X.yaml
                change: read review-receipt.receipt_review.data in the harness-author step
                rationale: Keep the review object structured for downstream planning.
                risk: Low; only dependent tests need updating.
            next_harness_checks:
              - improve-skill passes structured review data
          agent_step.harness-author.output:
            skill_spec:
              name: improve-skill
            execution_plan:
              runner: chain
            harness_fixture:
              - name: improve-skill-structured-review
                kind: skill
                target: ../improve-skill
                inputs:
                  receipt_summary: context flattened
                expect:
                  status: success
            acceptance_checks:
              - improve-skill passes structured review data
      expect:
        status: success
        receipt:
          kind: chain_execution
          status: success

runners:
  improve-skill:
    default: true
    type: chain
    inputs:
      receipt_id:
        type: string
        required: false
        description: "Receipt id to inspect when available."
      receipt_summary:
        type: string
        required: false
        description: "Sanitized receipt or failure summary."
      harness_output:
        type: string
        required: false
        description: "Sanitized harness output or failure text."
      skill_path:
        type: string
        required: false
        description: "Skill package being improved."
      objective:
        type: string
        required: false
        description: "Operator intent for the next improvement pass."
    chain:
      name: improve-skill
      owner: runx
      steps:
        - id: review-receipt
          skill: ../receipt-review
          scopes:
            - runx:builder:review
        - id: author-update-harness
          skill: ../harness-author
          scopes:
            - runx:builder:write-proposal
          context:
            review: review-receipt.receipt_review.data
