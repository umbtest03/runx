skill: improve-skill
version: "0.1.1"

catalog:
  kind: graph
  audience: builder
  visibility: private


harness:
  cases:
    - name: improve-skill-produces-regression-fixtures
      inputs:
        receipt_id: rx_failed
        receipt_summary: harness failed because required context was flattened
        harness_output: needs_resolution
        skill_path: skills/design-skill
        objective: Preserve structured review data in builder graphs
      caller:
        answers:
          agent_step.review-receipt.output:
            verdict: needs_update
            failure_summary: The review payload was consumed from stdout instead of an artifact envelope.
            improvement_proposals:
              - target: skills/improve-skill/X.yaml
                change: read review-receipt.review_receipt.data in the write-harness step
                rationale: Keep the review object structured for downstream planning.
                risk: Low; only dependent tests need updating.
            next_harness_checks:
              - improve-skill passes structured review data
          agent_step.write-harness.output:
            skill_spec:
              name: improve-skill
            execution_plan:
              runner: graph
            harness_fixture:
              - name: improve-skill-structured-review
                kind: skill
                target: ../improve-skill
                inputs:
                  receipt_summary: context flattened
                expect:
                  status: success
            acceptance_checks:
              - improve-skill passes structured review data
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success

    - name: improve-skill-passes-on-paused-graph
      inputs:
        receipt_id: rx_paused
        receipt_summary: graph paused at step 1 awaiting caller cognitive work; status needs_resolution with one outstanding agent-step request
        harness_output: needs_resolution
        skill_path: skills/content-pipeline
        objective: Distinguish paused-but-healthy graphs from broken skills in diagnosis
      caller:
        answers:
          agent_step.review-receipt.output:
            verdict: pass
            failure_summary: No failure. The graph paused as designed awaiting caller cognitive work; needs_resolution is a healthy agent-mediated suspension, not a defect.
            improvement_proposals: []
            next_harness_checks:
              - target skill harness still passes on the happy path where the agent step receives valid outputs
          agent_step.write-harness.output:
            skill_spec:
              name: content-pipeline
              note: No SKILL.md change proposed; receipt review verdict was pass.
            execution_plan:
              runner: graph
              note: No change to graph definition.
            harness_fixture:
              - name: content-pipeline-paused-run-is-healthy-suspension
                kind: skill
                target: ../content-pipeline
                expect:
                  status: needs_resolution
            acceptance_checks:
              - needs_resolution is treated as a healthy caller hand-off, not a skill failure
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success

runners:
  improve-skill:
    default: true
    type: graph
    inputs:
      receipt_id:
        type: string
        required: false
        description: "Receipt id to inspect when available."
      receipt_summary:
        type: string
        required: false
        description: "Sanitized receipt or failure summary."
      harness_output:
        type: string
        required: false
        description: "Sanitized harness output or failure text."
      skill_path:
        type: string
        required: false
        description: "Skill package being improved."
      objective:
        type: string
        required: false
        description: "Operator intent for the next improvement pass."
    graph:
      name: improve-skill
      owner: runx
      steps:
        - id: review-receipt
          skill: ../review-receipt
          scopes:
            - runx:builder:review
        - id: author-update-harness
          skill: ../write-harness
          scopes:
            - runx:builder:write-proposal
          context:
            review: review-receipt.review_receipt.data
