skill: improve-skill
version: 0.1.1
catalog:
  kind: graph
  audience: builder
  visibility: public
  role: canonical
runners:
  improve-skill:
    default: true
    type: graph
    inputs:
      receipt_id:
        type: string
        required: false
        description: Receipt id to inspect when available.
      receipt_summary:
        type: string
        required: false
        description: Sanitized receipt or failure summary.
      harness_output:
        type: string
        required: false
        description: Sanitized harness output or failure text.
      skill_path:
        type: string
        required: false
        description: Skill package being improved.
      objective:
        type: string
        required: false
        description: Operator intent for the next improvement pass.
    graph:
      name: improve-skill
      steps:
        - id: review-receipt
          skill: ../review-receipt
          scopes:
            - runx:builder:review
        - id: author-update-harness
          skill: ../write-harness
          scopes:
            - runx:builder:write-proposal
          context:
            review: review-receipt.review_receipt.data
