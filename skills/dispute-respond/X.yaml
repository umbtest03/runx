skill: dispute-respond
version: "0.1.1"
catalog:
  kind: skill
  audience: operator
  visibility: public
  role: canonical
  execution: plan
  completion: plan
  requires_adapter: true
  approval: required
runners:
  respond:
    default: true
    type: agent-task
    agent: operator
    task: dispute-respond
    outputs:
      dispute_response: object
      dispute_evidence: object
      linked_receipts: object
      posture: object
      open_questions: array
    artifacts:
      wrap_as: dispute_response_artifact
    runx:
      payment_authority:
        direction: provider_dispute
        phase: dispute_response
        resource_family: effect
        verbs:
          - verify
        mutates_rail: false
        receives_rail_secret_material: false
        requires_original_receipt_ref: true
        settles_dispute: false
    inputs:
      dispute_event:
        type: object
        required: true
        description: Provider-initiated dispute or chargeback event.
      original_receipt_ref:
        type: string
        required: true
        description: Linked sealed charge receipt reference.
      prior_refund_receipt_refs:
        type: json
        required: false
        description: Prior refund receipt references.
      evidence_refs:
        type: json
        required: false
        description: Provider evidence references.
      operator_posture:
        type: string
        required: false
        description: Requested response posture.
