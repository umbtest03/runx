skill: sourcey
version: "0.1.1"

catalog:
  kind: skill
  audience: public
  visibility: public


harness:
  cases:
    - name: sourcey-discovery-yield
      runner: sourcey
      inputs:
        project: fixtures/sourcey/basic
      expect:
        status: needs_resolution

    - name: sourcey-needs-project-input
      runner: sourcey
      inputs: {}
      expect:
        status: needs_resolution

runners:
  agent:
    type: agent

  sourcey:
    default: true
    type: chain
    inputs:
      project:
        type: string
        required: true
        description: "Project root containing Sourcey inputs."
      repo_root:
        type: string
        required: false
        description: "Optional alias for the project root when Sourcey is composed inside a parent chain."
      homepage_url:
        type: string
        required: false
        description: "Canonical project homepage URL. If omitted, discover it from project evidence."
      brand_name:
        type: string
        required: false
        description: "Human-facing brand or project name. If omitted, discover it from project evidence."
      docs_inputs:
        type: json
        required: false
        description: "Structured docs inputs. If omitted, infer a bounded config or spec path from the project."
      project_brief:
        type: json
        required: false
        description: "Grounded project, brand, docs-audit, and writing brief to steer authoring toward native project docs."
      output_dir:
        type: string
        required: false
        description: "Generated site output directory for Sourcey docs; defaults to <project>/.sourcey/runx-docs and should remain separate from authored docs source."
      sourcey_bin:
        type: string
        required: false
        description: "Explicit Sourcey executable or JS entrypoint; defaults to SOURCEY_BIN or sourcey on PATH."
    chain:
      name: sourcey
      steps:
        - id: discover
          label: inspect repo
          run:
            type: agent-step
            agent: builder
            task: sourcey-discover
            outputs:
              discovery_report: object
          instructions: >
            Inspect the target project and produce a bounded discovery_report for
            Sourcey. Prefer explicit input values when supplied. Otherwise infer
            brand_name, homepage_url, and docs_inputs from real project evidence
            such as package.json, README, existing docs, and specs. Do not invent
            APIs or pages. When config does not already exist, propose a practical
            docs_inputs object pointing to the config or spec path the next step
            should build from. Treat authored docs source and generated site
            output as separate surfaces. Prefer committed docs source in the
            config-relative docs tree and generated output under
            <project>/.sourcey/runx-docs unless explicit inputs say otherwise.
            Do not propose writing built HTML back into the docs source tree. If
            the chosen output directory is inside the repo and not gitignored,
            record that as an operational gap. Treat this as a bounded
            scope/ingest/model pass. Do not author docs, build the site, or
            propose open-ended revision. When project_brief is supplied, treat it
            as grounded evidence about brand, current docs quality, information
            architecture, and writing direction. Use it to resolve a better
            documentation plan, but do not widen scope beyond the repo evidence
            and the brief's stated priorities.
            discovery_report must use this canonical shape:
            {
              "discovered": {
                "brand_name": string|null,
                "homepage_url": string|null,
                "docs_inputs": object|null
              }
            }
            Additional fields are allowed, but brand_name, homepage_url, and
            docs_inputs must live under discovery_report.discovered.
          allowed_tools:
            - fs.read
            - git.status
            - git.current_branch
            - git.diff_name_only
            - cli.capture_help
          artifacts:
            named_emits:
              discovery_report: discovery_report
            packets:
              discovery_report: runx.sourcey.discovery.v1
        - id: approve
          label: approve docs plan
          run:
            type: approval
          inputs:
            gate_id: sourcey.discovery.approval
            reason: Approve the discovered documentation plan before writing or building.
          context:
            discovery_report: discover.discovery_report.data
          artifacts:
            wrap_as: approval_decision
            packet: runx.approval.decision.v1
        - id: author
          label: draft docs
          run:
            type: agent-step
            agent: builder
            task: sourcey-author
            outputs:
              doc_bundle: object
          instructions: >
            Author a bounded Sourcey source bundle from the approved discovery
            plan. doc_bundle must include a files array of { path, contents }
            entries to write under the target project, plus a summary of what was
            authored. When the project already has a complete Sourcey config and
            pages, keep the bundle minimal. When config or pages are missing,
            create only the files required to build a strong first documentation
            site grounded in the discovered evidence. If docs_inputs was supplied
            explicitly and discovery did not establish that the referenced config
            or docs files are missing, preserve the existing repo contents and
            return an empty files array rather than overwriting the config with a
            weaker placeholder bundle. Lack of repository inspection evidence is
            not evidence that the files are absent. Only write source docs,
            config, assets, and minimal supporting repo metadata. Never write
            generated HTML, search indexes, or OG assets into the source docs
            tree. When the approved plan uses a generated output_dir under the
            repo root and the repo does not already ignore it, include the
            minimal .gitignore change needed to ignore that build artifact. This
            is one bounded materialize pass, not an open-ended iteration loop.
            When project_brief is supplied, it is the quality bar:
            - Use the brief's brand_system to set logo, favicon, colours, and
              visual direction when the evidence supports it.
            - Use the brief's current_docs_audit and information_architecture to
              preserve what works and fill only the highest-value gaps.
            - Use the brief's writing_directives to keep terminology, audience,
              and tone native to the project.
            - Never write docs that call themselves a preview, migration,
              adoption, scaffold, or vendor-generated artifact unless the repo's
              own evidence already uses those words.
            - A maintainer should be able to read the result and believe it is
              their project's docs, not a demo site.
          allowed_tools:
            - fs.read
            - cli.capture_help
          context:
            discovery_report: discover.discovery_report.data
          artifacts:
            named_emits:
              doc_bundle: doc_bundle
            packets:
              doc_bundle: runx.sourcey.doc_bundle.v1
        - id: write-docs
          label: write docs
          tool: fs.write_bundle
          scopes:
            - fs.write
          mutation: true
          context:
            files: author.doc_bundle.data.files
        - id: build
          label: build docs site
          tool: sourcey.build
          scopes:
            - sourcey.build
          context:
            homepage_url: discover.discovery_report.data.discovered.homepage_url
            brand_name: discover.discovery_report.data.discovered.brand_name
            docs_inputs: discover.discovery_report.data.discovered.docs_inputs
        - id: critique
          label: review built site
          run:
            type: agent-step
            agent: reviewer
            task: sourcey-critique
            outputs:
              evaluation_report: object
          instructions: >
            Evaluate the built Sourcey site against the discovered plan and the
            authored source bundle. Use the build_report as the primary evidence
            packet for rendered output, especially generated_files, index_title,
            index_headings, and index_excerpt. When that evidence is absent or
            thin, call it out as an evidence gap rather than inventing site
            content. Produce one bounded evaluation_report covering grounding,
            clarity, navigation quality, brand alignment, voice integrity,
            coverage, and obvious gaps. Flag operational mistakes such as
            generated output living in source control without intent or
            deploy-time authoring assumptions. Explicitly call out any wording
            that reads like a preview, adoption pitch, migration pitch, or tool
            scaffolding instead of native project docs. Do not propose
            open-ended revision loops here.
          allowed_tools:
            - fs.read
          context:
            discovery_report: discover.discovery_report.data
            doc_bundle: author.doc_bundle.data
            build_report: build.sourcey_build_report.data
          artifacts:
            named_emits:
              evaluation_report: evaluation_report
            packets:
              evaluation_report: runx.sourcey.evaluation.v1
        - id: revise
          label: revise docs
          run:
            type: agent-step
            agent: builder
            task: sourcey-revise
            outputs:
              revision_bundle: object
          instructions: >
            Apply at most one bounded revision pass using the evaluation_report.
            revision_bundle must include a files array of { path, contents }
            entries to update under the target project, plus a summary of the
            deltas applied. If the first build is already strong, return an
            empty files array and explain why. Do not open a second critique
            loop, do not widen scope beyond the discovered plan, and do not turn
            generated site output into committed source. Prioritize fixing
            brand-fit errors, generic vendor framing, shallow IA, and missing
            maintainer-grade coverage before making cosmetic changes.
          allowed_tools:
            - fs.read
          context:
            discovery_report: discover.discovery_report.data
            doc_bundle: author.doc_bundle.data
            build_report: build.sourcey_build_report.data
            evaluation_report: critique.evaluation_report.data
          artifacts:
            named_emits:
              revision_bundle: revision_bundle
            packets:
              revision_bundle: runx.sourcey.revision.v1
        - id: write-revisions
          label: write revisions
          tool: fs.write_bundle
          scopes:
            - fs.write
          mutation: true
          context:
            files: revise.revision_bundle.data.files
        - id: rebuild
          label: rebuild docs site
          tool: sourcey.build
          scopes:
            - sourcey.build
          context:
            homepage_url: discover.discovery_report.data.discovered.homepage_url
            brand_name: discover.discovery_report.data.discovered.brand_name
            docs_inputs: discover.discovery_report.data.discovered.docs_inputs
        - id: verify
          label: verify docs site
          tool: sourcey.verify
          scopes:
            - sourcey.verify
          context:
            output_dir: rebuild.sourcey_build_report.data.output_dir
            index_path: rebuild.sourcey_build_report.data.index_path
        - id: package
          label: package sourcey run
          tool: sourcey.package
          scopes:
            - sourcey.verify
          context:
            discovery_report: discover.discovery_report.data
            doc_bundle: author.doc_bundle.data
            sourcey_build_report: rebuild.sourcey_build_report.data
            evaluation_report: critique.evaluation_report.data
            revision_bundle: revise.revision_bundle.data
            sourcey_verification_report: verify.sourcey_verification_report.data
      policy:
        transitions:
          - to: author
            field: approve.approval_decision.data.approved
            equals: true
          - to: build
            field: approve.approval_decision.data.approved
            equals: true
          - to: critique
            field: build.sourcey_build_report.data.generated
            equals: true
          - to: revise
            field: build.sourcey_build_report.data.generated
            equals: true
          - to: rebuild
            field: build.sourcey_build_report.data.generated
            equals: true
          - to: verify
            field: rebuild.sourcey_build_report.data.generated
            equals: true
    artifacts:
      wrap_as: sourcey_packet
      packet: runx.sourcey.packet.v1
