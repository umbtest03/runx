skill: skill-testing
version: "0.1.1"

catalog:
  kind: chain
  audience: public
  visibility: public


harness:
  cases:
    - name: skill-testing-publishes-trust-audit
      inputs:
        skill_ref: sourcey/sourcey
        objective: Decide whether Sourcey is ready for public recommendation
        evidence_pack:
          receipts:
            - kind: harness
              status: success
              note: Sourcey inline harness currently passes.
          docs:
            - path: docs/skill-profile-model.md
              reason: Describes the package-only SKILL standard.
        test_constraints: Keep the report grounded in repo-visible evidence and local harness receipts.
      caller:
        answers:
          agent_step.review-skill.output:
            capability_profile:
              summary: Bounded docs generation with approval and verification steps.
            trust_assessment:
              tier: runx-derived
              caveats:
                - Path contract docs needed tightening.
            test_matrix:
              - check: harness passes
                status: required
            recommendation_report:
              recommendation: publish_trust_audit
              rationale: Strong enough for evaluators once the docs are aligned.
          agent_step.draft-content-draft.output:
            content_brief:
              angle: trust audit
            draft:
              title: Sourcey trust audit
            review_checklist:
              - confirm trust-tier language
            distribution_notes:
              primary_channel: trust-audit
          agent_step.draft-content-package.output:
            publish_packet:
              channel: trust-audit
              headline: Sourcey trust audit
            qa_checklist:
              - evidence and caveats checked
            handoff_notes:
              next_action: publish after approval
        approvals:
          skill-testing.publish.approval: true
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success

    - name: skill-testing-needs-required-inputs
      inputs: {}
      expect:
        status: needs_resolution

runners:
  skill-testing:
    default: true
    type: chain
    inputs:
      skill_ref:
        type: string
        required: true
        description: "Skill package or registry reference to evaluate."
      objective:
        type: string
        required: false
        default: "Decide whether this skill is ready for public recommendation"
        description: "Decision the trust audit should support."
      channel:
        type: string
        required: false
        default: "trust-audit"
        description: "Final delivery channel for the report."
      evidence_pack:
        type: json
        required: false
        description: "Receipts, docs, or source notes that should anchor the evaluation."
      test_constraints:
        type: string
        required: false
        description: "Safety, environment, or time constraints on evaluation."
    chain:
      name: skill-testing
      owner: runx
      steps:
        - id: review-skill
          skill: ../review-skill
          runner: evaluate
          scopes:
            - runx:skill-eval:read
        - id: draft-report
          skill: ../draft-content
          runner: draft
          scopes:
            - runx:content:draft
          inputs:
            channel: trust-audit
            audience: operators
          context:
            evidence_pack: review-skill.skill_evaluation_packet.data
        - id: approve-report
          run:
            type: approval
          inputs:
            gate_id: skill-testing.publish.approval
            reason: Approve the trust audit before packaging it for publication.
          context:
            draft: draft-report.content_draft_packet.data.draft
            review_checklist: draft-report.content_draft_packet.data.review_checklist
          artifacts:
            wrap_as: approval_decision
            packet: runx.approval.decision.v1
        - id: package-report
          skill: ../draft-content
          runner: package
          scopes:
            - runx:content:package
          inputs:
            channel: trust-audit
          context:
            draft: draft-report.content_draft_packet.data.draft
            distribution_notes: draft-report.content_draft_packet.data.distribution_notes
      policy:
        transitions:
          - to: package-report
            field: approve-report.approval_decision.data.approved
            equals: true
