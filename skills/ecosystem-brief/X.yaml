skill: ecosystem-brief
version: "0.1.1"

catalog:
  kind: chain
  audience: public
  visibility: public


harness:
  cases:
    - name: ecosystem-brief-daily-brief
      inputs:
        objective: Identify the most important signal for runx evaluators this week
        audience: evaluators
        domain: OSS developer tools
        operator_context: Emphasize visible governance, not generic AI-product messaging.
        target_entities:
          - runx
          - sourcey
          - scafld
      caller:
        answers:
          agent_step.research.output:
            research_brief:
              objective: Identify the most important signal for runx evaluators this week.
              scope: OSS repo quality and evaluator expectations
              summary: Visible governance and repeatable skill packages are the key differentiators.
              open_questions: []
            evidence_log:
              - claim: Evaluators respond to visible receipts and bounded execution graphs.
                source: plans/runx.md
                confidence: verified
                relevance: determines the lead angle for the brief
            decision_support:
              - option: Lead with enforcement and proving-ground gaps closed in the repo.
                rationale: Most concrete proof point available now.
            risks: []
          agent_step.draft-content-draft.output:
            content_brief:
              angle: evaluator-oriented daily brief
            draft:
              title: "Today's signal: runx tightened its skill surface"
            review_checklist:
              - verify every repo claim
            distribution_notes:
              primary_channel: brief
          agent_step.draft-content-package.output:
            publish_packet:
              channel: brief
              headline: "Today's signal: runx tightened its skill surface"
            qa_checklist:
              - evidence reviewed
            handoff_notes:
              next_action: send or publish
        approvals:
          ecosystem-brief.publish.approval: true
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success

    - name: ecosystem-brief-minimal-inputs
      inputs:
        objective: Minimal smoke-case for ecosystem-brief regression
      expect:
        status: needs_resolution


runners:
  ecosystem-brief:
    default: true
    type: chain
    inputs:
      objective:
        type: string
        required: false
        default: "Identify the most important signal for runx evaluators this week"
        description: "Specific market or ecosystem question to answer."
      audience:
        type: string
        required: false
        default: "operators"
        description: "Audience for the final briefing."
      channel:
        type: string
        required: false
        default: "brief"
        description: "Final delivery channel."
      domain:
        type: string
        required: false
        default: "developer tools"
        description: "Ecosystem slice to monitor."
      operator_context:
        type: string
        required: false
        description: "Decision context or evaluation lens for the brief."
      target_entities:
        type: json
        required: false
        description: "Structured list of projects or companies to compare or monitor."
    chain:
      name: ecosystem-brief
      owner: runx
      steps:
        - id: research-market
          skill: ../research
          runner: research
          scopes:
            - runx:research:read
          inputs:
            deliverable: daily brief
        - id: draft-brief
          skill: ../draft-content
          runner: draft
          scopes:
            - runx:content:draft
          context:
            evidence_pack: research-market.research_packet.data
        - id: approve-brief
          run:
            type: approval
          inputs:
            gate_id: ecosystem-brief.publish.approval
            reason: Approve the ecosystem-brief draft before packaging the daily brief.
          context:
            draft: draft-brief.content_draft_packet.data.draft
            review_checklist: draft-brief.content_draft_packet.data.review_checklist
          artifacts:
            wrap_as: approval_decision
            packet: runx.approval.decision.v1
        - id: package-brief
          skill: ../draft-content
          runner: package
          scopes:
            - runx:content:package
          inputs:
            channel: brief
          context:
            draft: draft-brief.content_draft_packet.data.draft
            distribution_notes: draft-brief.content_draft_packet.data.distribution_notes
      policy:
        transitions:
          - to: package-brief
            field: approve-brief.approval_decision.data.approved
            equals: true
