skill: review-receipt
version: "0.2.0"

catalog:
  kind: graph
  audience: builder
  visibility: public
  role: context
  execution: read
  completion: runtime_receipt
  requires_adapter: false
  approval: none

harness:
  cases:
    - name: review-receipt-diagnoses-context-flattening
      inputs:
        receipt_id: rcpt_context_flattening
        receipt_rows:
          - receipt_id: rcpt_context_flattening
            skill_ref: skills/skill-lab
            status: failed
            created_at: "2026-07-16T00:00:00Z"
            verification_status: verified
        receipt_summary: Downstream step received JSON text instead of a structured object.
        harness_output: Context edge pointed at stdout and flattened the payload.
        skill_path: skills/skill-lab
      caller:
        answers:
          agent_task.review-receipt.output:
            verdict: needs_update
            failure_summary: Context edges are reading stdout instead of an artifact envelope, so structured data is flattened before the next step.
            improvement_proposals:
              - target: skills/skill-lab/X.yaml
                change: Emit a wrapped artifact from the upstream step and consume the named artifact data in downstream context.
                rationale: Preserves structured objects across governed graph steps.
                risk: Existing fixtures that parse stdout-shaped context will need updates.
            next_harness_checks:
              - skill-lab passes structured authoring context into the bounded author step
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: review-receipt-passes-on-paused-graph
      inputs:
        receipt_id: rcpt_paused
        receipt_rows:
          - receipt_id: rcpt_paused
            skill_ref: skills/research
            status: paused
            created_at: "2026-07-16T00:00:00Z"
            verification_status: verified
        receipt_summary: Graph paused at step 1 awaiting caller cognitive work.
        harness_output: needs_agent
        skill_path: skills/research
      caller:
        answers:
          agent_task.review-receipt.output:
            verdict: pass
            failure_summary: No failure. The graph paused as designed while awaiting caller cognitive work.
            improvement_proposals: []
            next_harness_checks:
              - target skill completes when a valid agent response is supplied
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

runners:
  review:
    default: true
    type: graph
    inputs:
      receipt_id:
        type: string
        required: false
        description: Exact receipt id to resolve through the native ledger.
      receipt_summary:
        type: string
        required: false
        description: Sanitized failure summary when detailed execution evidence is already available.
      harness_output:
        type: string
        required: false
        description: Sanitized native harness output or assertion failure.
      skill_path:
        type: string
        required: false
        description: Skill path being reviewed.
      receipt_rows:
        type: json
        required: false
        description: Explicit native-projection rows for deterministic replay only.
    graph:
      name: review-receipt
      steps:
        - id: evidence
          label: resolve and verify receipt evidence
          skill: ../ledger
          runner: read
          inputs:
            question: Resolve the exact receipt referenced by this failure review.
            receipt_ids:
              - $input.receipt_id
            proof:
              verify_chain: true
            receipts: $input.receipt_rows
        - id: diagnose
          label: diagnose one bounded failure
          run:
            type: agent-task
            agent: reviewer
            task: review-receipt
            outputs:
              verdict: string
              failure_summary: string
              improvement_proposals: array
              next_harness_checks: array
          instructions: >
            Diagnose one failure from native receipt evidence plus the supplied
            summary or harness output. Treat needs_agent or a paused receipt as
            a healthy suspension unless another concrete failure signal exists.
            Distinguish input, scope, tool, schema, timeout, policy, review, and
            harness failures. If receipt_id was supplied but native evidence did
            not match it, return blocked unless the supplied harness output alone
            proves the defect. Return verdict, a concise failure_summary, at most
            three bounded improvement_proposals, and replayable
            next_harness_checks. Each proposal must name target, change,
            rationale, and risk. Do not write files or weaken a refusal.
          allowed_tools:
            - fs.read
          context:
            receipt_evidence: evidence.ledger_answer_packet.data
          artifacts:
            wrap_as: failure_packet
            packet: runx.review.receipt.v1
