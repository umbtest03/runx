skill: review-receipt
version: "0.1.3"

catalog:
  kind: skill
  audience: builder
  visibility: public
  role: context
  execution: read
  completion: runtime_receipt
  requires_adapter: false
  approval: none
harness:
  cases:
    - name: review-receipt-diagnoses-context-flattening
      inputs:
        receipt_summary: Downstream step received JSON text instead of a structured object.
        harness_output: Context edge pointed at stdout and flattened the payload.
        skill_path: skills/skill-lab
      caller:
        answers:
          agent_task.review-receipt.output:
            verdict: needs_update
            failure_summary: Context edges are reading stdout instead of an artifact envelope, so structured data is flattened before the next step.
            improvement_proposals:
              - target: skills/skill-lab/X.yaml
                change: Emit a wrapped artifact from the upstream step and consume <step>.<artifact>.data in downstream context.
                rationale: Preserves structured objects across governed graph steps.
                risk: Existing tests that parse stdout-shaped context will need updates.
            next_harness_checks:
              - skill-lab passes structured authoring context into the bounded author step
              - skill-lab improve passes structured failure evidence into validation
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: review-receipt-passes-on-paused-graph
      inputs:
        receipt_summary: Graph paused at step 1 awaiting caller cognitive work; status needs_agent with one outstanding agent-task request.
        harness_output: needs_agent
        skill_path: skills/research
      caller:
        answers:
          agent_task.review-receipt.output:
            verdict: pass
            failure_summary: No failure. The graph paused at step 1 as designed, awaiting caller cognitive work; needs_agent is a healthy agent-mediated suspension in runx, not a failure class.
            improvement_proposals: []
            next_harness_checks:
              - target skill completes successfully on the happy path when valid agent outputs are supplied
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

runners:
  review-receipt-agent:
    default: true
    type: agent-task
    runx:
      post_run:
        reflect: never
    agent: reviewer
    task: review-receipt
    outputs:
      verdict: string
      failure_summary: string
      improvement_proposals: array
      next_harness_checks: array
    artifacts:
      wrap_as: review_receipt
      packet: runx.review.receipt.v1
    inputs:
      receipt_id:
        type: string
        required: false
        description: "Receipt id to review when available."
      receipt_summary:
        type: string
        required: false
        description: "Sanitized receipt or harness summary."
      harness_output:
        type: string
        required: false
        description: "Sanitized failed harness output."
      skill_path:
        type: string
        required: false
        description: "Skill path being improved."
