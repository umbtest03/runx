skill: payment-execute
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public

harness:
  cases:
    - name: payment-execute-mock-path
      runner: mock
      inputs:
        payment_signal:
          signal_type: payment_required
          challenge_id: ch_mock_001
          amount_minor: 125
          currency: USD
          rail: mock
          counterparty: merchant:demo
          operation: search.paid
        parent_payment_authority:
          authority_ref: authority:payment:test
        rail_profile_ref: rail-profile:mock:test
        realm: test
        idempotency_seed: demo-search-001
      caller:
        answers:
          agent_step.quote.output:
            payment_quote:
              quote_id: quote_demo_001
              amount_minor: 125
              currency: USD
              rails:
                - mock
              counterparty: merchant:demo
              operation: search.paid
            requested_payment_authority:
              term_id: authority-term:payment:quote-demo-001
              principal_ref:
                type: host
                uri: principal:operator:test
              resource_ref:
                type: surface
                uri: merchant:demo
              resource_family: payment
              verbs:
                - reserve
                - spend
              bounds:
                payment:
                  currency: USD
                  max_per_call_minor: 125
                  rails:
                    - mock
                  realm: test
              conditions: []
              approvals: []
              capabilities: []
              issued_by_ref:
                type: host
                uri: authority:payment:test
          agent_step.reserve.output:
            payment_decision:
              decision_id: decision_payment_demo_001
              selected: true
            reserved_payment_authority:
              term_id: authority-term:payment:reserve-demo-001
              principal_ref:
                type: host
                uri: principal:operator:test
              resource_ref:
                type: surface
                uri: merchant:demo
              resource_family: payment
              verbs:
                - spend
              capabilities:
                - payment_single_use_spend
              bounds:
                payment:
                  currency: USD
                  max_per_call_minor: 125
                  rails:
                    - mock
                  single_use_spend: true
                  credential_form: single_use_spend_capability
              conditions: []
              approvals: []
              issued_by_ref:
                type: host
                uri: authority:payment:test
            idempotency:
              key: payment:demo-search-001
            spend_capability_ref: capability:payment:demo-search-001
            approval:
              required: false
              status: not_required
            core_requirements:
              - payment_authority_subset
              - reserve_before_rail
              - receipt_before_success
            open_questions: []
          agent_step.fulfill.output:
            rail_result:
              status: fulfilled
              rail: mock
              amount_minor: 125
              currency: USD
            rail_proof:
              proof_ref: receipt-proof:mock:demo-search-001
              idempotency_key: payment:demo-search-001
            credential_envelope:
              form: paid_tool_credential
              credential_ref: credential:mock:demo-search-001
            redactions:
              - rail_session_material
            recovery_hint:
              status: sealed
        approvals:
          payment-execute.spend.approval: true
      expect:
        status: success
        receipt:
          schema: runx.harness_receipt.v1
          state: sealed
          disposition: closed
          reason_code: payment_execution_closed
        steps:
          - quote
          - reserve
          - approve-spend
          - fulfill

runners:
  mock:
    default: true
    type: graph
    inputs:
      payment_signal:
        type: object
        required: true
        description: "Payment-required signal or challenge."
      parent_payment_authority:
        type: object
        required: true
        description: "Parent payment authority term or authority reference."
      rail_profile_ref:
        type: string
        required: true
        description: "Configured rail profile reference."
      realm:
        type: string
        required: false
        description: "Authority realm."
      spend_policy:
        type: object
        required: false
        description: "Policy limits and approval thresholds."
      approval_context:
        type: object
        required: false
        description: "Prior approval evidence."
      idempotency_seed:
        type: string
        required: false
        description: "Stable idempotency material."
    graph:
      name: payment-execute
      owner: runx
      steps:
        - id: quote
          skill: ../payment-quote-preflight
          runner: quote
          scopes:
            - payment:quote
          inputs:
            payment_signal: "{{payment_signal}}"
            realm: "{{realm}}"
            idempotency_seed: "{{idempotency_seed}}"
          artifacts:
            wrap_as: payment_quote_packet
            packet: runx.payment.quote.v1
        - id: reserve
          skill: ../payment-authorize-reserve
          runner: reserve
          scopes:
            - payment:reserve
          mutation: true
          idempotency_key: payment-reserve
          inputs:
            parent_payment_authority: "{{parent_payment_authority}}"
            spend_policy: "{{spend_policy}}"
            approval_context: "{{approval_context}}"
            idempotency_seed: "{{idempotency_seed}}"
          context:
            payment_quote_packet: quote.payment_quote_packet.data
          artifacts:
            wrap_as: payment_reservation_packet
            packet: runx.payment.reservation.v1
        - id: approve-spend
          run:
            type: approval
          inputs:
            gate_id: payment-execute.spend.approval
            reason: Approve the reserved payment before a rail skill receives spend authority.
          context:
            payment_decision: reserve.payment_reservation_packet.data.payment_decision
            reserved_payment_authority: reserve.payment_reservation_packet.data.reserved_payment_authority
          artifacts:
            wrap_as: payment_approval
            packet: runx.payment.approval.v1
        - id: fulfill
          skill: ../payment-fulfill-rail
          runner: mock
          scopes:
            - payment:spend
          mutation: true
          idempotency_key: payment-fulfill
          inputs:
            payment_challenge: "{{payment_signal}}"
            rail_profile_ref: "{{rail_profile_ref}}"
          context:
            reserved_payment_authority: reserve.payment_reservation_packet.data.reserved_payment_authority
            spend_capability_ref: reserve.payment_reservation_packet.data.spend_capability_ref
            idempotency: reserve.payment_reservation_packet.data.idempotency
            quote_packet: quote.payment_quote_packet.data
          artifacts:
            wrap_as: payment_rail_packet
            packet: runx.payment.rail.v1
      policy:
        transitions:
          - to: fulfill
            field: approve-spend.payment_approval.data.approved
            equals: true
