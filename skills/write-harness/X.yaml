skill: write-harness
version: "0.1.1"

catalog:
  kind: skill
  audience: builder
  visibility: public
  role: context
harness:
  cases:
    - name: write-harness-new-skill-fixtures
      inputs:
        objective: Create a governed content pipeline skill
        decomposition:
          objective_summary: Create a governed content pipeline skill.
          orchestration_steps:
            - id: research
              skill: ../research
        research:
          findings:
            - claim: Separate research and drafting phases keep evidence auditable.
              confidence: verified
      caller:
        answers:
          agent_task.write-harness.output:
            skill_spec:
              name: content-pipeline
              description: Govern research and drafting before packaging a publishable bundle.
            pain_points:
              - Operators need a reviewable content workflow that preserves evidence between research and drafting.
            catalog_fit:
              adjacent_skills:
                - research
                - ghostwrite
              why_new: The current catalog has primitives for research and drafting, but not one governed content pipeline that binds them into a first-party skill graph.
            maintainer_decisions:
              - question: Should the first release stop at a packaged draft rather than publish?
                options:
                  - yes
                  - no
                why: Keeps the first-party graph bounded around review before any outward publish path.
            execution_plan:
              runner: graph
              phases:
                - research
                - draft
                - approve
            harness_fixture:
              - name: content-pipeline-happy-path
                kind: skill
                target: ../content-pipeline
                inputs:
                  objective: publish a daily brief
                expect:
                  status: sealed
              - name: content-pipeline-missing-objective
                kind: skill
                target: ../content-pipeline
                expect:
                  status: needs_agent
            acceptance_checks:
              - happy-path fixture passes
              - missing-objective fixture fails with needs_agent
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
    - name: write-harness-turns-review-into-regression-fixtures
      inputs:
        objective: Improve design-skill structured context handling
        review:
          verdict: needs_update
          improvement_proposals:
            - target: skills/design-skill/X.yaml
              change: swap stdout edges for artifact data edges
      caller:
        answers:
          agent_task.write-harness.output:
            skill_spec:
              name: design-skill
            pain_points:
              - Builder flows need stronger regression coverage when structured context moves between steps.
            catalog_fit:
              adjacent_skills:
                - design-skill
                - review-receipt
              why_new: This is not a new public skill. The proposal is a bounded builder update to an existing first-party builder surface.
            maintainer_decisions:
              - question: Should the regression lock only the structured-context happy path?
                options:
                  - yes
                  - no, add negative cases now
            execution_plan:
              runner: graph
            harness_fixture:
              - name: design-skill-structured-context
                kind: skill
                target: ../design-skill
                inputs:
                  objective: build a new skill
                expect:
                  status: sealed
            acceptance_checks:
              - downstream steps receive structured review and research data
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: write-harness-honors-pass-verdict
      inputs:
        objective: Confirm write-harness emits minimal regression output when review verdict is pass
        review:
          verdict: pass
          failure_summary: No failure. Graph paused as designed; needs_agent is a healthy agent-mediated suspension.
          improvement_proposals: []
      caller:
        answers:
          agent_task.write-harness.output:
            skill_spec:
              name: write-harness
              note: No change. Upstream review.verdict was pass.
            pain_points: []
            catalog_fit:
              adjacent_skills:
                - write-harness
              why_new: No new capability or catalog entry is proposed because the upstream review passed.
            maintainer_decisions: []
            execution_plan:
              runner: agent-task
              note: No change.
            harness_fixture:
              - name: write-harness-pass-verdict-regression
                kind: skill
                target: ../write-harness
                inputs:
                  objective: regression fixture locked in by cycle 3
                expect:
                  status: sealed
            acceptance_checks:
              - write-harness returns minimal output on pass-verdict input
              - write-harness does not fabricate skill_spec changes on empty improvement_proposals
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

runners:
  write-harness-agent:
    default: true
    type: agent-task
    agent: builder
    task: write-harness
    outputs:
      skill_spec: object
      pain_points: array
      catalog_fit: object
      maintainer_decisions: array
      execution_plan: object
      harness_fixture: array
      acceptance_checks: array
    artifacts:
      wrap_as: skill_design_packet
      packet: runx.skill.design.v1
    inputs:
      objective:
        type: string
        required: true
        description: "The skill objective to harness."
      decomposition:
        type: json
        required: false
        description: "Output from work-plan."
      research:
        type: json
        required: false
        description: "Output from prior-art."
      review:
        type: json
        required: false
        description: "Output from review-receipt when improving an existing skill."
