skill: scafld
version: "0.1.1"

catalog:
  kind: skill
  audience: public
  visibility: public


harness:
  cases:
    - name: scafld-review-boundary-yields-fresh-caller-request
      runner: agent
      inputs:
        task_id: proving-ground-scafld
        review_file: .ai/reviews/proving-ground-scafld.md
        review_prompt: |
          ADVERSARIAL REVIEW

          Review the bounded change set and return a pass/fail verdict with concrete findings.
      expect:
        status: needs_resolution

    - name: scafld-agent-needs-required-inputs
      runner: agent
      inputs: {}
      expect:
        status: needs_resolution


runners:
  agent:
    type: agent
    inputs:
      task_id:
        type: string
        required: true
        description: "scafld task id whose review artifact must be filled."
      review_file:
        type: string
        required: true
        description: "Review artifact path emitted by scafld review --json."
      review_prompt:
        type: string
        required: true
        description: "Adversarial review prompt emitted by scafld review --json."
      instruction:
        type: string
        required: false
        description: "Caller-facing review handoff instructions."

  scafld-cli:
    default: true
    type: cli-tool
    command: node
    args:
      - ./run.mjs
    timeout_seconds: 300
    input_mode: none
    inputs:
      command:
        type: string
        required: true
        description: "Native scafld command to run: init, new/spec, approve, start, exec/execute, audit, review, complete, validate, status, fail, cancel, report, branch, sync, summary, checks, or pr-body."
      task_id:
        type: string
        required: false
        description: "scafld task id for commands that target one spec."
      fixture:
        type: string
        required: false
        description: "Workspace root containing `.ai/`; used as the scafld working directory."
      title:
        type: string
        required: false
        description: "Direct title passed to `scafld new`."
      thread_title:
        type: string
        required: false
        description: "Canonical thread title accepted by composite wrappers that call `scafld new`."
      size:
        type: string
        required: false
        description: "Size passed to `scafld new`."
      risk:
        type: string
        required: false
        description: "Risk passed to `scafld new`."
      phase:
        type: string
        required: false
        description: "Optional phase passed to `scafld exec --phase`."
      base:
        type: string
        required: false
        description: "Optional base ref for `scafld audit --base` or `scafld branch --base`."
      name:
        type: string
        required: false
        description: "Optional branch name passed to `scafld branch --name`."
      bind_current:
        type: boolean
        required: false
        description: "When true, pass `--bind-current` to `scafld branch`."
      scafld_bin:
        type: string
        required: false
        description: "Explicit scafld executable path; defaults to SCAFLD_BIN or scafld on PATH."
      human_reviewed:
        type: boolean
        required: false
        description: "When true, pass --human-reviewed to scafld complete."
      reason:
        type: string
        required: false
        description: "Required with human_reviewed; forwarded to scafld complete --reason."
    runtime:
      requirements:
        - "scafld CLI with native JSON contracts available on PATH, via SCAFLD_BIN, or through explicit scafld_bin input"
