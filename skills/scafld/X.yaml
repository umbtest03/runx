skill: scafld
version: "0.2.1"

catalog:
  kind: skill
  audience: public
  visibility: public

harness:
  cases:
    - name: scafld-plan-json
      runner: scafld-cli
      inputs:
        command: plan
        task_id: proving-ground-scafld
        fixture: .
        title: Proving ground scafld
        scafld_bin: ./fixtures/scafld-v2-harness.mjs
      expect:
        status: success

runners:
  scafld-cli:
    default: true
    type: cli-tool
    command: node
    args:
      - ./run.mjs
    timeout_seconds: 300
    input_mode: none
    inputs:
      command:
        type: string
        required: true
        description: "scafld command to run: init, plan, harden, validate, approve, build, build_to_review, exec, review, complete, fail, cancel, status, list, report, or handoff."
      task_id:
        type: string
        required: false
        description: "scafld task id for commands that target one spec."
      fixture:
        type: string
        required: false
        description: "Workspace root containing `.scafld/`; used as the scafld working directory."
      title:
        type: string
        required: false
        description: "Direct title passed to `scafld plan`."
      summary:
        type: string
        required: false
        description: "Direct summary passed to `scafld plan`."
      thread_title:
        type: string
        required: false
        description: "Canonical thread title accepted by composite wrappers that call `scafld plan`."
      size:
        type: string
        required: false
        description: "Size passed to `scafld plan`."
      risk:
        type: string
        required: false
        description: "Risk passed to `scafld plan`."
      acceptance_command:
        type: string
        required: false
        description: "Acceptance command passed to `scafld plan --command`."
      mark_passed:
        type: boolean
        required: false
        description: "When true, pass `--mark-passed` to `scafld harden`."
      max_builds:
        type: string
        required: false
        description: "Maximum native `scafld build` advances for `build_to_review`; defaults to 12."
      provider:
        type: string
        required: false
        description: "Review provider passed to `scafld review --provider`."
      provider_command:
        type: string
        required: false
        description: "Review command passed to `scafld review --provider-command`."
      provider_binary:
        type: string
        required: false
        description: "Review provider binary passed to `scafld review --provider-binary`."
      model:
        type: string
        required: false
        description: "Review model passed to `scafld review --model`."
      scafld_bin:
        type: string
        required: false
        description: "Explicit scafld executable path; defaults to SCAFLD_BIN or scafld on PATH."
      scafld_min_version:
        type: string
        required: false
        description: "Minimum accepted scafld version for this runner; defaults to 2.4.0."
    runtime:
      requirements:
        - "scafld CLI 2.4.0 or newer with native JSON contracts available on PATH, via SCAFLD_BIN, or through explicit scafld_bin input"
