skill: vuln-disclosure
version: "0.1.1"

catalog:
  kind: graph
  audience: public
  visibility: public
  role: context
harness:
  cases:
    - name: vuln-disclosure-approved-advisory
      inputs:
        target: pnpm-lock.yaml
      caller:
        answers:
          agent_task.vuln-triage.output:
            dependency_inventory:
              target: pnpm-lock.yaml
            advisories:
              - package: example-lib
                severity: medium
                exposure: transitive
            remediation_plan:
              immediate:
                - patch example-lib
            operator_summary:
              verdict: investigate
              summary: One advisory is worth preparing.
          agent_task.vuln-triage-advisory.output:
            advisory_draft:
              title: Example advisory
              body: We identified a medium-severity transitive issue and are preparing remediation.
            maintainer_summary:
              audience: repo_owners
              summary: Patch path prepared.
            disclosure_checklist:
              - verify versions
              - verify patch
          agent_task.ghostwrite-package.output:
            publish_packet:
              channel: advisory
              headline: Example advisory
            qa_checklist:
              - disclosure checklist reviewed
            handoff_notes:
              next_action: publish after approval
        approvals:
          vuln-disclosure.publish.approval: true
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: vuln-disclosure-needs-target
      inputs: {}
      expect:
        status: failure


runners:
  vuln-disclosure:
    default: true
    type: graph
    inputs:
      target:
        type: string
        required: true
        description: "Repo, lockfile, package set, or ecosystem slice to review."
      objective:
        type: string
        required: false
        default: "Identify whether a public-facing advisory should be prepared"
        description: "Question the scan should answer."
      channel:
        type: string
        required: false
        default: "advisory"
        description: "Final publication channel."
      scan_context:
        type: json
        required: false
        description: "Known incidents or prior findings."
      cve_evidence:
        type: json
        required: false
        description: "Verified exact-version CVE evidence from cve-audit. When present, the risk triage grounds its advisory in these confirmed findings."
    graph:
      name: vuln-disclosure
      steps:
        - id: scan-risk
          skill: ../vuln-triage
          runner: scan
          scopes:
            - runx:security:read
        - id: draft-advisory
          skill: ../vuln-triage
          runner: advisory
          scopes:
            - runx:security:write-proposal
          context:
            advisories: scan-risk.vulnerability_scan_packet.data.advisories
            remediation_plan: scan-risk.vulnerability_scan_packet.data.remediation_plan
        - id: approve-advisory
          run:
            type: approval
          inputs:
            gate_id: vuln-disclosure.publish.approval
            reason: Approve the drafted advisory before packaging it for publication.
          context:
            advisory_draft: draft-advisory.vulnerability_advisory_packet.data.advisory_draft
            disclosure_checklist: draft-advisory.vulnerability_advisory_packet.data.disclosure_checklist
          artifacts:
            wrap_as: approval_decision
            packet: runx.approval.decision.v1
        - id: package-advisory
          skill: ../ghostwrite
          runner: package
          scopes:
            - runx:content:package
          inputs:
            channel: advisory
          context:
            draft: draft-advisory.vulnerability_advisory_packet.data.advisory_draft
      policy:
        guards:
          - step: package-advisory
            field: approve-advisory.approval_decision.data.approved
            equals: true
