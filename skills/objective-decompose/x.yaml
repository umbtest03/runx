skill: objective-decompose

harness:
  cases:
    - name: objective-decompose-bounded-plan
      inputs:
        objective: Launch a governed market-intelligence briefing flow
        project_context: OSS skill package catalog
        change_set:
          change_set_id: change_set_market_intelligence
          source:
            type: operator_objective
            id: market-intelligence
          summary: Launch a governed market-intelligence briefing flow.
          category: other
          severity: medium
          recommended_lane: objective-decompose
          commence_decision: approve
          action_decision: proceed_to_plan
          target_surfaces:
            - surface: runx-ops
              kind: other
              mutating: false
              rationale: The flow is an internal governed content lane.
          shared_invariants:
            - Keep the flow research-backed and approval-gated.
          success_criteria:
            - One bounded governed content plan is produced.
      caller:
        answers:
          agent_step.objective-decomposition.output:
            change_set:
              change_set_id: change_set_market_intelligence
              source:
                type: operator_objective
                id: market-intelligence
              summary: Launch a governed market-intelligence briefing flow.
              category: other
              severity: medium
              recommended_lane: objective-decompose
              commence_decision: approve
              action_decision: proceed_to_plan
              target_surfaces:
                - surface: runx-ops
                  kind: other
                  mutating: false
                  rationale: The flow is an internal governed content lane.
              shared_invariants:
                - Keep the flow research-backed and approval-gated.
              success_criteria:
                - One bounded governed content plan is produced.
            objective_summary: Launch a governed market-intelligence briefing flow.
            workspace_change_plan:
              plan_id: workspace_plan_market_intelligence
              change_set_id: change_set_market_intelligence
              objective_summary: Launch a governed market-intelligence briefing flow.
              shared_invariants:
                - Keep the flow research-backed and approval-gated.
              success_criteria:
                - One bounded governed content plan is produced.
              phases:
                - id: phase-research-and-draft
                  name: Research and draft
                  depends_on: []
                  parallelizable: false
                  repo_change_requests:
                    - id: market-intelligence-content
                      repo: runx-ops
                      task_id: market-intelligence-content
                      objective: Produce research and draft a publishable briefing.
                      depends_on: []
                      shared_context_refs:
                        - change_set.target_surfaces[0]
                      validation_commands:
                        - pnpm --dir oss test tests/external-skill-dogfood.test.ts
                      mutating: false
              integration_checks:
                - The resulting content lane remains approval-gated before publication.
              open_questions: []
            orchestration_steps:
              - id: research-brief
                skill: ../research
                scopes:
                  - runx:research:read
                mutating: false
                inputs: {}
                context_from: []
                description: Produce a bounded research packet on the ecosystem topic.
              - id: draft-brief
                skill: ../draft-content
                scopes:
                  - runx:content:draft
                mutating: false
                inputs: {}
                context_from:
                  - research-brief.research_packet
                description: Draft the publishable briefing from verified evidence.
              - id: approve
                skill: approval
                scopes:
                  - runx:content:approve
                mutating: false
                inputs: {}
                context_from:
                  - draft-brief.content_draft_packet
                description: Route the draft through the publishing approval gate.
            required_skills:
              - name: research
                exists: true
              - name: draft-content
                exists: true
            open_questions: []
      expect:
        status: success
        receipt:
          kind: skill_execution
          status: success
          subject:
            skill_name: objective-decompose
            source_type: agent-step
    - name: objective-decompose-phased-workspace-plan
      inputs:
        objective: Roll out abandoned cart recovery across api, app, and mcp
        project_context: Nitrosend workspace with repo-local worker lanes
        change_set:
          change_set_id: change_set_abandoned_cart_982
          source:
            type: support_request
            id: "982"
          summary: Add abandoned cart recovery across api, app, and mcp.
          category: feature_request
          severity: medium
          recommended_lane: objective-decompose
          commence_decision: approve
          action_decision: proceed_to_plan
          target_surfaces:
            - surface: api
              kind: repo
              mutating: true
              rationale: Backend flow rules and event handling must change first.
            - surface: app
              kind: repo
              mutating: true
              rationale: Operator and user-visible surfaces need coordinated updates.
            - surface: mcp
              kind: repo
              mutating: true
              rationale: Tool contracts must stay aligned with api and app behavior.
          shared_invariants:
            - Preserve current checkout and cart event semantics.
            - Child workers must share one governed abandoned-cart objective.
          success_criteria:
            - Cross-repo rollout happens through one phased workspace plan.
            - Integration checks verify api, app, and mcp remain aligned.
      caller:
        answers:
          agent_step.objective-decomposition.output:
            change_set:
              change_set_id: change_set_abandoned_cart_982
              source:
                type: support_request
                id: "982"
              summary: Add abandoned cart recovery across api, app, and mcp.
              category: feature_request
              severity: medium
              recommended_lane: objective-decompose
              commence_decision: approve
              action_decision: proceed_to_plan
              target_surfaces:
                - surface: api
                  kind: repo
                  mutating: true
                  rationale: Backend flow rules and event handling must change first.
                - surface: app
                  kind: repo
                  mutating: true
                  rationale: Operator and user-visible surfaces need coordinated updates.
                - surface: mcp
                  kind: repo
                  mutating: true
                  rationale: Tool contracts must stay aligned with api and app behavior.
              shared_invariants:
                - Preserve current checkout and cart event semantics.
                - Child workers must share one governed abandoned-cart objective.
              success_criteria:
                - Cross-repo rollout happens through one phased workspace plan.
                - Integration checks verify api, app, and mcp remain aligned.
            objective_summary: Roll out abandoned cart recovery across api, app, and mcp.
            workspace_change_plan:
              plan_id: workspace_plan_abandoned_cart_982
              change_set_id: change_set_abandoned_cart_982
              objective_summary: Roll out abandoned cart recovery across api, app, and mcp.
              shared_invariants:
                - Preserve current checkout and cart event semantics.
                - Child workers must share one governed abandoned-cart objective.
              success_criteria:
                - Cross-repo rollout happens through one phased workspace plan.
                - Integration checks verify api, app, and mcp remain aligned.
              phases:
                - id: phase-contract-freeze
                  name: Freeze backend contract
                  depends_on: []
                  parallelizable: false
                  repo_change_requests:
                    - id: api-abandoned-cart
                      repo: nitrosend/api
                      task_id: issue-982-api
                      objective: Implement backend abandoned cart flow rules and emit the contract surface.
                      depends_on: []
                      shared_context_refs:
                        - change_set.shared_invariants
                      validation_commands:
                        - bundle exec rspec spec
                      mutating: true
                - id: phase-consumers
                  name: Update consumers against frozen contract
                  depends_on:
                    - phase-contract-freeze
                  parallelizable: true
                  repo_change_requests:
                    - id: app-abandoned-cart
                      repo: nitrosend/app
                      task_id: issue-982-app
                      objective: Update operator and user-facing app surfaces to match the backend flow contract.
                      depends_on:
                        - api-abandoned-cart
                      shared_context_refs:
                        - phase-contract-freeze.repo_change_requests[0]
                      validation_commands:
                        - pnpm test
                      mutating: true
                    - id: mcp-abandoned-cart
                      repo: nitrosend/mcp
                      task_id: issue-982-mcp
                      objective: Align MCP capabilities and exposed operations with the frozen backend contract.
                      depends_on:
                        - api-abandoned-cart
                      shared_context_refs:
                        - phase-contract-freeze.repo_change_requests[0]
                      validation_commands:
                        - pnpm test
                      mutating: true
              integration_checks:
                - api contract and downstream consumers agree on abandoned cart flow semantics
                - all child PRs reference the same change_set_id and phased plan
              open_questions:
                - Should rollout remain behind an explicit feature flag for the first release?
            orchestration_steps:
              - id: freeze-contract
                skill: ../issue-to-pr
                scopes:
                  - git.write
                mutating: true
                inputs:
                  target_repo: nitrosend/api
                context_from:
                  - change_set
                description: Implement the backend contract first and freeze the shared interface.
              - id: update-app
                skill: ../issue-to-pr
                scopes:
                  - git.write
                mutating: true
                inputs:
                  target_repo: nitrosend/app
                context_from:
                  - freeze-contract
                description: Update the app against the frozen backend contract.
              - id: update-mcp
                skill: ../issue-to-pr
                scopes:
                  - git.write
                mutating: true
                inputs:
                  target_repo: nitrosend/mcp
                context_from:
                  - freeze-contract
                description: Update the MCP layer against the frozen backend contract.
            required_skills:
              - name: issue-to-pr
                exists: true
              - name: support-triage
                exists: true
            open_questions:
              - Should rollout remain behind an explicit feature flag for the first release?
      expect:
        status: success
        receipt:
          kind: skill_execution
          status: success
          subject:
            skill_name: objective-decompose
            source_type: agent-step

runners:
  objective-decompose-agent:
    default: true
    type: agent-step
    agent: builder
    task: objective-decomposition
    outputs:
      change_set: object
      objective_summary: string
      workspace_change_plan: object
      orchestration_steps: array
      required_skills: array
      open_questions: array
    artifacts:
      wrap_as: objective_decomposition
    inputs:
      objective:
        type: string
        required: true
        description: "The build or skill objective to decompose."
      project_context:
        type: string
        required: false
        description: "Optional repo, product, or user context for the objective."
      change_set:
        type: object
        required: false
        description: "Optional parent change set from support-triage or a workspace supervisor."
