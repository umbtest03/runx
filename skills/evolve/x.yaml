skill: evolve

harness:
  cases:
    - name: evolve-introspect
      runner: introspect
      inputs:
        repo_root: .
      caller:
        answers:
          agent_step.evolve-introspect.output:
            opportunity_report:
              summary: Documentation and release hygiene are the highest-leverage gaps.
              opportunities:
                - id: docs-release-notes
                  title: Add release notes workflow
                  impact: high
                  effort: low
            recommended_objective:
              objective: add release notes
              rationale: Clear user-facing gap with bounded implementation scope.
            change_plan:
              steps:
                - draft release notes process
                - add docs
              estimated_scope: small
              risk_assessment: low
            spec_document:
              spec_version: "1.1"
              task_id: evolve_release_notes
              phases:
                - scope
                - model
                - materialize
      expect:
        status: success
        receipt:
          kind: chain_execution
          status: success
    - name: evolve-plan-spec
      runner: evolve
      inputs:
        objective: add release notes
        repo_root: .
        terminate: spec
      caller:
        answers:
          agent_step.evolve-plan.output:
            objective_brief:
              objective: add release notes
              target_type: repo
              target_ref: .
            diagnosis_report:
              findings:
                - docs missing
              recommended_phases:
                - plan
                - act
            change_plan:
              steps:
                - draft release notes
              estimated_scope: small
              risk_assessment: low
            spec_document:
              spec_version: "1.1"
              task_id: evolve_release_notes
              phases:
                - plan
                - act
        approvals:
          evolve.plan.approval: true
      expect:
        status: success
        receipt:
          kind: chain_execution
          status: success

runners:
  introspect:
    type: chain
    inputs:
      repo_root:
        type: string
        required: false
        default: "."
        description: "Repository root to inspect."
    chain:
      name: evolve-introspect
      steps:
        - id: preflight
          label: inspect repo
          run:
            type: cli-tool
            command: node
            args:
              - -e
              - |
                const fs = require("node:fs");
                const path = require("node:path");
                const inputs = JSON.parse(process.env.RUNX_INPUTS_JSON || "{}");
                const callerRoot = process.env.RUNX_CWD || process.cwd();
                const repoRoot = path.resolve(callerRoot, String(inputs.repo_root || "."));
                const hasScafld = fs.existsSync(path.join(repoRoot, ".ai"));
                const packageJsonPath = path.join(repoRoot, "package.json");
                const packageJson = fs.existsSync(packageJsonPath)
                  ? JSON.parse(fs.readFileSync(packageJsonPath, "utf8"))
                  : null;
                const languages = [];
                if (packageJson) languages.push("javascript");
                if (fs.existsSync(path.join(repoRoot, "pnpm-workspace.yaml"))) languages.push("typescript");
                process.stdout.write(JSON.stringify({
                  repo_profile: {
                    root: repoRoot,
                    has_scafld: hasScafld,
                    languages,
                    risk_signals: hasScafld ? [] : ["missing_scafld"]
                  }
                }));
          artifacts:
            named_emits:
              repo_profile: repo_profile
        - id: introspect
          label: recommend next improvement
          run:
            type: agent-step
            agent: builder
            task: evolve-introspect
            outputs:
              opportunity_report: object
              recommended_objective: object
              change_plan: object
              spec_document: object
          instructions: >
            Deeply analyze the current repository and recommend one bounded,
            high-leverage improvement. Produce an opportunity_report,
            recommended_objective, change_plan, and spec_document grounded in
            real repo evidence. This is introspection and recommendation only:
            do not propose hidden execution loops, mutations, or approval
            gating in this runner.
          allowed_tools:
            - fs.read
            - git.status
            - shell.exec
          context:
            repo_profile: preflight.repo_profile.data
          artifacts:
            named_emits:
              opportunity_report: opportunity_report
              recommended_objective: recommended_objective
              change_plan: change_plan
              spec_document: spec_document
  evolve:
    default: true
    type: chain
    inputs:
      objective:
        type: string
        required: true
        description: "Objective to evolve the repository toward."
      repo_root:
        type: string
        required: false
        default: "."
        description: "Repository root to inspect and evolve."
      terminate:
        type: string
        required: false
        default: "spec"
        description: "Bounded termination target: spec, patch, or pr."
    chain:
      name: evolve
      steps:
        - id: preflight
          label: inspect repo
          run:
            type: cli-tool
            command: node
            args:
              - -e
              - |
                const fs = require("node:fs");
                const path = require("node:path");
                const inputs = JSON.parse(process.env.RUNX_INPUTS_JSON || "{}");
                const callerRoot = process.env.RUNX_CWD || process.cwd();
                const repoRoot = path.resolve(callerRoot, String(inputs.repo_root || "."));
                const hasScafld = fs.existsSync(path.join(repoRoot, ".ai"));
                const packageJsonPath = path.join(repoRoot, "package.json");
                const packageJson = fs.existsSync(packageJsonPath)
                  ? JSON.parse(fs.readFileSync(packageJsonPath, "utf8"))
                  : null;
                const languages = [];
                if (packageJson) languages.push("javascript");
                if (fs.existsSync(path.join(repoRoot, "pnpm-workspace.yaml"))) languages.push("typescript");
                process.stdout.write(JSON.stringify({
                  repo_profile: {
                    root: repoRoot,
                    has_scafld: hasScafld,
                    languages,
                    risk_signals: hasScafld ? [] : ["missing_scafld"]
                  }
                }));
          artifacts:
            named_emits:
              repo_profile: repo_profile
        - id: plan
          label: draft evolve plan
          run:
            type: agent-step
            agent: builder
            task: evolve-plan
            outputs:
              objective_brief: object
              diagnosis_report: object
              change_plan: object
              spec_document: object
          instructions: >
            Using the evolve skill environment, produce a bounded objective_brief,
            diagnosis_report, change_plan, and spec_document. Keep them practical
            and directly actionable for the current repository. This is one
            bounded planning pass, not an open-ended improvement loop. If a
            revision path is needed, state it explicitly and keep it limited.
          allowed_tools:
            - fs.read
            - git.status
            - shell.exec
          context:
            repo_profile: preflight.repo_profile.data
          artifacts:
            named_emits:
              objective_brief: objective_brief
              diagnosis_report: diagnosis_report
              change_plan: change_plan
              spec_document: spec_document
        - id: approve
          label: approve evolve plan
          run:
            type: approval
          inputs:
            gate_id: evolve.plan.approval
            reason: Approve the evolve plan before any acting or publishing phase.
          context:
            objective_brief: plan.objective_brief.data
            change_plan: plan.change_plan.data
            spec_document: plan.spec_document.data
          artifacts:
            wrap_as: approval_decision
        - id: act
          label: apply bounded change
          run:
            type: cli-tool
            command: node
            args:
              - -e
              - |
                const inputs = JSON.parse(process.env.RUNX_INPUTS_JSON || "{}");
                const terminate = String(inputs.terminate || "spec");
                const approved = Boolean(inputs.approved);
                const noOp = terminate === "spec" || !approved;
                process.stdout.write(JSON.stringify({
                  execution_report: {
                    steps_completed: noOp ? 0 : 1,
                    files_changed: noOp ? [] : ["README.md"],
                    receipt_ids: []
                  },
                  verification_report: {
                    passed: approved,
                    checks: noOp ? ["bounded_noop"] : ["synthetic_check"]
                  },
                  review_report: {
                    verdict: approved ? "approve" : "reject",
                    findings: []
                  }
                }));
          scopes:
            - runx:evolve:draft_write
          context:
            approved: approve.approval_decision.data.approved
            change_plan: plan.change_plan.data
            spec_document: plan.spec_document.data
            repo_profile: preflight.repo_profile.data
          artifacts:
            named_emits:
              execution_report: execution_report
              verification_report: verification_report
              review_report: review_report
        - id: publish
          label: publish result
          run:
            type: cli-tool
            command: node
            args:
              - -e
              - |
                const inputs = JSON.parse(process.env.RUNX_INPUTS_JSON || "{}");
                const terminate = String(inputs.terminate || "spec");
                const reviewVerdict = String(inputs.review_verdict || "reject");
                const published = terminate === "pr" && reviewVerdict === "approve";
                process.stdout.write(JSON.stringify({
                  publish_report: {
                    published,
                    target: published ? "pull_request" : "none",
                    artifact_refs: []
                  }
                }));
          scopes:
            - runx:evolve:write
          context:
            review_verdict: act.review_report.data.verdict
            execution_report: act.execution_report.data
          artifacts:
            named_emits:
              publish_report: publish_report
      policy:
        transitions:
          - to: act
            field: approve.approval_decision.data.approved
            equals: true
          - to: publish
            field: act.review_report.data.verdict
            equals: approve
