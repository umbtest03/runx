skill: evolve
version: "0.1.1"

catalog:
  kind: chain
  audience: operator
  visibility: private


harness:
  cases:
    - name: evolve-introspect
      runner: introspect
      env:
        RUNX_KNOWLEDGE_DIR: knowledge
      inputs:
        repo_root: .
      caller:
        answers:
          agent_step.evolve-introspect.output:
            opportunity_report:
              summary: Documentation and release hygiene are the highest-leverage gaps.
              opportunities:
                - id: docs-release-notes
                  title: Add release notes workflow
                  impact: high
                  effort: low
            recommended_objective:
              objective: add release notes
              rationale: Clear user-facing gap with bounded implementation scope.
            change_plan:
              steps:
                - draft release notes process
                - add docs
              estimated_scope: small
              risk_assessment: low
            spec_document:
              spec_version: "1.1"
              task_id: evolve_release_notes
              phases:
                - scope
                - model
                - materialize
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success
    - name: evolve-plan-spec
      runner: evolve
      env:
        RUNX_KNOWLEDGE_DIR: knowledge
      inputs:
        objective: add release notes
        repo_root: .
        terminate: spec
      caller:
        answers:
          agent_step.evolve-plan.output:
            objective_brief:
              objective: add release notes
              target_type: repo
              target_ref: .
            diagnosis_report:
              findings:
                - docs missing
              recommended_phases:
                - scope
                - model
            change_plan:
              steps:
                - draft release notes
              estimated_scope: small
              risk_assessment: low
            spec_document:
              spec_version: "1.1"
              task_id: evolve_release_notes
              phases:
                - scope
                - ingest
                - model
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success

runners:
  introspect:
    type: chain
    runx:
      post_run:
        reflect: never
    inputs:
      repo_root:
        type: string
        required: false
        default: "."
        description: "Repository root to inspect."
    chain:
      name: evolve-introspect
      steps:
        - id: preflight
          label: inspect repo
          run:
            type: cli-tool
            command: node
            args:
              - ./inspect_repo.mjs
          artifacts:
            named_emits:
              repo_profile: repo_profile
            packets:
              repo_profile: runx.repo.profile.v1
        - id: introspect
          label: recommend next improvement
          run:
            type: agent-step
            agent: builder
            task: evolve-introspect
            outputs:
              opportunity_report: object
              recommended_objective: object
              change_plan: object
              spec_document: object
          instructions: >
            Deeply analyze the current repository and recommend one bounded,
            high-leverage improvement. Produce an opportunity_report,
            recommended_objective, change_plan, and spec_document grounded in
            real repo evidence. This is introspection and recommendation only:
            do not propose hidden execution loops, mutations, or approval
            gating in this runner.
          allowed_tools:
            - fs.read
            - git.status
            - shell.exec
          context:
            repo_profile: preflight.repo_profile.data
          artifacts:
            named_emits:
              opportunity_report: opportunity_report
              recommended_objective: recommended_objective
              change_plan: change_plan
              spec_document: spec_document
  evolve:
    default: true
    type: chain
    runx:
      post_run:
        reflect: auto
    inputs:
      objective:
        type: string
        required: true
        description: "Objective to evolve the repository toward."
      repo_root:
        type: string
        required: false
        default: "."
        description: "Repository root to inspect and evolve."
      terminate:
        type: string
        required: false
        default: "spec"
        description: "Bounded termination target. Current shipped runner only supports spec."
    chain:
      name: evolve
      steps:
        - id: validate-mode
          label: validate mode
          run:
            type: cli-tool
            command: node
            args:
              - ./validate_mode.mjs
        - id: preflight
          label: inspect repo
          run:
            type: cli-tool
            command: node
            args:
              - ./inspect_repo.mjs
          artifacts:
            named_emits:
              repo_profile: repo_profile
            packets:
              repo_profile: runx.repo.profile.v1
        - id: plan
          label: draft evolve plan
          run:
            type: agent-step
            agent: builder
            task: evolve-plan
            outputs:
              objective_brief: object
              diagnosis_report: object
              change_plan: object
              spec_document: object
          instructions: >
            Using the evolve skill environment, produce a bounded objective_brief,
            diagnosis_report, change_plan, and spec_document. Keep them practical
            and directly actionable for the current repository. This runner ends
            at plan/spec artifacts. Do not imply hidden mutation, publish, or
            autonomous execution. If later execution is needed, name the real
            downstream skill or substrate explicitly and keep the lane bounded.
          allowed_tools:
            - fs.read
            - git.status
            - shell.exec
          context:
            repo_profile: preflight.repo_profile.data
          artifacts:
            named_emits:
              objective_brief: objective_brief
              diagnosis_report: diagnosis_report
              change_plan: change_plan
              spec_document: spec_document
