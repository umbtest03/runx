skill: evolve
version: 0.1.2
catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical
runners:
  introspect:
    type: graph
    runx:
      post_run:
        reflect: never
    inputs:
      repo_root:
        type: string
        required: false
        default: .
        description: Repository root to inspect.
    graph:
      name: evolve-introspect
      steps:
        - id: preflight
          label: inspect repo
          run:
            type: cli-tool
            command: node
            args:
              - ./inspect_repo.mjs
          artifacts:
            named_emits:
              repo_profile: repo_profile
            packets:
              repo_profile: runx.repo.profile.v1
        - id: introspect
          label: recommend next improvement
          run:
            type: agent-task
            agent: builder
            task: evolve-introspect
            outputs:
              opportunity_report: object
              recommended_objective: object
              change_plan: object
              spec_document: object
          instructions: |
            Deeply analyze the current repository and recommend one bounded, high-leverage improvement grounded in repo_profile and other visible repo evidence. Produce an opportunity_report, recommended_objective, change_plan, and spec_document that a maintainer could review without reverse-engineering hidden context. If the repo evidence is thin or the highest-leverage move is still ambiguous, keep the recommendation narrow and say what evidence is missing instead of inventing a broad rewrite. This is introspection and recommendation only: do not propose hidden execution loops, mutations, or approval gating in this runner.
          allowed_tools:
            - fs.read
            - git.status
            - shell.exec
          context:
            repo_profile: preflight.repo_profile.data
          artifacts:
            named_emits:
              opportunity_report: opportunity_report
              recommended_objective: recommended_objective
              change_plan: change_plan
              spec_document: spec_document
  evolve:
    default: true
    type: graph
    runx:
      post_run:
        reflect: auto
    inputs:
      objective:
        type: string
        required: true
        description: Objective to evolve the repository toward.
      repo_root:
        type: string
        required: false
        default: .
        description: Repository root to inspect and evolve.
      terminate:
        type: string
        required: false
        default: spec
        description: Bounded termination target. Current shipped runner only supports spec.
    graph:
      name: evolve
      steps:
        - id: validate-mode
          label: validate mode
          run:
            type: cli-tool
            command: node
            args:
              - ./validate_mode.mjs
        - id: preflight
          label: inspect repo
          run:
            type: cli-tool
            command: node
            args:
              - ./inspect_repo.mjs
          artifacts:
            named_emits:
              repo_profile: repo_profile
            packets:
              repo_profile: runx.repo.profile.v1
        - id: plan
          label: draft evolve plan
          run:
            type: agent-task
            agent: builder
            task: evolve-plan
            outputs:
              objective_brief: object
              diagnosis_report: object
              change_plan: object
              spec_document: object
          instructions: |
            Using objective, terminate, repo_root, and repo_profile, produce a bounded objective_brief, diagnosis_report, change_plan, and spec_document for the current repository. Keep every field grounded in visible repo evidence; do not generalize beyond what the repo profile and cited surfaces support. This runner ends at plan/spec artifacts only. Do not imply hidden mutation, publish, or autonomous execution. If the evidence is too thin for a responsible patch or PR lane, keep the plan narrow and explicit about the missing evidence instead of inventing scope. spec_document must remain a planning artifact for terminate=spec and must not assume a patch or PR lane already exists. If later execution is needed, name the real downstream skill or substrate explicitly and keep the lane bounded.
          allowed_tools:
            - fs.read
            - git.status
            - shell.exec
          context:
            repo_profile: preflight.repo_profile.data
          artifacts:
            named_emits:
              objective_brief: objective_brief
              diagnosis_report: diagnosis_report
              change_plan: change_plan
              spec_document: spec_document
