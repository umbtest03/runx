skill: harness-author

harness:
  cases:
    - name: harness-author-new-skill-fixtures
      inputs:
        objective: Create a governed content pipeline skill
        decomposition:
          objective_summary: Create a governed content pipeline skill.
          orchestration_steps:
            - id: research
              skill: ../research
        research:
          findings:
            - claim: Separate research and drafting phases keep evidence auditable.
              confidence: verified
      caller:
        answers:
          agent_step.harness-author.output:
            skill_spec:
              name: content-pipeline
              description: Govern research and drafting before packaging a publishable bundle.
            execution_plan:
              runner: chain
              phases:
                - research
                - draft
                - approve
            harness_fixture:
              - name: content-pipeline-happy-path
                kind: skill
                target: ../content-pipeline
                inputs:
                  objective: publish a daily brief
                expect:
                  status: success
              - name: content-pipeline-missing-objective
                kind: skill
                target: ../content-pipeline
                expect:
                  status: needs_resolution
            acceptance_checks:
              - happy-path fixture passes
              - missing-objective fixture fails with needs_resolution
      expect:
        status: success
        receipt:
          kind: skill_execution
          status: success
          subject:
            skill_name: harness-author
            source_type: agent-step
    - name: harness-author-turns-review-into-regression-fixtures
      inputs:
        objective: Improve objective-to-skill structured context handling
        review:
          verdict: needs_update
          improvement_proposals:
            - target: x.yaml
              change: swap stdout edges for artifact data edges
      caller:
        answers:
          agent_step.harness-author.output:
            skill_spec:
              name: objective-to-skill
            execution_plan:
              runner: chain
            harness_fixture:
              - name: objective-to-skill-structured-context
                kind: skill
                target: ../objective-to-skill
                inputs:
                  objective: build a new skill
                expect:
                  status: success
            acceptance_checks:
              - downstream steps receive structured review and research data
      expect:
        status: success
        receipt:
          kind: skill_execution
          status: success
          subject:
            skill_name: harness-author
            source_type: agent-step

runners:
  harness-author-agent:
    default: true
    type: agent-step
    agent: builder
    task: harness-author
    outputs:
      skill_spec: object
      execution_plan: object
      harness_fixture: array
      acceptance_checks: array
    artifacts:
      wrap_as: skill_design_packet
    inputs:
      objective:
        type: string
        required: true
        description: "The skill objective to harness."
      decomposition:
        type: json
        required: false
        description: "Output from objective-decompose."
      research:
        type: json
        required: false
        description: "Output from skill-research."
      review:
        type: json
        required: false
        description: "Output from receipt-review when improving an existing skill."
