skill: pay-recover
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: public

harness:
  cases:
    - name: pay-recovery-finds-proof
      runner: inspect
      inputs:
        idempotency:
          key: payment:demo-search-001
        reserved_payment_authority:
          term_id: authority-term:payment:reserve-demo-001
          principal_ref:
            type: host
            uri: principal:operator:test
          resource_ref:
            type: surface
            uri: merchant:demo
          resource_family: payment
          verbs:
            - spend
          capabilities:
            - payment_single_use_spend
          bounds:
            payment:
              currency: USD
              max_per_call_minor: 125
              rails:
                - mock
              realm: test
              counterparty: merchant:demo
              operation: search.paid
              single_use_spend: true
          conditions: []
          approvals: []
          issued_by_ref:
            type: host
            uri: authority:payment:test
        rail_profile_ref: rail-profile:mock:test
        prior_rail_result:
          status: timeout_after_mutation
      caller:
        answers:
          agent_task.pay-recover.output:
            recovery_assessment:
              status: recovered
              already_mutated: true
            rail_lookup:
              idempotency_key: payment:demo-search-001
              rail_profile_ref: rail-profile:mock:test
            proof_refs:
              - receipt-proof:mock:demo-search-001
            recommended_action:
              action: seal_recovered_proof
            open_questions: []
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: payment_recovery_closed

runners:
  inspect:
    default: true
    type: agent-task
    agent: operator
    task: pay-recover
    outputs:
      recovery_assessment: object
      rail_lookup: object
      proof_refs: array
      recommended_action: object
      open_questions: array
    artifacts:
      wrap_as: payment_recovery_packet
      packet: runx.payment.recovery.v1
    runx:
      payment_authority:
        phase: recover
        resource_family: payment
        verbs:
          - verify
        mutates_rail: false
        receives_funding_material: false
        checks_idempotency_before_retry: true
    inputs:
      idempotency:
        type: object
        required: true
        description: "Reservation key and recovery lookup fields."
      reserved_payment_authority:
        type: object
        required: true
        description: "Child payment authority term."
      rail_profile_ref:
        type: string
        required: true
        description: "Configured rail profile reference."
      prior_rail_result:
        type: object
        required: false
        description: "Previous rail attempt result."
      receipt_refs:
        type: json
        required: false
        description: "Existing harness or rail proof refs."
