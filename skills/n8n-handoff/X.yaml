skill: n8n-handoff
version: 0.1.0
catalog:
  kind: graph
  audience: operator
  visibility: internal
  role: context
harness:
  cases:
    - name: n8n-handoff-preflight-ready
      runner: preflight
      inputs:
        event_id: evt_n8n_demo_001
        handoff_audience: n8n:workflow:runx-governed-effect
        execution_context:
          caller: runx-cli
          workflow_ref: self-hosted-n8n-demo
          environment: local-dogfood
        payload:
          hello: workflow
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
        steps:
          - build-handoff-context
runners:
  preflight:
    default: false
    type: graph
    inputs:
      event_id:
        type: string
        required: true
        description: Stable event id used by n8n for deduplication.
      handoff_audience:
        type: string
        required: false
        default: n8n:workflow:runx-governed-effect
        description: Expected n8n receiver audience.
      execution_context:
        type: json
        required: true
        description: Explicit caller/workflow context for the handoff.
      payload:
        type: json
        required: true
        description: Business payload to deliver to the n8n workflow.
      source:
        type: string
        required: false
        default: runx
        description: Human-readable source label.
      idempotency_key:
        type: string
        required: false
        description: Optional explicit idempotency key. Defaults to event_id.
      receiver:
        type: json
        required: false
        description: Optional receiver metadata such as workflow id, endpoint ref, or support owner.
    graph:
      name: n8n-handoff-preflight
      steps:
        - id: build-handoff-context
          tool: orchestrators.build_handoff_context
          scopes:
            - orchestrator.handoff.prepare
          inputs:
            platform: n8n
            event_id: $input.event_id
            handoff_scope: orchestrator.n8n.workflow.invoke
            handoff_audience: $input.handoff_audience
            execution_context: $input.execution_context
            payload: $input.payload
            source: $input.source
            idempotency_key: $input.idempotency_key
            receiver: $input.receiver
  send:
    default: true
    type: graph
    inputs:
      webhook_host:
        type: string
        required: true
        description: Public n8n host, without scheme or path.
      workflow_slug:
        type: string
        required: false
        default: runx-governed-effect
        description: Single safe n8n webhook path segment.
      event_id:
        type: string
        required: true
        description: Stable event id used by n8n for deduplication.
      handoff_audience:
        type: string
        required: false
        default: n8n:workflow:runx-governed-effect
        description: Expected n8n receiver audience.
      execution_context:
        type: json
        required: true
        description: Explicit caller/workflow context for the handoff.
      payload:
        type: json
        required: true
        description: Business payload to deliver to the n8n workflow.
      source:
        type: string
        required: false
        default: runx
        description: Human-readable source label.
      idempotency_key:
        type: string
        required: false
        description: Optional explicit idempotency key. Defaults to event_id.
      receiver:
        type: json
        required: false
        description: Optional receiver metadata such as workflow id, endpoint ref, or support owner.
    graph:
      name: n8n-handoff-send
      steps:
        - id: build-handoff-context
          tool: orchestrators.build_handoff_context
          scopes:
            - orchestrator.handoff.prepare
          inputs:
            platform: n8n
            event_id: $input.event_id
            handoff_scope: orchestrator.n8n.workflow.invoke
            handoff_audience: $input.handoff_audience
            execution_context: $input.execution_context
            payload: $input.payload
            source: $input.source
            idempotency_key: $input.idempotency_key
            receiver: $input.receiver
        - id: post-to-n8n
          tool: orchestrators.n8n_handoff
          scopes:
            - orchestrator.n8n.workflow.invoke
          inputs:
            webhook_host: $input.webhook_host
            workflow_slug: $input.workflow_slug
            event_id: $input.event_id
            handoff_scope: orchestrator.n8n.workflow.invoke
            handoff_audience: $input.handoff_audience
            execution_context: $input.execution_context
            payload: $input.payload
            source: $input.source
            idempotency_key: $input.idempotency_key
