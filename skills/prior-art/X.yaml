skill: prior-art
version: "0.1.2"

catalog:
  kind: skill
  audience: builder
  visibility: public
  role: context
  execution: read
  completion: runtime_receipt
  requires_adapter: false
  approval: none
harness:
  cases:
    - name: prior-art-validates-proposed-flow
      inputs:
        objective: Build a moltbook presence automation lane
        decomposition:
          objective_summary: Build a governed Moltbook presence automation lane.
          orchestration_steps:
            - id: scan
              skill: ../moltbook
              runner: scan
              scopes:
                - runx:moltbook:read
          required_skills:
            - name: moltbook
              exists: true
          open_questions: []
      caller:
        answers:
          agent_task.prior-art.output:
            findings:
              - claim: Use separate read and post runners for Moltbook.
                source: plans/runx.md
                relevance: Preserves governance boundaries between scanning and posting.
                confidence: verified
            catalog_fit:
              adjacent_skills:
                - moltbook
              why_new: Reuse the existing Moltbook runners and add only the governed composition around them.
            quality_bar:
              audience: runx skill maintainers
              artifact: A source-grounded flow recommendation.
              evidence: Cite inspected skill and protocol surfaces.
              stop_conditions:
                - Stop if the required invocation surface cannot be verified.
            recommended_flow:
              - step: scan
                rationale: Gather bounded opportunities before drafting.
              - step: approve
                rationale: Human approval is required before public posting.
              - step: post
                rationale: Use a separate write runner with only publish scopes.
            sources:
              - path: plans/runx.md
                kind: repo-document
            risks:
              - risk: Community posting can drift off-brand without explicit moderation.
                likelihood: medium
                impact: high
                mitigation: Require an approval gate and moderation notes.
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: prior-art-recommends-reuse
      inputs:
        objective: Add a moltbook content scan to the governed pipeline
        decomposition:
          objective_summary: Add a moltbook content scan step.
          orchestration_steps:
            - id: scan
              skill: ../moltbook
              runner: scan
          required_skills:
            - name: moltbook
              exists: true
          open_questions: []
      caller:
        answers:
          agent_task.prior-art.output:
            findings:
              - claim: moltbook already exposes a scan runner with the required scopes.
                source: skills/moltbook/X.yaml
                relevance: Reusing the existing skill is cheaper and better-governed than drafting a new primitive.
                confidence: verified
            catalog_fit:
              adjacent_skills:
                - moltbook
              why_new: No new primitive is justified; amend the composition to reuse the existing scan runner.
            quality_bar:
              audience: runx skill maintainers
              artifact: A concrete reuse decision.
              evidence: Ground the recommendation in the existing skill contract.
              stop_conditions:
                - Stop rather than propose a duplicate scanner.
            recommended_flow:
              - step: scan
                rationale: Reuse ../moltbook scan runner rather than drafting a new scanner.
            sources:
              - path: skills/moltbook/X.yaml
                kind: repo-document
            risks: []
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

runners:
  prior-art-agent:
    default: true
    type: agent-task
    agent: researcher
    task: prior-art
    outputs:
      findings: array
      catalog_fit: object
      quality_bar: object
      recommended_flow: array
      sources: array
      risks: array
    artifacts:
      wrap_as: prior_art_report
      packet: runx.builder.prior_art.v1
    inputs:
      objective:
        type: string
        required: true
        description: "The build or skill objective being researched."
      decomposition:
        type: json
        required: false
        description: "Structured decomposition output from work-plan."
