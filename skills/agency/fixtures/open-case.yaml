name: agency-open-case
kind: skill
target: ..
runner: open
env:
  RUNX_DATA_SOURCES: '{"data_sources":{"tenant://agency/sqlite-cases":{"adapter":"data.sqlite","database_path":".runx/data/agency-open.sqlite","resources":{"agency_cases":{"kind":"event_stream","partition_key":"aggregate_id"}}}}}'
inputs:
  data_source_ref: tenant://agency/sqlite-cases
  case_id: case-open-1
  agency_ref: docs-agency
  mandate: keep the published docs current and accurate
  roster:
    - { role: writer, skill: ghostwrite, scope: [docs.write] }
    - { role: reviewer, skill: review-skill, scope: [docs.read] }
  limits:
    max_turns: 50
    spend:
      max_per_run:
        amount: 50
        currency: USD
  signal: docs drift detected on the API reference
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
  steps:
    - open
