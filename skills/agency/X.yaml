skill: agency
version: "0.1.2"

catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical
  execution: execute
  completion: runtime_receipt
  requires_adapter: true
  approval: conditional

emits:
  - name: agency_turn
    packet: runx.agency.turn.v1

runners:
  advance:
    default: true
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Logical data source holding the case stream.
      case_id:
        type: string
        required: true
        description: The case aggregate id.
      driver_id:
        type: string
        required: true
        description: The driver advancing the case; part of the per-turn contention lease.
      member_result:
        type: json
        required: false
        description: The outcome of the dispatch this driver previously issued, fed back so the turn records it.
    graph:
      name: agency-advance
      steps:
        - id: read
          skill: ../data-store
          runner: read_events
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: agency_cases
            aggregate_id: "$input.case_id"
            limit: 500
        - id: reduce
          skill: ./graph/reduce
          inputs:
            case_id: "$input.case_id"
            member_result: "$input.member_result"
          context:
            events: read.data_operation_result.data.events
        - id: decide
          skill: ../ops-desk
          runner: advance
          inputs:
            scope_ref: "$input.case_id"
          context:
            mandate: reduce.reduction.data.mandate
            case_state: reduce.reduction.data.case_state
            candidate_roster: reduce.reduction.data.roster
        - id: plan
          skill: ./graph/plan
          inputs:
            driver_id: "$input.driver_id"
            case_id: "$input.case_id"
            member_result: "$input.member_result"
          context:
            decision: decide.dispatch_decision.data
            reduction: reduce.reduction.data
          artifacts:
            wrap_as: turn_plan
            packet: runx.agency.turn.v1
        - id: append
          skill: ../data-store
          runner: append_event
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: agency_cases
            aggregate_id: "$input.case_id"
          context:
            event: plan.turn_plan.data.turn_event
            expected_version: plan.turn_plan.data.expected_version
            idempotency_key: plan.turn_plan.data.idempotency_key

  open:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Logical data source that will hold the case stream.
      case_id:
        type: string
        required: true
        description: The case aggregate id to open.
      agency_ref:
        type: string
        required: true
        description: The operator-bound agency definition this case runs under.
      mandate:
        type: string
        required: true
        description: The standing objective the case advances toward.
      roster:
        type: json
        required: true
        description: The fixed members the case may dispatch, as [{ role, skill, scope }].
      limits:
        type: json
        required: true
        description: Cumulative caps (max_turns, spend) the measurable gate enforces.
      signal:
        type: string
        required: false
        default: ""
        description: The originating signal that opened the case.
    graph:
      name: agency-open
      steps:
        - id: open
          skill: ../data-store
          runner: append_event
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: agency_cases
            aggregate_id: "$input.case_id"
            expected_version: 0
            idempotency_key: "$input.case_id"
            event:
              type: opened
              payload:
                agency_ref: "$input.agency_ref"
                mandate: "$input.mandate"
                roster: "$input.roster"
                limits: "$input.limits"
                signal: "$input.signal"

  status:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Logical data source holding the case stream.
      case_id:
        type: string
        required: true
        description: The case aggregate id to read.
    graph:
      name: agency-status
      steps:
        - id: read
          skill: ../data-store
          runner: read_events
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: agency_cases
            aggregate_id: "$input.case_id"
            limit: 500
        - id: reduce
          skill: ./graph/reduce
          inputs:
            case_id: "$input.case_id"
          context:
            events: read.data_operation_result.data.events
