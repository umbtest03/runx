skill: agency-reduce
version: "0.1.0"

catalog:
  kind: skill
  audience: public
  visibility: internal
  role: graph-stage
  part_of:
    - runx/agency

runners:
  default:
    default: true
    type: cli-tool
    command: node
    args:
      - run.mjs
    artifacts:
      named_emits:
        reduction: runx.agency.reduction.v1
      packets:
        reduction: runx.agency.reduction.v1
    inputs:
      events:
        type: json
        required: false
        description: The case event stream from data-store read_events.
      member_result:
        type: json
        required: false
        description: The outcome of the dispatch the calling driver previously issued, applied in-flight and persisted by plan.
      case_id:
        type: string
        required: true
        description: The case aggregate id.
