skill: ghostwrite
version: "0.1.1"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: context
harness:
  cases:
    - name: ghostwrite-produces-brief
      runner: draft
      inputs:
        objective: Publish a concise ecosystem-brief brief
        audience: evaluator
        channel: blog
        evidence_pack:
          summary: Governance and package standard enforcement are the strongest signals.
      caller:
        answers:
          agent_task.ghostwrite-draft.output:
            content_brief:
              angle: Show runx by demonstrating governed automation, not by making vague claims.
              audience: evaluator
              channel: blog
            draft:
              title: runx proves itself by governing its own work
              sections:
                - Why package-shaped skills matter
                - Why receipts beat promises
            review_checklist:
              - verify every claim against the evidence pack
            distribution_notes:
              primary_channel: blog
              follow_ups:
                - summarize for Moltbook
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
    - name: ghostwrite-packages-delivery
      runner: package
      inputs:
        channel: blog
        draft:
          title: runx proves itself by governing its own work
      caller:
        answers:
          agent_task.ghostwrite-package.output:
            publish_packet:
              channel: blog
              headline: runx proves itself by governing its own work
              body: final polished content
            qa_checklist:
              - links verified
              - evidence claims checked
            handoff_notes:
              next_action: publish after approval
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
    - name: ghostwrite-explicit-external-handoff
      runner: handoff
      inputs:
        channel: github_issue_comment
        boundary_kind: external_maintainer
        packet:
          channel: github_issue_comment
          body: The canonical output directory is `.sourcey/runx-docs`.
        target:
          thread_locator: github.com/runxhq/runx/issues/241
          repo: runxhq/runx
      caller:
        answers:
          agent_task.ghostwrite-handoff.output:
            handoff_packet:
              channel: github_issue_comment
              body: The canonical output directory is `.sourcey/runx-docs`.
              boundary_kind: external_maintainer
            boundary_state:
              boundary_kind: external_maintainer
              completion_state: handoff_ready
              next_actor: upstream_maintainer
              ack_expected: false
            follow_up_contract:
              retrigger_on:
                - maintainer reply
                - operator amendment
              closure_rule: close when the thread is resolved or the operator retires the attempt
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

runners:
  draft:
    default: true
    type: agent-task
    agent: builder
    task: ghostwrite-draft
    outputs:
      content_brief: object
      draft: object
      review_checklist: array
      distribution_notes: object
    artifacts:
      wrap_as: content_draft_packet
      packet: runx.content.draft.v1
    inputs:
      objective:
        type: string
        required: false
        description: "What the content should accomplish."
      audience:
        type: string
        required: false
        description: "Audience or reader segment."
      channel:
        type: string
        required: false
        description: "Publishing channel or medium."
      evidence_pack:
        type: json
        required: false
        description: "Structured evidence or research packet."
      voice_guide:
        type: string
        required: false
        description: "Tone or style guidance."

  package:
    type: agent-task
    agent: builder
    task: ghostwrite-package
    outputs:
      publish_packet: object
      qa_checklist: array
      handoff_notes: object
    artifacts:
      wrap_as: content_publish_packet
      packet: runx.content.publish.v1
    inputs:
      channel:
        type: string
        required: false
        description: "Target publishing channel."
      draft:
        type: json
        required: true
        description: "Structured draft to package for delivery."
      distribution_notes:
        type: json
        required: false
        description: "Channel-specific notes from the draft runner."

  handoff:
    type: agent-task
    agent: builder
    task: ghostwrite-handoff
    outputs:
      handoff_packet: object
      boundary_state: object
      follow_up_contract: object
    artifacts:
      wrap_as: content_handoff_packet
      packet: runx.content.handoff.v1
    inputs:
      channel:
        type: string
        required: false
        description: "Target outward channel or thread surface."
      boundary_kind:
        type: string
        required: false
        description: "Named boundary type such as external_maintainer."
      packet:
        type: json
        required: true
        description: "Already-packaged outward payload from the package runner."
      target:
        type: json
        required: false
        description: "Repo summary or thread summary for the outward handoff."
      approval:
        type: json
        required: false
        description: "Approval decision that cleared the outward move."
