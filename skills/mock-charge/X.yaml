skill: mock-charge
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public

harness:
  cases:
    - name: mock-charge-models-receipt-before-forward
      runner: mock
      inputs:
        mcp_tool_call:
          tool: search.paid
          arguments:
            query: runx
        provider_policy:
          price_minor: 125
          currency: USD
          accepted_settlement_families:
            - mock
          counterparty: provider:demo
        returned_credential:
          family: mock
          credential_ref: credential:mock:paid-search-001
        verify_capability_ref: capability:charge-verify:paid-search-001
        idempotency_seed: paid-search-001
      caller:
        answers:
          agent_task.price.output:
            charge_price:
              price_id: charge_price_demo_001
              amount_minor: 125
              currency: USD
              settlement_families:
                - mock
            requested_payment_authority:
              authority_ref: authority:payment:charge-price-demo-001
          agent_task.challenge.output:
            payment_required_signal:
              signal_type: payment_required
              challenge_id: charge_challenge_demo_001
            charge_challenge:
              challenge_id: charge_challenge_demo_001
              receipt_before_forward_required: true
            idempotency:
              key: charge:paid-search-001
            accepted_settlement_families:
              - mock
          agent_task.verify.output:
            verification_result:
              status: verified
              settlement_family: mock
            settlement_proof:
              proof_ref: receipt-proof:mock-charge:paid-search-001
              idempotency_key: charge:paid-search-001
            sealed_receipt_ref: receipt:charge:mock:paid-search-001
            redactions:
              - credential_material
            recovery_hint:
              status: sealed
          agent_task.seal.output:
            sealed: true
            receipt_ref: receipt:charge:mock:paid-search-001
          agent_task.forward.output:
            forwarded: true
            result_ref: result:search:paid-search-001
        approvals: {}
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: mock_charge_closed
        steps:
          - price
          - challenge
          - verify
          - seal
          - forward

runners:
  mock:
    default: true
    type: graph
    inputs:
      mcp_tool_call:
        type: object
        required: true
        description: "Inbound MCP operation request."
      provider_policy:
        type: object
        required: true
        description: "Provider price and settlement family policy."
      returned_credential:
        type: object
        required: true
        description: "Returned mock payment credential."
      parent_payment_authority:
        type: object
        required: false
        description: "Parent payment authority term or ref."
      verify_capability_ref:
        type: string
        required: true
        description: "Single-use verification capability reference."
      idempotency_seed:
        type: string
        required: false
        description: "Stable challenge idempotency seed."
    graph:
      name: mock-charge
      steps:
        - id: price
          skill: ../charge-price
          runner: price
          scopes:
            - payment:quote
          inputs:
            mcp_tool_call: "{{mcp_tool_call}}"
            provider_policy: "{{provider_policy}}"
            parent_payment_authority: "{{parent_payment_authority}}"
            idempotency_seed: "{{idempotency_seed}}"
        - id: challenge
          skill: ../charge-challenge
          runner: challenge
          scopes:
            - payment:quote
          inputs:
            provider_policy: "{{provider_policy}}"
            idempotency_seed: "{{idempotency_seed}}"
          context:
            charge_price_packet: price.charge_price_packet.data
        - id: verify
          skill: ../charge-verify
          runner: verify
          scopes:
            - payment:verify
          mutation: true
          idempotency_key: charge-verify
          inputs:
            returned_credential: "{{returned_credential}}"
            verify_capability_ref: "{{verify_capability_ref}}"
            settlement_family: mock
          context:
            charge_price_packet: price.charge_price_packet.data
            charge_challenge_packet: challenge.charge_challenge_packet.data
            priced_payment_authority: price.charge_price_packet.data.requested_payment_authority
            idempotency: challenge.charge_challenge_packet.data.idempotency
        - id: seal
          run:
            type: receipt-seal
          inputs:
            receipt_ref: verify.charge_verification_packet.data.sealed_receipt_ref
            required: true
          context:
            settlement_proof: verify.charge_verification_packet.data.settlement_proof
          artifacts:
            wrap_as: charge_seal
            packet: runx.payment.charge_seal.v1
        - id: forward
          run:
            type: modeled-forward
          inputs:
            operation: "{{mcp_tool_call}}"
          context:
            sealed_receipt_ref: seal.charge_seal.data.receipt_ref
          artifacts:
            wrap_as: forwarded_result
      policy:
        transitions:
          - to: forward
            field: seal.charge_seal.data.sealed
            equals: true
    runx:
      payment_authority:
        direction: provider_charge
        phase: graph
        resource_family: payment
        settlement_family: mock
        receipt_before_forward_required: true
        runtime_forwarding_enabled: false
