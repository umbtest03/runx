skill: mock-charge
version: 0.1.0
catalog:
  kind: graph
  audience: operator
  visibility: internal
  role: harness-fixture
  part_of:
    - runx/charge
harness:
  cases:
    - name: mock-charge-models-receipt-before-forward
      runner: mock
      inputs:
        mcp_tool_call:
          tool: search.paid
          arguments:
            query: runx
        provider_policy:
          price_minor: 125
          currency: USD
          accepted_settlement_families:
            - mock
          counterparty: provider:demo
        returned_credential:
          family: mock
          credential_ref: credential:mock:paid-search-001
        verify_capability_ref: capability:charge-verify:paid-search-001
        idempotency_seed: paid-search-001
      caller:
        answers:
          agent_task.charge-price.output:
            charge_price:
              price_id: charge_price_demo_001
              amount_minor: 125
              currency: USD
              settlement_families:
                - mock
            requested_payment_authority:
              authority_ref: authority:payment:charge-price-demo-001
          agent_task.charge-challenge.output:
            effect_required_signal:
              signal_type: effect_required
              challenge_id: charge_challenge_demo_001
            charge_challenge:
              challenge_id: charge_challenge_demo_001
              receipt_before_forward_required: true
            idempotency:
              key: charge:paid-search-001
            accepted_settlement_families:
              - mock
          agent_task.charge-verify.output:
            verification_result:
              status: verified
              settlement_family: mock
            settlement_proof:
              proof_ref: receipt-proof:mock-charge:paid-search-001
              idempotency_key: charge:paid-search-001
            sealed_receipt_ref: receipt:charge:mock:paid-search-001
            redactions:
              - credential_material
            recovery_hint:
              status: sealed
          agent_task.seal.output:
            sealed: true
            receipt_ref: receipt:charge:mock:paid-search-001
          agent_task.forward.output:
            forwarded: true
            result_ref: result:search:paid-search-001
        approvals: {}
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: graph_closed
        steps:
          - price
          - challenge
          - verify
          - seal
          - forward
runners:
  mock:
    default: true
    type: graph
    inputs:
      mcp_tool_call:
        type: object
        required: true
        description: Inbound MCP operation request.
      provider_policy:
        type: object
        required: true
        description: Provider price and settlement family policy.
      returned_credential:
        type: object
        required: true
        description: Returned mock payment credential.
      parent_payment_authority:
        type: object
        required: false
        description: Parent payment authority term or ref.
      verify_capability_ref:
        type: string
        required: true
        description: Single-use verification capability reference.
      idempotency_seed:
        type: string
        required: false
        description: Stable challenge idempotency seed.
    graph:
      name: mock-charge
      steps:
        - id: charge
          skill: ../charge
          runner: mock
          inputs:
            mcp_tool_call: "{{mcp_tool_call}}"
            provider_policy: "{{provider_policy}}"
            returned_credential: "{{returned_credential}}"
            parent_payment_authority: "{{parent_payment_authority}}"
            verify_capability_ref: "{{verify_capability_ref}}"
            idempotency_seed: "{{idempotency_seed}}"
    runx:
      payment_authority:
        direction: provider_charge
        phase: graph
        resource_family: effect
        settlement_family: mock
        receipt_before_forward_required: true
        runtime_forwarding_enabled: false
