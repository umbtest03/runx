skill: inbox-and-calendar-exec
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: internal
  role: context
harness:
  cases:
    - name: inbox-calendar-exec-action-packet
      inputs:
        objective: Prepare the operator's next three actions for the launch inbox.
        mail_context:
          threads:
            - id: thread_1
              from: design-partner@example.com
              summary: Asked for a launch-readiness call and sent two blocker questions.
            - id: thread_2
              from: vendor@example.com
              summary: Shared a routine status update with no requested action.
        calendar_context:
          availability:
            - 2026-06-05T15:00:00Z
            - 2026-06-05T17:00:00Z
        constraints:
          final_send_requires_human: true
      caller:
        answers:
          agent_task.inbox-and-calendar-exec.output:
            priority_queue:
              - source_ref: thread_1
                priority: high
                reason: Design partner has active blocker questions before launch.
              - source_ref: thread_2
                priority: low
                reason: Informational status update; no action requested.
            draft_replies:
              - source_ref: thread_1
                subject: "Re: launch readiness"
                body_summary: Acknowledge blockers, answer what is known, and offer a call.
            scheduling_proposals:
              - source_ref: thread_1
                proposed_times:
                  - 2026-06-05T15:00:00Z
                  - 2026-06-05T17:00:00Z
            risks:
              - Final reply must be reviewed before send.
            verdict: ready_for_human_review
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: inbox-calendar-needs-context
      inputs:
        objective: Tell me what to do next.
      expect:
        status: needs_agent

runners:
  exec:
    default: true
    type: agent-task
    agent: operator
    task: inbox-and-calendar-exec
    outputs:
      priority_queue: array
      draft_replies: array
      scheduling_proposals: array
      risks: array
      verdict: string
    artifacts:
      wrap_as: inbox_calendar_action_packet
      packet: runx.ops.inbox_calendar_action_packet.v1
    inputs:
      objective:
        type: string
        required: true
        description: "Operator goal for this inbox/calendar pass."
      mail_context:
        type: json
        required: true
        description: "Redacted thread summaries and message evidence."
      calendar_context:
        type: json
        required: false
        description: "Redacted availability and event context."
      constraints:
        type: json
        required: false
        description: "Tone, owner, final-send, and scheduling constraints."
