skill: refund-recover
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: private

harness:
  cases:
    - name: refund-recover-finds-proof
      runner: recover
      inputs:
        original_receipt_ref: receipt:charge:mock:paid-search-001
        refund_idempotency:
          key: refund:paid-search-001
        settlement_family: mock
        prior_refund_attempt:
          status: timeout_after_mutation
      caller:
        answers:
          agent_task.refund-recover.output:
            recovery_assessment:
              status: recovered
              already_mutated: true
              original_receipt_ref: receipt:charge:mock:paid-search-001
            refund_lookup:
              refund_idempotency_key: refund:paid-search-001
              settlement_family: mock
            proof_refs:
              - receipt-proof:mock-refund:paid-search-001
            recommended_action:
              action: seal_recovered_proof
            open_questions: []
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: refund_recovery_closed

runners:
  recover:
    default: true
    type: agent-task
    agent: operator
    task: refund-recover
    outputs:
      recovery_assessment: object
      refund_lookup: object
      proof_refs: array
      recommended_action: object
      open_questions: array
    artifacts:
      wrap_as: refund_recovery_packet
      packet: runx.payment.recovery.v1
    runx:
      payment_authority:
        direction: provider_refund
        phase: recover
        resource_family: payment
        verbs:
          - verify
          - refund
        mutates_rail: false
        receives_rail_secret_material: false
        checks_idempotency_before_retry: true
        requires_original_receipt_ref: true
    inputs:
      original_receipt_ref:
        type: string
        required: true
        description: "Linked sealed charge receipt reference."
      refund_idempotency:
        type: object
        required: true
        description: "Refund idempotency key and replay metadata."
      settlement_family:
        type: string
        required: true
        description: "Original receipt settlement family."
      prior_refund_attempt:
        type: object
        required: false
        description: "Prior rail attempt summary."
      receipt_refs:
        type: json
        required: false
        description: "Existing harness or proof refs."
