skill: x402-pay
version: "0.1.1"
catalog:
  kind: graph
  audience: operator
  visibility: public
  role: branded
  canonical_skill: runx/spend
  provider: x402
  runtime_path: x402
runners:
  x402:
    default: true
    type: graph
    inputs:
      payment_signal:
        type: object
        required: true
        description: Payment-required signal or challenge.
      parent_payment_authority:
        type: object
        required: true
        description: Parent payment authority term or authority reference.
      rail_profile_ref:
        type: string
        required: true
        description: Configured rail profile reference.
      realm:
        type: string
        required: false
        description: Authority realm.
      spend_policy:
        type: object
        required: false
        description: Policy limits and approval thresholds.
      approval_context:
        type: object
        required: false
        description: Prior approval evidence.
      idempotency_seed:
        type: string
        required: false
        description: Stable idempotency material.
    graph:
      name: x402-pay
      steps:
        - id: spend
          skill: ../spend
          runner: x402
          inputs:
            payment_signal: "$input.payment_signal"
            parent_payment_authority: "$input.parent_payment_authority"
            rail_profile_ref: "$input.rail_profile_ref"
            realm: "$input.realm"
            spend_policy: "$input.spend_policy"
            approval_context: "$input.approval_context"
            idempotency_seed: "$input.idempotency_seed"
