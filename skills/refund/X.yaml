skill: refund
version: "0.1.3"
catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical
  execution: plan
  completion: plan
  requires_adapter: false
  approval: required
runners:
  mock:
    default: true
    type: graph
    inputs:
      original_receipt_ref:
        type: string
        required: true
        description: Linked sealed charge receipt reference.
      original_receipt:
        type: object
        required: true
        description: Redacted original charge receipt summary.
      refund_request:
        type: object
        required: true
        description: Requested amount and reason.
      parent_payment_authority:
        type: object
        required: true
        description: Parent payment authority term or ref.
      approval_context:
        type: object
        required: false
        description: Prior approval evidence.
      idempotency_seed:
        type: string
        required: false
        description: Stable refund idempotency seed.
    graph:
      name: refund
      steps:
        - id: quote
          skill: graph/refund-quote
          runner: quote
          scopes:
            - payment:quote
            - payment:refund
          inputs:
            original_receipt_ref: "$input.original_receipt_ref"
            original_receipt: "$input.original_receipt"
            refund_request: "$input.refund_request"
        - id: reserve
          skill: graph/refund-reserve
          runner: reserve
          scopes:
            - payment:refund
          mutation: true
          idempotency_key: refund-reserve
          inputs:
            parent_payment_authority: "$input.parent_payment_authority"
            approval_context: "$input.approval_context"
            idempotency_seed: "$input.idempotency_seed"
          context:
            refund_quote_packet: quote.refund_quote_packet.data
        - id: approve-refund
          run:
            type: approval
          inputs:
            gate_id: refund.mock.approval
            reason: Approve the linked refund reservation before settlement.
          context:
            refund_decision: reserve.refund_reservation_packet.data.payment_decision
            refund_reservation: reserve.refund_reservation_packet.data.reservation
            refund_idempotency: reserve.refund_reservation_packet.data.idempotency
          artifacts:
            wrap_as: refund_approval
        - id: settlement
          run:
            type: agent-task
            agent: operator
            task: settlement
            outputs:
              refund_closure: object
              refund_proof: object
              refund_receipt_ref: string
          inputs:
            settlement_family: mock
          context:
            refund_reservation: reserve.refund_reservation_packet.data.reservation
            refund_idempotency: reserve.refund_reservation_packet.data.idempotency
            reserved_refund_authority: reserve.refund_reservation_packet.data.reserved_payment_authority
          artifacts:
            wrap_as: refund_rail_packet
            packet: runx.refund.evidence.v1
      policy:
        guards:
          - step: settlement
            field: approve-refund.refund_approval.data.approved
            equals: true
    runx:
      payment_authority:
        direction: provider_refund
        phase: graph
        resource_family: effect
        settlement_family: mock
        requires_original_receipt_ref: true
        same_family_required: true
        runtime_refund_enabled: false
  accept:
    default: false
    type: graph
    act:
      purpose: Settle a governed refund within the requested authority ceiling.
      mint_authority:
        source: requested_scope
      requested_scope_from: requested_scope
    inputs:
      requested_scope:
        type: object
        required: true
        description: Requested authority ceiling (AttenuationRequest) the refund must stay within. It is both the reservation ceiling quote/reserve narrow from and the subject the runtime mints the child grant from against the charter.
      charter:
        type: object
        required: true
        description: Parent charter authority term the requested ceiling attenuates from.
      original_receipt_ref:
        type: string
        required: true
        description: Linked sealed charge receipt reference.
      original_receipt:
        type: object
        required: true
        description: Redacted original charge receipt summary.
      refund_request:
        type: object
        required: true
        description: Requested amount and reason.
      approval_context:
        type: object
        required: false
        description: Prior approval evidence.
      idempotency_seed:
        type: string
        required: false
        description: Stable refund idempotency seed.
    graph:
      name: refund
      charter_from: charter
      steps:
        - id: quote
          skill: graph/refund-quote
          runner: quote
          scopes:
            - payment:quote
            - payment:refund
          inputs:
            original_receipt_ref: "$input.original_receipt_ref"
            original_receipt: "$input.original_receipt"
            refund_request: "$input.refund_request"
        - id: reserve
          skill: graph/refund-reserve
          runner: reserve
          scopes:
            - payment:refund
          mutation: true
          idempotency_key: refund-reserve
          inputs:
            parent_payment_authority: "$input.requested_scope"
            approval_context: "$input.approval_context"
            idempotency_seed: "$input.idempotency_seed"
          context:
            refund_quote_packet: quote.refund_quote_packet.data
        - id: approve-refund
          run:
            type: approval
          inputs:
            gate_id: refund.accept.approval
            reason: Approve the linked refund reservation before settlement.
          context:
            refund_decision: reserve.refund_reservation_packet.data.payment_decision
            refund_reservation: reserve.refund_reservation_packet.data.reservation
            refund_idempotency: reserve.refund_reservation_packet.data.idempotency
          artifacts:
            wrap_as: refund_approval
        - id: settlement
          run:
            type: agent-task
            agent: operator
            task: settlement
            outputs:
              refund_closure: object
              refund_proof: object
              refund_receipt_ref: string
          inputs:
            settlement_family: mock
          context:
            refund_reservation: reserve.refund_reservation_packet.data.reservation
            refund_idempotency: reserve.refund_reservation_packet.data.idempotency
            reserved_refund_authority: reserve.refund_reservation_packet.data.reserved_payment_authority
          artifacts:
            wrap_as: refund_rail_packet
            packet: runx.refund.evidence.v1
      policy:
        guards:
          - step: settlement
            field: approve-refund.refund_approval.data.approved
            equals: true
    runx:
      payment_authority:
        direction: provider_refund
        phase: graph
        resource_family: effect
        settlement_family: mock
        requires_original_receipt_ref: true
        same_family_required: true
        runtime_refund_enabled: false
