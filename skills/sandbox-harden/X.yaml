skill: sandbox-harden
version: "0.1.1"
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
  execution: plan
  completion: plan
  requires_adapter: true
  approval: required
runners:
  sandbox-harden:
    default: true
    type: agent-task
    agent: reviewer
    task: sandbox-harden
    outputs:
      hardening_profile: object
    artifacts:
      wrap_as: hardening_profile_packet
      packet: runx.hardening.v1
    runx:
      category: security
    inputs:
      workload:
        type: json
        required: true
        description: "Target to harden, as { image_digest } or { skill_ref }, optionally with class."
      threat_context:
        type: string
        required: false
        description: "Trust assumptions and exposure, e.g. processes untrusted uploads, no inbound network."
      baseline:
        type: string
        required: false
        description: "Current or floor posture; the recommendation is never weaker than this without a stated reason."
