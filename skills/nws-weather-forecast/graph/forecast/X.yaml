skill: nws-weather-forecast-gridpoint
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: internal
  role: graph-stage
  part_of:
    - runx/nws-weather-forecast

runners:
  forecast:
    default: true
    type: http
    url: https://api.weather.gov/gridpoints/{office}/{grid_x},{grid_y}/forecast
    method: GET
    headers:
      user-agent: "runx-weather-catalog/0.1 (https://github.com/runxhq/runx)"
      accept: "application/geo+json, application/json"
    inputs:
      office:
        type: string
        required: true
        description: NWS forecast office id, for example LWX.
      grid_x:
        type: string
        required: true
        description: NWS grid X coordinate.
      grid_y:
        type: string
        required: true
        description: NWS grid Y coordinate.
