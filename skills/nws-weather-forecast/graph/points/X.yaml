skill: nws-weather-forecast-points
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: internal
  role: graph-stage
  part_of:
    - runx/nws-weather-forecast

runners:
  points:
    default: true
    type: http
    url: https://api.weather.gov/points/{lat},{lon}
    method: GET
    headers:
      user-agent: "runx-weather-catalog/0.1 (https://github.com/runxhq/runx)"
      accept: "application/geo+json, application/json"
    inputs:
      lat:
        type: string
        required: true
        description: Latitude with no more than four decimal places.
      lon:
        type: string
        required: true
        description: Longitude with no more than four decimal places.
