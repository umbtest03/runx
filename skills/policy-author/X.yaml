skill: policy-author
version: "0.1.1"
catalog:
  kind: skill
  audience: operator
  visibility: public
  role: canonical
  execution: plan
  completion: plan
  requires_adapter: false
  approval: none
runners:
  author:
    default: true
    type: agent-task
    agent: builder
    task: policy-author
    outputs:
      policy_proposal: object
    artifacts:
      wrap_as: policy_proposal_packet
      packet: runx.policy_proposal.v1
    inputs:
      governance_brief:
        type: string
        required: true
        description: The governance intent in prose.
      existing_policy:
        type: json
        required: false
        description: A current runx.operational_policy.v1 to tighten (never widen).
      target_repos:
        type: json
        required: false
        description: Explicit repository list when not stated in the brief.
      objective:
        type: string
        required: false
        description: Operator intent that focuses the pass.
