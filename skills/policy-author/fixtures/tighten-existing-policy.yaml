        blockers: []
        needs_input: []
        success_checkpoint:
          milestone: policy_tightened
          description: The audited policy now passes lint with mutation gated, auto-merge off, and every surface owned.
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
    state: sealed
    disposition: closed
metadata:
  public_skill: policy-author
  source_case: tighten-existing-policy
