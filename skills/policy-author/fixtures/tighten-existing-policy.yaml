name: tighten-existing-policy
kind: skill
target: ..
runner: author
inputs:
  governance_brief: Tighten our current policy after an audit found auto-merge was on and the docs surface had no owner.
  existing_policy: '{"schema":"runx.operational_policy.v1","target_repos":["acme/acme"],"runner":{"id":"github-actions-issue-intake","kind":"github-actions","requires":["github-actions","scafld"]},"allowed_actions":["issue-intake","issue-to-pr"],"sources":[{"provider":"github","min_confidence":0.6}],"owner_routes":[{"surface":"platform","owner":"kam"}],"outcomes":{"verification_required":true,"close_source_issue":"when_verified","require_human_merge_gate":false,"auto_merge":true}}'
  objective: Narrow the policy to close the audit findings; do not widen anything.
caller:
