    agent_task.policy-author.output:
      policy_proposal:
        decision: ready
        policy:
          schema: runx.operational_policy.v1
          target_repos:
            - acme/acme
          runner:
            id: github-actions-issue-intake
            kind: github-actions
            requires:
              - github-actions
              - scafld
          allowed_actions:
            - issue-intake
            - issue-to-pr
          sources:
