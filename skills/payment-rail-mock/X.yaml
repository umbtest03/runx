skill: payment-rail-mock
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: public

harness:
  cases:
    - name: payment-rail-mock-fulfills
      runner: mock
      inputs:
        payment_challenge:
          challenge_id: ch_mock_001
          rail: mock
          amount_minor: 125
          currency: USD
          counterparty: merchant:demo
          operation: search.paid
        reserved_payment_authority:
          term_id: authority-term:payment:reserve-demo-001
          principal_ref:
            type: host
            uri: principal:operator:test
          resource_ref:
            type: surface
            uri: merchant:demo
          resource_family: payment
          verbs:
            - spend
          capabilities:
            - payment_single_use_spend
          bounds:
            payment:
              currency: USD
              max_per_call_minor: 125
              rails:
                - mock
              realm: test
              counterparty: merchant:demo
              operation: search.paid
              single_use_spend: true
              credential_form: single_use_spend_capability
          conditions: []
          approvals: []
          issued_by_ref:
            type: host
            uri: authority:payment:test
        spend_capability_ref: capability:payment:demo-search-001
        rail_profile_ref: rail-profile:mock:test
        idempotency:
          key: payment:demo-search-001
      caller:
        answers:
          agent_step.payment-rail-mock.output:
            rail_result:
              status: fulfilled
              rail: mock
              amount_minor: 125
              currency: USD
              counterparty: merchant:demo
              operation: search.paid
            rail_proof:
              proof_ref: receipt-proof:mock:demo-search-001
              idempotency_key: payment:demo-search-001
              hash: sha256:mock-proof
            credential_envelope:
              form: paid_tool_credential
              credential_ref: credential:mock:demo-search-001
            redactions:
              - rail_session_material
            recovery_hint:
              status: sealed
      expect:
        status: sealed
        receipt:
          schema: runx.harness_receipt.v1
          state: sealed
          disposition: closed
          reason_code: payment_rail_closed

runners:
  mock:
    default: true
    type: agent-step
    agent: operator
    task: payment-rail-mock
    mutating: true
    retry:
      max_attempts: 1
    idempotency:
      key: payment-rail-mock
    outputs:
      rail_result: object
      rail_proof: object
      credential_envelope: object
      redactions: array
      recovery_hint: object
    artifacts:
      wrap_as: payment_rail_packet
      packet: runx.payment.rail.v1
    runx:
      payment_authority:
        phase: fulfill
        resource_family: payment
        verbs:
          - spend
        rails:
          - mock
        requires_capability: payment_single_use_spend
        credential_form: single_use_spend_capability
        receives_funding_material: false
        deterministic: true
        receipt_before_success: true
    inputs:
      payment_challenge:
        type: object
        required: true
        description: "Protocol/provider challenge to fulfill."
      reserved_payment_authority:
        type: object
        required: true
        description: "Child payment authority term admitted by core."
      spend_capability_ref:
        type: string
        required: true
        description: "Scoped single-use spend capability reference."
      rail_profile_ref:
        type: string
        required: true
        description: "Configured rail profile reference."
      idempotency:
        type: object
        required: true
        description: "Reservation key and recovery lookup fields."
      quote_packet:
        type: object
        required: false
        description: "Source quote packet for evidence continuity."
