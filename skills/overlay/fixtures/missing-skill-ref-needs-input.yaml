name: missing-skill-ref-needs-input
kind: skill
target: ..
runner: generate
inputs:
  scope_intent: Let it read the repo.
  objective: Author an overlay.
caller:
  answers:
    agent_task.overlay.output:
      overlay_proposal:
        decision: needs_input
        wraps:
          ref: ""
          path: ""
          digest: ""
        overlay_path: ""
        runner:
          type: agent
          scopes: []
          allowed_tools: []
        diagnostics:
          - id: runx.overlay.skill.missing
            severity: error
            message: Neither a skill_ref nor a skill_path was provided, so there is no skill to wrap.
        rationale: An overlay must wrap a specific skill. With neither a registry ref nor a local path, there is nothing to resolve or pin, so the skill stops for input rather than emitting an empty overlay.
        blockers: []
        needs_input:
          - Provide the skill to wrap as a registry ref (e.g. vendor/research@1.2.0) or a local path to its SKILL.md.
        success_checkpoint:
          milestone: awaiting_wrapped_skill
          description: The skill stops for a wrapped ref or path rather than emitting an empty, allow-all overlay.
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
    state: sealed
    disposition: closed
