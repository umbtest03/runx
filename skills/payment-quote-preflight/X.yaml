skill: payment-quote-preflight
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: public

harness:
  cases:
    - name: payment-quote-normalizes-challenge
      inputs:
        payment_signal:
          signal_type: payment_required
          challenge_id: ch_mock_001
          amount_minor: 125
          currency: USD
          rail: mock
          counterparty: merchant:demo
          operation: search.paid
        realm: test
        idempotency_seed: demo-search-001
      caller:
        answers:
          agent_step.payment-quote-preflight.output:
            payment_quote:
              quote_id: quote_demo_001
              amount_minor: 125
              currency: USD
              rails:
                - mock
              counterparty: merchant:demo
              operation: search.paid
              expires_at: "2026-05-20T01:00:00Z"
            requested_payment_authority:
              resource_family: payment
              verbs:
                - reserve
                - spend
              bounds:
                payment:
                  currency: USD
                  max_per_call_minor: 125
                  rails:
                    - mock
                  realm: test
                  counterparty: merchant:demo
                  operation: search.paid
                  idempotency_required: true
                  recovery_required: true
                  receipt_before_success: true
            challenge_evidence:
              source_refs:
                - signal:ch_mock_001
            risk_notes: []
            open_questions: []
      expect:
        status: success
        receipt:
          kind: skill_execution
          status: success
          skill_name: payment-quote-preflight
          source_type: agent-step

runners:
  quote:
    default: true
    type: agent-step
    agent: operator
    task: payment-quote-preflight
    outputs:
      payment_quote: object
      requested_payment_authority: object
      challenge_evidence: object
      risk_notes: array
      open_questions: array
    artifacts:
      wrap_as: payment_quote_packet
      packet: runx.payment.quote.v1
    runx:
      payment_authority:
        phase: quote
        resource_family: payment
        verbs:
          - quote
        mutates_rail: false
        receives_funding_material: false
    inputs:
      payment_signal:
        type: object
        required: true
        description: "Payment-required signal, MCP challenge, invoice, checkout request, or operator intent."
      realm:
        type: string
        required: false
        description: "Authority realm such as local, test, or prod."
      rail_preferences:
        type: json
        required: false
        description: "Ordered list of preferred payment rails."
      max_per_call_minor:
        type: number
        required: false
        description: "Caller cap in minor currency units."
      currency:
        type: string
        required: false
        description: "Caller-expected ISO 4217 currency."
      operation:
        type: string
        required: false
        description: "Stable operation name for the paid action."
      counterparty:
        type: string
        required: false
        description: "Expected merchant or payee reference."
      idempotency_seed:
        type: string
        required: false
        description: "Stable caller-provided idempotency material."
