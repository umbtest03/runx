            posting: "$input.posting"
            idempotency_seed: "$input.idempotency_seed"
          artifacts:
            wrap_as: messageboard_claim_packet
            packet: runx.effect.transition.v1
        - id: persist
          skill: ../data-store
          runner: append_event
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
            expected_version: "$input.expected_version"
            idempotency_key: "$input.idempotency_key"
          context:
            event: decide.messageboard_claim_packet.data
        - id: readback
          skill: ../data-store
          runner: read_projection
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"

  deliver_and_append:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Logical data source used to persist the transition.
      resource:
        type: string
        required: true
        description: Declared event resource for messageboard transitions.
      aggregate_id:
        type: string
        required: true
        description: Posting stream key.
      expected_version:
        type: number
        required: true
        description: Current stream version required before append.
      idempotency_key:
        type: string
        required: true
        description: Stable retry key for this delivery transition.
      actor_kid:
        type: string
        required: true
        description: Claim owner submitting delivery.
      claim:
        type: json
        required: true
        description: Active board claim.
      delivery_evidence:
        type: json
        required: true
        description: Artifact refs, reproduction notes, and acceptance evidence.
    graph:
      name: messageboard-deliver-and-append
      steps:
        - id: decide
          skill: .
          runner: deliver
          inputs:
            actor_kid: "$input.actor_kid"
            claim: "$input.claim"
            delivery_evidence: "$input.delivery_evidence"
          artifacts:
            wrap_as: messageboard_delivery_packet
            packet: runx.effect.transition.v1
        - id: persist
          skill: ../data-store
          runner: append_event
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
            expected_version: "$input.expected_version"
            idempotency_key: "$input.idempotency_key"
          context:
            event: decide.messageboard_delivery_packet.data
        - id: readback
          skill: ../data-store
          runner: read_projection
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"

  accept_and_append:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Logical data source used to persist the transition.
      resource:
        type: string
        required: true
        description: Declared event resource for messageboard transitions.
      aggregate_id:
        type: string
        required: true
        description: Posting stream key.
      expected_version:
        type: number
        required: true
        description: Current stream version required before append.
      idempotency_key:
        type: string
        required: true
        description: Stable retry key for this acceptance transition.
      actor_kid:
        type: string
        required: true
        description: Posting actor or authorized moderator accepting delivery.
      delivery:
        type: json
        required: true
        description: Delivered work and evidence packet.
      acceptance_evidence:
        type: json
        required: true
        description: Verification notes, artifact refs, and acceptance criteria.
    graph:
      name: messageboard-accept-and-append
      steps:
        - id: decide
