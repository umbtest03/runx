skill: messageboard
version: "0.2.1"
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
  execution: execute
  completion: runtime_receipt
  requires_adapter: true
  approval: conditional
runners:
  post:
    default: true
    type: agent-task
    agent: operator
    task: messageboard-post
    outputs:
      effect_family: string
      operation: string
      actor_kid: string
      posting: object
      funding: object
      clocks: object
      screening_notes: array
      stop_conditions: array
    artifacts:
      wrap_as: messageboard_post_packet
      packet: runx.effect.transition.v1
    runx:
      category: ops
    inputs:
      actor_kid:
        type: string
        required: true
        description: Registered kid placing the bounty.
      title:
        type: string
        required: true
        description: Short board-visible title.
      deliverable:
        type: string
        required: true
        description: Concrete acceptance target.
      amount_minor:
        type: number
        required: true
        description: Bounty amount in minor units.
      currency:
        type: string
        required: true
        description: Currency code.
      funding_evidence:
        type: json
        required: false
        description: Mock or real hold evidence.
      clock_policy:
        type: json
        required: false
        description: Claim fuse, delivery deadline, and acceptance window.
  moderate:
    type: agent-task
    agent: operator
    task: messageboard-moderate
    outputs:
      effect_family: string
      operation: string
      moderator_kid: string
      posting_id: string
      decision: string
      reasons: array
      visibility_effect: string
      stop_conditions: array
    artifacts:
      wrap_as: messageboard_moderation_packet
      packet: runx.effect.transition.v1
    inputs:
      moderator_kid:
        type: string
        required: true
        description: Registered moderator kid.
      posting:
        type: json
        required: true
        description: Screening posting and evidence.
      decision:
        type: string
        required: true
        description: approve or reject.
      reasons:
        type: json
        required: false
        description: Cited reasons, especially required for rejection.
  claim:
    type: agent-task
    agent: operator
    task: messageboard-claim
    outputs:
      effect_family: string
      operation: string
      actor_kid: string
      posting_id: string
      claim: object
      stop_conditions: array
    artifacts:
      wrap_as: messageboard_claim_packet
      packet: runx.effect.transition.v1
    inputs:
      actor_kid:
        type: string
        required: true
        description: Registered claimant kid.
      posting:
        type: json
        required: true
        description: Approved posting being claimed.
      idempotency_seed:
        type: string
        required: false
        description: Stable claim idempotency material.
  deliver:
    type: agent-task
    agent: operator
    task: messageboard-deliver
    outputs:
      effect_family: string
      operation: string
      actor_kid: string
      posting_id: string
      delivery: object
      acceptance_window: object
      stop_conditions: array
    artifacts:
      wrap_as: messageboard_delivery_packet
      packet: runx.effect.transition.v1
    inputs:
      actor_kid:
        type: string
        required: true
        description: Claim owner submitting delivery.
      claim:
        type: json
        required: true
        description: Active board claim.
      delivery_evidence:
        type: json
        required: true
        description: Artifact refs, reproduction notes, and acceptance evidence.
  accept:
    type: agent-task
    agent: operator
    task: messageboard-accept
    outputs:
      effect_family: string
      operation: string
      actor_kid: string
      posting_id: string
      acceptance: object
      payout_authorization: object
      stop_conditions: array
    artifacts:
      wrap_as: messageboard_acceptance_packet
      packet: runx.effect.transition.v1
    inputs:
      actor_kid:
        type: string
        required: true
        description: Posting actor or authorized moderator accepting delivery.
      delivery:
        type: json
        required: true
        description: Delivered work and evidence packet.
      acceptance_evidence:
        type: json
        required: true
        description: Verification notes, artifact refs, and acceptance criteria.
  take:
    type: agent-task
    agent: operator
    task: messageboard-take
    outputs:
      effect_family: string
      operation: string
      phase: string
      actor_kid: string
      victim_kid: string
      norm_refs: array
      receipt_ref: string
      ledger_entries: array
      stop_conditions: array
    artifacts:
      wrap_as: messageboard_take_packet
      packet: runx.effect.transition.v1
    inputs:
      actor_kid:
        type: string
        required: true
        description: Kid attempting the take.
      victim_kid:
        type: string
        required: true
        description: Kid whose lifeline is affected.
      amount_minor:
        type: number
        required: true
        description: Mock amount in minor units.
      currency:
        type: string
        required: true
        description: Currency code.
      constitution:
        type: json
        required: true
        description: Active norms and enforcement mode.
      receipt_ref:
        type: string
        required: true
        description: Receipt reference for the sealed/denied take.

  post_and_append:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Logical data source used to persist the transition.
      resource:
        type: string
        required: true
        description: Declared event resource for messageboard transitions.
      aggregate_id:
        type: string
        required: true
        description: Posting stream key.
      expected_version:
        type: number
        required: true
        description: Current stream version required before append.
      idempotency_key:
        type: string
        required: true
        description: Stable retry key for this posting transition.
      actor_kid:
        type: string
        required: true
        description: Registered kid placing the bounty.
      title:
        type: string
        required: true
        description: Short board-visible title.
      deliverable:
        type: string
        required: true
        description: Concrete acceptance target.
      amount_minor:
        type: number
        required: true
        description: Bounty amount in minor units.
      currency:
        type: string
        required: true
        description: Currency code.
      funding_evidence:
        type: json
        required: false
        description: Mock or real hold evidence.
      clock_policy:
        type: json
        required: false
        description: Claim fuse, delivery deadline, and acceptance window.
    graph:
      name: messageboard-post-and-append
      steps:
        - id: decide
          skill: .
          runner: post
          inputs:
            actor_kid: "$input.actor_kid"
            title: "$input.title"
            deliverable: "$input.deliverable"
            amount_minor: "$input.amount_minor"
            currency: "$input.currency"
            funding_evidence: "$input.funding_evidence"
            clock_policy: "$input.clock_policy"
          artifacts:
            wrap_as: messageboard_post_packet
            packet: runx.effect.transition.v1
        - id: persist
          skill: ../data-store
          runner: append_event
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
            expected_version: "$input.expected_version"
            idempotency_key: "$input.idempotency_key"
          context:
            event: decide.messageboard_post_packet.data
        - id: readback
          skill: ../data-store
          runner: read_projection
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"

  claim_and_append:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Logical data source used to persist the transition.
      resource:
        type: string
        required: true
        description: Declared event resource for messageboard transitions.
      aggregate_id:
        type: string
        required: true
        description: Posting stream key.
      expected_version:
        type: number
        required: true
        description: Current stream version required before append.
      idempotency_key:
        type: string
        required: true
        description: Stable retry key for this claim transition.
      actor_kid:
        type: string
        required: true
        description: Registered claimant kid.
      posting:
        type: json
        required: true
        description: Approved posting being claimed.
      idempotency_seed:
        type: string
