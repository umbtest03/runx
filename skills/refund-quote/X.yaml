skill: refund-quote
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: private

harness:
  cases:
    - name: refund-quote-computes-bounds
      runner: quote
      inputs:
        original_receipt_ref: receipt:charge:mock:paid-search-001
        original_receipt:
          amount_minor: 125
          currency: USD
          settlement_family: mock
          counterparty: provider:demo
          operation: search.paid
        refund_request:
          amount_minor: 125
          reason: operator_refund
        prior_refund_receipt_refs: []
      caller:
        answers:
          agent_task.refund-quote.output:
            refund_quote:
              quote_id: refund_quote_demo_001
              original_receipt_ref: receipt:charge:mock:paid-search-001
              amount_minor: 125
              currency: USD
              reason: operator_refund
            refundable_bounds:
              remaining_minor: 125
              max_refund_minor: 125
              currency: USD
              partial_refund_depth_remaining: 2
            original_receipt_link:
              receipt_ref: receipt:charge:mock:paid-search-001
              prior_refund_receipt_refs: []
            settlement_family: mock
            open_questions: []
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: refund_quote_closed

runners:
  quote:
    default: true
    type: agent-task
    agent: operator
    task: refund-quote
    outputs:
      refund_quote: object
      refundable_bounds: object
      original_receipt_link: object
      settlement_family: string
      open_questions: array
    artifacts:
      wrap_as: refund_quote_packet
      packet: runx.payment.quote.v1
    runx:
      payment_authority:
        direction: provider_refund
        phase: quote
        resource_family: payment
        verbs:
          - quote
          - refund
        mutates_rail: false
        receives_rail_secret_material: false
        requires_original_receipt_ref: true
    inputs:
      original_receipt_ref:
        type: string
        required: true
        description: "Linked sealed charge receipt reference."
      original_receipt:
        type: object
        required: false
        description: "Redacted original charge receipt summary."
      refund_request:
        type: object
        required: false
        description: "Requested refund amount, reason, and operator note."
      prior_refund_receipt_refs:
        type: json
        required: false
        description: "Prior refund receipt references linked to the charge."
      policy:
        type: object
        required: false
        description: "Provider refund policy and time window."
