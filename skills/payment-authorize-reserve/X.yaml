skill: payment-authorize-reserve
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: public

harness:
  cases:
    - name: payment-reserve-selected
      inputs:
        payment_quote_packet:
          payment_quote:
            quote_id: quote_demo_001
            amount_minor: 125
            currency: USD
            rails:
              - mock
            counterparty: merchant:demo
            operation: search.paid
          requested_payment_authority:
            bounds:
              payment:
                currency: USD
                max_per_call_minor: 125
                rails:
                  - mock
                realm: test
                counterparty: merchant:demo
                operation: search.paid
        parent_payment_authority:
          authority_ref: authority:payment:test
        idempotency_seed: demo-search-001
      caller:
        answers:
          agent_step.payment-authorize-reserve.output:
            payment_decision:
              decision_id: decision_payment_demo_001
              choice: continue
              selected: true
              amount_minor: 125
              currency: USD
            reserved_payment_authority:
              resource_family: payment
              verbs:
                - spend
              capabilities:
                - payment_single_use_spend
              bounds:
                payment:
                  currency: USD
                  max_per_call_minor: 125
                  rails:
                    - mock
                  realm: test
                  counterparty: merchant:demo
                  operation: search.paid
                  idempotency_required: true
                  recovery_required: true
                  receipt_before_success: true
                  single_use_spend: true
                  credential_form: single_use_spend_capability
            idempotency:
              key: payment:demo-search-001
              recovery_required: true
            spend_capability_ref: capability:payment:demo-search-001
            approval:
              required: false
              status: not_required
            core_requirements:
              - payment_authority_subset
              - reserve_before_rail
              - receipt_before_success
            open_questions: []
      expect:
        status: success
        receipt:
          kind: skill_execution
          status: success
          skill_name: payment-authorize-reserve
          source_type: agent-step

runners:
  reserve:
    default: true
    type: agent-step
    agent: operator
    task: payment-authorize-reserve
    mutating: true
    outputs:
      payment_decision: object
      reserved_payment_authority: object
      spend_capability_ref: string
      idempotency: object
      approval: object
      core_requirements: array
      open_questions: array
    artifacts:
      wrap_as: payment_reservation_packet
      packet: runx.payment.reservation.v1
    runx:
      payment_authority:
        phase: reserve
        resource_family: payment
        verbs:
          - reserve
        core_owned:
          - authority_subset_proof
          - atomic_budget_hold
          - idempotency_key
        mutates_rail: false
        receives_funding_material: false
    inputs:
      payment_quote_packet:
        type: object
        required: true
        description: "Output from payment-quote-preflight."
      parent_payment_authority:
        type: object
        required: true
        description: "Parent payment authority term or authority reference."
      spend_policy:
        type: object
        required: false
        description: "Policy limits, period caps, and approval thresholds."
      approval_context:
        type: object
        required: false
        description: "Operator, system, or prior approval evidence."
      idempotency_seed:
        type: string
        required: false
        description: "Stable seed if not already supplied by the quote."
