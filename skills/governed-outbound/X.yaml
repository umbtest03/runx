skill: governed-outbound
version: "0.1.4"

catalog:
  kind: graph
  audience: public
  visibility: public
  role: context
  execution: read
  completion: runtime_receipt
  requires_adapter: false
  approval: required
harness:
  cases:
    - name: governed-outbound-approved-plan
      env:
        RUNX_PROVIDER_PERMISSION_GRANT_ID: provider-send-demo
        RUNX_PROVIDER_PERMISSION_GRANTED_SCOPES: runx:net:allowlist
      inputs:
        url: https://status.example.com/incidents/2026-06-14
        allowlist:
          - status.example.com
        channel: "#incidents"
        principal: account:ops-bot
        claim: A public incident update was gathered, scrubbed of personal data, and authorized for the incident channel.
        operator_context: Post-incident summary; never let customer identifiers reach the channel.
      caller:
        answers:
          agent_task.web-fetch.output:
            fetch_result:
              final_url: https://status.example.com/incidents/2026-06-14
              status: 200
              content_digest: "sha256:1f0a9c7e4b2d6a8f3c5e1b0d9a7c6e4f2b8d0a1c3e5f7a9b1d3f5a7c9e1b3d5f"
              extracted: "Incident resolved at 14:20 UTC. Primary restored in us-east-1. Reporter on file and one affected account were contacted directly."
              provenance:
                fetched_at: "2026-06-14T14:35:00Z"
                redirects: 0
                bytes: 1841
          agent_task.redact-pii.output:
            redaction_report:
              decision: ready
              detected:
                - class: person
                  span: [78, 86]
                  confidence: 0.91
                - class: account_id
                  span: [104, 118]
                  confidence: 0.95
              redacted_digest: "sha256:9b1d4c0e2af7b53c8e51a0d9f4c2b18e7a3d5c0f9e2b4a16d8c3f0a7b9e1d2c4"
              residual_risk:
                level: low
                reason: Two personal spans removed at high confidence; the rest is incident status with no identifiers.
              policy:
                classes:
                  - person
                  - account_id
                mode: redact
          agent_task.send-as.output:
            send_plan:
              decision: ready
              action_family: send-as
              principal:
                type: account
                ref: account:ops-bot
              provider:
                name: slack
                account_ref: workspace:incidents
                runtime_path: channel.post
              send_class: status
              channel: chat
              audience:
                type: channel
                ref: "#incidents"
                requires_reconfirmation: false
              content:
                draft_ref: redaction:redacted
                digest: "sha256:9b1d4c0e2af7b53c8e51a0d9f4c2b18e7a3d5c0f9e2b4a16d8c3f0a7b9e1d2c4"
                subject_or_title: Incident resolved
              gates:
                preflight_required: true
                human_approval_required: true
                approval_ref: governed-outbound.send.approval
              blockers: []
              provider_actions:
                - channel.post
              evidence_refs:
                - "sha256:9b1d4c0e2af7b53c8e51a0d9f4c2b18e7a3d5c0f9e2b4a16d8c3f0a7b9e1d2c4"
              success_checkpoint:
                milestone: provider_delivery_required
                description: Provider delivery and readback remain required after this plan.
          agent_task.sign-receipt.output:
            attestation:
              decision: ready_to_seal
              action: governed outbound plan
              claim: A public incident update was gathered, scrubbed of personal data, and authorized for the incident channel.
              principal: account:ops-bot
              evidence_refs:
                - ref: source:incident-update
                  digest: "sha256:1f0a9c7e4b2d6a8f3c5e1b0d9a7c6e4f2b8d0a1c3e5f7a9b1d3f5a7c9e1b3d5f"
                  proves: The allowlisted incident source was gathered.
                - ref: redaction:incident-update
                  digest: "sha256:9b1d4c0e2af7b53c8e51a0d9f4c2b18e7a3d5c0f9e2b4a16d8c3f0a7b9e1d2c4"
                  proves: The approved outbound content is bound to the scrubbed artifact.
              gaps: []
              scope:
                channel: "#incidents"
                completion: plan_only
        approvals:
          governed-outbound.send.approval: true
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: governed-outbound-needs-target
      inputs: {}
      expect:
        status: failure

runners:
  governed-outbound:
    default: true
    type: graph
    inputs:
      url:
        type: string
        required: true
        description: "Source URL to gather before preparing the notification."
      allowlist:
        type: json
        required: true
        description: "Hosts the fetch is permitted to reach."
      channel:
        type: string
        required: true
        description: "Destination channel for the notification."
      principal:
        type: string
        required: true
        description: "Principal the notification is sent as."
      claim:
        type: string
        required: false
        description: "What the sealed attestation should assert about the run."
      operator_context:
        type: string
        required: false
        description: "Boundary, audience, or compliance context for the run."
    graph:
      name: governed-outbound
      steps:
        - id: fetch-source
          label: gather the source
          skill: ../web-fetch
          runner: web-fetch
          scopes:
            - runx:net:allowlist
          inputs:
            extract: text
        - id: scrub-content
          label: scrub personal data before the boundary
          skill: ../redact-pii
          runner: redact-pii
          scopes:
            - runx:content:read
          inputs:
            mode: redact
          context:
            content: fetch-source.fetch_result.data.extracted
        - id: approve-send
          label: human approval before delivery
          run:
            type: approval
          inputs:
            gate_id: governed-outbound.send.approval
            reason: Approve delivery of the scrubbed content; review the redaction verdict and residual risk before it leaves the boundary.
          context:
            decision: scrub-content.redaction_report.data.decision
            residual_risk: scrub-content.redaction_report.data.residual_risk
            redacted_digest: scrub-content.redaction_report.data.redacted_digest
          artifacts:
            wrap_as: approval_decision
            packet: runx.approval.decision.v1
        - id: plan-notice
          label: authorize the governed notification plan
          skill: ../send-as
          runner: plan
          inputs:
            objective: Authorize the approved scrubbed update for the configured provider host.
            audience: "$input.channel"
            provider_context: "$input.operator_context"
          context:
            content_ref: scrub-content.redaction_report.data
        - id: seal-run
          label: seal the run to the ledger
          skill: ../sign-receipt
          runner: sign-receipt
          scopes:
            - runx:ledger:append
          inputs:
            action: governed outbound plan
          context:
            evidence: plan-notice.send_plan.data
      policy:
        guards:
          - step: plan-notice
            field: approve-send.approval_decision.data.approved
            equals: true
          - step: plan-notice
            field: scrub-content.redaction_report.data.decision
            equals: ready
