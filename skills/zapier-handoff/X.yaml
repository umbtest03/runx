skill: zapier-handoff
version: "0.1.1"
catalog:
  kind: graph
  audience: operator
  visibility: public
  role: context
credentials:
  zapier:
    provider: zapier
    auth:
      bearer:
        delivery:
          env: ZAPIER_WEBHOOK_TOKEN
harness:
  cases:
    - name: zapier-handoff-preflight-ready
      runner: preflight
      inputs:
        event_id: evt_zapier_demo_001
        handoff_audience: zapier:zap:runx-governed-effect
        execution_context:
          caller: runx-cli
          workflow_ref: operator-zap-demo
          environment: local-dogfood
        payload:
          hello: zap
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
        steps:
          - build-handoff-context
runners:
  preflight:
    default: false
    type: graph
    runx:
      category: ops
    inputs:
      event_id:
        type: string
        required: true
        description: Stable event id used by Zapier for deduplication.
      handoff_audience:
        type: string
        required: false
        default: zapier:zap:runx-governed-effect
        description: Expected Zap receiver audience.
      execution_context:
        type: json
        required: true
        description: Explicit caller/workflow context for the handoff.
      payload:
        type: json
        required: true
        description: Business payload to deliver to the Zap.
      source:
        type: string
        required: false
        default: runx
        description: Human-readable source label.
      idempotency_key:
        type: string
        required: false
        description: Optional explicit idempotency key. Defaults to event_id.
      receiver:
        type: json
        required: false
        description: Optional receiver metadata such as Zap id, endpoint ref, or support owner.
    graph:
      name: zapier-handoff-preflight
      steps:
        - id: build-handoff-context
          tool: orchestrators.build_handoff_context
          scopes:
            - orchestrator.handoff.prepare
          inputs:
            platform: zapier
            event_id: $input.event_id
            handoff_scope: orchestrator.zapier.workflow.invoke
            handoff_audience: $input.handoff_audience
            execution_context: $input.execution_context
            payload: $input.payload
            source: $input.source
            idempotency_key: $input.idempotency_key
            receiver: $input.receiver
  send:
    default: true
    type: graph
    credential: zapier
    inputs:
      zapier_account_id:
        type: string
        required: true
        description: Zapier Catch Hook account id path segment.
      zapier_hook_id:
        type: string
        required: true
        description: Zapier Catch Hook id path segment.
      event_id:
        type: string
        required: true
        description: Stable event id used by Zapier for deduplication.
      handoff_audience:
        type: string
        required: false
        default: zapier:zap:runx-governed-effect
        description: Expected Zap receiver audience.
      execution_context:
        type: json
        required: true
        description: Explicit caller/workflow context for the handoff.
      payload:
        type: json
        required: true
        description: Business payload to deliver to the Zap.
      source:
        type: string
        required: false
        default: runx
        description: Human-readable source label.
      idempotency_key:
        type: string
        required: false
        description: Optional explicit idempotency key. Defaults to event_id.
      receiver:
        type: json
        required: false
        description: Optional receiver metadata such as Zap id, endpoint ref, or support owner.
    graph:
      name: zapier-handoff-send
      steps:
        - id: build-handoff-context
          tool: orchestrators.build_handoff_context
          scopes:
            - orchestrator.handoff.prepare
          inputs:
            platform: zapier
            event_id: $input.event_id
            handoff_scope: orchestrator.zapier.workflow.invoke
            handoff_audience: $input.handoff_audience
            execution_context: $input.execution_context
            payload: $input.payload
            source: $input.source
            idempotency_key: $input.idempotency_key
            receiver: $input.receiver
        - id: post-to-zapier
          tool: orchestrators.zapier_handoff
          scopes:
            - orchestrator.zapier.workflow.invoke
          inputs:
            zapier_account_id: $input.zapier_account_id
            zapier_hook_id: $input.zapier_hook_id
            event_id: $input.event_id
            handoff_scope: orchestrator.zapier.workflow.invoke
            handoff_audience: $input.handoff_audience
            execution_context: $input.execution_context
            payload: $input.payload
            source: $input.source
            idempotency_key: $input.idempotency_key
