skill: vault-unseal
version: "0.1.1"
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
  execution: plan
  completion: plan
  requires_adapter: true
  approval: required
runners:
  vault-unseal:
    default: true
    type: agent-task
    agent: operator
    task: vault-unseal
    outputs:
      unseal_plan: object
    artifacts:
      wrap_as: unseal_plan_packet
      packet: runx.unseal.v1
    runx:
      category: security
    inputs:
      secret_ref:
        type: string
        required: true
        description: "Reference to the secret to unseal, never its value."
      purpose:
        type: string
        required: true
        description: "Bounded reason the secret is needed."
      ttl:
        type: string
        required: true
        description: "Access window duration; the window starts at approval."
      scope:
        type: json
        required: true
        description: "Structured statement of what the secret unlocks."
      principal:
        type: string
        required: true
        description: "Who the access is attributed to."
      policy_notes:
        type: string
        required: false
        description: "Reserved purposes, break-glass conditions, or constraints that affect the decision."
      operator_context:
        type: string
        required: false
        description: "Approval posture or extra guardrails."
