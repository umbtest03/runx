skill: issue-to-pr
version: "0.1.5"

harness:
  cases:
    - name: issue-to-pr-dispatches-first-step
      inputs:
        task_id: issue-to-pr-smoke
        issue_title: Fixture smoke test
        issue_body: Minimal smoke test body for the harness.
        size: micro
      # Shallow smoke baseline. Harness now sandboxes cli-tool cwd
      # to the tempdir (runner.ts RUNX_CWD/INIT_CWD), so scafld-init
      # and scafld-new land inside the sandbox. The chain reaches
      # author-spec and yields `needs_resolution` because this
      # fixture does not supply caller.answers.
      expect:
        status: needs_resolution

    - name: issue-to-pr-reaches-author-spec
      inputs:
        task_id: issue-to-pr-reach-author
        issue_title: Author-spec harness reach
        issue_body: Deeper harness case with canned author-spec answers so the chain can progress past the first agent hand-off.
        size: micro
      caller:
        answers:
          agent_step.issue-to-pr-author-spec.output:
            spec_draft:
              path: .ai/specs/drafts/issue-to-pr-reach-author.yaml
              task_id: issue-to-pr-reach-author
            spec_contents: |
              spec_version: "1.1"
              task_id: "issue-to-pr-reach-author"
              created: "2026-04-20T00:00:00Z"
              updated: "2026-04-20T00:00:00Z"
              status: "draft"
              task:
                title: "Reach author-spec harness stub"
                summary: >
                  Minimal stub spec emitted by the cycle-8 harness fixture; the
                  chain uses this to exercise steps past author-spec.
                size: "micro"
                risk_level: "low"
                context:
                  packages: []
                  invariants: []
                  files_impacted:
                    - "README.md"
                  cwd: "/tmp"
                objectives:
                  - "Update the stub readme"
                touchpoints:
                  - area: "docs"
                    description: "Keep the stub README aligned with the fixture."
                acceptance:
                  definition_of_done:
                    - id: "dod1"
                      description: "Stub"
                      status: "pending"
                  validation: []
              planning_log:
                - timestamp: "2026-04-20T00:00:00Z"
                  actor: "agent"
                  summary: "Stub from cycle-8 harness fixture."
              phases:
                - id: "phase1"
                  name: "Stub"
                  objective: "Stub"
                  changes: []
                  acceptance_criteria: []
                  status: "pending"
              rollback:
                strategy: "per_phase"
                commands:
                  phase1: "true"
      # The stub spec lets the chain progress past author-spec.
      # author-fix (the next agent-step hand-off) has no canned
      # answer here, so the chain yields `needs_resolution` at
      # that point.
      expect:
        status: needs_resolution

    - name: issue-to-pr-completes-chain
      inputs:
        task_id: issue-to-pr-full-chain
        issue_title: Full-chain harness
        issue_body: Canned answers for every agent-step hand-off so the chain reaches scafld-complete.
        size: micro
      caller:
        answers:
          agent_step.issue-to-pr-author-spec.output:
            spec_draft:
              path: .ai/specs/drafts/issue-to-pr-full-chain.yaml
              task_id: issue-to-pr-full-chain
            spec_contents: |
              spec_version: "1.1"
              task_id: "issue-to-pr-full-chain"
              created: "2026-04-20T00:00:00Z"
              updated: "2026-04-20T00:00:00Z"
              status: "draft"
              task:
                title: "Full-chain harness stub"
                summary: >
                  Minimal stub spec emitted by the cycle-9 harness case.
                size: "micro"
                risk_level: "low"
                context:
                  packages: []
                  invariants: []
                  files_impacted: []
                  cwd: "/tmp"
                objectives:
                  - "Stub objective"
                touchpoints: []
                acceptance:
                  definition_of_done:
                    - id: "dod1"
                      description: "Stub"
                      status: "pending"
                  validation: []
              planning_log:
                - timestamp: "2026-04-20T00:00:00Z"
                  actor: "agent"
                  summary: "Stub from cycle-9 full-chain fixture."
              phases:
                - id: "phase1"
                  name: "Stub"
                  objective: "Stub"
                  changes:
                    - file: "README.md"
                      action: "update"
                      content_spec: "Write the fixture README text."
                  acceptance_criteria:
                    - id: "ac1"
                      type: "test"
                      description: "README contains the stub output"
                      command: "grep -q '^stub fixture$' README.md"
                      expected: "exit code 0"
                  status: "pending"
              rollback:
                strategy: "per_phase"
                commands:
                  phase1: "git checkout HEAD -- README.md"
          agent_step.issue-to-pr-apply-fix.output:
            fix_bundle:
              files:
                - path: "README.md"
                  contents: "stub fixture\n"
              summary: Stub fix bundle writing one declared fixture file.
          agent_step.issue-to-pr-review.output:
            review_decision:
              review_file: .ai/reviews/issue-to-pr-full-chain.md
              verdict: pass
            review_contents: |
              # Review: issue-to-pr-full-chain

              ## Spec
              Full-chain harness stub

              ---

              ## Review 1 — 2026-04-20T00:00:00Z

              ### Metadata
              ```json
              {
                "schema_version": 3,
                "round_status": "completed",
                "reviewer_mode": "executor",
                "reviewer_session": "",
                "reviewed_at": "2026-04-20T00:00:00Z",
                "override_reason": null,
                "pass_results": {
                  "spec_compliance": "pass",
                  "scope_drift": "pass",
                  "regression_hunt": "pass",
                  "convention_check": "pass",
                  "dark_patterns": "pass"
                }
              }
              ```

              ### Pass Results
              - spec_compliance: PASS
              - scope_drift: PASS
              - regression_hunt: PASS
              - convention_check: PASS
              - dark_patterns: PASS

              ### Regression Hunt
              Stub fixture; no code changes.

              ### Convention Check
              Stub fixture.

              ### Dark Patterns
              Stub fixture.

              ### Blocking
              None.

              ### Non-blocking
              None.

              ### Verdict
              pass
      # With all three agent-step answers canned, the chain
      # executes every step including scafld-complete and returns
      # success. This fixture is the full-chain smoke test.
      expect:
        status: success

runners:
  issue-to-pr:
    default: true
    type: chain
    inputs:
      task_id:
        type: string
        required: false
        default: "issue-to-pr-fixture"
        description: "scafld task id for the governed issue-to-PR lane."
      issue_title:
        type: string
        required: false
        default: "Fixture issue to PR"
        description: "Canonical issue title passed to the lane."
      title:
        type: string
        required: false
        description: "Compatibility alias for issue_title."
      issue_body:
        type: string
        required: false
        description: "Issue or support body describing the change request."
      source:
        type: string
        required: false
        description: "Source system for the issue, such as github_issue or support_request."
      source_id:
        type: string
        required: false
        description: "Source record identifier."
      source_url:
        type: string
        required: false
        description: "Source URL for the issue or support request."
      target_repo:
        type: string
        required: false
        description: "Intended repository slug for repo-local dispatchers."
      repo_snapshot:
        type: json
        required: false
        description: "Compact structured snapshot of the target repo gathered from a real workspace."
      repo_snapshot_path:
        type: string
        required: false
        description: "Optional path to a fuller repo snapshot artifact that can be read when the inline snapshot is insufficient."
      repo_context:
        type: string
        required: false
        description: "Operator-authored textual repo context, such as architecture notes or likely validation hooks."
      size:
        type: string
        required: false
        default: "micro"
        description: "Size passed to scafld spec/new."
      risk:
        type: string
        required: false
        default: "low"
        description: "Risk passed to scafld spec/new."
      phase:
        type: string
        required: false
        default: "phase1"
        description: "Optional scafld execution phase."
      draft_spec_path:
        type: string
        required: false
        description: "Canonical scafld draft spec path relative to fixture root."
      fixture:
        type: string
        required: false
        description: "Workspace root containing the target .ai/ directory."
      scafld_bin:
        type: string
        required: false
        description: "Explicit scafld executable path."
    chain:
      name: issue-to-pr
      owner: runx
      notes:
        status: governed
        rationale: >
          This execution graph keeps cognition and mutation separate. Agent
          phases author the spec, fix, and review contents. Deterministic
          fs.write phases make the on-disk mutations visible before the
          scafld lifecycle advances.
      steps:
        - id: scafld-init
          label: ensure scafld workspace
          skill: ../scafld
          scopes:
            - scafld:workspace:write
          mutation: true
          inputs:
            command: init
        - id: scafld-new
          label: open task lane
          skill: ../scafld
          scopes:
            - scafld:spec:write
          mutation: true
          inputs:
            command: spec
        - id: author-spec
          label: draft spec
          run:
            type: agent-step
            agent: builder
            task: issue-to-pr-author-spec
            outputs:
              spec_draft: object
              spec_contents: string
          instructions: >
            Replace the scafld draft TODOs with a valid bounded spec for this
            issue-to-PR lane. Use the issue metadata in inputs, especially
            issue_title/title, issue_body, source, source_id, source_url,
            target_repo, repo_snapshot, repo_snapshot_path, repo_context, and
            draft_spec_path to keep the spec grounded in the real codebase.
            Prefer repo_context and the inline repo_snapshot first. If you need
            more grounding and repo_snapshot_path is present, read that file via
            fs.read rather than guessing.
            spec_draft.path must point at the canonical scafld draft spec file
            relative to the fixture root. Prefer draft_spec_path when present;
            otherwise derive the exact created path from scafld_new_stdout,
            which comes from the preceding scafld new step. spec_contents must
            be the full YAML text to write. spec_contents must be a complete
            scafld v1.1 document with this structure:
            - spec_version, task_id, created, updated, status
            - task.title, task.summary, task.size, task.risk_level
            - task.context with grounded files_impacted and any relevant invariants
            - task.objectives as an explicit list of bounded outcomes
            - task.touchpoints describing the concrete repo areas being changed
            - task.acceptance.definition_of_done and task.acceptance.validation
            - planning_log entries with timestamp, actor, and summary
            - at least one phases[] entry with id, name, objective, changes[],
              acceptance_criteria[], and status
            - rollback.strategy and rollback.commands
            spec_draft.path is a temporary draft lifecycle path used only for
            write-spec/read-spec before approval. Do not list spec_draft.path
            or any .ai/specs/drafts/<task_id>.yaml path in
            task.context.files_impacted, phases[].changes[].file, acceptance
            validation commands, or rollback commands. After scafld-start, the
            durable lifecycle-managed spec lives at .ai/specs/active/<task_id>.yaml.
            If the spec must declare a live governance artifact after start,
            use the active path only. Never declare both draft and active copies
            for the same task_id.
            The spec must declare every tracked file that will be changed before
            scafld audit runs, including the active spec path if that file
            will appear in git diff. Use concrete repo-relative file paths only
            in task.context.files_impacted, phases[].changes[].file, and
            rollback commands. Never use prose placeholders such as "the relevant
            docs file" or "the minimal set of files". Mirror the scafld schema
            used by the passing issue-to-pr fixture tests: task.summary/size/
            risk_level and task.acceptance.validation are required semantics,
            not optional prose. If a required file path cannot be grounded from
            the issue body or available evidence, keep the spec narrowly scoped
            and state the missing path confirmation in assumptions or notes
            rather than inventing it. When repo_snapshot or
            repo_snapshot_path is present, prefer those real repo artifacts over
            generic assumptions. Keep the scope minimal and make acceptance
            criteria executable in the current workspace state before any
            commit exists. Never author acceptance criteria that depend on git
            history or revision ranges such as HEAD~1, merge-base comparisons,
            or prior commits being available. Prefer current-tree checks or
            exact file-path checks such as git diff --name-only -- <path> or
            git status --short -- <path>. Never write an exhaustive whole-tree
            assertion such as "the lane only changes X and Y" by comparing the
            full git status output to an exact file list. Governed lanes create
            additional lifecycle artifacts after review, especially
            .ai/reviews/<task_id>.md, so that pattern makes the task impossible
            to complete even when the repo change itself is correct. If you
            need a scope check, validate the intended repo file directly and
            let scafld audit/review enforce the broader boundary, or include
            the known lifecycle-managed governance artifacts explicitly. When
            checking file contents, target the declared changed file directly
            and anchor on the exact expected text so the command cannot
            accidentally match the issue title, spec prose, or unrelated
            strings elsewhere in the repo.
          allowed_tools:
            - fs.read
            - git.status
          context:
            scafld_new_stdout: scafld-new.stdout
          artifacts:
            named_emits:
              spec_draft: spec_draft
        - id: write-spec
          label: write spec
          tool: fs.write
          scopes:
            - fs.write
          mutation: true
          context:
            path: author-spec.spec_draft.data.path
            contents: author-spec.spec_contents
        - id: read-spec
          label: read persisted spec
          tool: fs.read
          scopes:
            - fs.read
          context:
            path: author-spec.spec_draft.data.path
        - id: scafld-validate
          label: validate spec
          skill: ../scafld
          scopes:
            - scafld:spec:validate
          inputs:
            command: validate
        - id: scafld-approve
          label: approve spec
          skill: ../scafld
          scopes:
            - scafld:spec:approve
          mutation: true
          inputs:
            command: approve
        - id: scafld-start
          label: start task
          skill: ../scafld
          scopes:
            - scafld:exec:start
          mutation: true
          inputs:
            command: start
        - id: delete-draft-spec
          label: remove temporary draft spec
          tool: fs.delete
          scopes:
            - fs.write
          mutation: true
          context:
            path: author-spec.spec_draft.data.path
        - id: read-declared-files
          label: read declared files
          tool: spec.read_declared_files
          scopes:
            - spec.read_declared_files
          context:
            spec_contents: read-spec.file_read.data.contents
        - id: author-fix
          label: draft fix
          run:
            type: agent-step
            agent: builder
            task: issue-to-pr-apply-fix
            outputs:
              fix_bundle: object
          instructions: >
            Produce the bounded fix bundle described by the approved spec,
            grounded in the declared issue metadata, approved scope, and
            provided spec_contents. Use repo_snapshot, repo_snapshot_path, and
            repo_context when present to stay aligned with the real repo shape.
            declared_file_context is the deterministic preloaded current-file
            surface for every path the approved spec already declared. Review
            declared_file_context.files before deciding what to edit, and
            prefer those grounded contents over generic assumptions. If the
            temporary draft spec path appears in the approved spec, treat it as
            stale governance metadata only; the chain deletes that draft copy
            immediately after scafld-start and you must not recreate it in the
            fix bundle. If the inline snapshot is insufficient and
            repo_snapshot_path is present,
            read it via fs.read before choosing files. Use fs.read only when
            you need additional grounded repo files beyond the declared set.
            fix_bundle.files must be an array of { path, contents } entries
            covering every tracked repo file that must change to satisfy the
            approved spec. Each path must be relative to the fixture root. When
            the approved spec requires more than one repo file, a partial bundle
            is incorrect. Do not widen scope, and do not rely on hidden edits
            outside the deterministic write phase. If the declared context is
            still insufficient after reviewing declared_file_context and any
            justified fs.read calls, return fix_bundle.status: blocked with a
            reason and leave fix_bundle.files empty rather than guessing or
            emitting a silent no-op bundle.
          allowed_tools:
            - fs.read
            - git.status
          context:
            spec_draft: author-spec.spec_draft.data
            spec_file: read-spec.file_read.data
            spec_contents: read-spec.file_read.data.contents
            declared_file_context: read-declared-files.declared_file_context.data
          artifacts:
            named_emits:
              fix_bundle: fix_bundle
        - id: write-fix
          label: write fix
          tool: fs.write_bundle
          scopes:
            - fs.write
          mutation: true
          context:
            files: author-fix.fix_bundle.data.files
        - id: scafld-exec
          label: run task
          skill: ../scafld
          scopes:
            - scafld:exec:write
          mutation: true
          inputs:
            command: execute
        - id: scafld-audit
          label: audit changes
          skill: ../scafld
          scopes:
            - scafld:review:read
          inputs:
            command: audit
        - id: scafld-review-open
          label: open review
          skill: ../scafld
          scopes:
            - scafld:review:write
          mutation: true
          inputs:
            command: review
        - id: read-review-template
          label: read review template
          tool: fs.read
          scopes:
            - fs.read
          context:
            path: scafld-review-open.review_file
        - id: reviewer-boundary
          label: draft review
          run:
            type: agent-step
            agent: reviewer
            task: issue-to-pr-review
            outputs:
              review_decision: object
              review_contents: string
          scopes:
            - scafld:review:fill
          allowed_tools:
            - fs.read
          context:
            review_file: scafld-review-open.review_file
            review_prompt: scafld-review-open.review_prompt
            review_file_contents: read-review-template.file_read.data.contents
            fix_bundle: author-fix.fix_bundle.data
            written_files: write-fix.file_bundle_write.data.files
            spec_contents: read-spec.file_read.data.contents
          instructions: >
            Fill the existing scafld review artifact requested by review_prompt.
            review_file_contents is the canonical scaffold that scafld created;
            preserve that scaffold shape and return the full markdown file in
            review_contents after filling it in. Do not invent a new top-level
            format. Preserve the exact review-artifact headings that scafld
            parses: `# Review: <task_id>`, `## Spec`, the latest round heading
            `## Review N — <timestamp>`, and the section titles `### Metadata`,
            `### Pass Results`, `### Regression Hunt`,
            `### Convention Check`, `### Dark Patterns`, `### Blocking`,
            `### Non-blocking`, and `### Verdict`. Do not rename
            `### Metadata` to `### Metadata JSON`. Produce review_decision with
            at least review_file and verdict, plus review_contents as the full
            markdown review file to write. Keep the review grounded in the
            declared change set, the full fix_bundle.files array, the
            persisted write_bundle result, and the existing scaffold contents.
            The latest review round Metadata JSON block must include
            schema_version: 3, round_status: completed, reviewer_mode,
            reviewer_session, reviewed_at, override_reason, and pass_results
            for spec_compliance, scope_drift, regression_hunt,
            convention_check, and dark_patterns. Use verdict pass_with_issues
            when there are non-blocking findings, and use pass only when the
            blocking section is empty and the pass_results block reflects a
            clean review. When `### Blocking` or `### Non-blocking` has no
            findings, write the literal `None.` on the next line with no bullet
            marker and no extra prose. Do not write placeholder bullets such as
            `- No blocking findings.` or `- None.` because scafld counts
            bullet lines in those sections as real findings.
          artifacts:
            named_emits:
              review_decision: review_decision
        - id: write-review
          label: write review
          tool: fs.write
          scopes:
            - fs.write
          mutation: true
          context:
            path: scafld-review-open.review_file
            contents: reviewer-boundary.review_contents
        - id: scafld-complete
          label: complete task
          skill: ../scafld
          scopes:
            - scafld:archive:write
          mutation: true
          context:
            reviewer_result: reviewer-boundary.review_decision.data
          inputs:
            command: complete
      policy:
        transitions:
          - to: write-fix
            field: author-fix.fix_bundle.data.files
            not_equals: []
