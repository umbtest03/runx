runners:
  issue-to-pr:
    default: true
    type: graph
    inputs:
      task_id:
        type: string
        required: false
        default: "issue-to-pr-fixture"
        description: "scafld task id for the governed issue-to-PR lane."
      thread_title:
        type: string
        required: false
        default: "Fixture thread-driven change"
        description: "Canonical thread title passed to the lane."
      thread_body:
        type: string
        required: false
        description: "Subject body or request text describing the change request."
      thread_locator:
        type: string
        required: false
        description: "Canonical locator for the bounded thread."
      thread:
        type: json
        required: false
        description: "Portable thread for the current thread."
      outbox_entry:
        type: json
        required: false
        description: "Current outbox entry when the lane is refreshing an adapter-owned target."
      target_repo:
        type: string
        required: false
        description: "Intended repository slug for repo-local dispatchers."
      repo_snapshot:
        type: json
        required: false
        description: "Compact structured snapshot of the target repo gathered from a real workspace."
      repo_snapshot_path:
        type: string
        required: false
        description: "Optional path to a fuller repo snapshot artifact that can be read when the inline snapshot is insufficient."
      repo_context:
        type: string
        required: false
        description: "Operator-authored textual repo context, such as architecture notes or likely validation hooks."
      size:
        type: string
        required: false
        default: "small"
        description: "Size passed to scafld plan."
      risk:
        type: string
        required: false
        default: "low"
        description: "Risk passed to scafld plan."
      base:
        type: string
        required: false
        default: "main"
        description: "Base ref used by the PR packaging boundary."
      fixture:
        type: string
        required: false
        description: "Workspace root containing the target .scafld directory."
      scafld_bin:
        type: string
        required: false
        description: "Explicit scafld executable path."
      provider:
        type: string
        required: false
        description: "Optional scafld review provider, such as command, claude, or codex."
      provider_command:
        type: string
        required: false
        description: "Optional scafld review provider command override."
      provider_binary:
        type: string
        required: false
        description: "Optional scafld review provider binary override."
      model:
        type: string
        required: false
        description: "Optional model forwarded to scafld review."
    graph:
      name: issue-to-pr
      owner: runx
      notes:
        status: governed
        rationale: >
          This graph keeps cognition and mutation separate while treating
          scafld 2.2 as the workflow kernel. Agent phases author the markdown
          spec and bounded fix bundle. Deterministic fs.write phases perform
          mutations. Native scafld plan, validate, approve, build, review,
          complete, status, and handoff surfaces stay visible instead of being
          re-created by translation projection steps.
      steps:
        - id: scafld-plan
          label: open task lane
          skill: ../scafld
          scopes:
            - scafld:spec:write
          mutation: true
          inputs:
            command: plan
        - id: author-spec
          label: draft markdown spec
          run:
            type: agent-step
            agent: builder
            task: issue-to-pr-author-spec
            outputs:
              spec_contents: string
          instructions: >
            Replace the draft created by scafld plan with a complete scafld
            2.0 markdown spec. Use thread_title, thread_body, thread_locator,
            thread, outbox_entry, target_repo, repo_snapshot,
            repo_snapshot_path, and repo_context to keep the spec grounded in
            the actual request and repository. Preserve the front matter shape:
            spec_version '2.0', task_id, created, updated, status: draft,
            title: non-empty thread title, harden_status: not_run, size as one
            of small, medium, or large, and risk_level. The body must include
            Current State, Summary, Context, Objectives, Scope, Dependencies,
            Assumptions, Touchpoints, Risks, Acceptance, at least one Phase
            section, Rollback, Review, Self Eval, Deviations, Metadata, Origin,
            Harden Rounds, and
            Planning Log. Declare changed repo files in Context / Files
            impacted and Phase / Changes using concrete repo-relative paths in
            backticks. Do not declare scafld-managed control-plane artifacts
            under .scafld/specs, .scafld/reviews, .scafld/runs, or old .ai
            governance paths as repo-change scope. Validation commands must be
            executable in the current workspace after the fix bundle is written.
            Do not depend on git history ranges such as HEAD~1. When validation
            commands are included, use direct repo-local checks such as tests,
            lint, build, or file-content commands. Do not use runx skill runner
            internals or skills/scafld/run.mjs as validation commands; scafld
            is already the lifecycle runner around this graph. If a required file
            path cannot be grounded from the thread or repository evidence, keep
            the scope narrow and state the assumption instead of inventing a file.
            When the approved lane is documentation or process work, prefer
            existing documentation surfaces from repo_snapshot.existing_files or
            repo_context, and declare at least one non-governance repo file;
            issue-to-pr is a PR lane, so an approved spec must not leave the
            repo-change scope empty.
          allowed_tools:
            - fs.read
            - git.status
          context:
            spec_path: scafld-plan.result.path
            scafld_plan: scafld-plan.result
        - id: normalize-spec
          label: normalize scafld frontmatter
          tool: spec.normalize_scafld_frontmatter
          scopes:
            - spec.normalize_scafld_frontmatter
          context:
            spec_contents: author-spec.spec_contents
        - id: write-spec
          label: write markdown spec
          tool: fs.write
          scopes:
            - fs.write
          mutation: true
          context:
            path: scafld-plan.result.path
            contents: normalize-spec.normalized_spec.data.data.contents
        - id: read-draft-spec
          label: read draft spec
          tool: fs.read
          scopes:
            - fs.read
          context:
            path: scafld-plan.result.path
        - id: scafld-validate
          label: validate spec
          skill: ../scafld
          scopes:
            - scafld:spec:validate
          inputs:
            command: validate
        - id: scafld-approve
          label: approve spec
          skill: ../scafld
          scopes:
            - scafld:spec:approve
          mutation: true
          inputs:
            command: approve
        - id: read-approved-spec
          label: read approved spec
          tool: fs.read
          scopes:
            - fs.read
          context:
            path: scafld-approve.result.path
        - id: read-declared-files
          label: read declared files
          tool: spec.read_declared_files
          scopes:
            - spec.read_declared_files
          context:
            spec_contents: read-approved-spec.file_read.data.data.contents
        - id: author-fix
          label: draft fix
          run:
            type: agent-step
            agent: builder
            task: issue-to-pr-apply-fix
            outputs:
              fix_bundle: object
          instructions: >
            Produce the bounded fix bundle described by the approved scafld 2
            markdown spec. Use repo_snapshot, repo_snapshot_path, repo_context,
            approved spec contents, current thread context, and
            declared_file_context. Review declared_file_context.files before
            deciding what to edit. fix_bundle.files must be an array of
            { path, contents } entries covering every repo file needed to satisfy
            the approved spec. For documentation or process changes, the
            approved spec, thread, repo_snapshot, repo_context, and current
            declared file contents are sufficient when they identify a narrow
            edit; do not return an empty bundle when one scoped docs edit is
            possible. For any existing file, contents must be the complete
            current file with the smallest necessary edit applied; preserve
            unrelated sections, headings, prose, tables, links, setup
            instructions, and ordering exactly. Never replace an existing file
            with only the new section or a shortened summary. If a declared file
            has exists: false and the approved spec intentionally creates it,
            write the new file when the desired contents are inferable from the
            spec and thread. Do not widen scope.
            Do not hand-edit scafld lifecycle files. Return
            fix_bundle.status: blocked with a reason and files: [] only when no
            concrete repo-relative target is declared, a required existing file
            cannot be read, or the requested behavior cannot be inferred without
            inventing requirements; name the missing evidence and path in the
            reason because an empty bundle is a terminal policy denial.
          allowed_tools:
            - fs.read
            - git.status
          context:
            spec_path: scafld-approve.result.path
            spec_file: read-approved-spec.file_read.data.data
            spec_contents: read-approved-spec.file_read.data.data.contents
            declared_file_context: read-declared-files.declared_file_context.data
          artifacts:
            named_emits:
              fix_bundle: fix_bundle
            packets:
              fix_bundle: runx.issue.fix_bundle.v1
        - id: write-fix
          label: write fix
          tool: fs.write_bundle
          scopes:
            - fs.write
          mutation: true
          context:
            files: author-fix.fix_bundle.data.files
        - id: scafld-build
          label: build task
          skill: ../scafld
          scopes:
            - scafld:build
          mutation: true
          inputs:
            command: build
        - id: scafld-status
          label: inspect review state
          skill: ../scafld
          scopes:
            - scafld:status:read
          inputs:
            command: status
        - id: read-current-branch
          label: read current branch
          tool: git.current_branch
          scopes:
            - git.read
        - id: scafld-review
          label: run scafld review
          skill: ../scafld
          scopes:
            - scafld:review:write
          mutation: true
          inputs:
            command: review
        - id: scafld-complete
          label: complete task
          skill: ../scafld
          scopes:
            - scafld:archive:write
          mutation: true
          inputs:
            command: complete
        - id: scafld-final-status
          label: inspect completed state
          skill: ../scafld
          scopes:
            - scafld:status:read
          inputs:
            command: status
        - id: scafld-handoff
          label: render handoff
          skill: ../scafld
          scopes:
            - scafld:handoff:read
          inputs:
            command: handoff
        - id: package-pull-request
          label: package the draft PR outbox entry
          tool: outbox.build_pull_request
          scopes:
            - runx:repo:package
          context:
            handoff_markdown: scafld-handoff.stdout
            build_result: scafld-build.result
            review_result: scafld-review.result
            completion_result: scafld-complete.result
            status_snapshot: scafld-final-status.result
            current_branch: read-current-branch.git_branch.data
        - id: push-pull-request
          label: push the PR outbox entry through thread
          tool: thread.push_outbox
          scopes:
            - thread:push
          context:
            outbox_entry: package-pull-request.outbox_entry.data
            draft_pull_request: package-pull-request.draft_pull_request.data
          inputs:
            next_status: draft
      policy:
        transitions:
          - to: write-fix
            field: author-fix.fix_bundle.data.files
            not_equals: []
