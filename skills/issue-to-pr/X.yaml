skill: issue-to-pr
version: "0.1.5"

harness:
  cases:
    - name: issue-to-pr-dispatches-first-step
      inputs:
        task_id: issue-to-pr-smoke
        subject_title: Fixture smoke test
        subject_body: Minimal subject body for the harness.
        subject_locator: local://fixtures/issue-to-pr-smoke
        size: micro
      # Shallow smoke baseline. Harness now sandboxes cli-tool cwd
      # to the tempdir (runner.ts RUNX_CWD/INIT_CWD), so scafld-init
      # and scafld-new land inside the sandbox. The chain reaches
      # author-spec and yields `needs_resolution` because this
      # fixture does not supply caller.answers.
      expect:
        status: needs_resolution

    - name: issue-to-pr-reaches-author-spec
      inputs:
        task_id: issue-to-pr-reach-author
        subject_title: Author-spec harness reach
        subject_body: Deeper harness case with canned author-spec answers so the chain can progress past the first agent hand-off.
        subject_locator: local://fixtures/issue-to-pr-reach-author
        size: micro
      caller:
        answers:
          agent_step.issue-to-pr-author-spec.output:
            spec_contents: |
              spec_version: "1.1"
              task_id: "issue-to-pr-reach-author"
              created: "2026-04-20T00:00:00Z"
              updated: "2026-04-20T00:00:00Z"
              status: "draft"
              task:
                title: "Reach author-spec harness stub"
                summary: >
                  Minimal stub spec emitted by the cycle-8 harness fixture; the
                  chain uses this to exercise steps past author-spec.
                size: "micro"
                risk_level: "low"
                context:
                  packages: []
                  invariants: []
                  files_impacted:
                    - "README.md"
                  cwd: "/tmp"
                objectives:
                  - "Update the stub readme"
                touchpoints:
                  - area: "docs"
                    description: "Keep the stub README aligned with the fixture."
                acceptance:
                  definition_of_done:
                    - id: "dod1"
                      description: "Stub"
                      status: "pending"
                  validation: []
              planning_log:
                - timestamp: "2026-04-20T00:00:00Z"
                  actor: "agent"
                  summary: "Stub from cycle-8 harness fixture."
              phases:
                - id: "phase1"
                  name: "Stub"
                  objective: "Stub"
                  changes: []
                  acceptance_criteria: []
                  status: "pending"
              rollback:
                strategy: "per_phase"
                commands:
                  phase1: "true"
      # The stub spec lets the chain progress past author-spec.
      # author-fix (the next agent-step hand-off) has no canned
      # answer here, so the chain yields `needs_resolution` at
      # that point.
      expect:
        status: needs_resolution

    - name: issue-to-pr-reaches-reviewer-boundary
      inputs:
        task_id: issue-to-pr-review-boundary
        subject_title: Reviewer-boundary harness
        subject_body: Canned answers for authored spec and fix so the chain reaches the explicit reviewer hand-off.
        subject_locator: local://fixtures/issue-to-pr-review-boundary
        size: micro
      caller:
        answers:
          agent_step.issue-to-pr-author-spec.output:
            spec_contents: |
              spec_version: "1.1"
              task_id: "issue-to-pr-review-boundary"
              created: "2026-04-20T00:00:00Z"
              updated: "2026-04-20T00:00:00Z"
              status: "draft"
              task:
                title: "Reviewer-boundary harness stub"
                summary: >
                  Minimal stub spec emitted by the reviewer-boundary harness case.
                size: "micro"
                risk_level: "low"
                context:
                  packages: []
                  invariants: []
                  files_impacted: []
                  cwd: "/tmp"
                objectives:
                  - "Stub objective"
                touchpoints: []
                acceptance:
                  definition_of_done:
                    - id: "dod1"
                      description: "Stub"
                      status: "pending"
                  validation: []
              planning_log:
                - timestamp: "2026-04-20T00:00:00Z"
                  actor: "agent"
                  summary: "Stub from reviewer-boundary fixture."
              phases:
                - id: "phase1"
                  name: "Stub"
                  objective: "Stub"
                  changes:
                    - file: "README.md"
                      action: "update"
                      content_spec: "Write the fixture README text."
                  acceptance_criteria:
                    - id: "ac1"
                      type: "test"
                      description: "README contains the stub output"
                      command: "grep -q '^stub fixture$' README.md"
                      expected: "exit code 0"
                  status: "pending"
              rollback:
                strategy: "per_phase"
                commands:
                  phase1: "git checkout HEAD -- README.md"
          agent_step.issue-to-pr-apply-fix.output:
            fix_bundle:
              files:
                - path: "README.md"
                  contents: "stub fixture\n"
              summary: Stub fix bundle writing one declared fixture file.
      # With authored spec and fix answers canned, the lane advances all the
      # way to the explicit reviewer boundary and then yields
      # `needs_resolution`. That proves the engineering loop without faking a
      # static review scaffold in inline harness JSON.
      expect:
        status: needs_resolution

runners:
  issue-to-pr:
    default: true
    type: chain
    inputs:
      task_id:
        type: string
        required: false
        default: "issue-to-pr-fixture"
        description: "scafld task id for the governed issue-to-PR lane."
      subject_title:
        type: string
        required: false
        default: "Fixture subject-driven change"
        description: "Canonical subject title passed to the lane."
      subject_body:
        type: string
        required: false
        description: "Subject body or request text describing the change request."
      subject_locator:
        type: string
        required: false
        description: "Canonical locator for the bounded subject."
      subject_memory:
        type: json
        required: false
        description: "Portable subject memory for the current subject thread."
      publication_target:
        type: json
        required: false
        description: "Current publication surface when the lane is refreshing an adapter-owned target."
      target_repo:
        type: string
        required: false
        description: "Intended repository slug for repo-local dispatchers."
      repo_snapshot:
        type: json
        required: false
        description: "Compact structured snapshot of the target repo gathered from a real workspace."
      repo_snapshot_path:
        type: string
        required: false
        description: "Optional path to a fuller repo snapshot artifact that can be read when the inline snapshot is insufficient."
      repo_context:
        type: string
        required: false
        description: "Operator-authored textual repo context, such as architecture notes or likely validation hooks."
      size:
        type: string
        required: false
        default: "micro"
        description: "Size passed to scafld spec/new."
      risk:
        type: string
        required: false
        default: "low"
        description: "Risk passed to scafld spec/new."
      phase:
        type: string
        required: false
        default: "phase1"
        description: "Optional scafld execution phase."
      name:
        type: string
        required: false
        description: "Optional branch name passed to `scafld branch`."
      base:
        type: string
        required: false
        description: "Optional base ref passed to `scafld branch` or `scafld audit`."
      bind_current:
        type: boolean
        required: false
        default: true
        description: "When true, bind the current branch instead of creating or switching."
      draft_spec_path:
        type: string
        required: false
        description: "Optional expected draft spec path relative to fixture root; `scafld new` remains the canonical source."
      fixture:
        type: string
        required: false
        description: "Workspace root containing the target .ai/ directory."
      scafld_bin:
        type: string
        required: false
        description: "Explicit scafld executable path."
    chain:
      name: issue-to-pr
      owner: runx
      notes:
        status: governed
        rationale: >
          This execution graph keeps cognition and mutation separate. Agent
          phases author the spec, fix, and review contents. Deterministic
          fs.write phases make the on-disk mutations visible before the
          scafld lifecycle advances, while native scafld branch, sync, status,
          and projection surfaces keep the lane aligned with normal
          issue-to-branch-to-PR work instead of a shadow workflow model.
      steps:
        - id: scafld-init
          label: ensure scafld workspace
          skill: ../scafld
          scopes:
            - scafld:workspace:write
          mutation: true
          inputs:
            command: init
        - id: scafld-new
          label: open task lane
          skill: ../scafld
          scopes:
            - scafld:spec:write
          mutation: true
          inputs:
            command: spec
        - id: author-spec
          label: draft spec
          run:
            type: agent-step
            agent: builder
            task: issue-to-pr-author-spec
            outputs:
              spec_contents: string
          instructions: >
            Replace the scafld draft TODOs with a valid bounded spec for this
            issue-to-PR lane. Use the subject metadata in inputs, especially
            subject_title, subject_body, subject_locator, subject_memory,
            publication_target, target_repo, repo_snapshot, repo_snapshot_path,
            repo_context, and draft_spec_path to keep the spec grounded in the
            real codebase. Prefer repo_context and the inline repo_snapshot
            first. If you need more grounding and repo_snapshot_path is
            present, read that file via fs.read rather than guessing.
            draft_spec_path is the canonical draft path created by scafld new.
            Treat it as source-of-truth lifecycle state, not as something to
            re-emit in a parallel object. spec_contents must be the full YAML
            text to write to that path. spec_contents must be a complete
            scafld v1.1 document with this structure:
            - spec_version, task_id, created, updated, status
            - task.title, task.summary, task.size, task.risk_level
            - task.context with grounded files_impacted and any relevant invariants
            - task.objectives as an explicit list of bounded outcomes
            - task.touchpoints describing the concrete repo areas being changed
            - task.acceptance.definition_of_done and task.acceptance.validation
            - planning_log entries with timestamp, actor, and summary
            - at least one phases[] entry with id, name, objective, changes[],
              acceptance_criteria[], and status
            - rollback.strategy and rollback.commands
            The draft path is temporary lifecycle state used only before
            approval. Do not declare any `.ai/specs/drafts/<task_id>.yaml`
            path in task.context.files_impacted, phases[].changes[].file,
            acceptance validation commands, or rollback commands. More
            generally, do not declare scafld-managed control-plane artifacts
            under `.ai/specs/`, `.ai/reviews/`, or `.ai/logs/` as repo-change
            scope. scafld owns those lifecycle files and excludes them from
            scope auditing. Never declare both draft and active copies for the
            same task_id. The spec must declare every tracked repo file that
            will be intentionally changed before scafld audit runs. Use
            concrete repo-relative file paths only
            in task.context.files_impacted, phases[].changes[].file, and
            rollback commands. Never use prose placeholders such as "the relevant
            docs file" or "the minimal set of files". Mirror the scafld schema
            used by the passing issue-to-pr fixture tests: task.summary/size/
            risk_level and task.acceptance.validation are required semantics,
            not optional prose. If a required file path cannot be grounded from
            the subject body or available evidence, keep the spec narrowly scoped
            and state the missing path confirmation in assumptions or notes
            rather than inventing it. When repo_snapshot or
            repo_snapshot_path is present, prefer those real repo artifacts over
            generic assumptions. Keep the scope minimal and make acceptance
            criteria executable in the current workspace state before any
            commit exists. Never author acceptance criteria that depend on git
            history or revision ranges such as HEAD~1, merge-base comparisons,
            or prior commits being available. Prefer current-tree checks or
            exact file-path checks such as git diff --name-only -- <path> or
            git status --short -- <path>. Never write an exhaustive whole-tree
            assertion such as "the lane only changes X and Y" by comparing the
            full git status output to an exact file list. Governed lanes create
            additional lifecycle artifacts after review, especially
            .ai/reviews/<task_id>.md, so that pattern makes the task impossible
            to complete even when the repo change itself is correct. If you
            need a scope check, validate the intended repo file directly and
            let scafld audit/review enforce the broader boundary, or mention
            the lifecycle-managed governance artifacts only in narrative
            context, not in phases[].changes[].file. When
            checking file contents, target the declared changed file directly
            and anchor on the exact expected text so the command cannot
            accidentally match the work title, spec prose, or unrelated
            strings elsewhere in the repo.
          allowed_tools:
            - fs.read
            - git.status
          context:
            draft_spec_path: scafld-new.state.file
            scafld_new_stdout: scafld-new.stdout
        - id: write-spec
          label: write spec
          tool: fs.write
          scopes:
            - fs.write
          mutation: true
          context:
            path: scafld-new.state.file
            contents: author-spec.spec_contents
        - id: read-draft-spec
          label: read draft spec
          tool: fs.read
          scopes:
            - fs.read
          context:
            path: scafld-new.state.file
        - id: scafld-validate
          label: validate spec
          skill: ../scafld
          scopes:
            - scafld:spec:validate
          inputs:
            command: validate
        - id: scafld-approve
          label: approve spec
          skill: ../scafld
          scopes:
            - scafld:spec:approve
          mutation: true
          inputs:
            command: approve
        - id: scafld-start
          label: start task
          skill: ../scafld
          scopes:
            - scafld:exec:start
          mutation: true
          inputs:
            command: start
        - id: scafld-branch
          label: bind task branch
          skill: ../scafld
          scopes:
            - scafld:branch:write
          mutation: true
          inputs:
            command: branch
        - id: read-active-spec
          label: read active spec
          tool: fs.read
          scopes:
            - fs.read
          context:
            path: scafld-start.result.transition.to
        - id: read-declared-files
          label: read declared files
          tool: spec.read_declared_files
          scopes:
            - spec.read_declared_files
          context:
            spec_contents: read-active-spec.file_read.data.contents
        - id: author-fix
          label: draft fix
          run:
            type: agent-step
            agent: builder
            task: issue-to-pr-apply-fix
            outputs:
              fix_bundle: object
          instructions: >
            Produce the bounded fix bundle described by the approved spec,
            grounded in the declared subject metadata, approved scope, and
            provided spec_contents. Use repo_snapshot, repo_snapshot_path, and
            repo_context when present to stay aligned with the real repo shape.
            branch_binding and sync_state come from native scafld branch/status
            surfaces; use them to stay aligned with the engineering branch the
            task is actually bound to.
            declared_file_context is the deterministic preloaded current-file
            surface for every path the approved spec already declared. Review
            declared_file_context.files before deciding what to edit, and
            prefer those grounded contents over generic assumptions. If the
            active spec path appears in the declared context, treat it as
            scafld-owned workflow state only; do not recreate or hand-edit the
            lifecycle-managed spec file in the fix bundle. If the inline snapshot is insufficient and
            repo_snapshot_path is present,
            read it via fs.read before choosing files. Use fs.read only when
            you need additional grounded repo files beyond the declared set.
            fix_bundle.files must be an array of { path, contents } entries
            covering every tracked repo file that must change to satisfy the
            approved spec. Each path must be relative to the fixture root. When
            the approved spec requires more than one repo file, a partial bundle
            is incorrect. Do not widen scope, and do not rely on hidden edits
            outside the deterministic write phase. If the declared context is
            still insufficient after reviewing declared_file_context and any
            justified fs.read calls, return fix_bundle.status: blocked with a
            reason and leave fix_bundle.files empty rather than guessing or
            emitting a silent no-op bundle.
          allowed_tools:
            - fs.read
            - git.status
          context:
            spec_path: scafld-start.result.transition.to
            spec_file: read-active-spec.file_read.data
            spec_contents: read-active-spec.file_read.data.contents
            branch_binding: scafld-branch.result.origin.git
            sync_state: scafld-branch.result.sync
            declared_file_context: read-declared-files.declared_file_context.data
          artifacts:
            named_emits:
              fix_bundle: fix_bundle
        - id: write-fix
          label: write fix
          tool: fs.write_bundle
          scopes:
            - fs.write
          mutation: true
          context:
            files: author-fix.fix_bundle.data.files
        - id: scafld-exec
          label: run task
          skill: ../scafld
          scopes:
            - scafld:exec:write
          mutation: true
          inputs:
            command: execute
        - id: scafld-status
          label: inspect live lane state
          skill: ../scafld
          scopes:
            - scafld:status:read
          inputs:
            command: status
        - id: scafld-audit
          label: audit changes
          skill: ../scafld
          scopes:
            - scafld:review:read
          inputs:
            command: audit
        - id: scafld-review-open
          label: open review
          skill: ../scafld
          scopes:
            - scafld:review:write
          mutation: true
          inputs:
            command: review
        - id: read-review-template
          label: read review template
          tool: fs.read
          scopes:
            - fs.read
          context:
            path: scafld-review-open.result.review_file
        - id: reviewer-boundary
          label: draft review
          run:
            type: agent-step
            agent: reviewer
            task: issue-to-pr-review
            outputs:
              review_contents: string
          scopes:
            - scafld:review:fill
          allowed_tools:
            - fs.read
          context:
            review_file: scafld-review-open.result.review_file
            review_prompt: scafld-review-open.result.review_prompt
            review_required_sections: scafld-review-open.result.required_sections
            review_file_contents: read-review-template.file_read.data.contents
            fix_bundle: author-fix.fix_bundle.data
            written_files: write-fix.file_bundle_write.data.files
            spec_contents: read-active-spec.file_read.data.contents
            status_snapshot: scafld-status.result
          instructions: >
            Fill the existing scafld review artifact requested by review_prompt.
            review_file_contents is the canonical scaffold that scafld created;
            preserve that scaffold shape and return the full markdown file in
            review_contents after filling it in. Do not invent a new top-level
            format. Preserve the exact review-artifact headings that scafld
            parses: `# Review: <task_id>`, `## Spec`, the latest round heading
            `## Review N — <timestamp>`, and the section titles `### Metadata`,
            `### Pass Results`, `### Regression Hunt`,
            `### Convention Check`, `### Dark Patterns`, `### Blocking`,
            `### Non-blocking`, and `### Verdict`. Do not rename
            `### Metadata` to `### Metadata JSON`.
            Preserve the metadata values scafld already grounded, especially
            reviewed_head, reviewed_dirty, and reviewed_diff; update
            round_status, reviewer_mode, reviewer_session, reviewed_at, and
            pass_results for the completed review round. Keep the review grounded in the
            declared change set, the full fix_bundle.files array, the
            persisted write_bundle result, the native scafld status snapshot,
            and the existing scaffold contents. The latest review round Metadata
            JSON block must include schema_version: 3, round_status: completed,
            reviewer_mode, reviewer_session, reviewed_at, override_reason, and
            pass_results for spec_compliance, scope_drift, regression_hunt,
            convention_check, and dark_patterns. Use verdict pass_with_issues
            when there are non-blocking findings, and use pass only when the
            blocking section is empty and the pass_results block reflects a
            clean review. When `### Blocking` or `### Non-blocking` has no
            findings, write the literal `None.` on the next line with no bullet
            marker and no extra prose. Do not write placeholder bullets such as
            `- No blocking findings.` or `- None.` because scafld counts
            bullet lines in those sections as real findings.
        - id: write-review
          label: write review
          tool: fs.write
          scopes:
            - fs.write
          mutation: true
          context:
            path: scafld-review-open.result.review_file
            contents: reviewer-boundary.review_contents
        - id: scafld-complete
          label: complete task
          skill: ../scafld
          scopes:
            - scafld:archive:write
          mutation: true
          inputs:
            command: complete
        - id: scafld-summary
          label: render summary surface
          skill: ../scafld
          scopes:
            - scafld:projection:read
          inputs:
            command: summary
        - id: scafld-pr-body
          label: render PR body surface
          skill: ../scafld
          scopes:
            - scafld:projection:read
          inputs:
            command: pr-body
      policy:
        transitions:
          - to: write-fix
            field: author-fix.fix_bundle.data.files
            not_equals: []
