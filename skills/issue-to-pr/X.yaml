skill: issue-to-pr
version: "0.2.1"

catalog:
  kind: graph
  audience: public
  visibility: public

harness:
  cases:
    - name: issue-to-pr-dispatches-first-step
      inputs:
        task_id: issue-to-pr-smoke
        thread_title: Fixture smoke test
        thread_body: Minimal thread body for the harness.
        thread_locator: local://fixtures/issue-to-pr-smoke
        size: small
        risk: low
        scafld_bin: ./fixtures/issue-to-pr-harness-scafld.mjs
      expect:
        status: needs_agent

    - name: issue-to-pr-reaches-fix-boundary
      inputs:
        task_id: issue-to-pr-reach-fix
        thread_title: Fix-boundary harness reach
        thread_body: Canned markdown spec lets the graph progress to the fix authoring boundary.
        thread_locator: local://fixtures/issue-to-pr-reach-fix
        size: small
        risk: low
        scafld_bin: ./fixtures/issue-to-pr-harness-scafld.mjs
      caller:
        answers:
          agent_task.issue-to-pr-author-spec.output:
            spec_contents: |
              ---
              spec_version: '2.0'
              task_id: issue-to-pr-reach-fix
              created: '2026-05-04T00:00:00Z'
              updated: '2026-05-04T00:00:00Z'
              status: draft
              harden_status: not_run
              size: small
              risk_level: low
              ---

              ## Current State

              Status: draft
              Current phase: none
              Next: none
              Reason: none
              Blockers: none
              Allowed follow-up command: none
              Latest runner update: none
              Review gate: not_started

              ## Summary

              Update the fixture README with one bounded line.

              ## Context

              CWD: `.`

              Packages:
              - fixture

              Files impacted:
              - `README.md`

              Invariants:
              - bounded_scope

              Related docs:
              - none

              ## Objectives

              - Replace the fixture README text with approved guidance.

              ## Scope

              - `README.md`

              ## Dependencies

              - None.

              ## Assumptions

              - None.

              ## Touchpoints

              - README fixture content.

              ## Risks

              - None.

              ## Acceptance

              Profile: standard

              Definition of done:
              - [ ] `dod1` README.md contains fixture guidance.

              Validation:
              - [ ] `v1` test - README contains fixture guidance.
                - Command: `grep -q '^fixture guidance$' README.md`
                - Expected kind: `exit_code_zero`
                - Timeout seconds: none
                - Result: none
                - Status: pending
                - Evidence: none
                - Source event: none
                - Last attempt: none
                - Checked at: none

              ## Phase 1: Update fixture README

              Goal: Write the bounded README change and validate it.

              Status: pending
              Dependencies: none

              Changes:
              - `README.md` (all, exclusive) - Replace the contents with fixture guidance.

              Acceptance:
              - [ ] `ac1_1` test - README contains fixture guidance.
                - Command: `grep -q '^fixture guidance$' README.md`
                - Expected kind: `exit_code_zero`
                - Timeout seconds: none
                - Result: none
                - Status: pending
                - Evidence: none
                - Source event: none
                - Last attempt: none
                - Checked at: none

              ## Rollback

              Strategy: per_phase

              Commands:
              - `git checkout HEAD -- README.md`

              ## Review

              Status: not_started
              Verdict: none

              Findings:
              - none

              Passes:
              - none

              ## Self Eval

              Status: not_started

              Notes:
              none

              Improvements:
              - none

              ## Deviations

              - none

              ## Metadata

              Tags:
              - fixture

              ## Origin

              Source:
              - harness

              Repo:
              - none

              Git:
              - none

              Sync:
              - none

              Supersession:
              - none

              ## Harden Rounds

              - none

              ## Planning Log

              - none
      expect:
        status: needs_agent

runners:
  issue-to-pr:
    default: true
    type: graph
    inputs:
      task_id:
        type: string
        required: false
        default: "issue-to-pr-fixture"
        description: "scafld task id for the governed issue-to-PR lane."
      thread_title:
        type: string
        required: false
        default: "Fixture thread-driven change"
        description: "Canonical thread title passed to the lane."
      thread_body:
        type: string
        required: false
        description: "Subject body or request text describing the change request."
      thread_locator:
        type: string
        required: false
        description: "Canonical locator for the bounded thread."
      thread:
        type: json
        required: false
        description: "Portable thread for the current thread."
      outbox_entry:
        type: json
        required: false
        description: "Current outbox entry when the lane is refreshing an adapter-owned target."
      harness:
        type: json
        required: false
        description: "Optional runx.receipt.v1 packet for the governed run boundary."
      signal:
        type: json
        required: false
        description: "Optional runx.signal.v1 packet with source references, authenticity, fingerprint, and evidence references."
      decision:
        type: json
        required: false
        description: "Optional runx.decision.v1 packet with the accountable lane selection rationale."
      target_repo:
        type: string
        required: false
        description: "Intended repository slug for repo-local dispatchers."
      operational_policy:
        type: json
        required: false
        description: "Optional runx.operational_policy.v1 packet for source, target, runner, and source-thread admission."
      source_id:
        type: string
        required: false
        description: "Operational policy source id for request-time admission."
      runner_id:
        type: string
        required: false
        description: "Operational policy runner id for request-time admission."
      branch:
        type: string
        required: false
        description: "Explicit head branch for live provider publication; callers must ensure the workspace is on this branch before mutation."
      repo_snapshot:
        type: json
        required: false
        description: "Compact structured snapshot of the target repo gathered from a real workspace."
      repo_snapshot_path:
        type: string
        required: false
        description: "Optional path to a fuller repo snapshot artifact that can be read when the inline snapshot is insufficient."
      repo_context:
        type: string
        required: false
        description: "Operator-authored textual repo context, such as architecture notes or likely validation hooks."
      size:
        type: string
        required: false
        default: "small"
        description: "Size passed to scafld plan."
      risk:
        type: string
        required: false
        default: "low"
        description: "Risk passed to scafld plan."
      base:
        type: string
        required: false
        default: "main"
        description: "Base ref used by the PR packaging boundary."
      fixture:
        type: string
        required: false
        description: "Workspace root containing the target .scafld directory."
      workspace_path:
        type: string
        required: false
        description: "Workspace root forwarded to provider-push tools that need local git state for branch and PR publication."
      scafld_bin:
        type: string
        required: false
        description: "Explicit scafld executable path."
      provider:
        type: string
        required: false
        description: "Optional scafld review provider, such as command, claude, or codex."
      provider_command:
        type: string
        required: false
        description: "Optional scafld review provider command override."
      provider_binary:
        type: string
        required: false
        description: "Optional scafld review provider binary override."
      model:
        type: string
        required: false
        description: "Optional model forwarded to scafld review."
    graph:
      name: issue-to-pr
      notes:
        status: governed
        rationale: >
          This graph keeps cognition and mutation separate while treating
          scafld 2.4 as the workflow kernel. Agent phases author the markdown
          spec and bounded fix bundle. Deterministic fs.write phases perform
          mutations. Native scafld plan, validate, approve, build, review,
          complete, status, and handoff surfaces stay visible instead of being
          re-created by translation projection steps. The public story is the
          source-thread lifecycle: signal, decision, spec, build, review,
          draft PR, human merge gate, and final provider outcome when observed.
      steps:
        - id: scafld-plan
          label: open task lane
          skill: ../scafld
          scopes:
            - scafld:spec:write
          mutation: true
          inputs:
            command: plan
        - id: author-spec
          label: author scafld spec
          run:
            type: agent-task
            agent: builder
            task: issue-to-pr-author-spec
            outputs:
              spec_contents: string
          instructions: >
            Replace the draft created by scafld plan with a complete
            scafld 2.4-compatible markdown spec. Use thread_title,
            thread_body, thread_locator,
            thread, outbox_entry, target_repo, repo_snapshot,
            repo_snapshot_path, and repo_context to keep the spec grounded in
            the actual request and repository. Preserve the front matter shape
            with spec_version '2.0', task_id, created, updated, status set to
            draft, a non-empty thread title, harden_status set to not_run, size
            as one of small, medium, or large, and risk_level. The body must include
            Current State, Summary, Context, Objectives, Scope, Dependencies,
            Assumptions, Touchpoints, Risks, Acceptance, at least one Phase
            section, Rollback, Review, Self Eval, Deviations, Metadata, Origin,
            Harden Rounds, and
            Planning Log. Declare changed repo files in Context / Files
            impacted and Phase / Changes using concrete repo-relative paths in
            backticks. Do not declare scafld-managed control-plane artifacts
            under .scafld/specs, .scafld/reviews, .scafld/runs, or old .ai
            governance paths as repo-change scope. Validation commands must be
            executable in the current workspace after the fix bundle is written.
            Do not depend on git history ranges such as HEAD~1. When validation
            commands are included, use direct repo-local checks such as tests,
            lint, build, or file-content commands. Do not use runx runtime
            internals or skills/scafld/run.mjs as validation commands; scafld
            is already the lifecycle runner around this graph. For any code
            change, declare at least one targeted test/spec file in Files
            impacted and Phase / Changes and include at least one executable
            validation command that exercises that target. Do this even when the
            source thread does not explicitly request coverage; code PRs are not
            publishable from this lane without either targeted test/spec scope
            or grounded scafld validation evidence. When the source thread or
            acceptance criteria asks for tests, specs, regression coverage,
            focused coverage, or request/service coverage, this coverage
            requirement is mandatory and cannot be softened to a generic smoke
            check. If no existing test/spec path is declared but the repository
            layout makes a conventional path inferable, declare that new
            test/spec file. If no grounded test/spec path or command can be
            inferred from the repo snapshot, stop with a missing-evidence reason
            instead of publishing a code-only PR. If a required file
            path cannot be grounded from the thread or repository evidence, keep
            the scope narrow and state the assumption instead of inventing a file.
            When the approved lane is documentation or process work, prefer
            existing documentation surfaces from repo_snapshot.existing_files or
            repo_context, and declare at least one non-governance repo file;
            issue-to-pr is a PR lane, so an approved spec must not leave the
            repo-change scope empty. Preserve source-thread context in Summary,
            Origin, and Planning Log so the eventual reviewer story can explain
            why this lane ran and what evidence justified mutation.
          allowed_tools:
            - fs.read
            - git.status
          context:
            spec_path: scafld-plan.result.path
            scafld_plan: scafld-plan.result
        - id: normalize-spec
          label: normalize scafld frontmatter
          tool: spec.normalize_scafld_frontmatter
          scopes:
            - spec.normalize_scafld_frontmatter
          context:
            spec_contents: author-spec.spec_contents
        - id: write-spec
          label: write markdown spec
          tool: fs.write
          scopes:
            - fs.write
          mutation: true
          context:
            path: scafld-plan.result.path
            contents: normalize-spec.normalized_spec.data.data.contents
        - id: read-draft-spec
          label: read draft spec
          tool: fs.read
          scopes:
            - fs.read
          context:
            path: scafld-plan.result.path
        - id: scafld-validate
          label: validate spec
          skill: ../scafld
          scopes:
            - scafld:spec:validate
          inputs:
            command: validate
        - id: scafld-approve
          label: approve spec
          skill: ../scafld
          scopes:
            - scafld:spec:approve
          mutation: true
          inputs:
            command: approve
        - id: read-approved-spec
          label: read approved spec
          tool: fs.read
          scopes:
            - fs.read
          context:
            path: scafld-approve.result.path
        - id: read-declared-files
          label: read declared files
          tool: spec.read_declared_files
          scopes:
            - spec.read_declared_files
          inputs:
            extra_files: $input.repo_snapshot.recommended_files
          context:
            spec_contents: read-approved-spec.file_read.data.data.contents
        - id: author-fix
          label: author bounded fix
          run:
            type: agent-task
            agent: builder
            task: issue-to-pr-apply-fix
            outputs:
              fix_bundle: object
          instructions: >
            Produce the bounded fix bundle described by the approved scafld 2
            markdown spec. Use repo_snapshot, repo_snapshot_path, repo_context,
            approved spec contents, current thread context, and
            declared_file_context. Review declared_file_context.files before
            deciding what to edit. declared_file_context is unwrapped and has
            the shape { repo_root, declared_count, files }, where each file has
            { path, exists, kind, declared_in, contents }. Treat files with
            exists: true and contents as already read source evidence, not as
            missing context. fix_bundle.files must be an array of
            { path, contents } entries covering every repo file needed to satisfy
            the approved spec. For documentation or process changes, the
            approved spec, thread, repo_snapshot, repo_context, and current
            declared file contents are sufficient when they identify a narrow
            edit; do not return an empty bundle when one scoped docs edit is
            possible. For any existing file, contents must be the complete
            current file with the smallest necessary edit applied; preserve
            unrelated sections, headings, prose, tables, links, setup
            instructions, and ordering exactly. Never replace an existing file
            with only the new section or a shortened summary. If a declared file
            list is sparse but repo_snapshot.recommended_files contains
            concrete repo-relative files, treat those recommended files as
            actionable target evidence. Read the recommended file and the
            nearest relevant test or spec before blocking. When the source
            thread includes a runtime exception, backtrace, failing command, or
            named behavior and a recommended file exists, prefer the smallest
            conventional fix plus targeted regression coverage over an empty
            bundle. For any production code change, fix_bundle.files must
            include both the smallest production fix and a targeted test/spec
            file, even when the source request does not explicitly ask for
            coverage. Do not publish a code-only fix bundle from this lane. When
            the approved spec, source thread, or acceptance criteria asks for
            tests, specs, regression coverage, focused coverage, or
            request/service coverage, the targeted test/spec file must directly
            cover that requested behavior. If no test file exists, create the
            narrow conventional test file when the repository structure makes
            that path inferable; otherwise block with the missing path and
            evidence reason. If no fix is possible after inspecting the target paths, the
            blocked reason must name the exact path and missing evidence. If a
            declared file
            has exists: false and the approved spec intentionally creates it,
            write the new file when the desired contents are inferable from the
            spec and thread. Do not widen scope.
            Do not hand-edit scafld lifecycle files. Return
            fix_bundle.status: blocked with a reason and an empty files
            array only when no concrete repo-relative target is declared, a
            required existing file cannot be read, or the requested behavior
            cannot be inferred after inspecting the supplied target files
            without inventing requirements; name the missing evidence and path
            in the reason because an empty bundle is a terminal policy denial.
          allowed_tools:
            - fs.read
            - git.status
          context:
            spec_path: scafld-approve.result.path
            spec_file: read-approved-spec.file_read.data.data
            spec_contents: read-approved-spec.file_read.data.data.contents
            declared_file_context: read-declared-files.declared_file_context.data.data
          artifacts:
            named_emits:
              fix_bundle: fix_bundle
            packets:
              fix_bundle: runx.issue.fix_bundle.v1
        - id: write-fix
          label: write fix
          tool: fs.write_bundle
          scopes:
            - fs.write
          mutation: true
          context:
            files: author-fix.fix_bundle.data.files
        - id: scafld-build
          label: build to review
          skill: ../scafld
          scopes:
            - scafld:build
          mutation: true
          inputs:
            command: build_to_review
        - id: scafld-status
          label: inspect review state
          skill: ../scafld
          scopes:
            - scafld:status:read
          inputs:
            command: status
        - id: read-current-branch
          label: read current branch
          tool: git.current_branch
          scopes:
            - git.read
        - id: scafld-review
          label: run scafld review
          skill: ../scafld
          scopes:
            - scafld:review:write
          mutation: true
          inputs:
            command: review
        - id: scafld-complete
          label: complete task
          skill: ../scafld
          scopes:
            - scafld:archive:write
          mutation: true
          inputs:
            command: complete
        - id: scafld-final-status
          label: inspect completed state
          skill: ../scafld
          scopes:
            - scafld:status:read
          inputs:
            command: status
        - id: scafld-handoff
          label: render handoff
          skill: ../scafld
          scopes:
            - scafld:handoff:read
          inputs:
            command: handoff
        - id: capture-harness-context
          label: capture harness context
          tool: control.capture_harness_context
          scopes:
            - runx:control:read
          inputs:
            harness: $input.harness
            signal: $input.signal
            decision: $input.decision
        - id: package-pull-request
          label: package reviewer PR story
          tool: outbox.build_pull_request
          scopes:
            - runx:repo:package
          context:
            harness_context: capture-harness-context.harness_context
            handoff_markdown: scafld-handoff.stdout
            build_result: scafld-build.result
            review_result: scafld-review.result
            completion_result: scafld-complete.result
            status_snapshot: scafld-final-status.result
            current_branch: read-current-branch.git_branch.data
            fix_bundle: author-fix.fix_bundle.data
          inputs:
            thread_body: $input.thread_body
            repo_context: $input.repo_context
            repo_snapshot: $input.repo_snapshot
            operational_policy: $input.operational_policy
            source_id: $input.source_id
            target_repo: $input.target_repo
            runner_id: $input.runner_id
            source_thread_locator: $input.thread_locator
            policy_action: issue-to-pr
        - id: push-pull-request
          label: push the PR outbox entry through thread
          tool: thread.push_outbox
          scopes:
            - thread:push
          context:
            outbox_entry: package-pull-request.outbox_entry.data
            draft_pull_request: package-pull-request.draft_pull_request.data
          inputs:
            next_status: draft
        - id: package-feed-entry
          label: package feed entry
          tool: outbox.build_feed_entry
          scopes:
            - runx:repo:package
          context:
            thread: push-pull-request.thread
            harness_context: capture-harness-context.harness_context
            build_result: scafld-build.result
            review_result: scafld-review.result
            completion_result: scafld-complete.result
            status_snapshot: scafld-final-status.result
            draft_pull_request: package-pull-request.draft_pull_request.data
            pull_request_outbox_entry: push-pull-request.outbox_entry
            push_result: push-pull-request.push
        - id: push-feed-entry
          label: update source thread feed
          tool: thread.push_outbox
          scopes:
            - thread:push
          context:
            thread: push-pull-request.thread
            outbox_entry: package-feed-entry.outbox_entry.data
            draft_pull_request: package-pull-request.draft_pull_request.data
          inputs:
            next_status: published
      policy:
        transitions:
          - to: write-fix
            field: author-fix.fix_bundle.data.files
            not_equals: []
