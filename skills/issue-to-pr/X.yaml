skill: issue-to-pr
version: "0.2.0"

catalog:
  kind: graph
  audience: public
  visibility: public

harness:
  cases:
    - name: issue-to-pr-dispatches-first-step
      inputs:
        task_id: issue-to-pr-smoke
        thread_title: Fixture smoke test
        thread_body: Minimal thread body for the harness.
        thread_locator: local://fixtures/issue-to-pr-smoke
        size: small
        risk: low
        scafld_bin: ./fixtures/issue-to-pr-harness-scafld.mjs
      expect:
        status: needs_resolution

    - name: issue-to-pr-reaches-fix-boundary
      inputs:
        task_id: issue-to-pr-reach-fix
        thread_title: Fix-boundary harness reach
        thread_body: Canned markdown spec lets the graph progress to the fix authoring boundary.
        thread_locator: local://fixtures/issue-to-pr-reach-fix
        size: small
        risk: low
        scafld_bin: ./fixtures/issue-to-pr-harness-scafld.mjs
      caller:
        answers:
          agent_step.issue-to-pr-author-spec.output:
            spec_contents: |
              ---
              spec_version: '2.0'
              task_id: issue-to-pr-reach-fix
              created: '2026-05-04T00:00:00Z'
              updated: '2026-05-04T00:00:00Z'
              status: draft
              harden_status: not_run
              size: small
              risk_level: low
              ---

              ## Current State

              Status: draft
              Current phase: none
              Next: none
              Reason: none
              Blockers: none
              Allowed follow-up command: none
              Latest runner update: none
              Review gate: not_started

              ## Summary

              Update the fixture README with one bounded line.

              ## Context

              CWD: `.`

              Packages:
              - fixture

              Files impacted:
              - `README.md`

              Invariants:
              - bounded_scope

              Related docs:
              - none

              ## Objectives

              - Replace the fixture README text with approved guidance.

              ## Scope

              - `README.md`

              ## Dependencies

              - None.

              ## Assumptions

              - None.

              ## Touchpoints

              - README fixture content.

              ## Risks

              - None.

              ## Acceptance

