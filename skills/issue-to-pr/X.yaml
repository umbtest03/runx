                - Command: `grep -q '^fixture guidance$' README.md`
                - Expected kind: `exit_code_zero`
                - Timeout seconds: none
                - Result: none
                - Status: pending
                - Evidence: none
                - Source event: none
                - Last attempt: none
                - Checked at: none

              ## Phase 1: Update fixture README

              Goal: Write the bounded README change and validate it.

