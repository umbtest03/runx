              - [ ] `ac1_1` test - README contains fixture guidance.
                - Command: `grep -q '^fixture guidance$' README.md`
                - Expected kind: `exit_code_zero`
                - Timeout seconds: none
                - Result: none
                - Status: pending
                - Evidence: none
                - Source event: none
                - Last attempt: none
                - Checked at: none

