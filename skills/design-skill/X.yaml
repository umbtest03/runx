skill: design-skill
version: "0.1.0"

catalog:
  kind: chain
  audience: builder
  visibility: private


harness:
  cases:
    - name: design-skill-produces-structured-skill-packet
      inputs:
        objective: Build a runx ecosystem-brief flow
        project_context: OSS evaluator demo
      caller:
        answers:
          agent_step.work-plan.output:
            objective_summary: Build a runx ecosystem-brief flow.
            orchestration_steps:
              - id: research
                skill: ../research
                scopes:
                  - runx:research:read
                mutating: false
                inputs: {}
                context_from: []
                description: Gather the evidence pack.
              - id: draft
                skill: ../draft-content
                scopes:
                  - runx:content:draft
                mutating: false
                inputs: {}
                context_from:
                  - research.research_packet
                description: Draft the briefing.
            required_skills:
              - name: research
                exists: true
              - name: draft-content
                exists: true
            open_questions: []
          agent_step.prior-art.output:
            findings:
              - claim: Market-intelligence should keep research and drafting as separate steps.
                source: plans/runx.md
                relevance: Protects evidence integrity.
                confidence: verified
            catalog_fit:
              adjacent_skills:
                - research
                - draft-content
              why_new: The missing capability is the governed chain that turns those adjacent primitives into one reusable first-party ecosystem brief flow.
            recommended_flow:
              - step: research
              - step: draft
            sources:
              - path: plans/runx.md
            risks:
              - risk: Unverified claims weaken evaluator trust.
                likelihood: medium
                impact: high
                mitigation: Require a cited evidence log.
          agent_step.write-harness.output:
            skill_spec:
              name: ecosystem-brief
              description: Research and draft a daily ecosystem brief.
            pain_points:
              - Maintainers need one bounded ecosystem brief flow instead of stitching research and drafting together by hand every time.
            catalog_fit:
              adjacent_skills:
                - research
                - draft-content
              why_new: The current catalog exposes research and drafting separately, but not one first-party skill that turns them into a reusable ecosystem brief flow.
            maintainer_decisions:
              - question: Should the first-party chain stop at a reviewable brief draft?
                options:
                  - yes
                  - no, add publish now
                why: Keeps the first cut bounded around evidence and review.
            execution_plan:
              runner: chain
              phases:
                - research
                - draft
                - approve
            harness_fixture:
              - name: ecosystem-brief-success
                kind: skill
                target: ../ecosystem-brief
                expect:
                  status: success
              - name: ecosystem-brief-missing-objective
                kind: skill
                target: ../ecosystem-brief
                expect:
                  status: needs_resolution
            acceptance_checks:
              - structured context reaches write-harness
              - ecosystem-brief success fixture passes
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success

    - name: design-skill-needs-objective
      inputs: {}
      expect:
        status: needs_resolution


runners:
  design-skill:
    default: true
    type: chain
    inputs:
      objective:
        type: string
        required: true
        description: "The capability or automation objective to design."
      project_context:
        type: string
        required: false
        description: "Repo, product, or operator context that constrains the design."
    chain:
      name: design-skill
      owner: runx
      steps:
        - id: decompose
          skill: ../work-plan
          scopes:
            - runx:builder:read
        - id: research
          skill: ../prior-art
          scopes:
            - runx:builder:research
          context:
            decomposition: decompose.work_plan.data
        - id: author-harness
          skill: ../write-harness
          scopes:
            - runx:builder:write-proposal
          context:
            decomposition: decompose.work_plan.data
            research: research.prior_art_report.data
