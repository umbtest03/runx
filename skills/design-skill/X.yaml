skill: design-skill
version: "0.1.1"

catalog:
  kind: graph
  audience: builder
  visibility: public
  role: context
harness:
  cases:
    - name: design-skill-produces-structured-skill-packet
      inputs:
        objective: Build a runx ecosystem-brief flow
        project_context: OSS evaluator demo
      caller:
        answers:
          agent_task.work-plan.output:
            change_set:
              change_set_id: change_set_ecosystem_brief
              thread_locator: objective://ecosystem-brief
              summary: Build a runx ecosystem-brief flow.
              category: other
              severity: medium
              recommended_lane: design-skill
              commence_decision: approve
              action_decision: proceed_to_plan
              target_surfaces:
                - surface: runx
                  kind: repo
                  mutating: false
                  rationale: The result is a reviewed first-party skill proposal.
              shared_invariants:
                - Keep evidence gathering separate from drafting.
              success_criteria:
                - One bounded ecosystem-brief skill proposal is produced.
            objective_summary: Build a runx ecosystem-brief flow.
            workspace_change_plan:
              plan_id: workspace_plan_ecosystem_brief
              change_set_id: change_set_ecosystem_brief
              objective_summary: Build a runx ecosystem-brief flow.
              shared_invariants:
                - Keep evidence gathering separate from drafting.
              success_criteria:
                - One bounded ecosystem-brief skill proposal is produced.
              phases:
                - id: phase-design
                  name: Design the candidate skill
                  depends_on: []
                  parallelizable: false
                  repo_change_requests:
                    - id: ecosystem-brief-skill
                      repo: runx
                      task_id: ecosystem-brief-skill
                      objective: Design and prove the ecosystem-brief skill proposal.
                      depends_on: []
                      shared_context_refs:
                        - change_set.shared_invariants
                      validation_commands:
                        - pnpm test tests/official-skill-catalog.test.ts
                      mutating: false
              integration_checks:
                - Research evidence remains explicit in the drafted brief.
              open_questions: []
            orchestration_steps:
              - id: research
                skill: ../research
                scopes:
                  - runx:research:read
                mutating: false
                inputs: {}
                context_from: []
                description: Gather the evidence pack.
              - id: draft
                skill: ../ghostwrite
                scopes:
                  - runx:content:draft
                mutating: false
                inputs: {}
                context_from:
                  - research.research_packet
                description: Draft the briefing.
            required_skills:
              - name: research
                exists: true
              - name: ghostwrite
                exists: true
            open_questions: []
          agent_task.prior-art.output:
            findings:
              - claim: Market-intelligence should keep research and drafting as separate steps.
                source: plans/runx.md
                relevance: Protects evidence integrity.
                confidence: verified
            catalog_fit:
              adjacent_skills:
                - research
                - ghostwrite
              why_new: The missing capability is the governed graph that turns those adjacent primitives into one reusable first-party ecosystem brief flow.
            quality_bar:
              audience: runx skill maintainers
              artifact: A grounded ecosystem-brief skill design.
              evidence: Cite existing skill paths and verified project sources.
              stop_conditions:
                - Stop if the proposed graph duplicates an existing catalog skill.
            recommended_flow:
              - step: research
              - step: draft
            sources:
              - path: plans/runx.md
            risks:
              - risk: Unverified claims weaken evaluator trust.
                likelihood: medium
                impact: high
                mitigation: Require a cited evidence log.
          agent_task.write-harness.output:
            skill_spec:
              name: ecosystem-brief
              description: Research and draft a daily ecosystem brief.
            pain_points:
              - Maintainers need one bounded ecosystem brief flow instead of stitching research and drafting together by hand every time.
            catalog_fit:
              adjacent_skills:
                - research
                - ghostwrite
              why_new: The current catalog exposes research and drafting separately, but not one first-party skill that turns them into a reusable ecosystem brief flow.
            maintainer_decisions:
              - question: Should the first-party graph stop at a reviewable brief draft?
                options:
                  - yes
                  - no, add publish now
                why: Keeps the first cut bounded around evidence and review.
            execution_plan:
              runner: graph
              phases:
                - research
                - draft
                - approve
            harness_fixture:
              - name: ecosystem-brief-success
                kind: skill
                target: ../ecosystem-brief
                expect:
                  status: sealed
              - name: ecosystem-brief-missing-objective
                kind: skill
                target: ../ecosystem-brief
                expect:
                  status: needs_agent
            acceptance_checks:
              - structured context reaches write-harness
              - ecosystem-brief success fixture passes
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: design-skill-needs-objective
      inputs: {}
      expect:
        status: needs_agent


runners:
  design-skill:
    default: true
    type: graph
    inputs:
      objective:
        type: string
        required: true
        description: "The capability or automation objective to design."
      project_context:
        type: string
        required: false
        description: "Repo, product, or operator context that constrains the design."
    graph:
      name: design-skill
      steps:
        - id: decompose
          skill: ../work-plan
          scopes:
            - runx:builder:read
        - id: research
          skill: ../prior-art
          scopes:
            - runx:builder:research
          context:
            decomposition: decompose.work_plan.data
        - id: author-harness
          skill: ../write-harness
          scopes:
            - runx:builder:write-proposal
          context:
            decomposition: decompose.work_plan.data
            research: research.prior_art_report.data
