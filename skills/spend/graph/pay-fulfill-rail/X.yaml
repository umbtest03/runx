skill: pay-fulfill-rail
version: 0.1.0
catalog:
  kind: skill
  audience: operator
  visibility: internal
  role: graph-stage
  part_of:
    - runx/spend
harness:
  cases:
    - name: pay-fulfill-rail-mock-fulfills
      runner: mock
      inputs:
        payment_challenge:
          challenge_id: ch_mock_001
          rail: mock
          amount_minor: 125
          currency: USD
        reserved_payment_authority:
          term_id: authority-term:payment:reserve-demo-001
          principal_ref:
            type: host
            uri: principal:operator:test
          resource_ref:
            type: surface
            uri: merchant:demo
          resource_family: effect
          verbs:
            - commit
          capabilities:
            - effect_single_use_capability
          bounds:
            effect_limits:
              - family: payment
                unit: USD
                max_per_call_units: 125
                channels:
                  - mock
                peer: merchant:demo
                operation: search.paid
                single_use_capability: true
                authorization_form: single_use_capability
          conditions: []
          approvals: []
          issued_by_ref:
            type: host
            uri: authority:payment:test
        spend_capability_ref:
          type: credential
          uri: capability:payment:demo-search-001
        rail_profile_ref: rail-profile:mock:test
        idempotency:
          key: payment:demo-search-001
      caller:
        answers:
          agent_task.pay-fulfill-rail-mock.output:
            rail_result:
              status: fulfilled
              rail: mock
              amount_minor: 125
              currency: USD
              counterparty: merchant:demo
              operation: search.paid
            rail_proof:
              proof_ref: receipt-proof:mock:demo-search-001
              idempotency_key: payment:demo-search-001
              hash: sha256:mock-proof
            credential_envelope:
              form: paid_tool_credential
              credential_ref: credential:mock:demo-search-001
            redactions:
              - rail_session_material
            recovery_hint:
              status: sealed
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: effect_evidence_closed
runners:
  mock:
    default: true
    type: agent-task
    agent: operator
    task: pay-fulfill-rail-mock
    mutating: true
    retry:
      max_attempts: 1
    idempotency:
      key: pay-fulfill-rail-mock
    outputs: &a1
      rail_result: object
      rail_proof: object
      credential_envelope: object
      redactions: array
      recovery_hint: object
    artifacts: &a2
      wrap_as: effect_evidence_packet
      packet: runx.effect.evidence.v1
    runx: &a3
      payment_authority:
        phase: fulfill
        resource_family: effect
        verbs:
          - commit
        requires_capability: effect_single_use_capability
        authorization_form: single_use_capability
        receives_funding_material: false
        receipt_before_success: true
    inputs: &a4
      payment_challenge:
        type: object
        required: true
        description: Protocol/provider challenge to fulfill.
      reserved_payment_authority:
        type: object
        required: true
        description: Child payment authority term admitted by core.
      spend_capability_ref:
        type: object
        required: true
        description: Scoped single-use spend capability reference.
      rail_profile_ref:
        type: string
        required: true
        description: Configured rail profile reference.
      idempotency:
        type: object
        required: true
        description: Reservation key and recovery lookup fields.
      quote_packet:
        type: object
        required: false
        description: Source quote packet for evidence continuity.
  x402:
    type: agent-task
    agent: operator
    task: pay-fulfill-rail-x402
    mutating: true
    retry:
      max_attempts: 1
    idempotency:
      key: payment-rail-x402
    outputs: *a1
    artifacts: *a2
    runx:
      <<: *a3
      payment_authority:
        phase: fulfill
        resource_family: effect
        verbs:
          - commit
        rails:
          - x402
        requires_capability: effect_single_use_capability
        authorization_form: single_use_capability
        receives_funding_material: false
        receipt_before_success: true
    inputs: *a4
  mpp:
    type: agent-task
    agent: operator
    task: pay-fulfill-rail-mpp
    mutating: true
    retry:
      max_attempts: 1
    idempotency:
      key: payment-rail-mpp
    outputs: *a1
    artifacts: *a2
    runx:
      <<: *a3
      payment_authority:
        phase: fulfill
        resource_family: effect
        verbs:
          - commit
        rails:
          - mpp
        requires_capability: effect_single_use_capability
        authorization_form: single_use_capability
        receives_funding_material: false
        receipt_before_success: true
    inputs: *a4
  stripe-spt:
    type: agent-task
    agent: operator
    task: pay-fulfill-rail-stripe-spt
    mutating: true
    retry:
      max_attempts: 1
    idempotency:
      key: payment-rail-stripe-spt
    outputs: *a1
    artifacts: *a2
    runx:
      <<: *a3
      payment_authority:
        phase: fulfill
        resource_family: effect
        verbs:
          - commit
        rails:
          - stripe-spt
        requires_capability: effect_single_use_capability
        authorization_form: single_use_capability
        receives_funding_material: false
        receipt_before_success: true
    inputs: *a4
