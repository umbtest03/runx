skill: mock-refund
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public

harness:
  cases:
    - name: mock-refund-links-original-receipt
      runner: mock
      inputs:
        original_receipt_ref: receipt:charge:mock:paid-search-001
        original_receipt:
          amount_minor: 125
          currency: USD
          settlement_family: mock
        refund_request:
          amount_minor: 125
          reason: operator_refund
        parent_payment_authority:
          authority_ref: authority:payment:refund:test
        idempotency_seed: refund-paid-search-001
      caller:
        answers:
          agent_step.quote.output:
            refund_quote:
              quote_id: refund_quote_demo_001
              original_receipt_ref: receipt:charge:mock:paid-search-001
              amount_minor: 125
              currency: USD
            refundable_bounds:
              remaining_minor: 125
              max_refund_minor: 125
              currency: USD
            original_receipt_link:
              receipt_ref: receipt:charge:mock:paid-search-001
            settlement_family: mock
          agent_step.reserve.output:
            refund_decision:
              decision_id: decision_refund_demo_001
              selected: true
            reserved_refund_authority:
              authority_ref: authority:payment:refund-demo-001
            refund_idempotency:
              key: refund:paid-search-001
              original_receipt_ref: receipt:charge:mock:paid-search-001
            approval:
              required: false
              status: not_required
            original_receipt_ref: receipt:charge:mock:paid-search-001
          agent_step.approve-refund.output:
            approved: true
          agent_step.settlement.output:
            refund_closure:
              status: refunded
              settlement_family: mock
              original_receipt_ref: receipt:charge:mock:paid-search-001
            refund_proof:
              proof_ref: receipt-proof:mock-refund:paid-search-001
              refund_idempotency_key: refund:paid-search-001
            refund_receipt_ref: receipt:refund:mock:paid-search-001
      expect:
        status: sealed
        receipt:
          schema: runx.harness_receipt.v1
          state: sealed
          disposition: closed
          reason_code: mock_refund_closed
        steps:
          - quote
          - reserve
          - approve-refund
          - settlement

runners:
  mock:
    default: true
    type: graph
    inputs:
      original_receipt_ref:
        type: string
        required: true
        description: "Linked sealed charge receipt reference."
      original_receipt:
        type: object
        required: true
        description: "Redacted original charge receipt summary."
      refund_request:
        type: object
        required: true
        description: "Requested amount and reason."
      parent_payment_authority:
        type: object
        required: true
        description: "Parent payment authority term or ref."
      approval_context:
        type: object
        required: false
        description: "Prior approval evidence."
      idempotency_seed:
        type: string
        required: false
        description: "Stable refund idempotency seed."
    graph:
      name: mock-refund
      steps:
        - id: quote
          skill: ../refund-quote
          runner: quote
          scopes:
            - payment:quote
            - payment:refund
          inputs:
            original_receipt_ref: "{{original_receipt_ref}}"
            original_receipt: "{{original_receipt}}"
            refund_request: "{{refund_request}}"
        - id: reserve
          skill: ../refund-reserve
          runner: reserve
          scopes:
            - payment:refund
          mutation: true
          idempotency_key: refund-reserve
          inputs:
            parent_payment_authority: "{{parent_payment_authority}}"
            approval_context: "{{approval_context}}"
            idempotency_seed: "{{idempotency_seed}}"
          context:
            refund_quote_packet: quote.refund_quote_packet.data
        - id: approve-refund
          run:
            type: approval
          inputs:
            gate_id: mock-refund.approval
            reason: Approve the linked refund reservation before settlement.
          context:
            refund_decision: reserve.refund_reservation_packet.data.refund_decision
          artifacts:
            wrap_as: refund_approval
        - id: settlement
          run:
            type: refund-settlement
          inputs:
            settlement_family: mock
          context:
            original_receipt_ref: reserve.refund_reservation_packet.data.original_receipt_ref
            refund_idempotency: reserve.refund_reservation_packet.data.refund_idempotency
            reserved_refund_authority: reserve.refund_reservation_packet.data.reserved_refund_authority
          artifacts:
            wrap_as: refund_rail_packet
            packet: runx.payment.rail.v1
      policy:
        transitions:
          - to: settlement
            field: approve-refund.refund_approval.data.approved
            equals: true
    runx:
      payment_authority:
        direction: provider_refund
        phase: graph
        resource_family: payment
        settlement_family: mock
        requires_original_receipt_ref: true
        same_family_required: true
        runtime_refund_enabled: false
