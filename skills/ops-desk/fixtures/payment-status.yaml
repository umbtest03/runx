name: ops-desk-payment-status
kind: skill
target: ..
runner: operate
inputs:
  objective: Check payment readiness and tell me what to do next.
  scope_ref: workspace:example
  dashboard_snapshot:
    health:
      api: ok
    money:
      rail_targets:
        - network: primary-net
          recommended: true
        - network: secondary-net-a
        - network: secondary-net-b
      unfunded_approved_items: 0
      funded_open_items: 3
    communications:
      pending_live_sends: 0
    receipts:
      latest_funding_receipt: hfr_example_funding
  receipt_summary:
    receipts:
      - id: hfr_example_funding
        status: verified
        rail: primary-rail
        network: primary-net
  provider_status:
    runx_api: ok
    secondary_rail_webhook: needs_review
  approval_context:
    approvals: []
  operator_policy: >
    The primary rail is preferred. Secondary rails stay disabled until webhook
    readiness is re-verified.
caller:
  answers:
    agent_task.ops-desk.output:
      ops_desk_packet:
        decision: ready
        scope_ref: workspace:example
        objective: Check payment readiness and tell me what to do next.
        mode: read_only
        dashboard:
          health: ok
          money: ok
          communications: ok
          providers: needs_attention
          receipts: ok
        findings:
          - severity: warning
            area: providers
            summary: Secondary rail webhook readiness needs review, but primary rail funding is healthy.
            evidence_refs:
              - provider_status.secondary_rail_webhook
        proposals:
          - action_id: secondary_rail_webhook_check
            lane: provider.webhook_check
            reason: The secondary rail should not be trusted until webhook readiness is checked.
            inputs_summary:
              provider: secondary_rail
            consequence: read_only
            approval_required: false
            approval_prompt: null
            blockers: []
            verification:
              expected_receipt: runx.provider.health_check.v1
              expected_effect: null
              readback: webhook delivery endpoint health and latest event status
            execution:
              interface: skill
              lane_ref: ops-desk
              profile_ref: null
              command_ref: null
              workflow_ref: null
              approval_gate: null
              verifier_ref: provider.webhook_check
        ordered_next_steps:
          - step: Run a secondary rail webhook health check before relying on secondary payouts.
            lane: provider.webhook_check
            requires_confirmation: false
        refused_reasons: []
        needs_input: []
        success_checkpoint:
          milestone: primary rail funding ready
          description: Primary rail funding has a verified receipt and no approved item is waiting on funding.
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
