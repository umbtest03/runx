skill: skill-lab
version: "0.2.0"

catalog:
  kind: graph
  audience: builder
  visibility: public
  role: canonical
  execution: execute
  completion: runtime_receipt
  requires_adapter: false
  approval: required

harness:
  cases:
    - name: skill-lab-designs-bounded-package
      runner: design
      inputs:
        objective: Add a governed release-notes skill
        repo_root: .
        project_context: Runx OSS first-party catalog
      caller:
        answers:
          agent_task.skill-lab-design.output:
            skill_design:
              decision: extend_existing
              proposed_name: release
              rationale: Release notes belong in the existing release skill rather than a parallel public package.
              catalog_fit:
                adjacent_skills:
                  - release
                ownership: Extend the release preparation runner.
              implementation_plan:
                - Add a bounded release-notes artifact to release preparation.
                - Add a fixture that proves notes remain separate from publication.
              boundaries:
                - Do not publish or deploy from the design runner.
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
        steps:
          - inspect
          - decide

    - name: skill-lab-needs-objective
      runner: design
      inputs: {}
      expect:
        status: failure

runners:
  design:
    type: graph
    inputs:
      objective:
        type: string
        required: true
        description: Capability to design or place in the current catalog.
      repo_root:
        type: string
        required: false
        default: .
        description: Workspace root to inspect.
      target_dir:
        type: string
        required: false
        description: Existing or proposed repo-relative package directory.
      project_context:
        type: string
        required: false
        description: Product, repository, and operator constraints.
    graph:
      name: skill-lab-design
      steps:
        - id: inspect
          label: inspect target and catalog
          inputs:
            objective: $input.objective
            repo_root: $input.repo_root
            target_dir: $input.target_dir
          run:
            type: cli-tool
            command: node
            args:
              - ./inspect_target.mjs
            outputs:
              authoring_context: object
          artifacts:
            named_emits:
              authoring_context: authoring_context
            packets:
              authoring_context: runx.skill_lab.authoring_context.v1
        - id: decide
          label: decide catalog fit and package shape
          run:
            type: agent-task
            agent: builder
            task: skill-lab-design
            outputs:
              skill_design: object
          instructions: >
            Decide whether the objective warrants a new Runx skill, an extension
            to an existing skill or graph, or no skill. Inspect only the bounded
            workspace evidence needed to make that decision. Return skill_design
            with decision (new_skill, extend_existing, or no_skill), proposed_name,
            rationale, catalog_fit, implementation_plan, and boundaries. Prefer
            existing ownership. Do not write files, invent provider proof, or
            propose approval for safe design and packaging work.
          allowed_tools:
            - fs.read
            - git.status
          context:
            authoring_context: inspect.authoring_context.data
          artifacts:
            named_emits:
              skill_design: skill_design
            packets:
              skill_design: runx.skill_lab.design.v1

  build:
    default: true
    type: graph
    inputs:
      objective:
        type: string
        required: true
        description: Skill capability to create or update.
      repo_root:
        type: string
        required: false
        default: .
        description: Workspace root that owns target_dir.
      target_dir:
        type: string
        required: true
        description: Repo-relative package directory to create or update.
      project_context:
        type: string
        required: false
        description: Product, repository, and operator constraints.
    graph:
      name: skill-lab-build
      steps:
        - id: inspect
          label: inspect target and catalog
          inputs:
            objective: $input.objective
            repo_root: $input.repo_root
            target_dir: $input.target_dir
          run:
            type: cli-tool
            command: node
            args:
              - ./inspect_target.mjs
            outputs:
              authoring_context: object
          artifacts:
            named_emits:
              authoring_context: authoring_context
            packets:
              authoring_context: runx.skill_lab.authoring_context.v1
        - id: author
          label: author bounded package bundle
          run:
            type: agent-task
            agent: builder
            task: skill-lab-build
            outputs:
              change_bundle: object
          instructions: >
            Build the smallest complete Runx package for the objective. First
            decide whether the catalog needs a write or no_skill from the
            inspected catalog. For a write decision, return change_bundle with decision,
            summary, non_goals, and files. Each file is {path, contents} relative
            to target_dir. Include only files the package consumes: SKILL.md,
            X.yaml, required scripts, fixtures, and narrowly scoped references
            or assets. Never add README, changelog, strategy, generated state,
            credentials, or placeholder prose. Keep model judgment separate from
            deterministic operations, declare truthful catalog capabilities, and
            include a realistic happy path plus a stop, refusal, or error path.
            Return no_skill with an empty files array when an existing owner
            already solves the job and no extension is warranted.
          allowed_tools:
            - fs.read
            - git.status
          context:
            authoring_context: inspect.authoring_context.data
          artifacts:
            named_emits:
              change_bundle: change_bundle
            packets:
              change_bundle: runx.skill_lab.change_bundle.v1
        - id: prepare
          label: validate bundle boundary
          inputs:
            target_dir: $input.target_dir
            mode: build
          context:
            change_bundle: author.change_bundle.data
          run:
            type: cli-tool
            command: node
            args:
              - ./prepare_bundle.mjs
            outputs:
              files: array
              bundle_manifest: object
          artifacts:
            named_emits:
              bundle_manifest: bundle_manifest
            packets:
              bundle_manifest: runx.skill_lab.bundle_manifest.v1
        - id: write
          label: write bounded package files
          when:
            field: prepare.bundle_manifest.data.decision
            equals: write
          tool: fs.write_bundle
          scopes:
            - fs.write
          mutation: true
          context:
            repo_root: inspect.authoring_context.data.repo_root
            files: prepare.files
        - id: validate
          label: inspect package and run safe harness
          when:
            field: prepare.bundle_manifest.data.decision
            equals: write
          inputs:
            target_dir: $input.target_dir
          context:
            repo_root: inspect.authoring_context.data.repo_root
          run:
            type: cli-tool
            command: node
            args:
              - ./validate_target.mjs
            outputs:
              validation_report: object
          artifacts:
            named_emits:
              validation_report: validation_report
            packets:
              validation_report: runx.skill_lab.validation.v1

  improve:
    type: graph
    inputs:
      objective:
        type: string
        required: true
        description: Bounded improvement objective.
      repo_root:
        type: string
        required: false
        default: .
        description: Workspace root that owns target_dir.
      target_dir:
        type: string
        required: true
        description: Repo-relative package directory to improve.
      receipt_id:
        type: string
        required: false
        description: Receipt reference for the failed or suspicious run.
      receipt_summary:
        type: string
        required: false
        description: Sanitized receipt or failure summary.
      harness_output:
        type: string
        required: false
        description: Sanitized harness output or assertion failure.
    graph:
      name: skill-lab-improve
      steps:
        - id: inspect
          label: inspect target and evidence posture
          inputs:
            objective: $input.objective
            repo_root: $input.repo_root
            target_dir: $input.target_dir
            receipt_id: $input.receipt_id
            receipt_summary: $input.receipt_summary
            harness_output: $input.harness_output
          run:
            type: cli-tool
            command: node
            args:
              - ./inspect_target.mjs
            outputs:
              authoring_context: object
          artifacts:
            named_emits:
              authoring_context: authoring_context
            packets:
              authoring_context: runx.skill_lab.authoring_context.v1
        - id: diagnose-and-author
          label: diagnose one failure and author bounded update
          run:
            type: agent-task
            agent: builder
            task: skill-lab-improve
            outputs:
              change_bundle: object
          instructions: >
            Diagnose the supplied receipt or harness evidence against the current
            package, then return one bounded correction. Distinguish contract,
            implementation, fixture, environment, and operator failures. Return
            no_change with an empty files array when the evidence does not justify
            a package change. Otherwise return change_bundle with decision write,
            summary, non_goals, and target-relative {path, contents} files. Include
            a regression fixture whenever the failure is reproducible. Do not
            weaken refusal behavior or bundle unrelated cleanup.
          allowed_tools:
            - fs.read
            - git.status
          context:
            authoring_context: inspect.authoring_context.data
          artifacts:
            named_emits:
              change_bundle: change_bundle
            packets:
              change_bundle: runx.skill_lab.change_bundle.v1
        - id: prepare
          label: validate improvement boundary
          inputs:
            target_dir: $input.target_dir
            mode: improve
          context:
            change_bundle: diagnose-and-author.change_bundle.data
          run:
            type: cli-tool
            command: node
            args:
              - ./prepare_bundle.mjs
            outputs:
              files: array
              bundle_manifest: object
          artifacts:
            named_emits:
              bundle_manifest: bundle_manifest
            packets:
              bundle_manifest: runx.skill_lab.bundle_manifest.v1
        - id: write
          label: write bounded improvement
          when:
            field: prepare.bundle_manifest.data.decision
            equals: write
          tool: fs.write_bundle
          scopes:
            - fs.write
          mutation: true
          context:
            repo_root: inspect.authoring_context.data.repo_root
            files: prepare.files
        - id: validate
          label: inspect package and run safe harness
          when:
            field: prepare.bundle_manifest.data.decision
            equals: write
          inputs:
            target_dir: $input.target_dir
          context:
            repo_root: inspect.authoring_context.data.repo_root
          run:
            type: cli-tool
            command: node
            args:
              - ./validate_target.mjs
            outputs:
              validation_report: object
          artifacts:
            named_emits:
              validation_report: validation_report
            packets:
              validation_report: runx.skill_lab.validation.v1

  harness:
    type: graph
    inputs:
      objective:
        type: string
        required: true
        description: Behavior or regression boundary the fixtures must prove.
      repo_root:
        type: string
        required: false
        default: .
        description: Workspace root that owns target_dir.
      target_dir:
        type: string
        required: true
        description: Repo-relative package directory receiving fixtures.
      harness_output:
        type: string
        required: false
        description: Existing harness evidence to reproduce or strengthen.
    graph:
      name: skill-lab-harness
      steps:
        - id: inspect
          label: inspect target package
          inputs:
            objective: $input.objective
            repo_root: $input.repo_root
            target_dir: $input.target_dir
            harness_output: $input.harness_output
          run:
            type: cli-tool
            command: node
            args:
              - ./inspect_target.mjs
            outputs:
              authoring_context: object
          artifacts:
            named_emits:
              authoring_context: authoring_context
            packets:
              authoring_context: runx.skill_lab.authoring_context.v1
        - id: author-fixtures
          label: author focused fixture bundle
          run:
            type: agent-task
            agent: builder
            task: skill-lab-harness
            outputs:
              change_bundle: object
          instructions: >
            Author the smallest replayable fixture set that proves the requested
            behavior against the inspected package. Return no_change with an
            empty files array when the package already proves the behavior or
            the request lacks enough evidence. Otherwise return change_bundle
            with decision write, summary, non_goals, and files. Every file path must
            be relative to target_dir and live under fixtures/*.yaml. Cover the
            named happy, stop, refusal, or regression boundary without network,
            wall-clock, secret, or live-provider dependencies. Test the public
            contract rather than incidental internal wiring.
          allowed_tools:
            - fs.read
          context:
            authoring_context: inspect.authoring_context.data
          artifacts:
            named_emits:
              change_bundle: change_bundle
            packets:
              change_bundle: runx.skill_lab.change_bundle.v1
        - id: prepare
          label: validate fixture boundary
          inputs:
            target_dir: $input.target_dir
            mode: harness
          context:
            change_bundle: author-fixtures.change_bundle.data
          run:
            type: cli-tool
            command: node
            args:
              - ./prepare_bundle.mjs
            outputs:
              files: array
              bundle_manifest: object
          artifacts:
            named_emits:
              bundle_manifest: bundle_manifest
            packets:
              bundle_manifest: runx.skill_lab.bundle_manifest.v1
        - id: write
          label: write fixture files
          when:
            field: prepare.bundle_manifest.data.decision
            equals: write
          tool: fs.write_bundle
          scopes:
            - fs.write
          mutation: true
          context:
            repo_root: inspect.authoring_context.data.repo_root
            files: prepare.files
        - id: validate
          label: replay safe native harness
          when:
            field: prepare.bundle_manifest.data.decision
            equals: write
          inputs:
            target_dir: $input.target_dir
          context:
            repo_root: inspect.authoring_context.data.repo_root
          run:
            type: cli-tool
            command: node
            args:
              - ./validate_target.mjs
            outputs:
              validation_report: object
          artifacts:
            named_emits:
              validation_report: validation_report
            packets:
              validation_report: runx.skill_lab.validation.v1
