skill: stripe-pay
version: "0.1.4"
catalog:
  kind: graph
  audience: operator
  visibility: public
  role: branded
  canonical_skill: runx/spend
  provider: stripe
  runtime_path: stripe-spt
  execution: execute
  completion: provider_readback
  requires_adapter: true
  approval: required
runners:
  stripe-spt:
    default: true
    type: graph
    inputs:
      payment_signal:
        type: object
        required: true
        description: Payment-required signal or challenge.
      parent_payment_authority:
        type: object
        required: true
        description: Parent payment authority term or authority reference.
      rail_profile_ref:
        type: string
        required: true
        description: Configured rail profile reference.
      payment_admission:
        type: object
        required: false
        description: Hosted payment admission token and settlement identity.
      realm:
        type: string
        required: false
        description: Authority realm.
      spend_policy:
        type: object
        required: false
        description: Policy limits and approval thresholds.
      approval_context:
        type: object
        required: false
        description: Prior approval evidence.
      idempotency_seed:
        type: string
        required: false
        description: Stable idempotency material.
    graph:
      name: stripe-pay
      steps:
        - id: spend
          skill: ../spend
          runner: stripe-spt
          inputs:
            payment_signal: "$input.payment_signal"
            parent_payment_authority: "$input.parent_payment_authority"
            rail_profile_ref: "$input.rail_profile_ref"
            payment_admission: "$input.payment_admission"
            realm: "$input.realm"
            spend_policy: "$input.spend_policy"
            approval_context: "$input.approval_context"
            idempotency_seed: "$input.idempotency_seed"
