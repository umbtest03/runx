name: over-granted-scope-is-attenuated
kind: skill
target: ..
runner: audit
inputs:
  subject: growth/lifecycle-campaign-send
  granted_scopes:
    - email:send
    - repo:write
    - payment:spend
  usage_summary:
    email:send:
      verbs_observed:
        - send
      runs: 14
    repo:
      verbs_observed:
        - read
      runs: 14
    payment:
      verbs_observed: []
      runs: 0
  objective: Tighten the campaign sender to the narrowest grant before renewal.
caller:
  answers:
    agent_task.least-privilege.output:
      audit_report:
        subject: growth/lifecycle-campaign-send
        scope_diff:
          - scope: email:send
            status: exercised
            evidence: 14 runs exercised send; keep as granted.
          - scope: repo:write
            status: over_broad
            evidence: 14 runs, only read verbs observed; write never exercised.
          - scope: payment:spend
            status: unused
            evidence: 0 runs touched payment; no spend ever exercised.
      attenuation_proposals:
        - scope: repo:write
          action: narrow
          to: repo:read
          rationale: Every observed repo use was a read; write authority is unnecessary.
          risk: Low; a future write would re-request the scope and be re-reviewed.
        - scope: payment:spend
          action: remove
          rationale: No run has ever exercised payment; the grant is dead authority.
          risk: Low; removal cannot break observed behaviour.
      verdict: attenuate
      residual_risk: After attenuation the sender can send email and read the repo. It can no longer write the repo or spend, both of which it never did.
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
    state: sealed
    disposition: closed
metadata:
  public_skill: least-privilege
  source_case: over-granted-scope-is-attenuated
  source: skills-fixture
