skill: stripe-charge
version: "0.1.1"
catalog:
  kind: graph
  audience: operator
  visibility: internal
  role: runtime-path
  part_of:
    - runx/charge
harness:
  cases:
    - name: stripe-charge-models-receipt-before-forward
      runner: stripe
      inputs:
        mcp_tool_call:
          tool: search.paid
          arguments:
            query: runx
        provider_policy:
          price_minor: 125
          currency: USD
          accepted_settlement_families:
            - stripe
          counterparty: provider:demo
        returned_credential:
          family: stripe
          credential_ref: credential:stripe:paid-search-001
        verify_capability_ref: capability:charge-verify:paid-search-001
        idempotency_seed: paid-search-001
      caller:
        answers:
          agent_task.charge-price.output:
            charge_price:
              price_id: charge_price_demo_001
              amount_minor: 125
              currency: USD
              settlement_families:
                - stripe
            requested_payment_authority:
              authority_ref: authority:payment:charge-price-demo-001
            price_evidence:
              source_refs:
                - policy:provider-demo
                - tool-call:search.paid
              redactions: []
            policy_metadata:
              provider_realm: test
              direction: provider_charge
            open_questions: []
          agent_task.charge-challenge.output:
            effect_required_signal:
              signal_type: effect_required
              challenge_id: charge_challenge_demo_001
            charge_challenge:
              challenge_id: charge_challenge_demo_001
              receipt_before_forward_required: true
            idempotency:
              key: charge:paid-search-001
            accepted_settlement_families:
              - stripe
            open_questions: []
          agent_task.charge-verify.output:
            verification_result:
              status: verified
              settlement_family: stripe
            settlement_proof:
              proof_ref: receipt-proof:stripe-charge:paid-search-001
              idempotency_key: charge:paid-search-001
            sealed_receipt_ref: receipt:charge:stripe:paid-search-001
            redactions:
              - credential_material
            recovery_hint:
              status: sealed
          agent_task.seal.output:
            sealed: true
            receipt_ref: receipt:charge:stripe:paid-search-001
          agent_task.forward.output:
            forwarded: true
            result_ref: result:search:paid-search-001
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: graph_closed
        steps:
          - price
          - challenge
          - verify
          - seal
          - forward
runners:
  stripe:
    default: true
    type: graph
    inputs:
      mcp_tool_call:
        type: object
        required: true
        description: Inbound MCP operation request.
      provider_policy:
        type: object
        required: true
        description: Provider price and settlement family policy.
      returned_credential:
        type: object
        required: true
        description: Returned Stripe payment credential reference.
      parent_payment_authority:
        type: object
        required: false
        description: Parent payment authority term or ref.
      verify_capability_ref:
        type: string
        required: true
        description: Single-use verification capability reference.
      idempotency_seed:
        type: string
        required: false
        description: Stable challenge idempotency seed.
    graph:
      name: stripe-charge
      steps:
        - id: charge
          skill: ../charge
          runner: stripe
          inputs:
            mcp_tool_call: "$input.mcp_tool_call"
            provider_policy: "$input.provider_policy"
            returned_credential: "$input.returned_credential"
            parent_payment_authority: "$input.parent_payment_authority"
            verify_capability_ref: "$input.verify_capability_ref"
            idempotency_seed: "$input.idempotency_seed"
    runx:
      payment_authority:
        direction: provider_charge
        phase: graph
        resource_family: effect
        settlement_family: stripe
        receipt_before_forward_required: true
        runtime_forwarding_enabled: false
