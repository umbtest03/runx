skill: charge
version: "0.1.2"
catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical
  execution: plan
  completion: plan
  requires_adapter: false
  approval: required
runners:
  mock:
    default: true
    type: graph
    inputs:
      mcp_tool_call:
        type: object
        required: true
        description: Inbound MCP operation request.
      provider_policy:
        type: object
        required: true
        description: Provider price and settlement family policy.
      returned_credential:
        type: object
        required: true
        description: Returned mock payment credential.
      parent_payment_authority:
        type: object
        required: false
        description: Parent payment authority term or ref.
      verify_capability_ref:
        type: string
        required: true
        description: Single-use verification capability reference.
      idempotency_seed:
        type: string
        required: false
        description: Stable challenge idempotency seed.
    graph:
      name: charge
      steps:
        - id: price
          skill: graph/charge-price
          runner: price
          scopes:
            - payment:quote
          inputs:
            mcp_tool_call: "$input.mcp_tool_call"
            provider_policy: "$input.provider_policy"
            parent_payment_authority: "$input.parent_payment_authority"
            idempotency_seed: "$input.idempotency_seed"
        - id: challenge
          skill: graph/charge-challenge
          runner: challenge
          scopes:
            - payment:quote
          inputs:
            provider_policy: "$input.provider_policy"
            idempotency_seed: "$input.idempotency_seed"
          context:
            charge_price_packet: price.charge_price_packet.data
        - id: verify
          skill: graph/charge-verify
          runner: verify
          scopes:
            - payment:verify
          mutation: true
          idempotency_key: charge-verify
          inputs:
            returned_credential: "$input.returned_credential"
            verify_capability_ref: "$input.verify_capability_ref"
            settlement_family: mock
          context:
            charge_price_packet: price.charge_price_packet.data
            charge_challenge_packet: challenge.charge_challenge_packet.data
            priced_payment_authority: price.charge_price_packet.data.requested_payment_authority
            idempotency: challenge.charge_challenge_packet.data.idempotency
        - id: seal
          run:
            type: agent-task
            agent: operator
            task: seal
            outputs:
              sealed: boolean
              receipt_ref: string
          inputs:
            required: true
          context:
            receipt_ref: verify.charge_verification_packet.data.sealed_receipt_ref
            settlement_proof: verify.charge_verification_packet.data.settlement_proof
          artifacts:
            wrap_as: charge_seal
            packet: runx.payment.charge_seal.v1
        - id: forward
          run:
            type: agent-task
            agent: operator
            task: forward
            outputs:
              forwarded: boolean
              result_ref: string
          inputs:
            operation: "$input.mcp_tool_call"
          context:
            sealed_receipt_ref: seal.charge_seal.data.receipt_ref
          artifacts:
            wrap_as: forwarded_result
      policy:
        guards:
          - step: forward
            field: seal.charge_seal.data.sealed
            equals: true
    runx:
      payment_authority:
        direction: provider_charge
        phase: graph
        resource_family: effect
        settlement_family: mock
        receipt_before_forward_required: true
        runtime_forwarding_enabled: false
