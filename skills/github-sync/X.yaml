skill: github-sync
version: "0.1.1"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: branded
  canonical_skill: runx/messageboard
  provider: github
  runtime_path: github

runners:
  github-sync:
    default: true
    type: agent-task
    agent: operator
    task: github-sync
    outputs:
      sync_plan: object
    artifacts:
      wrap_as: sync_plan_packet
      packet: runx.github_sync.v1
    runx:
      category: ops
    inputs:
      repo:
        type: string
        required: true
        description: "Target repository as owner/name."
      direction:
        type: string
        required: true
        description: "Sync direction: pull (read-only) or push (mutation)."
      resources:
        type: json
        required: true
        description: "Selector for issues, prs, or threads plus filters (state, label, author, range, refs)."
      scope:
        type: string
        required: true
        description: "read or write. A push needs write backed by a repo:write grant."
