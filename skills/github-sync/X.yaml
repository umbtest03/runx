skill: github-sync
version: "0.1.3"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: branded
  canonical_skill: runx/messageboard
  provider: github
  runtime_path: github
  execution: execute
  completion: runtime_receipt
  requires_adapter: true
  approval: conditional

runners:
  github-sync:
    default: true
    type: agent-task
    agent: operator
    task: github-sync
    outputs:
      sync_plan: object
    artifacts:
      named_emits:
        sync_plan: sync_plan
      packets:
        sync_plan: runx.github_sync.v1
    runx:
      category: ops
    inputs:
      repo:
        type: string
        required: true
        description: "Target repository as owner/name."
      direction:
        type: string
        required: true
        description: "Sync direction: pull (read-only) or push (mutation)."
      resources:
        type: json
        required: true
        description: "Selector for issues, prs, or threads plus filters (state, label, author, range, refs)."
      scope:
        type: string
        required: true
        description: "read or write. A push needs write backed by a repo:write grant."

  plan_and_append_cursor:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Logical data source used to persist sync cursor events.
      resource:
        type: string
        required: true
        description: Declared event resource for GitHub sync cursor events.
      aggregate_id:
        type: string
        required: true
        description: Cursor stream key, usually owner/repo or owner/repo:selector.
      expected_version:
        type: number
        required: true
        description: Current cursor stream version required before append.
      idempotency_key:
        type: string
        required: true
        description: Stable retry key for this sync plan.
      repo:
        type: string
        required: true
        description: "Target repository as owner/name."
      direction:
        type: string
        required: true
        description: "Sync direction: pull (read-only) or push (mutation)."
      resources:
        type: json
        required: true
        description: "Selector for issues, prs, or threads plus filters (state, label, author, range, refs)."
      scope:
        type: string
        required: true
        description: "read or write. A push needs write backed by a repo:write grant."
    graph:
      name: github-sync-plan-and-append-cursor
      steps:
        - id: read-cursor
          skill: ../data-store
          runner: read_projection
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
        - id: plan
          skill: .
          runner: github-sync
          inputs:
            repo: "$input.repo"
            direction: "$input.direction"
            resources: "$input.resources"
            scope: "$input.scope"
          context:
            cursor_projection: read-cursor.data_operation_result.data.projection
        - id: append-cursor-event
          skill: ../data-store
          runner: append_event
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
            expected_version: "$input.expected_version"
            idempotency_key: "$input.idempotency_key"
          context:
            event: plan.sync_plan.data
        - id: readback
          skill: ../data-store
          runner: read_projection
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
