skill: charge-challenge
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: public

harness:
  cases:
    - name: charge-challenge-emits-payment-required
      runner: challenge
      inputs:
        charge_price_packet:
          charge_price:
            price_id: charge_price_demo_001
            amount_minor: 125
            currency: USD
            settlement_families:
              - mock
            counterparty: provider:demo
            operation: search.paid
          requested_payment_authority:
            authority_ref: authority:payment:charge-price-demo-001
        idempotency_seed: paid-search-001
      caller:
        answers:
          agent_task.charge-challenge.output:
            payment_required_signal:
              signal_type: payment_required
              challenge_id: charge_challenge_demo_001
              amount_minor: 125
              currency: USD
              rail: mock
              counterparty: provider:demo
              operation: search.paid
            charge_challenge:
              challenge_id: charge_challenge_demo_001
              price_id: charge_price_demo_001
              required_authority_ref: authority:payment:charge-price-demo-001
              receipt_before_forward_required: true
            idempotency:
              key: charge:paid-search-001
              replay_policy: recover_or_refuse_duplicate
            accepted_settlement_families:
              - mock
            open_questions: []
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: charge_challenge_closed

runners:
  challenge:
    default: true
    type: agent-task
    agent: operator
    task: charge-challenge
    outputs:
      payment_required_signal: object
      charge_challenge: object
      idempotency: object
      accepted_settlement_families: array
      open_questions: array
    artifacts:
      wrap_as: charge_challenge_packet
      packet: runx.payment.charge_challenge.v1
    runx:
      payment_authority:
        direction: provider_charge
        phase: challenge
        resource_family: payment
        verbs:
          - quote
        mutates_rail: false
        receives_rail_secret_material: false
        receipt_before_forward_required: true
    inputs:
      charge_price_packet:
        type: object
        required: true
        description: "Output from charge-price."
      provider_policy:
        type: object
        required: false
        description: "Provider challenge formatting hints."
      idempotency_seed:
        type: string
        required: false
        description: "Stable seed if the price packet lacks an idempotency key."
