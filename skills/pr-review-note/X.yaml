skill: pr-review-note
version: "0.1.0"

catalog:
  kind: graph
  audience: public
  visibility: public
  role: context
harness:
  cases:
    - name: pr-review-note-comment-seals
      runner: comment
      env:
        RUNX_PROVIDER_PERMISSION_GRANT_ID: github-mcp-pr-comment
        RUNX_PROVIDER_PERMISSION_GRANTED_SCOPES: pr.comment
      inputs:
        repository: runxhq/runx
        pr_number: "42"
        body: The reviewed path is sound; please add the missing harness case.
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
    - name: pr-review-note-merge-refused
      runner: merge-refused
      env:
        RUNX_PROVIDER_PERMISSION_GRANT_ID: github-mcp-pr-comment
        RUNX_PROVIDER_PERMISSION_GRANTED_SCOPES: pr.comment
      inputs:
        repository: runxhq/runx
        pr_number: "42"
      expect:
        status: policy_denied
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: blocked
          reason_code: authority_denied

runners:
  comment:
    default: true
    type: graph
    inputs:
      repository:
        type: string
        required: true
        description: Repository slug.
      pr_number:
        type: string
        required: true
        description: Pull request number.
      body:
        type: string
        required: true
        description: Review note body.
    graph:
      name: pr-review-note-comment
      steps:
        - id: review_note
          skill: ../../examples/github-mcp-hero/review-note
          scopes:
            - pr.comment
          mutation: true
          idempotency_key: pr-review-note-comment
          policy:
            provider_permission:
              grant_id: github-mcp-pr-comment
              verb: comment
          inputs:
            repository: "$input.repository"
            pr_number: "$input.pr_number"
            body: "$input.body"

  merge-refused:
    type: graph
    inputs:
      repository:
        type: string
        required: true
        description: Repository slug.
      pr_number:
        type: string
        required: true
        description: Pull request number.
    graph:
      name: pr-review-note-merge-refused
      steps:
        - id: merge_pr
          skill: ../../examples/github-mcp-hero/merge-pr
          scopes:
            - pr.merge
          mutation: true
          idempotency_key: pr-review-note-merge
          policy:
            provider_permission:
              grant_id: github-mcp-pr-comment
              verb: merge
          inputs:
            repository: "$input.repository"
            pr_number: "$input.pr_number"
