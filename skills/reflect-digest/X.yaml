skill: reflect-digest
version: "0.2.0"

catalog:
  kind: graph
  audience: builder
  visibility: public
  role: context
  execution: read
  completion: runtime_receipt
  requires_adapter: true
  approval: none

harness:
  cases:
    - name: reflect-digest-empty-knowledge
      inputs:
        reflect_projections: []
        min_support: 1
      caller:
        answers:
          agent_task.reflect-digest.output:
            proposals: []
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: reflect-digest-below-floor
      inputs:
        min_support: 1
        min_confidence: 0.8
        reflect_projections:
          - entry_id: projection_low_signal
            entry_kind: projection
            project: /tmp/project
            scope: reflect
            key: receipt:rx_low
            source: post_run.reflect
            confidence: 0.3
            freshness: derived
            receipt_id: rx_low
            created_at: "2026-04-22T00:00:00Z"
            value:
              skill_ref: sourcey
              summary: sourcey completed with a low-confidence signal
      caller:
        answers:
          agent_task.reflect-digest.output:
            proposals: []
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

    - name: reflect-digest-builds-skill-lab-handoff
      inputs:
        min_support: 2
        reflect_projections:
          - entry_id: projection_sourcey_1
            entry_kind: projection
            project: /tmp/project
            scope: reflect
            key: receipt:rx_sourcey_1
            source: post_run.reflect
            confidence: 1
            freshness: derived
            receipt_id: rx_sourcey_1
            created_at: "2026-04-22T00:00:00Z"
            value:
              skill_ref: sourcey
              summary: sourcey planned successfully but omitted a stable coverage field
          - entry_id: projection_sourcey_2
            entry_kind: projection
            project: /tmp/project
            scope: reflect
            key: receipt:rx_sourcey_2
            source: post_run.reflect
            confidence: 1
            freshness: derived
            receipt_id: rx_sourcey_2
            created_at: "2026-04-22T01:00:00Z"
            value:
              skill_ref: sourcey
              summary: sourcey repeated the missing coverage field
      caller:
        answers:
          agent_task.reflect-digest.output:
            proposals:
              - skill_ref: sourcey
                target_dir: skills/sourcey
                objective: Preserve the stable coverage field in Sourcey planning output.
                evidence_summary: Two high-confidence reflections cite the same missing coverage field.
                supporting_receipt_ids:
                  - rx_sourcey_1
                  - rx_sourcey_2
                boundaries:
                  - Do not change Sourcey publication behavior.
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

runners:
  digest:
    default: true
    type: graph
    runx:
      post_run:
        reflect: never
    inputs:
      reflect_projections:
        type: json
        required: false
        description: Explicit reflect projection entries for replay or controlled evaluation.
      data_source_ref:
        type: string
        required: false
        default: local://runx/reflect
        description: Provider-neutral durable reflect state source.
      state_resource:
        type: string
        required: false
        default: reflect_projections
        description: Event-stream resource containing reflect projection events.
      skill_filter:
        type: string
        required: false
        description: Optional skill ref filter.
      since:
        type: string
        required: false
        description: Only include projections at or after this ISO timestamp.
      min_support:
        type: number
        required: false
        default: 2
        description: Minimum grouped support required to draft a proposal.
      min_confidence:
        type: number
        required: false
        default: 0.5
        description: Minimum per-projection confidence admitted into grouping.
    graph:
      name: reflect-digest
      steps:
        - id: read-reflect-projections
          label: read durable reflect state
          skill: ../data-store
          runner: list_stream_heads
          inputs:
            data_source_ref: $input.data_source_ref
            resource: $input.state_resource
            event_types:
              - reflect.projection.recorded
            limit: 100
        - id: load-reflect-projections
          label: load reflect projections
          inputs:
            explicit_reflect_projections: $input.reflect_projections
            skill_filter: $input.skill_filter
            since: $input.since
          context:
            stored_reflect_projections: read-reflect-projections.data_operation_result.data
          run:
            type: cli-tool
            command: node
            args:
              - ./load_reflect_projections.mjs
          artifacts:
            named_emits:
              reflect_projections_packet: reflect_projections_packet
            packets:
              reflect_projections_packet: runx.reflect.projections.v1
        - id: group-reflect-projections
          label: group reflect projections
          inputs:
            min_support: $input.min_support
            min_confidence: $input.min_confidence
          context:
            reflect_projections_packet: load-reflect-projections.reflect_projections_packet.data
          run:
            type: cli-tool
            command: node
            args:
              - ./group_reflect_projections.mjs
          artifacts:
            named_emits:
              grouped_reflections_packet: grouped_reflections_packet
            packets:
              grouped_reflections_packet: runx.reflect.grouped_reflections.v1
        - id: draft-digest
          label: draft bounded improvement opportunities
          run:
            type: agent-task
            agent: builder
            task: reflect-digest
            outputs:
              proposals: array
          instructions: >
            Review each grouped reflection independently. Return at most one
            proposal per skill_ref, and return an empty proposals array when no
            group supports a bounded fix. Every proposal must contain skill_ref,
            repo-relative target_dir, objective, evidence_summary,
            supporting_receipt_ids, and boundaries. Receipt ids must come from
            that group. Do not diagnose a single run again, author code, draft a
            pull request, publish, or mutate the target package.
          allowed_tools:
            - fs.read
          context:
            grouped_reflections: group-reflect-projections.grouped_reflections_packet.data.items
          artifacts:
            named_emits:
              proposals: proposals
            packets:
              proposals: runx.reflect.improvement_proposals.v1
        - id: build-handoffs
          label: validate and build skill-lab handoffs
          context:
            grouped_reflections: group-reflect-projections.grouped_reflections_packet.data.items
            proposals: draft-digest.proposals.data
          run:
            type: cli-tool
            command: node
            args:
              - ./build_handoffs.mjs
          outputs:
            proposals: array
            skill_lab_handoffs: array
          artifacts:
            wrap_as: reflect_digest_packet
            packet: runx.reflect.digest.v1
