skill: reflect-digest
version: "0.1.2"

catalog:
  kind: chain
  audience: builder
  visibility: private


harness:
  cases:
    - name: reflect-digest-empty-knowledge
      inputs:
        reflect_projections: []
        min_support: 1
      caller:
        answers:
          agent_step.reflect-digest.output:
            proposals: []
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success
    - name: reflect-digest-below-floor
      inputs:
        min_support: 1
        min_confidence: 0.8
        reflect_projections:
          - entry_id: projection_low_signal
            entry_kind: projection
            project: /tmp/project
            scope: reflect
            key: receipt:rx_low
            source: post_run.reflect
            confidence: 0.3
            freshness: derived
            receipt_id: rx_low
            created_at: "2026-04-22T00:00:00Z"
            value:
              skill_ref: sourcey
              summary: sourcey completed with a low-confidence signal
      caller:
        answers:
          agent_step.reflect-digest.output:
            proposals: []
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success
    - name: reflect-digest-single-skill
      inputs:
        min_support: 2
        reflect_projections:
          - entry_id: projection_sourcey_1
            entry_kind: projection
            project: /tmp/project
            scope: reflect
            key: receipt:rx_sourcey_1
            source: post_run.reflect
            confidence: 1
            freshness: derived
            receipt_id: rx_sourcey_1
            created_at: "2026-04-22T00:00:00Z"
            value:
              skill_ref: sourcey
              summary: sourcey planned successfully
          - entry_id: projection_sourcey_2
            entry_kind: projection
            project: /tmp/project
            scope: reflect
            key: receipt:rx_sourcey_2
            source: post_run.reflect
            confidence: 1
            freshness: derived
            receipt_id: rx_sourcey_2
            created_at: "2026-04-22T01:00:00Z"
            value:
              skill_ref: sourcey
              summary: sourcey repeated the same bounded plan shape
      caller:
        answers:
          agent_step.reflect-digest.output:
            proposals:
              - skill_ref: sourcey
                supporting_receipt_ids:
                  - rx_sourcey_1
                  - rx_sourcey_2
                draft_pull_request:
                  target:
                    repo: runx/registry
                    branch: reflect/sourcey
                  pull_request:
                    title: "Reflect digest: sourcey"
                    body: "Group the repeated sourcey reflect signals into one bounded registry follow-up."
                outbox_entry:
                  entry_id: pull_request:sourcey-reflect
                  kind: pull_request
                  title: "Reflect digest: sourcey"
                  status: draft
                  thread_locator: registry://skills/sourcey
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success
    - name: reflect-digest-multi-skill
      inputs:
        min_support: 2
        reflect_projections:
          - entry_id: projection_sourcey_1
            entry_kind: projection
            project: /tmp/project
            scope: reflect
            key: receipt:rx_sourcey_1
            source: post_run.reflect
            confidence: 1
            freshness: derived
            receipt_id: rx_sourcey_1
            created_at: "2026-04-22T00:00:00Z"
            value:
              skill_ref: sourcey
              summary: sourcey planned successfully
          - entry_id: projection_sourcey_2
            entry_kind: projection
            project: /tmp/project
            scope: reflect
            key: receipt:rx_sourcey_2
            source: post_run.reflect
            confidence: 1
            freshness: derived
            receipt_id: rx_sourcey_2
            created_at: "2026-04-22T01:00:00Z"
            value:
              skill_ref: sourcey
              summary: sourcey repeated the same bounded plan shape
          - entry_id: projection_release_1
            entry_kind: projection
            project: /tmp/project
            scope: reflect
            key: receipt:rx_release_1
            source: post_run.reflect
            confidence: 1
            freshness: derived
            receipt_id: rx_release_1
            created_at: "2026-04-22T00:30:00Z"
            value:
              skill_ref: release
              summary: release surfaced the same missing-note signal
          - entry_id: projection_release_2
            entry_kind: projection
            project: /tmp/project
            scope: reflect
            key: receipt:rx_release_2
            source: post_run.reflect
            confidence: 1
            freshness: derived
            receipt_id: rx_release_2
            created_at: "2026-04-22T01:30:00Z"
            value:
              skill_ref: release
              summary: release repeated the same registry drift signal
      caller:
        answers:
          agent_step.reflect-digest.output:
            proposals:
              - skill_ref: release
                supporting_receipt_ids:
                  - rx_release_1
                  - rx_release_2
                draft_pull_request:
                  target:
                    repo: runx/registry
                    branch: reflect/release
                  pull_request:
                    title: "Reflect digest: release"
                    body: "Group the repeated release reflect signals into one bounded registry follow-up."
                outbox_entry:
                  entry_id: pull_request:release-reflect
                  kind: pull_request
                  title: "Reflect digest: release"
                  status: draft
                  thread_locator: registry://skills/release
              - skill_ref: sourcey
                supporting_receipt_ids:
                  - rx_sourcey_1
                  - rx_sourcey_2
                draft_pull_request:
                  target:
                    repo: runx/registry
                    branch: reflect/sourcey
                  pull_request:
                    title: "Reflect digest: sourcey"
                    body: "Group the repeated sourcey reflect signals into one bounded registry follow-up."
                outbox_entry:
                  entry_id: pull_request:sourcey-reflect
                  kind: pull_request
                  title: "Reflect digest: sourcey"
                  status: draft
                  thread_locator: registry://skills/sourcey
      expect:
        status: success
        receipt:
          kind: graph_execution
          status: success

runners:
  reflect-digest:
    default: true
    type: chain
    runx:
      post_run:
        reflect: never
    inputs:
      reflect_projections:
        type: json
        required: false
        description: "Optional explicit reflect projection entries for replay or controlled evaluation."
      skill_filter:
        type: string
        required: false
        description: "Optional skill ref filter."
      since:
        type: string
        required: false
        description: "Only include reflect projections recorded at or after this ISO timestamp."
      min_support:
        type: number
        required: false
        default: 2
        description: "Minimum grouped support required to draft a proposal."
      min_confidence:
        type: number
        required: false
        default: 0.5
        description: "Minimum per-projection confidence required before grouping."
    chain:
      name: reflect-digest
      owner: runx
      steps:
        - id: load-reflect-projections
          label: load reflect projections
          run:
            type: cli-tool
            command: node
            args:
              - ./load_reflect_projections.mjs
          artifacts:
            named_emits:
              reflect_projections_packet: reflect_projections
            packets:
              reflect_projections_packet: runx.reflect.projections.v1
        - id: group-reflect-projections
          label: group reflect projections
          context:
            reflect_projections_packet: load-reflect-projections.reflect_projections_packet.data
          run:
            type: cli-tool
            command: node
            args:
              - ./group_reflect_projections.mjs
          artifacts:
            named_emits:
              grouped_reflections_packet: grouped_reflections
            packets:
              grouped_reflections_packet: runx.reflect.grouped_reflections.v1
        - id: draft-digest
          label: draft grouped proposals
          context:
            grouped_reflections: group-reflect-projections.grouped_reflections_packet.data.items
          run:
            type: agent-step
            agent: builder
            task: reflect-digest
            outputs:
              proposals: array
          instructions: >
            Review grouped_reflections and draft at most one bounded proposal
            packet per skill_ref. If no group clears the support and confidence
            floors, or the grouped evidence does not support a bounded fix,
            return {"proposals": []}. Emit only proposal packets that have
            enough evidence to justify a later governed pull-request lane.
            Every proposal must include skill_ref, supporting_receipt_ids,
            draft_pull_request, and outbox_entry, and each field must stay
            grounded in the grouped reflection entry for that same skill_ref.
            draft_pull_request should describe the repeated signal and the
            bounded follow-up; it must not pretend code has already changed.
            outbox_entry must stay in draft status and align to the same
            skill_ref. Do not merge multiple skills into one proposal, do not
            invent missing receipt ids or target repos, and do not publish or
            push.
