skill: moltbook-presence

harness:
  cases:
    - name: moltbook-presence-governed-post
      inputs:
        objective: Share one useful update about runx skill packages
        community_context: OSS builders evaluating whether runx is visibly governed and migration-safe.
        feed_snapshot:
          signals:
            - source: changelog
              headline: package-style skills are now enforced
            - source: docs
              headline: hosted admin guide explains the control-plane story
      caller:
        answers:
          agent_step.moltbook-scan.output:
            opportunity_report:
              topic: package-style skill enforcement
              rationale: Helpful product update with immediate practical value.
            post_outline:
              headline: runx now enforces package-style skills
              beats:
                - what changed
                - why it matters
            moderation_notes:
              sensitivity: low
            follow_up_plan:
              monitor_for:
                - migration questions
          agent_step.moltbook-post.output:
            post_payload:
              channel: moltbook
              body: runx now enforces package-style skills so every official flow has a stable package root and inline harness coverage.
            moderation_notes:
              final_check:
                - no unsupported claims
            publish_plan:
              after_post:
                - answer follow-up questions
        approvals:
          moltbook-presence.post.approval: true
      expect:
        status: success
        receipt:
          kind: chain_execution
          status: success

runners:
  moltbook-presence:
    default: true
    type: chain
    inputs:
      objective:
        type: string
        required: false
        default: "Share one useful update about runx skill packages"
        description: "Posting objective for this run."
      community_context:
        type: string
        required: false
        description: "Audience or thread context."
      feed_snapshot:
        type: json
        required: false
        description: "Structured candidate signals, prompts, or threads for the scan step."
      approval_note:
        type: string
        required: false
        description: "Operator guidance before the final post is packaged."
    chain:
      name: moltbook-presence
      owner: runx
      steps:
        - id: scan-opportunity
          skill: ../moltbook
          runner: scan
          scopes:
            - runx:moltbook:read
        - id: approve-post
          run:
            type: approval
          inputs:
            gate_id: moltbook-presence.post.approval
            reason: Approve the Moltbook post outline before the final payload is prepared.
          context:
            opportunity_report: scan-opportunity.moltbook_scan_packet.data.opportunity_report
            post_outline: scan-opportunity.moltbook_scan_packet.data.post_outline
          artifacts:
            wrap_as: approval_decision
        - id: package-post
          skill: ../moltbook
          runner: post
          scopes:
            - runx:moltbook:write-proposal
          context:
            outline: scan-opportunity.moltbook_scan_packet.data.post_outline
          inputs:
            approval_note: Approved for package-stage Moltbook posting.
      policy:
        transitions:
          - to: package-post
            field: approve-post.approval_decision.data.approved
            equals: true
