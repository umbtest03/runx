skill: sign-receipt
version: "0.1.1"
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
  execution: plan
  completion: runtime_receipt
  requires_adapter: false
  approval: none
runners:
  sign-receipt:
    default: true
    type: agent-task
    agent: reviewer
    task: sign-receipt
    outputs:
      attestation: object
    artifacts:
      wrap_as: attestation_packet
      packet: runx.attestation.v1
    runx:
      category: security
    inputs:
      action:
        type: string
        required: true
        description: "What was done, off-runtime."
      evidence:
        type: json
        required: true
        description: "References and digests proving the action, each with what it proves. References only; no raw content or secret values."
      principal:
        type: string
        required: true
        description: "The actor the attestation names."
      claim:
        type: string
        required: true
        description: "The exact assertion to be signed."
      scope:
        type: json
        required: false
        description: "Bound on what the attestation may be relied on for downstream."
