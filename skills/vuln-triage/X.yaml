skill: vuln-triage
version: "0.1.3"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: context
  execution: read
  completion: runtime_receipt
  requires_adapter: false
  approval: none
harness:
  cases:
    - name: vuln-triage-risk-packet
      runner: scan
      inputs:
        target: pnpm-lock.yaml
        objective: identify the highest-risk dependency issue to surface today
      caller:
        answers:
          agent_task.vuln-triage.output:
            dependency_inventory:
              target: pnpm-lock.yaml
              packages:
                - name: example-lib
                  version: 1.2.3
            advisories:
              - package: example-lib
                severity: medium
                exposure: transitive
                evidence: fixture advisory
            remediation_plan:
              immediate:
                - patch or pin example-lib
            operator_summary:
              verdict: investigate
              summary: One medium-severity transitive issue is worth a bounded advisory.
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
    - name: vuln-triage-advisory-packet
      runner: advisory
      inputs:
        target: pnpm-lock.yaml
        advisories:
          - package: example-lib
            severity: medium
      caller:
        answers:
          agent_task.vuln-triage-advisory.output:
            advisory_draft:
              title: Example advisory
              body: We identified a medium-severity transitive dependency issue and are preparing the patch path.
            maintainer_summary:
              audience: repo_owners
              summary: Patch planning in progress.
            disclosure_checklist:
              - verify affected versions
              - confirm remediation path
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1

runners:
  scan:
    default: true
    type: agent-task
    agent: reviewer
    task: vuln-triage
    outputs:
      dependency_inventory: object
      advisories: array
      remediation_plan: object
      operator_summary: object
    artifacts:
      wrap_as: vulnerability_scan_packet
      packet: runx.security.vulnerability_scan.v1
    inputs:
      target:
        type: string
        required: true
        description: "Repo, lockfile, package set, or ecosystem slice to review."
      objective:
        type: string
        required: false
        description: "Specific question the scan should answer."
      scan_context:
        type: json
        required: false
        description: "Known packages, incidents, or prior findings."
      cve_evidence:
        type: json
        required: false
        description: "Verified exact-version CVE evidence from cve-audit (findings and provenance). When present, triage these confirmed findings instead of inferring exposure."

  advisory:
    type: agent-task
    agent: builder
    task: vuln-triage-advisory
    outputs:
      advisory_draft: object
      maintainer_summary: object
      disclosure_checklist: array
    artifacts:
      wrap_as: vulnerability_advisory_packet
      packet: runx.security.vulnerability_advisory.v1
    inputs:
      target:
        type: string
        required: true
        description: "Target repo, package set, or advisory scope."
      advisories:
        type: json
        required: true
        description: "Structured scan findings to communicate."
      remediation_plan:
        type: json
        required: false
        description: "Structured remediation actions from the scan runner."
