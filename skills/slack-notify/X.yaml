skill: slack-notify
version: "0.1.3"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: branded
  canonical_skill: runx/send-as
  provider: slack
  runtime_path: slack
  execution: plan
  completion: plan
  requires_adapter: false
  approval: required

runners:
  plan:
    default: true
    type: agent-task
    agent: operator
    task: slack-notify
    outputs:
      notify_plan: object
    artifacts:
      named_emits:
        notify_plan: notify_plan
      packets:
        notify_plan: runx.notify.v1
    runx:
      category: ops
    inputs:
      channel:
        type: string
        required: true
        description: "Destination Slack channel, by id or name."
      content:
        type: json
        required: true
        description: "Message as { message } for inline text, or { content_ref, digest } for digest-bound content. Raw secrets and PII must not appear."
      principal:
        type: string
        required: true
        description: "Principal the notification is posted as."
      provider_context:
        type: json
        required: false
        description: "Slack connector and workspace readiness, e.g. a connector status snapshot."
