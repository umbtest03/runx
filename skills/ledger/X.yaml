skill: ledger
version: "0.2.1"
catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
  execution: read
  completion: runtime_receipt
  requires_adapter: false
  approval: none
runners:
  ledger:
    default: true
    type: agent-task
    agent: analyst
    task: ledger
    outputs:
      ledger_answer: object
      matched_receipts: array
      chain_verification: object
      summary: string
    artifacts:
      wrap_as: ledger_answer_packet
      packet: runx.ledger_answer.v1
    inputs:
      question:
        type: string
        required: true
        description: "The audit question to answer against the receipt ledger."
      filter:
        type: json
        required: false
        description: "Query narrowing: principal, skill_ref, status, and time_range (from/to)."
      proof:
        type: json
        required: false
        description: "Chain-verification request over the matched receipts, e.g. { verify_chain: true }."
  read:
    type: cli-tool
    command: node
    args:
      - run.mjs
    outputs:
      ledger_answer: object
      matched_receipts: array
      chain_verification: object
      summary: string
    artifacts:
      wrap_as: ledger_answer_packet
      packet: runx.ledger_answer.v1
    inputs:
      question:
        type: string
        required: false
        description: "The audit question to answer against the receipt ledger."
      filter:
        type: json
        required: false
        description: "Query narrowing: principal, skill_ref, status, and time_range (from/to)."
      proof:
        type: json
        required: false
        description: "Chain-verification request over the matched receipts, e.g. { verify_chain: true }."
      receipts:
        type: json
        required: false
        description: "Optional explicit ledger rows for replay or controlled evaluation; when present, the reader uses them instead of shelling runx history."
