skill: ledger
version: "0.3.0"
catalog:
  kind: skill
  audience: operator
  visibility: public
  role: canonical
  execution: read
  completion: runtime_receipt
  requires_adapter: false
  approval: none
runners:
  read:
    default: true
    type: cli-tool
    command: node
    args:
      - run.mjs
    outputs:
      ledger_answer: object
      matched_receipts: array
      chain_verification: object
      summary: string
    artifacts:
      wrap_as: ledger_answer_packet
      packet: runx.ledger_answer.v1
    inputs:
      question:
        type: string
        required: false
        description: The audit question bounding this read.
      filter:
        type: json
        required: false
        description: Query narrowing by principal, skill_ref, status, source, actor, time_range, and a bounded limit.
      receipt_ids:
        type: json
        required: false
        description: Exact receipt ids to resolve through native runx history.
      proof:
        type: json
        required: false
        description: "Chain-verification request, for example { verify_chain: true }."
      receipts:
        type: json
        required: false
        description: Explicit native-projection rows for replay; live reads use runx history.
