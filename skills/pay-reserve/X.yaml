runners:
  reserve:
    default: true
    type: agent-task
    agent: operator
    task: pay-reserve
    mutating: true
    outputs:
      payment_decision: object
      reserved_payment_authority: object
      spend_capability_ref: object
      idempotency: object
      approval: object
      core_requirements: array
      open_questions: array
    artifacts:
      wrap_as: payment_reservation_packet
      packet: runx.payment.reservation.v1
    runx:
      payment_authority:
        phase: reserve
        resource_family: payment
        verbs:
          - reserve
        core_owned:
          - authority_subset_proof
          - atomic_budget_hold
          - idempotency_key
        mutates_rail: false
        receives_funding_material: false
    inputs:
      payment_quote_packet:
        type: object
        required: true
        description: "Output from pay-quote."
      parent_payment_authority:
        type: object
        required: true
        description: "Parent payment authority term or authority reference."
      spend_policy:
        type: object
        required: false
        description: "Policy limits, period caps, and approval thresholds."
      approval_context:
        type: object
        required: false
        description: "Operator, system, or prior approval evidence."
      idempotency_seed:
        type: string
        required: false
        description: "Stable seed if not already supplied by the quote."
