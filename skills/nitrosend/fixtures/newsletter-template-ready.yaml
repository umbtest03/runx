name: newsletter-template-ready
kind: skill
target: ..
runner: compose-email
inputs:
  objective: Design our monthly product newsletter template with a hero, two updates, and one call to action.
  account_status_json: '{"status":"healthy","account":{"tier":"pro"},"brand":{"setup_complete":true,"company_name":"Acme Co"}}'
  brand_brief: Friendly, concise, one clear button.
  operator_context: Design and test only; no live audience send.
caller:
