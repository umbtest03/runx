        ordered_tool_calls:
          - tool: nitro_manage_template
            purpose: Create the newsletter template from the section design.
            requires_confirmation: false
          - tool: nitro_review_delivery
            purpose: Validate the template content and check the editor preview.
            requires_confirmation: false
          - tool: nitro_send_test_message
            purpose: Send a test of the template to the saved test recipient.
            requires_confirmation: false
        human_actions:
          - Review the editor preview before reusing the template in a campaign.
        blockers: []
        needs_input: []
        unsupported_requirements: []
        success_checkpoint:
          milestone: template_ready
