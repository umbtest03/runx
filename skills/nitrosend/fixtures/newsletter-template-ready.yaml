    agent_task.compose-email-plan.output:
      email_design:
        decision: ready
        template_intent: newsletter
        subject: Your Acme update for the month
        preheader: Two new things, one quick read.
        sections:
          - type: header
            summary: Brand logo, empty props so the theme fills it.
          - type: hero
            summary: Headline plus a one-line intro.
          - type: text
            summary: Two short product update paragraphs.
          - type: button
            summary: Single primary call to action.
          - type: footer
            summary: Company name, address, unsubscribe; empty props.
