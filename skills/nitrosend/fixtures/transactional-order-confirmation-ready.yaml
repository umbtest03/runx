name: transactional-order-confirmation-ready
kind: skill
target: ..
runner: send-transactional
inputs:
  objective: Send an order confirmation email to alice@example.com for order 1234.
  recipient: alice@example.com
  data: '{"order_id":"1234","name":"Alice","amount":"$49.99"}'
  account_status_json: '{"status":"healthy","account":{"tier":"pro","can_send":true,"domain_verified":true},"config":{"from_email":"orders@acme.com"}}'
  operator_context: Operator-initiated send; require dry run, idempotency, and confirmation before the real send.
caller:
  answers:
    agent_task.send-transactional-plan.output:
      transactional_plan:
        decision: ready
        channel: email
        recipient: alice@example.com
        idempotency_key: order-1234-confirmation
        ordered_tool_calls:
          - tool: nitro_send_message
            purpose: Dry-run the order confirmation to validate the recipient and body without sending.
            requires_confirmation: false
          - tool: nitro_send_message
            purpose: Send the real order confirmation with the idempotency key, only after the operator confirms.
            requires_confirmation: true
        human_actions:
          - Confirm the recipient and content before the real send.
        blockers: []
        needs_input: []
        unsupported_requirements: []
        success_checkpoint:
          milestone: transactional_sent
          description: A single-recipient order confirmation was dry-run validated and sent idempotently after confirmation.
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
metadata:
  public_skill: nitrosend
  source_case: transactional-order-confirmation-ready
  source: skills-fixture
