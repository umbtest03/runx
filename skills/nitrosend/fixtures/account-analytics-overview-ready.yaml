name: account-analytics-overview-ready
kind: skill
target: ..
runner: analytics
inputs:
  objective: How are our emails doing this month, and what should we fix first?
  scope: account
  period: 30d
  account_status_json: '{"status":"healthy","account":{"tier":"pro","contact_count":4200,"campaign_count":7}}'
  operator_context: Read-only report; recommend, do not act.
caller:
  answers:
    agent_task.analytics-report.output:
      analytics_report:
        decision: ready
        scope: account
        period: 30d
        ordered_tool_calls:
          - tool: nitro_get_insights
            purpose: Pull 30-day account metrics, trends, benchmarks, and recommendations.
            requires_confirmation: false
          - tool: nitro_query
            purpose: List recent campaigns to attribute the trend.
            requires_confirmation: false
        findings:
          - metric: open_rate
            value: 18%
            assessment: warning
          - metric: click_rate
            value: 3.4%
            assessment: good
          - metric: unsubscribe_rate
            value: 0.12%
            assessment: good
        recommendations:
          - Open rate is in the warning band; test stronger subject lines and revisit send times.
          - Click rate and unsubscribe rate are healthy; keep the current cadence.
        blockers: []
        needs_input: []
        success_checkpoint:
          milestone: report_delivered
          description: A read-only 30-day account report with benchmark-graded findings and recommendations.
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
metadata:
  public_skill: nitrosend
  source_case: account-analytics-overview-ready
  source: skills-fixture
