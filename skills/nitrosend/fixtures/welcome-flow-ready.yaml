name: welcome-flow-ready
kind: skill
target: ..
runner: build-flow
inputs:
  objective: Build a three-email welcome series that starts when someone joins our newsletter list.
  account_status_json: '{"status":"healthy","account":{"tier":"pro","can_send":true,"domain_verified":true,"using_sandbox":false,"contact_count":4200,"campaign_count":7},"brand":{"setup_complete":true,"company_name":"Acme Co"},"config":{"from_email":"news@acme.com"},"issues":[],"recommendations":[]}'
  flow_brief: Welcome on signup, then two follow-ups spaced a day or two apart.
  client_surface: runx_skill_cli
  operator_context: Activation requires explicit operator confirmation before nitro_control_delivery.
caller:
  answers:
    agent_task.build-flow-plan.output:
      flow_plan:
        decision: ready
        flow_type: welcome
        trigger:
          event: contact_add
          ref: newsletter-subscribers
        steps:
          - type: email
            summary: Immediate welcome email.
          - type: wait
            summary: Wait one day.
          - type: email
            summary: Getting-started email.
          - type: wait
            summary: Wait two days.
          - type: email
            summary: Feature highlight email.
        rationale: A welcome series should fire on list join and space follow-ups one to two days apart, so the plan previews the graph then gates activation.
        ordered_tool_calls:
          - tool: nitro_compose_flow
            purpose: Preview the welcome-series flow graph with dry_run before creating it.
            requires_confirmation: false
          - tool: nitro_compose_flow
            purpose: Create the flow for real once the dry-run graph is approved.
            requires_confirmation: false
          - tool: nitro_control_delivery
            purpose: Approve and activate the flow only after the operator confirms.
            requires_confirmation: true
        human_actions:
          - Review the dry-run flow graph and confirm activation before nitro_control_delivery runs.
        blockers: []
        needs_input: []
        unsupported_requirements: []
        success_checkpoint:
          milestone: flow_ready_for_activation
          description: The flow graph was previewed and created, and is ready for explicit operator activation.
expect:
  status: sealed
  receipt:
    schema: runx.receipt.v1
metadata:
  public_skill: nitrosend
  source_case: welcome-flow-ready
  source: skills-fixture
