skill: charge-verify
version: "0.1.0"

catalog:
  kind: skill
  audience: operator
  visibility: public

harness:
  cases:
    - name: charge-verify-seals-proof
      runner: verify
      inputs:
        charge_price_packet:
          charge_price:
            price_id: charge_price_demo_001
            amount_minor: 125
            currency: USD
            settlement_families:
              - mock
          requested_payment_authority:
            authority_ref: authority:payment:charge-price-demo-001
        charge_challenge_packet:
          charge_challenge:
            challenge_id: charge_challenge_demo_001
            receipt_before_forward_required: true
          idempotency:
            key: charge:paid-search-001
        returned_credential:
          family: mock
          credential_ref: credential:mock:paid-search-001
        priced_payment_authority:
          term_id: authority-term:payment:charge-price-demo-001
          principal_ref:
            type: host
            uri: principal:provider:test
          resource_ref:
            type: surface
            uri: provider:demo
          resource_family: payment
          verbs:
            - verify
          bounds:
            payment:
              currency: USD
              max_per_call_minor: 125
              rails:
                - mock
              realm: test
              counterparty: provider:demo
              operation: search.paid
              idempotency_required: true
              receipt_before_success: true
          conditions: []
          approvals: []
          capabilities: []
          issued_by_ref:
            type: host
            uri: authority:payment:provider-test
        verify_capability_ref: capability:charge-verify:paid-search-001
        settlement_family: mock
        idempotency:
          key: charge:paid-search-001
      caller:
        answers:
          agent_task.charge-verify.output:
            verification_result:
              status: verified
              settlement_family: mock
              amount_minor: 125
              currency: USD
            settlement_proof:
              proof_ref: receipt-proof:mock-charge:paid-search-001
              idempotency_key: charge:paid-search-001
              family: mock
            sealed_receipt_ref: receipt:charge:mock:paid-search-001
            redactions:
              - credential_material
            recovery_hint:
              status: sealed
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
          reason_code: charge_verify_closed

runners:
  verify:
    default: true
    type: agent-task
    agent: operator
    task: charge-verify
    mutating: true
    retry:
      max_attempts: 1
    idempotency:
      key: charge-verify
    outputs:
      verification_result: object
      settlement_proof: object
      sealed_receipt_ref: string
      redactions: array
      recovery_hint: object
    artifacts:
      wrap_as: charge_verification_packet
      packet: runx.payment.charge_verification.v1
    runx:
      payment_authority:
        direction: provider_charge
        phase: verify
        resource_family: payment
        verbs:
          - verify
        receives_rail_secret_material: false
        receipt_before_forward_required: true
        checks_idempotency_before_retry: true
    inputs:
      charge_price_packet:
        type: object
        required: true
        description: "Output from charge-price."
      charge_challenge_packet:
        type: object
        required: true
        description: "Output from charge-challenge."
      returned_credential:
        type: object
        required: true
        description: "Caller-returned payment credential envelope or reference."
      priced_payment_authority:
        type: object
        required: true
        description: "Already-priced provider-side payment authority term."
      verify_capability_ref:
        type: string
        required: true
        description: "Single-use verification capability reference."
      settlement_family:
        type: string
        required: true
        description: "Settlement family selected for verification."
      idempotency:
        type: object
        required: true
        description: "Challenge idempotency key and replay policy."
