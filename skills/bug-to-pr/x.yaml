skill: bug-to-pr

runners:
  bug-to-pr:
    default: true
    type: chain
    inputs:
      task_id:
        type: string
        required: false
        default: "issue-to-pr-fixture"
        description: "scafld task id for the governed issue-to-PR lane."
      issue_title:
        type: string
        required: false
        default: "Fixture issue to PR"
        description: "Canonical issue title passed through to issue-to-pr."
      title:
        type: string
        required: false
        description: "Compatibility alias for issue_title."
      issue_body:
        type: string
        required: false
        description: "Issue or support body describing the change request."
      source:
        type: string
        required: false
        description: "Source system for the issue, such as github_issue or support_request."
      source_id:
        type: string
        required: false
        description: "Source record identifier."
      source_url:
        type: string
        required: false
        description: "Source URL for the issue or support request."
      target_repo:
        type: string
        required: false
        description: "Intended repository slug for repo-local dispatchers."
      size:
        type: string
        required: false
        default: "micro"
        description: "Size passed to scafld spec/new."
      risk:
        type: string
        required: false
        default: "low"
        description: "Risk passed to scafld spec/new."
      phase:
        type: string
        required: false
        default: "phase1"
        description: "Optional scafld execution phase."
      fixture:
        type: string
        required: false
        description: "Workspace root containing the target .ai/ directory."
      scafld_bin:
        type: string
        required: false
        description: "Explicit scafld executable path."
    chain:
      name: bug-to-pr
      owner: runx
      notes:
        status: compatibility
        rationale: >
          `bug-to-pr` is a compatibility wrapper over the canonical
          `issue-to-pr` lane so existing callers keep working while new flows
          converge on issue-oriented naming.
      steps:
        - id: delegate
          label: turn issue into fix
          skill: ../issue-to-pr/SKILL.md
          runner: issue-to-pr
          mutation: true
