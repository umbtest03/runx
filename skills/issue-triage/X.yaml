skill: issue-triage
version: 0.1.1
catalog:
  kind: skill
  audience: public
  visibility: internal
  role: context
harness:
  cases:
    - name: issue-triage-discover-queue
      runner: discover
      inputs:
        repository: runxhq/runx
        query: find unanswered issues where a maintainer response would unblock progress
        operator_context: Respond as a maintainer who prefers concise, factual
          clarifications over speculative promises.
      caller:
        answers:
          agent_task.issue-triage-discover.output:
            issue_candidates:
              - id: issue-241
                title: Sourcey output path is unclear
                reason: Repeated confusion and no maintainer reply yet
            selection_rationale:
              chosen_issue: issue-241
              rationale: Small answer cost with high unblock potential.
            operator_notes:
              escalation: none
              caveats:
                - Confirm the current output directory contract before replying.
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
    - name: issue-triage-draft-response
      runner: respond
      inputs:
        issue_url: https://github.com/runxhq/runx/issues/241
        objective: Draft the next helpful maintainer response
        maintainer_context: Respond as a maintainer who prefers concise, factual
          clarifications over speculative promises.
      caller:
        answers:
          agent_task.issue-triage-respond.output:
            issue_profile:
              title: Sourcey output path is unclear
              state: open
              summary: The docs mention two different output directories.
            response_strategy:
              stance: acknowledge and clarify
              next_action: point to the canonical directory and note the doc fix in progress
            response_draft:
              channel: github_issue_comment
              body: The canonical output directory is `.sourcey/runx-docs`; the conflicting
                doc text is being corrected.
            follow_up_actions:
              - update docs
              - add a regression test for the path contract
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
    - name: issue-triage-mcp-read
      runner: mcp-read
      env:
        RUNX_PROVIDER_PERMISSION_GRANT_ID: github-mcp-issue-triage-read
        RUNX_PROVIDER_PERMISSION_GRANTED_SCOPES: repo.read
      inputs:
        repository: runxhq/runx
        issue_number: "241"
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
runners:
  agent:
    type: agent
  discover:
    type: agent-task
    agent: researcher
    task: issue-triage-discover
    outputs:
      issue_candidates: array
      selection_rationale: object
      operator_notes: object
    artifacts:
      wrap_as: issue_triage_queue
      packet: runx.issue.triage_queue.v1
    inputs:
      repository:
        type: string
        required: false
        description: Repository slug or local repo reference to inspect.
      query:
        type: string
        required: true
        description: Discovery objective for the issue queue.
      maintainer_context:
        type: string
        required: false
        description: Maintainer norms or project-specific constraints.
      operator_context:
        type: string
        required: false
        description: Operator-supplied context for triage.
  mcp-read:
    type: graph
    inputs:
      repository:
        type: string
        required: true
        description: Repository slug to inspect through the governed MCP read path.
      issue_number:
        type: string
        required: true
        description: Issue number to inspect through the governed MCP read path.
    graph:
      name: issue-triage-mcp-read
      steps:
        - id: read_issue
          skill: ../../examples/github-mcp-hero/read-issue
          scopes:
            - repo.read
          policy:
            provider_permission:
              grant_id: github-mcp-issue-triage-read
              verb: read
          inputs:
            repository: $input.repository
            issue_number: $input.issue_number
  respond:
    default: true
    type: agent-task
    agent: builder
    task: issue-triage-respond
    outputs:
      issue_profile: object
      response_strategy: object
      response_draft: object
      follow_up_actions: array
    artifacts:
      wrap_as: issue_triage_packet
      packet: runx.issue.triage.v1
    inputs:
      issue_url:
        type: string
        required: false
        description: Canonical issue URL when available.
      issue_snapshot:
        type: json
        required: false
        description: Structured issue snapshot or prior discovery output.
      objective:
        type: string
        required: false
        description: What the operator wants from the drafted response.
      maintainer_context:
        type: string
        required: false
        description: Repository norms, tone guidance, or release posture.
      operator_context:
        type: string
        required: false
        description: Operator-supplied context for triage.
