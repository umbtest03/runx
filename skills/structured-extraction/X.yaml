skill: structured-extraction
version: "0.1.0"

catalog:
  kind: skill
  audience: public
  visibility: internal
  role: canonical
  runtime_path: local

policy:
  allow:
    - provider: local-fixture
      method: READ
      scope: runx:fixture:read
    - provider: local-schema
      method: READ
      scope: runx:schema:read
  deny:
    - network_mutation
    - credential_material
    - private_user_data

emits:
  - name: structured_extraction_result
    packet: runx.structured_extraction.result.v1

harness:
  cases:
    - name: rfc9110-http-semantics
      runner: extract
      inputs:
        input_path: "fixtures/rfc9110-http-semantics.html"
        schema_path: "schemas/extraction.schema.json"
        source_url: "https://www.rfc-editor.org/rfc/rfc9110.html"
        content_type: "text/html"
        max_items: 18
      expect:
        status: sealed
        outputs:
          structured_extraction_result:
            matches_packet: runx.structured_extraction.result.v1
        receipt:
          schema: runx.receipt.v1

runners:
  extract:
    default: true
    type: graph
    inputs:
      input_path:
        type: string
        required: true
        description: "Package-relative messy HTML or text fixture."
      schema_path:
        type: string
        required: true
        description: "Package-relative JSON Schema used to validate output."
      source_url:
        type: string
        required: true
        description: "Canonical source URL for the fixture bytes."
      content_type:
        type: string
        required: false
        default: "text/html"
        description: "Input content type: text/html or text/plain."
      max_items:
        type: number
        required: false
        default: 20
        description: "Maximum extracted items to include in output."
    graph:
      name: structured-extraction
      steps:
        - id: extract_structured_json
          tool: structured.extract
          inputs:
            input_path: "$input.input_path"
            schema_path: "$input.schema_path"
            source_url: "$input.source_url"
            content_type: "$input.content_type"
            max_items: "$input.max_items"
