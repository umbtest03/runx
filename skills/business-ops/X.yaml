skill: business-ops
version: "0.1.3"

catalog:
  kind: graph
  audience: public
  visibility: public
  role: canonical
  execution: execute
  completion: runtime_receipt
  requires_adapter: true
  approval: conditional

runners:
  main:
    default: true
    type: graph
    inputs:
      signal:
        type: string
        required: true
        description: Business signal to triage.
      operator_context:
        type: string
        required: false
        description: Optional product policy, topology, audience constraints, or provider state. Context only, not authority.
    graph:
      name: business-ops
      steps:
        - id: classify
          skill: ./graph/ops-lane
          inputs:
            lane: classify
            signal: "$input.signal"
            operator_context: "$input.operator_context"
        - id: docs
          skill: ./graph/ops-lane
          inputs:
            lane: sourcey
            signal: "$input.signal"
            operator_context: "$input.operator_context"
        - id: release
          skill: ./graph/ops-lane
          inputs:
            lane: release.prepare
            signal: "$input.signal"
            operator_context: "$input.operator_context"
        - id: issue
          skill: ./graph/ops-lane
          inputs:
            lane: issue-to-pr
            signal: "$input.signal"
            operator_context: "$input.operator_context"
        - id: send
          skill: ./graph/ops-lane
          inputs:
            lane: outreach.plan
            signal: "$input.signal"
            operator_context: "$input.operator_context"
        - id: spend
          skill: ./graph/ops-lane
          inputs:
            lane: spend.quote
            signal: "$input.signal"
            operator_context: "$input.operator_context"
        - id: audit
          skill: ./graph/ops-lane
          inputs:
            lane: receipt-audit
            signal: "$input.signal"
            operator_context: "$input.operator_context"

  route_and_append:
    type: graph
    inputs:
      data_source_ref:
        type: string
        required: true
        description: Logical data source used to persist the routed signal packet.
      resource:
        type: string
        required: true
        description: Declared event resource for business operations route events.
      aggregate_id:
        type: string
        required: true
        description: Business operation stream key.
      expected_version:
        type: number
        required: true
        description: Current stream version required before append.
      idempotency_key:
        type: string
        required: true
        description: Stable retry key for this routed signal.
      signal:
        type: string
        required: true
        description: Business signal to triage.
      operator_context:
        type: string
        required: false
        description: Optional product policy, topology, audience constraints, or provider state. Context only, not authority.
    graph:
      name: business-ops-route-and-append
      steps:
        - id: classify
          skill: ./graph/ops-lane
          inputs:
            lane: classify
            signal: "$input.signal"
            operator_context: "$input.operator_context"
        - id: persist-route
          skill: ../data-store
          runner: append_event
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
            expected_version: "$input.expected_version"
            idempotency_key: "$input.idempotency_key"
          context:
            event: classify.lane_packet.data
        - id: readback
          skill: ../data-store
          runner: read_projection
          inputs:
            data_source_ref: "$input.data_source_ref"
            resource: "$input.resource"
            aggregate_id: "$input.aggregate_id"
