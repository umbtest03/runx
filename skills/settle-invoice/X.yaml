skill: settle-invoice
version: "0.1.4"

catalog:
  kind: skill
  audience: public
  visibility: public
  role: canonical
  execution: plan
  completion: plan
  requires_adapter: false
  approval: required

runners:
  settle-invoice:
    default: true
    type: agent-task
    agent: operator
    task: settle-invoice
    outputs:
      payment_plan: object
    artifacts:
      wrap_as: payment_plan_packet
    inputs:
      invoice_ref:
        type: string
        required: true
        description: "Reference for the invoice being settled."
      amount:
        type: number
        required: true
        description: "Settlement amount for the invoice."
      currency:
        type: string
        required: true
        description: "Settlement currency for the invoice."
      payee:
        type: json
        required: true
        description: "Payee name and account by reference or digest; a raw account number is reduced to a digest and the raw value is dropped."
      requested_scope:
        type: object
        required: true
        description: "Requested authority ceiling (AttenuationRequest) the settlement is authorized against; the same typed ceiling the spend/refund accepting runners narrow from. An amount over this ceiling forces an over_budget decision. The downstream spend lane reserves and mints against this exact ceiling, so the plan can never widen authority beyond it."
      rail:
        type: string
        required: false
        description: "Settlement rail to use, for example ach, wire, or a configured rail profile reference."
