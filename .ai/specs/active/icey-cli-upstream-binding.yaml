        command: "pnpm exec vitest run tests/upstream-registry-binding.test.ts"
        expected: "3 tests pass"
        result:
          status: "pass"
          timestamp: "2026-04-16T01:33:52Z"
          output: "tests/upstream-registry-binding.test.ts passed"
    status: "completed"

  - id: "phase2"
    name: "Materialize registry artifact"
    objective: "Build a reproducible registry package from upstream SKILL.md and local X.yaml."
    dependencies:
      - "phase1"
    changes:
      - file: "scripts/materialize-upstream-skill-binding.mjs"
        action: "create"
        lines: "all"
        content_spec: "Fetch or read upstream SKILL.md, verify git blob sha, write package files, and optionally publish locally."
      - file: "schemas/registry-binding.schema.json"
        action: "create"
        lines: "all"
        content_spec: "Machine-readable schema for runx upstream registry bindings."
    acceptance_criteria:
      - id: "ac2_1"
        type: "integration"
        description: "Materializer fetches pinned upstream skill and writes package"
        command: "node scripts/materialize-upstream-skill-binding.mjs bindings/nilstate/icey-server-operator/registry-binding.json --output-dir dist/upstream-bindings/nilstate/icey-server-operator"
        expected: "Materialized package reports upstream blob sha a1e1de7b5ea8b32c164d61fecc3c7ae4401b4c97"
        result:
          status: "pass"
          timestamp: "2026-04-16T01:33:30Z"
          output: "status materialized; skill_id nilstate/icey-server-operator"
      - id: "ac2_2"
        type: "integration"
        description: "Materialized package publishes to local registry and harness passes"
        command: "tmp=$(mktemp -d) && node scripts/materialize-upstream-skill-binding.mjs bindings/nilstate/icey-server-operator/registry-binding.json --output-dir dist/upstream-bindings/nilstate/icey-server-operator --registry-dir \"$tmp/registry\""
        expected: "publish.status published; harness.status passed"
        result:
          status: "pass"
          timestamp: "2026-04-16T01:35:03Z"
          output: "published nilstate/icey-server-operator@upstream-ee9aa1c with 2 harness cases"
    status: "completed"

  - id: "phase3"
    name: "Complete registry metadata"
    objective: "Expose X.yaml tags in registry rows so upstream bindings are searchable without modifying upstream SKILL.md."
    dependencies:
      - "phase1"
    changes:
      - file: "packages/registry/src/ingest.ts"
        action: "update"
        lines: "all"
        content_spec: "Merge runner runx.tags with portable SKILL.md runx tags when building registry records."
      - file: "packages/registry/src/index.test.ts"
        action: "update"
        lines: "all"
        content_spec: "Add coverage for runner-level tags flowing into registry versions."
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "Registry ingest extracts runner tags"
        command: "pnpm exec vitest run packages/registry/src/index.test.ts"
        expected: "registry package tests pass"
        result:
          status: "pass"
          timestamp: "2026-04-16T01:35:00Z"
          output: "packages/registry/src/index.test.ts passed"
    status: "completed"

