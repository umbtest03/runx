  - id: "phase1"
    name: "Declare upstream binding"
    objective: "Pin the upstream icey-cli SKILL.md and add runx-owned X.yaml metadata."
    changes:
      - file: "bindings/nilstate/icey-server-operator/registry-binding.json"
        action: "create"
        lines: "all"
        content_spec: "Upstream repo/path/commit/blob, trust tier, harness status, proof links, and publication pending state."
      - file: "bindings/nilstate/icey-server-operator/X.yaml"
        action: "create"
        lines: "all"
        content_spec: "Default operator-plan runner with two harness cases for web smoke and release pin preservation."
      - file: "bindings/README.md"
        action: "create"
        lines: "all"
        content_spec: "Explain upstream source-of-truth and generated registry artifact boundary."
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
