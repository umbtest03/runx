status: "completed"

task:
  title: "Bind merged icey-cli SKILL.md into runx registry"
  summary: >
    nilstate/icey-cli accepted the upstream portable SKILL.md. Add the runx-owned
    registry binding layer that pins the upstream source, supplies X.yaml runner
    metadata and harness cases, and materializes a reproducible registry package
    without treating a copied SKILL.md as source of truth.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "packages/registry"
      - "packages/harness"
      - "bindings"
      - "scripts"
    files_impacted:
      - path: "bindings/nilstate/icey-server-operator/registry-binding.json"
        lines: "all"
        reason: "Pinned upstream source, trust tier, harness state, and publication metadata"
      - path: "bindings/nilstate/icey-server-operator/X.yaml"
        lines: "all"
        reason: "runx-owned runner metadata and harness cases for the upstream skill"
      - path: "scripts/materialize-upstream-skill-binding.mjs"
        lines: "all"
        reason: "Materialize upstream SKILL.md plus local X.yaml into a registry package"
      - path: "packages/registry/src/ingest.ts"
        lines: "all"
        reason: "Carry runner tags from X.yaml into registry rows"
      - path: "tests/upstream-registry-binding.test.ts"
        lines: "all"
        reason: "Binding, harness, and materialization coverage"
    invariants:
      - "Upstream SKILL.md remains source of truth"
      - "runx execution metadata stays outside upstream repos"
      - "Registry artifacts are reproducible from pinned commit/blob"
    related_docs:
      - "bindings/README.md"
      - "../docs/skill-learning-contribution-spec.md"
  objectives:
    - "Represent nilstate/icey-cli as an upstream-owned registry binding"
    - "Add harnessed X.yaml metadata without modifying upstream"
    - "Materialize and locally publish the binding from the pinned upstream blob"
    - "Propagate X.yaml tags to registry search metadata"
  scope:
    in_scope:
      - "runx/oss binding files, materializer script, registry metadata extraction, and tests"
    out_of_scope:
      - "Hosted registry remote publish without RUNX_HOSTED_REGISTRY_PUBLISH_TOKEN"
      - "Changing nilstate/icey-cli after merge"
      - "Implementing generic runx add github:owner/repo resolution"
  dependencies:
    - "nilstate/icey-cli PR #2 merged at ee9aa1cc05055c2490537e762c81c9f28451f578"
  assumptions:
    - "The upstream SKILL.md blob sha a1e1de7b5ea8b32c164d61fecc3c7ae4401b4c97 is immutable for the pinned commit"
    - "Registry publish stores a pinned copy as an immutable artifact while preserving upstream provenance"
  touchpoints:
    - area: "bindings"
      description: "New upstream-owned binding contract and X.yaml harness"
    - area: "registry ingest"
      description: "Runner-level runx.tags become registry search tags"
    - area: "materialization"
      description: "Script fetches or reads the upstream SKILL.md, verifies blob sha, writes a package, and optionally publishes locally"
  risks:
    - description: "A registry package could be mistaken as the source SKILL.md"
      impact: "medium"
      mitigation: "Binding JSON marks upstream.source_of_truth=true and materialized_package_is_registry_artifact=true"
    - description: "Hosted publish cannot complete without registry publish token"
      impact: "medium"
      mitigation: "Local publish dogfood is complete; remote publication remains explicit pending state"
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "Binding pins upstream repo/path/commit/blob and PR proof"
        status: "done"
        checked_at: "2026-04-16T01:35:44Z"
      - id: "dod2"
        description: "X.yaml declares a default runner and two passing harness cases"
        status: "done"
        checked_at: "2026-04-16T01:35:44Z"
      - id: "dod3"
        description: "Materializer verifies blob sha and writes SKILL.md, X.yaml, binding, and materialization report"
        status: "done"
        checked_at: "2026-04-16T01:35:44Z"
      - id: "dod4"
        description: "Local registry publish succeeds from the materialized package"
        status: "done"
        checked_at: "2026-04-16T01:35:44Z"
    validation:
      - id: "v1"
        type: "test"
        description: "Binding and registry tests pass"
        command: "pnpm exec vitest run tests/upstream-registry-binding.test.ts packages/registry/src/index.test.ts"
        expected: "2 files, 6 tests pass"
      - id: "v2"
        type: "integration"
        description: "Materialize and publish binding to a temporary local registry"
        command: "tmp=$(mktemp -d) && node scripts/materialize-upstream-skill-binding.mjs bindings/nilstate/icey-server-operator/registry-binding.json --output-dir dist/upstream-bindings/nilstate/icey-server-operator --registry-dir \"$tmp/registry\""
        expected: "publish.status is published and harness.status is passed"
      - id: "v3"
        type: "boundary"
        description: "No upstream SKILL.md copy is committed under bindings"
        command: "! rg -n \"# icey-server Operator Workflow\" bindings"
        expected: "No match under tracked binding files"
  notes: >
    The binding is ready for hosted publication once a registry publish token is
    available. Until then, state is harness_verified with publication pending.

