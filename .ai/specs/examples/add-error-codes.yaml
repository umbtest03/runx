spec_version: "1.1"
task_id: "add-error-codes"
created: "2026-02-18T09:15:00Z"
updated: "2026-02-18T14:42:00Z"
status: "completed"

task:
  title: "Add typed error codes to document processing module"
  summary: >
    The document processor uses unstructured string errors, making it difficult for
    callers to programmatically handle failures. Introduce a typed error code enum
    and structured error class so consumers can match on specific failure modes.
  size: "small"
  risk_level: "medium"
  context:
    packages:
      - "src/services/documents"
      - "src/errors"
    files_impacted:
      - path: "src/errors/codes.ts"
        lines: "all"
        reason: "New file defining DocumentErrorCode enum and error map"
      - path: "src/errors/document-error.ts"
        lines: "all"
        reason: "New DocumentProcessingError class using typed codes"
      - path: "src/services/documents/processor.ts"
        lines: "45-120"
        reason: "Replace string throws with DocumentProcessingError instances"
      - path: "src/services/documents/processor.test.ts"
        lines: "all"
        reason: "Update assertions to check error codes instead of message strings"
    invariants:
      - "domain_boundaries"
      - "error_envelope"
    related_docs:
      - "docs/error-handling.md"
      - "docs/architecture/service-layer.md"
  objectives:
    - "Define a DocumentErrorCode enum covering all known failure modes"
    - "Create a structured error class that carries code, message, and context"
    - "Migrate processor.ts from string throws to typed errors"
  scope:
    in_scope:
      - "Document processor error paths"
      - "Unit tests for error scenarios"
    out_of_scope:
      - "Other service modules (auth, billing)"
      - "HTTP error response mapping (handled by controller layer)"
      - "Error monitoring/alerting integration"
  dependencies:
    - "No external dependencies required"
  assumptions:
    - "Existing error helper utilities in src/errors/ are compatible with subclassing"
    - "No downstream consumers rely on exact error message strings for control flow"
  touchpoints:
    - area: "src/errors"
      description: "New error code enum and DocumentProcessingError class"
      owners:
        - "backend-team"
      links:
        - "https://internal.wiki/error-handling-standards"
    - area: "src/services/documents/processor.ts"
      description: "Replace raw throws with typed error instances"
      owners:
        - "documents-team"
    - area: "src/services/documents/processor.test.ts"
      description: "Update test assertions to verify error codes"
      links:
        - "https://internal.wiki/testing-conventions"
  risks:
    - description: "Downstream callers may catch generic Error and miss new type"
      impact: "low"
      mitigation: "DocumentProcessingError extends Error, so existing catch blocks still work"
    - description: "Incomplete coverage of error paths in processor.ts"
      impact: "medium"
      mitigation: "Grep for all throw statements before and after migration to ensure full coverage"
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "DocumentErrorCode enum covers all processor failure modes"
        status: "done"
        checked_at: "2026-02-18T13:20:00Z"
        notes: "8 error codes identified matching 8 throw sites in processor.ts"
      - id: "dod2"
        description: "All throw statements in processor.ts use DocumentProcessingError"
        status: "done"
        checked_at: "2026-02-18T14:05:00Z"
        notes: "Verified via grep: 0 raw Error throws remain"
      - id: "dod3"
        description: "Tests assert on error codes, not message strings"
        status: "done"
        checked_at: "2026-02-18T14:30:00Z"
      - id: "dod4"
        description: "No regressions in existing test suite"
        status: "done"
        checked_at: "2026-02-18T14:35:00Z"
        notes: "Full suite: 142 passed, 0 failed"
    validation:
      - id: "v1"
        type: "compile"
        description: "Project compiles with no type errors"
        command: "npm run build"
        expected: "Exit code 0, no type errors"
      - id: "v2"
        type: "test"
        description: "All unit tests pass including updated error assertions"
        command: "npm test -- --filter documents"
        expected: "All tests pass"
      - id: "v3"
        type: "boundary"
        description: "No throw of raw Error or string in processor.ts"
        command: "rg 'throw new Error\\|throw \"' src/services/documents/processor.ts"
        expected: "No matches found"
      - id: "v4"
        type: "security"
        description: "No hardcoded secrets in changed files"
        command: "rg -i '(password|secret|api[_-]?key)\\s*=\\s*[\"'']\\w' src/errors/ src/services/documents/"
        expected: "No matches found"
  constraints:
    approvals_required:
      - "error_envelope"
    non_goals:
      - "Refactoring the processor's happy path logic"
      - "Adding error codes to other modules"
  info_sources:
    - "docs/error-handling.md"
    - "https://internal.wiki/error-handling-standards"
    - "src/errors/base-error.ts (existing base class)"
  notes: >
    Chose a flat enum over a class hierarchy to keep things simple. The error code
    enum can be extended later when other modules adopt the same pattern. Considered
    using numeric codes but string enums are more readable in logs and debuggers.

planning_log:
  - timestamp: "2026-02-18T09:15:00Z"
    actor: "agent"
    summary: "Identified processor.ts as primary target. Found 8 throw statements using raw strings."
    notes: "Searched with: rg 'throw new Error' src/services/documents/"
  - timestamp: "2026-02-18T09:40:00Z"
    actor: "agent"
    summary: "Confirmed src/errors/ has base helpers. Proposed enum + error class approach."
    notes: "BaseError class exists at src/errors/base-error.ts with code property pattern"
  - timestamp: "2026-02-18T10:05:00Z"
    actor: "user"
    summary: "User confirmed no schema changes needed. No downstream string matching on error messages."
  - timestamp: "2026-02-18T10:30:00Z"
    actor: "agent"
    summary: "Locked three-phase plan: define codes, migrate processor, update tests. Spec ready for review."
    notes: "Moved from two-phase to three-phase after realizing test updates are substantial enough to warrant isolation"

phases:
  - id: "phase1"
    name: "Define error codes and error class"
    objective: "Create the DocumentErrorCode enum and DocumentProcessingError class in src/errors/"
    changes:
      - file: "src/errors/codes.ts"
        action: "create"
        lines: "all"
        content_spec: |
          Export a DocumentErrorCode string enum with values:
          INVALID_FORMAT, PARSE_FAILED, SIZE_EXCEEDED, ENCODING_UNSUPPORTED,
          PERMISSION_DENIED, STORAGE_UNAVAILABLE, TEMPLATE_MISSING, TIMEOUT.
          Each value should be a SCREAMING_SNAKE string matching the enum key.
      - file: "src/errors/document-error.ts"
        action: "create"
        lines: "all"
        content_spec: |
          Export DocumentProcessingError extending Error.
          Constructor accepts (code: DocumentErrorCode, message: string, context?: Record<string, unknown>).
          Exposes readonly code, context properties. Sets name to 'DocumentProcessingError'.
          Re-export DocumentErrorCode for convenience.
    acceptance_criteria:
      - id: "ac1_1"
        type: "compile"
        description: "New files compile without errors"
        command: "npx tsc --noEmit src/errors/codes.ts src/errors/document-error.ts"
        expected: "Exit code 0"
        validation: "automated"
        result:
          status: "pass"
          timestamp: "2026-02-18T11:45:00Z"
          output: "tsc completed with exit code 0"
          notes: "Clean compile, no warnings"
      - id: "ac1_2"
        type: "test"
        description: "Error class instantiation works correctly"
        command: "npm test -- --filter document-error"
        expected: "Error instances carry correct code and extend Error"
        validation: "automated"
        result:
          status: "pass"
          timestamp: "2026-02-18T11:50:00Z"
          output: "2 tests passed"
      - id: "ac1_3"
        type: "documentation"
        description: "Error codes are documented in docs/error-handling.md"
        validation: "manual"
        result:
          status: "pass"
          timestamp: "2026-02-18T12:00:00Z"
          notes: "Added table of error codes with descriptions to error-handling.md"
    status: "completed"

  - id: "phase2"
    name: "Migrate processor error paths"
    objective: "Replace all raw throws in processor.ts with DocumentProcessingError using appropriate codes"
    dependencies:
      - "phase1"
    changes:
      - file: "src/services/documents/processor.ts"
        action: "update"
        lines: "45-120"
        content_spec: |
          Import DocumentProcessingError and DocumentErrorCode from src/errors.
          Replace each `throw new Error("...")` with the appropriate
          `throw new DocumentProcessingError(DocumentErrorCode.X, message, { context })`.
          Map each existing error string to the matching enum value:
          - "Invalid document format" -> INVALID_FORMAT
          - "Failed to parse document" -> PARSE_FAILED
          - "Document exceeds size limit" -> SIZE_EXCEEDED
          - "Unsupported encoding" -> ENCODING_UNSUPPORTED
          - "Permission denied" -> PERMISSION_DENIED
          - "Storage service unavailable" -> STORAGE_UNAVAILABLE
          - "Template not found" -> TEMPLATE_MISSING
          - "Processing timeout" -> TIMEOUT
      - file: "src/errors/index.ts"
        action: "update"
        lines: "1-10"
        content_spec: |
          Add re-exports for DocumentErrorCode and DocumentProcessingError
          so they can be imported from 'src/errors' directly.
    acceptance_criteria:
      - id: "ac2_1"
        type: "boundary"
        description: "No raw Error throws remain in processor.ts"
        command: "rg -c 'throw new Error' src/services/documents/processor.ts"
        expected: "No matches (exit code 1)"
        validation: "automated"
        result:
          status: "pass"
          timestamp: "2026-02-18T13:15:00Z"
          output: "exit code 1 - no matches"
          notes: "All 8 throw sites migrated"
      - id: "ac2_2"
        type: "compile"
        description: "Processor compiles with new error imports"
        command: "npx tsc --noEmit src/services/documents/processor.ts"
        expected: "Exit code 0"
        validation: "automated"
        result:
          status: "pass"
          timestamp: "2026-02-18T13:18:00Z"
          output: "tsc completed with exit code 0"
      - id: "ac2_3"
        type: "security"
        description: "No hardcoded secrets introduced"
        command: "rg -i '(password|secret|api[_-]?key)\\s*=\\s*[\"'']\\w' src/services/documents/processor.ts"
        expected: "No matches"
        validation: "automated"
        result:
          status: "pass"
          timestamp: "2026-02-18T13:20:00Z"
          output: "No matches found"
    status: "completed"

  - id: "phase3"
    name: "Update tests to assert on error codes"
    objective: "Migrate test assertions from message matching to code matching and add coverage for each error code"
    dependencies:
      - "phase2"
    changes:
      - file: "src/services/documents/processor.test.ts"
        action: "update"
        lines: "all"
        content_spec: |
          Import DocumentErrorCode and DocumentProcessingError.
          For each error-path test:
          - Replace `.toThrow("message")` with a catch block that asserts
            `error instanceof DocumentProcessingError` and
            `error.code === DocumentErrorCode.X`.
          - Verify error.context contains expected metadata where applicable.
          - Add one new test per error code to confirm the correct code is thrown
            for each failure scenario.
      - file: "src/errors/document-error.test.ts"
        action: "update"
        lines: "all"
        content_spec: |
          Add tests for edge cases: missing context, serialization,
          instanceof checks, and name property.
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "All processor tests pass with code-based assertions"
        command: "npm test -- --filter documents"
        expected: "All tests pass, 0 failures"
        validation: "automated"
        result:
          status: "pass"
          timestamp: "2026-02-18T14:28:00Z"
          output: "18 tests passed, 0 failed"
          notes: "Added 8 new tests (one per error code), updated 6 existing tests"
      - id: "ac3_2"
        type: "test"
        description: "Full test suite passes with no regressions"
        command: "npm test"
        expected: "Exit code 0"
        validation: "automated"
        result:
          status: "pass"
          timestamp: "2026-02-18T14:35:00Z"
          output: "142 tests passed, 0 failed, 0 skipped"
      - id: "ac3_3"
        type: "integration"
        description: "Document upload endpoint returns structured error on invalid input"
        command: "npm run test:integration -- --filter document-upload"
        expected: "Exit code 0"
        validation: "automated"
        result:
          status: "pass"
          timestamp: "2026-02-18T14:38:00Z"
          output: "3 integration tests passed"
      - id: "ac3_4"
        type: "custom"
        description: "Error code coverage matches throw site count"
        validation: "manual"
        result:
          status: "pass"
          timestamp: "2026-02-18T14:40:00Z"
          notes: "8 error codes defined, 8 throw sites migrated, 8 dedicated test cases added - 1:1:1 coverage"
    status: "completed"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- src/errors/codes.ts src/errors/document-error.ts"
    phase2: "git checkout HEAD -- src/services/documents/processor.ts src/errors/index.ts"
    phase3: "git checkout HEAD -- src/services/documents/processor.test.ts src/errors/document-error.test.ts"

self_eval:
  completeness: 3
  architecture_fidelity: 3
  spec_alignment: 2
  validation_depth: 2
  total: 10
  notes: |
    All 8 error paths migrated with 1:1 enum coverage. Error class follows existing
    BaseError pattern in the codebase. Tests cover every error code individually plus
    integration test for the upload endpoint. No deviations from spec.
  second_pass_performed: false

deviations: []

