phases:
  - id: "phase1"
    name: "Durable GitHub App claim sessions"
    objective: "Capture URL-first app-install attempts without mixing pending state into successful repo bindings."
    changes:
      - file: "../cloud/packages/api/src/github-app-claim-model.ts"
        action: "create"
        content_spec: |
          Define GitHubAppClaimSessionRecord:
            request_id, state, owner?, name?, repo_url, repo_full_name,
            skill_id?, status pending_install|installed|verified|rejected|expired|error,
            installation_id?, app_account_login?, app_account_type?,
            version_snapshot, created_at, updated_at, expires_at, completed_at?,
            rejection_reason?.
          request_id/state are generated server-side with cryptographic entropy.
      - file: "../cloud/packages/api/src/github-app-claim-stores.ts"
        action: "create"
        content_spec: |
          Add file and in-memory stores with get, put, list,
          findByState, findByInstallationId, findActiveByRepo, and pruneExpired.
          File writes are atomic one-record-per-session JSON writes.
      - file: "../cloud/packages/api/src/self-publish-model.ts"
        action: "update"
        content_spec: |
          Add successful binding metadata only:
            github_app_claim_session_id?, github_app_installation_id?,
            github_app_account_login?, github_app_account_type?.
          Add `sync_disabled` status plus disabled timestamp/reason for app
          access removal without tombstoning still-visible listings.
          Do not add pending/rejected GitHub App statuses to SelfPublishEnrollmentRecord.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "GitHubAppClaimSessionStore round-trips pending, verified, rejected, expired, and error records."
      - id: "ac1_2"
        type: "boundary"
        description: "SelfPublishEnrollmentRecord has only successful GitHub App binding metadata, not pending app session fields."
    status: "completed"

  - id: "phase2"
    name: "GitHub App client and config"
    objective: "Use app installation authority without persisting short-lived installation tokens."
    dependencies:
      - "phase1"
    changes:
      - file: "../cloud/packages/api/src/server-config.ts"
        action: "update"
        content_spec: |
          Read RUNX_GITHUB_APP_ID, RUNX_GITHUB_APP_SLUG,
          RUNX_GITHUB_APP_PRIVATE_KEY or *_FILE, RUNX_GITHUB_APP_WEBHOOK_SECRET,
          RUNX_GITHUB_APP_CALLBACK_URL?, and RUNX_GITHUB_API_BASE_URL?.
          Require app id, slug, private key, and webhook secret when the app
          claim route is enabled.
      - file: "../cloud/packages/api/src/github-app-client.ts"
        action: "create"
        content_spec: |
          Export GitHubAppClient:
            buildInstallUrl({ state, repoFullName? })
            createAppJwt()
            createInstallationAccessToken(installationId)
            getInstallation(installationId)
            listInstallationRepos(installationId)
            installationHasRepo(installationId, repoFullName)
            verifyWebhookSignature(secret, rawBody, signature)
          Do not expose or persist installation access tokens outside runtime calls.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Install URL includes configured app slug and server state."
      - id: "ac2_2"
        type: "test"
        description: "Repo verification rejects installations that do not include the exact source repo."
      - id: "ac2_3"
        type: "test"
        description: "Webhook signature verification accepts valid X-Hub-Signature-256 and rejects invalid signatures."
    status: "completed"

  - id: "phase3"
    name: "GitHub App claim service"
    objective: "Start from URL/listing, finalize installation, promote verified listings, and write repo bindings."
    dependencies:
      - "phase1"
      - "phase2"
    changes:
      - file: "../cloud/packages/api/src/github-app-claim-service.ts"
        action: "create"
        content_spec: |
          start({ repo_url, owner?, name? }):
            - Normalize GitHub URL to repo_full_name and optional ref.
            - If owner/name is absent or listing is missing, call existing
              URL-publish indexing for the repo URL and choose the matching
              listing target when exactly one listing is produced.
            - Snapshot current versions for the target listing.
            - If the GitHub App is already installed on the exact repo,
              verify repo access and promote immediately without returning
              an install redirect.
            - Persist pending session before returning install_url.

          finalize({ request_id, state, installation_id, setup_action }):
            - Resolve by state/request_id and reject mismatch.
            - Expire stale sessions.
            - Verify setup_action is usable and installation includes repo_full_name.
            - Promote snapshot-matched community versions to verified while
              preserving verified and first_party.
            - Write/update SelfPublishEnrollment with GitHub App installation metadata.
            - Optionally run immediate self-publish reindex through installation authority.
            - Mark verified/rejected/error idempotently.
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "Start indexes a missing URL-published listing before returning an install URL."
      - id: "ac3_1b"
        type: "test"
        description: "Start fast-paths already-installed repos to verified without returning an install URL."
      - id: "ac3_2"
        type: "test"
        description: "Finalize promotes only snapshot-matched versions and writes installation metadata."
      - id: "ac3_3"
        type: "test"
        description: "Wrong repo, wrong state, expired session, and deleted/suspended installation paths reject without registry mutation."
      - id: "ac3_4"
        type: "test"
        description: "Finalize is idempotent if GitHub redirects or the browser retries."
    status: "completed"

  - id: "phase4"
    name: "Routes, OpenAPI, and web proxies"
    objective: "Expose the app claim lifecycle without breaking existing Nango claim sessions."
    dependencies:
      - "phase3"
    changes:
      - file: "../cloud/packages/api/src/claim-routes.ts"
        action: "update"
        content_spec: |
          Add:
            POST /v1/claim/github-app/sessions
            GET /v1/claim/github-app/sessions/:request_id
            POST /v1/claim/github-app/sessions/:request_id/finalize
          Keep /v1/claim/sessions Nango routes intact during migration.
      - file: "../cloud/packages/api/src/openapi-route-catalog.ts"
        action: "update"
        content_spec: "Add GitHub App claim route entries and examples."
      - file: "packages/contracts/src/openapi-public.ts"
        action: "update"
        content_spec: "Add public GitHub App claim request/status envelope schemas."
      - file: "../cloud/apps/web/src/pages/api/claim/github-app"
        action: "create"
        content_spec: "Proxy start/status/finalize requests if web continues to isolate browser clients from the API origin."
    acceptance_criteria:
      - id: "ac4_1"
        type: "test"
        description: "Route tests return 201 for start, terminal status for verified/rejected, and clear 409/404/503 envelopes."
      - id: "ac4_2"
        type: "test"
        description: "Existing Nango claim route tests still pass."
    status: "completed"

  - id: "phase5"
    name: "GitHub App webhooks for repo sync"
    objective: "Let successful app bindings drive future push/tag/delete updates."
    dependencies:
      - "phase3"
    changes:
      - file: "../cloud/packages/api/src/self-publish-routes.ts"
        action: "update"
        content_spec: |
          Add a GitHub App webhook route that reads X-GitHub-Event, verifies
          X-Hub-Signature-256 with RUNX_GITHUB_APP_WEBHOOK_SECRET, extracts
          installation.id and repository.full_name, and forwards normalized
          push/tag/delete/install-repository events to SelfPublishService.
      - file: "../cloud/packages/api/src/self-publish-service.ts"
        action: "update"
        content_spec: |
          Add handling for GitHub App installation metadata. Reindex only
          enrollments whose repo_full_name and installation_id match. Treat
          installation removed/suspended or repository access removed as
          sync_disabled, and tombstone only when the repository itself is
          deleted.
    acceptance_criteria:
      - id: "ac5_1"
        type: "test"
        description: "Push/tag webhooks reindex bound repos and preserve verified trust tier."
      - id: "ac5_2"
        type: "test"
        description: "Repository deleted tombstones the matching binding only; installation/repo access removal marks only the matching binding sync_disabled."
      - id: "ac5_3"
        type: "boundary"
        description: "Legacy shared-secret webhook route remains isolated from GitHub App webhook handling."
    status: "completed"

  - id: "phase6"
    name: "URL-first /x/claim UX"
    objective: "Make the primary user path paste URL -> install app -> verified/synced."
    dependencies:
      - "phase4"
    changes:
      - file: "../cloud/packages/ui/src/ClaimAction/ClaimAction.tsx"
        action: "update"
        content_spec: |
          Support repo_url input and owner/name prefill. On start, render the
          install_url returned by the API and navigate or open it. On callback,
          make exactly one finalize request. Pending state shows a manual retry
          button. Already-verified start responses render success immediately.
          No setInterval, recursive timeout, or long-poll request.
      - file: "../cloud/apps/web/src/pages/x/claim/index.astro"
        action: "update"
        content_spec: |
          Render a URL-first claim panel even without owner/name query params.
          Preserve existing owner/name links from /x/add by pre-populating the
          listing target and source repo if available.
    acceptance_criteria:
      - id: "ac6_1"
        type: "test"
        description: "/x/claim renders a single URL input when no target query params exist."
      - id: "ac6_2"
        type: "test"
        description: "Callback finalize runs once and then renders verified/rejected/pending_manual_retry."
      - id: "ac6_3"
        type: "boundary"
        description: "ClaimAction contains no polling loop."
        command: "cd ../cloud && ! rg -n 'setInterval|setTimeout|while \\(|/await' packages/ui/src/ClaimAction apps/web/src/pages/api/claim"
        expected: "exit code 0"
    status: "completed"

