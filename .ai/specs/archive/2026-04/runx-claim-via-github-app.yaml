task:
  title: "Claim via GitHub App: paste URL first, verify and sync second"
  summary: >
    The Nango claim flow proves repo permission and upgrades an existing
    URL-published listing, but it does not install repository webhooks. The
    follow-on GitHub App flow should make the clean path one input: paste a
    GitHub URL, ensure the listing exists at community tier, install or select
    the exact repo through the GitHub App, verify the installation has access
    to that repo, promote snapshot-matched listings to verified, and use
    GitHub App webhooks for future push/tag/delete sync. The browser must not
    long-poll and the backend must not persist installation access tokens.
  size: "large"
  risk_level: "high"
  context:
    packages:
      - "../cloud/packages/api"
      - "../cloud/packages/ui"
      - "../cloud/apps/web"
      - "packages/contracts"
    files_impacted:
      - path: "../cloud/packages/api/src/github-app-claim-model.ts"
        lines: "all"
        reason: "Durable state for GitHub App claim/install sessions."
      - path: "../cloud/packages/api/src/github-app-client.ts"
        lines: "all"
        reason: "GitHub App JWT, installation token exchange, repo access verification, and webhook signature helpers."
      - path: "../cloud/packages/api/src/github-app-claim-service.ts"
        lines: "all"
        reason: "Orchestrates URL-first start, installation finalize, promotion, repo binding, and sync handoff."
      - path: "../cloud/packages/api/src/claim-routes.ts"
        lines: "all"
        reason: "Adds GitHub App claim session routes next to the existing Nango session routes."
      - path: "../cloud/packages/api/src/self-publish-routes.ts"
        lines: "webhook routes"
        reason: "Adds a GitHub App webhook route that verifies GitHub signatures and event types."
      - path: "../cloud/packages/api/src/self-publish-model.ts"
        lines: "SelfPublishEnrollmentRecord"
        reason: "Persists successful installation binding metadata, not pending install state."
      - path: "../cloud/packages/api/src/server-config.ts"
        lines: "GitHub App config"
        reason: "Reads app id, app slug, private key, webhook secret, and public callback URL settings."
      - path: "../cloud/packages/api/src/server.ts"
        lines: "service construction"
        reason: "Wires GitHub App client, claim service, stores, routes, and webhook handling."
      - path: "../cloud/packages/ui/src/ClaimAction"
        lines: "all"
        reason: "Replaces OAuth-first claim UI with URL/listing-first GitHub App claim flow."
      - path: "../cloud/apps/web/src/pages/x/claim/index.astro"
        lines: "all"
        reason: "Allows claim start from either a GitHub URL or existing owner/name query params."
      - path: "../cloud/apps/web/src/pages/api/claim"
        lines: "all"
        reason: "Adds web proxies for GitHub App start/finalize/status routes if the web app continues proxying API calls."
      - path: "packages/contracts/src/openapi-public.ts"
        lines: "claim schemas"
        reason: "Documents the public GitHub App claim route request/response envelopes."
    invariants:
      - "URL-publish stays anonymous and immediate; claim remains an optional trust upgrade."
      - "A GitHub App installation id is not proof by itself. The backend must verify the installation includes the exact source repo."
      - "Successful repo bindings live in SelfPublishEnrollmentStore. Pending, rejected, and expired install sessions do not."
      - "No raw GitHub OAuth token or GitHub App installation access token is persisted."
      - "Future sync is keyed by repo_full_name plus installation_id and never downgrades verified or first_party listings."
      - "Nango claim remains valid during migration; this spec adds a cleaner GitHub App path instead of breaking existing sessions."
      - "Nango/provider implementation details are never surfaced in browser code, package dependencies, public integration docs links, or frontend-visible URLs."
    related_docs:
      - ".ai/specs/approved/runx-claim-via-nango.yaml"
      - ".ai/specs/active/runx-url-as-publish.yaml"
      - "../cloud/packages/api/src/claim-service.ts"
      - "../cloud/packages/api/src/self-publish-service.ts"
      - "../cloud/apps/web/src/pages/x/claim/index.astro"
    cwd: "."
  objectives:
    - "Make claim start from a GitHub URL or existing listing target, with no OAuth prerequisite."
    - "Use GitHub App installation as the durable repo sync authority."
    - "Verify exact repo access before promotion or webhook binding."
    - "Promote only snapshot-matched community versions and preserve first_party/verified tiers."
    - "Replace manual/shared-secret GitHub webhook assumptions with GitHub App signed webhooks for claimed repos."
    - "Keep Nango claim routes and data compatible until the UI switch is explicitly complete."
  scope:
    in_scope:
      - "GitHub App claim session model, store, routes, service, and tests."
      - "GitHub App client for JWT signing, installation token exchange, installation repo verification, and webhook signature verification."
      - "URL-first /x/claim UX and one-shot finalize after GitHub redirects back with installation_id/setup_action/state."
      - "SelfPublishEnrollment metadata for successful GitHub App bindings."
      - "GitHub App webhook ingestion for push, create/tag, repository deleted, installation suspended/deleted, and installation_repositories changes."
      - "OpenAPI public schemas for the GitHub App claim route family."
    out_of_scope:
      - "Private repository indexing."
      - "Claim dispute/revocation UI beyond automatic installation removal/suspension handling."
      - "Replacing Nango principal-bound connect flows."
      - "Multi-repo bulk install onboarding."
      - "Hosted operator moderation dashboards."
  decisions:
    - "Use a separate GitHubAppClaimSessionStore instead of forcing GitHub App sessions into Nango-specific ClaimSessionRecord fields."
    - "Build the install URL with a server-generated `state`/request_id and configured app slug; never trust a browser-supplied installation_id without matching a pending session."
    - "The start route accepts `repo_url` and optional owner/name. If the listing is missing, it runs the existing URL-publish/index path first and returns the resulting listing target plus install URL."
    - "Finalize is one-shot. The browser calls finalize once after GitHub redirects back. Pending responses show a manual retry button, not polling."
    - "Installation access tokens are short-lived runtime credentials. They may be used to verify repo access and sync immediately, but are never written to session or enrollment records."
    - "The successful enrollment stores installation_id, app_account_login, app_account_type, repo_full_name, active listing id/version, and claim session id."
    - "GitHub App webhooks use GitHub's X-Hub-Signature-256 with a distinct app webhook secret. Do not reuse the Nango webhook secret or legacy self-publish shared secret."
    - "If the GitHub App is already installed on the exact repo, start may verify and promote immediately instead of redirecting the user through another install screen."
    - "Installation removal, suspension, or repo-access removal disables sync for the matching binding; only repository deletion tombstones registry versions."
    - "Keep raw provider docs/logo metadata internally, but strip vendor-hosted docs links from public payloads and serve vendor-hosted logos through runx-owned URLs."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "POST /v1/claim/github-app/sessions accepts a GitHub repo URL, ensures a community listing exists when possible, persists a pending app claim session, and returns install_url plus request_id."
        status: "done"
      - id: "dod2"
        description: "Finalize rejects missing, mismatched, expired, or wrong-repo installation callbacks without promoting registry records."
        status: "done"
      - id: "dod3"
        description: "Finalize verifies the installation includes the exact listing source repo, promotes snapshot-matched versions to verified, and writes a successful SelfPublishEnrollment binding with installation metadata."
        status: "done"
      - id: "dod4"
        description: "GitHub App webhooks reindex push/tag events for bound repos and tombstone repository.deleted or installation removal events."
        status: "done"
      - id: "dod5"
        description: "/x/claim supports a single GitHub URL input and existing owner/name links, then performs exactly one finalize request after the GitHub install callback."
        status: "done"
      - id: "dod6"
        description: "No code path stores raw GitHub OAuth tokens or GitHub App installation access tokens."
        status: "done"
      - id: "dod7"
        description: "Frontend packages and web routes contain no Nango references; public integration logos resolve through runx-owned URLs, and vendor docs links are not exposed."
        status: "done"
    validation:
      - id: "v1"
        type: "test"
        description: "GitHub App claim service tests cover URL-first start, finalize success, wrong installation, wrong repo, expiry, idempotency, and no-downgrade behavior."
        command: "cd ../cloud && pnpm exec vitest run packages/api/src/github-app-claim-service.test.ts"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "GitHub App client tests cover JWT signing seam, installation token exchange, repo selection verification, and webhook signature verification."
        command: "cd ../cloud && pnpm exec vitest run packages/api/src/github-app-client.test.ts"
        expected: "exit code 0"
      - id: "v3"
        type: "test"
        description: "Route tests cover start/status/finalize envelopes and GitHub App webhook event handling."
        command: "cd ../cloud && pnpm exec vitest run packages/api/src/claim-routes.test.ts packages/api/src/self-publish-routes.test.ts"
        expected: "exit code 0"
      - id: "v4"
        type: "test"
        description: "Claim UI tests cover URL input, install redirect, callback finalize, terminal states, and no polling loops."
        command: "cd ../cloud && pnpm exec vitest run packages/ui/src/ClaimAction/ClaimAction.test.tsx"
        expected: "exit code 0"
      - id: "v5"
        type: "boundary"
        description: "No persisted token fields are introduced in claim or enrollment models."
        command: "cd ../cloud && rg -n 'access_token|installation_token|github_token|Authorization.*github' packages/api/src/*claim* packages/api/src/self-publish-model.ts packages/api/src/github-app-client.ts"
        expected: "Only runtime HTTP client/header code in github-app-client.ts may match."
      - id: "v6"
        type: "compile"
        description: "Cloud and OSS builds stay green after public schema changes."
        command: "cd ../cloud && pnpm build && cd ../oss && pnpm build"
        expected: "exit code 0"
      - id: "v7"
        type: "boundary"
        description: "Frontend code and package metadata do not mention Nango."
        command: "cd ../cloud && ! rg -n 'Nango|nango|@nangohq' apps/web packages/ui"
        expected: "exit code 0"

