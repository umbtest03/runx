    phase2: "git -C /home/kam/dev/runx/oss checkout HEAD -- packages/contracts/src/index.ts schemas scripts/generate-contract-schemas.ts"
    phase3: "git -C /home/kam/dev/runx/oss checkout HEAD -- packages/core/src/executor packages/core/src"

