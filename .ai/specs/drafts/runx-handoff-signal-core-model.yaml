created: "2026-04-24T02:15:00Z"
updated: "2026-04-26T11:38:00Z"
status: "completed"

task:
  title: "Harden the generic handoff signal model for post-boundary state"
  summary: >
    Runx already has generic transport and delivery primitives for external
    work: thread hydration, outbox packaging, explicit decisions, and boundary
    semantics. The generic handoff contracts and reducer now exist in core, but
    the draft still needs to describe the remaining hardening work accurately:
    keep the canonical nouns stable, verify generated schemas and reducer tests,
    and add any missing persistence/query/tool surfaces without letting
    Sourcey-specific names become platform vocabulary. The stable runx concept is
    an outward handoff crossing an explicit boundary and then receiving
    normalized response signals, reduced state, and suppression policy.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "packages/contracts"
      - "packages/core"
      - "skills"
      - "tools/thread"
    files_impacted:
      - path: "packages/contracts/src/index.ts"
        lines: "all"
        reason: "Canonical home for existing handoff signal, handoff state, and suppression contracts."
      - path: "packages/contracts/src/handoff-contracts.test.ts"
        lines: "all"
        reason: "Focused contract coverage for the generic handoff model."
      - path: "schemas/handoff-*.schema.json"
        lines: "all"
        reason: "Generated schema artifacts for the handoff contract family."
      - path: "packages/core/src/knowledge/index.ts"
        lines: "all"
        reason: "Generic knowledge/boundary helpers own validation and reduction, and should own persistence/query if added."
      - path: "packages/core/src/knowledge/*handoff*.test.ts"
        lines: "all"
        reason: "Focused knowledge-layer coverage for handoff state reduction."
      - path: "tools/thread/handoff_state"
        lines: "all"
        reason: "Neutral tool surface for reducing generic handoff signals and suppression state."
      - path: "tests/thread-handoff-state-tool.test.ts"
        lines: "all"
        reason: "Tool-level coverage for generic handoff state reduction."
      - path: "skills/draft-content/SKILL.md"
        lines: "all"
        reason: "Existing boundary terminology should stay aligned with the new handoff model."
      - path: "skills/issue-to-pr/SKILL.md"
        lines: "all"
        reason: "Issue-to-PR is the current thin wrapper around generic transport and delivery surfaces."
      - path: "../plans/sourcey-adoption-engine.md"
        lines: "all"
        reason: "Sourcey adoption planning currently names a docs-specific signal surface and should map to the generic model."
    invariants:
      - "Thread and outbox stay transport and delivery primitives, not domain posture models."
      - "Boundary terminology stays aligned with existing boundary_kind and boundary_state concepts."
      - "Observed response signals stay distinct from explicit suppression policy."
      - "Sourcey and other domain lanes map into generic handoff concepts instead of becoming the platform vocabulary."
    related_docs:
      - "../plans/sourcey-adoption-engine.md"
      - "../docs/skill-lab-contribution-spec.md"
      - "skills/draft-content/SKILL.md"
      - "packages/core/src/knowledge/index.ts"
      - "packages/contracts/src/index.ts"
    cwd: "."
  objectives:
    - "Lock the canonical runx nouns for post-handoff state."
    - "Verify immutable observed signals, reduced current state, and durable suppression policy stay separate in contracts and tests."
    - "Place any remaining generic persistence/query capability in knowledge, not in Sourcey-specific lanes or runner-local kernel code."
    - "Leave Sourcey, skill-upstream, and future outreach workflows as thin wrappers over the generic model."
  scope:
    in_scope:
      - "Canonical contracts for handoff_signal, handoff_state, and suppression_record."
      - "Knowledge-layer validation, reduction, and any needed persistence/query responsibilities for post-handoff state."
      - "Tool and skill naming rules for generic versus domain-specific wrappers."
      - "Mapping from Sourcey docs review/PR/outreach flows onto the generic model."
    out_of_scope:
      - "Crawler, ranking, scheduling, or portfolio-scale outreach automation."
      - "Hosted moderation UI or suppression dashboard implementation."
      - "Provider-specific polling infrastructure beyond the boundary contract shape."
  assumptions:
    - "Runx should continue treating explicit external handoff boundaries as first-class concepts."
    - "Sourcey is only the first strong consumer of the generic post-handoff model, not its owner."
    - "Email, GitHub, discussions, and future channels all need to fit the same response model."
  touchpoints:
    - area: "contracts"
      description: "Canonical contract ids, TypeBox schemas, generated artifacts, and runtime validation for generic post-handoff state."
      links:
        - "packages/contracts/src/index.ts"
    - area: "knowledge"
      description: "Generic boundary-state validation and reduction already live here; persistence/query extensions should stay here too."
      links:
        - "packages/core/src/knowledge/index.ts"
    - area: "boundary semantics"
      description: "Existing boundary_kind and boundary_state language in draft-content must remain coherent with the new model."
      links:
        - "skills/draft-content/SKILL.md"
        - "skills/draft-content/X.yaml"
    - area: "Sourcey adoption"
      description: "Sourcey docs PR and outreach lanes should consume the generic model instead of defining platform nouns."
      links:
        - "../plans/sourcey-adoption-engine.md"
    - area: "upstream handoff flows"
      description: "Issue-to-PR and future skill-upstream lanes should be able to reuse the same post-handoff primitives."
      links:
        - "skills/issue-to-pr/SKILL.md"
  risks:
    - description: "A docs-specific or maintainer-specific name could leak into core and become hard to unwind later."
      impact: "high"
      mitigation: "Freeze the canonical nouns before implementation and treat docs-specific names as wrappers only."
    - description: "Signals, decisions, and suppression rules could collapse into one object and muddy operator reasoning."
      impact: "high"
      mitigation: "Keep immutable observations, reduced state, and policy records as separate contracts."
    - description: "A thread-centric model could exclude email or other non-thread surfaces."
      impact: "medium"
      mitigation: "Anchor the core concept on outward handoff and boundary response, not on GitHub thread mechanics."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "Canonical runx nouns remain frozen as handoff_signal, handoff_state, and suppression_record."
      - id: "dod2"
        description: "The design and tests keep docs-signal and maintainer-signal as consumer-level names, not core contract names."
      - id: "dod3"
        description: "Contracts stay in packages/contracts; validation/reduction and any persistence/query helpers stay in packages/core knowledge."
      - id: "dod4"
        description: "The mapping from Sourcey docs PR/outreach flows to the generic model is explicit without adding Sourcey-specific core vocabulary."
    validation:
      - id: "v1"
        type: "test"
        description: "Focused handoff contract and reducer tests stay green."
        command: "pnpm exec vitest run packages/contracts/src/handoff-contracts.test.ts packages/core/src/knowledge/handoff-state.test.ts packages/core/src/knowledge/index.test.ts tests/thread-handoff-state-tool.test.ts"
        cwd: "."
        expected: "exit code 0"
      - id: "v2"
        type: "boundary"
        description: "Generated handoff schema artifacts stay in sync with contracts."
        command: "pnpm schemas:generate && git diff --exit-code packages/contracts/src schemas/handoff-signal.schema.json schemas/handoff-state.schema.json schemas/suppression-record.schema.json"
        cwd: "."
        expected: "exit code 0"
      - id: "v3"
        type: "documentation"
        description: "The spec leaves room for GitHub, email, and future channels under the same core model."
  notes: >
    Canonical nomenclature:

    - `thread`: hydrated provider conversation or work-item surface.
    - `outbox_entry`: outbound artifact proposed or published through that surface.
    - `boundary_state`: pre-send or handoff-semantics object describing who acts
      next at the boundary and what acknowledgement is expected.
    - `handoff_signal`: immutable normalized observation captured after an
      outward handoff crosses an explicit boundary.
    - `handoff_state`: reduced current posture for one handoff or target after
      signals and suppression are considered.
    - `suppression_record`: explicit durable no-contact or operator-block rule.

    Non-canonical names:

    - `docs-signal`: acceptable only as a Sourcey wrapper or lane label.
    - `maintainer_signal`: acceptable only as a consumer-facing explanation when
      the downstream actor really is an upstream maintainer.
    - `thread_signal`: rejected as the core term because email and other
      boundary surfaces must also fit.

planning_log:
  - timestamp: "2026-04-24T02:15:00Z"
    actor: "user"
    summary: "Asked whether docs-signal should be core and requested a proper future-proof design with correct nomenclature."
  - timestamp: "2026-04-24T02:15:00Z"
    actor: "agent"
    summary: "Chose handoff as the stable core concept, with signals and suppression layered on top of existing thread and outbox transport surfaces."
    notes: >
      The existing knowledge package already owns thread, outbox, and decision
      contracts. The missing layer is generic post-handoff state, not another
      Sourcey-specific workflow primitive.
  - timestamp: "2026-04-25T14:31:49Z"
    actor: "agent"
    summary: "Rebased the draft on current code, where handoff contracts, generated schema artifacts, reducer helpers, and focused tests already exist."
    notes: >
      The remaining work should harden and expose the existing generic model
      instead of adding a second docs-specific signal vocabulary.
  - timestamp: "2026-04-26T11:24:14Z"
    actor: "agent"
    summary: "Hardened generic knowledge helpers and added the neutral thread.handoff_state tool surface."
    notes: >
      Outbox control queries now avoid stateful regex behavior, outbox file
      materialization normalizes relative paths before reading, and the
      issue-to-pr skill text keeps post-handoff signal capture in the generic
      handoff model rather than in PR packaging.
  - timestamp: "2026-04-26T11:38:00Z"
    actor: "agent"
    summary: "Completed the Sourcey crossover by keeping generic execution surfaces in runx."
    notes: >
      Control outbox lookup now treats entry id patterns as legacy fallback
      selectors when structured control metadata exists, and the CLI package
      test locks the neutral thread.handoff_state tool into the shipped tool
      surface.

phases:
  - id: "phase1"
    name: "Audit canonical contracts and naming"
    objective: "Lock the existing generic nouns and generated artifacts before integration drift hardens."
    changes:
      - file: "packages/contracts/src/index.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Keep the existing canonical contract families named
          runx.handoff_signal.v1, runx.handoff_state.v1, and
          runx.suppression_record.v1. The handoff signal represents one
          immutable normalized observation after an outward handoff. The handoff
          state represents the reduced posture for a handoff or target after
          replaying signals and suppression. The suppression record remains a
          separate explicit policy object rather than a signal subtype.
      - file: "schemas/handoff-*.schema.json"
        action: "update"
        lines: "all"
        content_spec: >
          Keep generated handoff schema artifacts synchronized with
          packages/contracts. Do not hand-edit generated artifacts except through
          the schema generation path.
      - file: "packages/contracts/src/index.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Keep boundary_kind as the taxonomy hook for who or what sits on the
          far side of the boundary. Use handoff as the noun for the attempt
          crossing that boundary. Do not make docs, maintainer, PR, or thread
          part of the canonical contract name.
    acceptance_criteria:
      - id: "ac1_1"
        type: "test"
        description: "Focused handoff contract tests stay green."
        command: "pnpm exec vitest run packages/contracts/src/handoff-contracts.test.ts"
        cwd: "."
        expected: "exit code 0"
      - id: "ac1_2"
        type: "boundary"
        description: "Generated handoff schema artifacts stay synchronized with packages/contracts."
        command: "pnpm schemas:generate && git diff --exit-code packages/contracts/src schemas/handoff-signal.schema.json schemas/handoff-state.schema.json schemas/suppression-record.schema.json"
        cwd: "."
        expected: "exit code 0"
    status: "completed"

  - id: "phase2"
    name: "Harden knowledge reduction and persistence boundary"
    objective: "Keep generic post-handoff state beside thread and outbox knowledge instead of burying it in a product lane."
    dependencies:
      - "phase1"
    changes:
      - file: "packages/core/src/knowledge/index.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Keep reducer helpers generic and pure. If durable append/load/query
          helpers are added, place them here beside thread and outbox knowledge,
          validate all records through packages/contracts, and keep the reducer
          usable without a storage adapter.
      - file: "packages/core/src/knowledge/index.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Keep this out of runner-local orchestration code. This is boundary
          knowledge and reduction logic, not execution-kernel logic.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Knowledge-layer handoff reducer coverage stays green."
        command: "pnpm exec vitest run packages/core/src/knowledge/handoff-state.test.ts packages/core/src/knowledge/index.test.ts"
        cwd: "."
        expected: "exit code 0"
      - id: "ac2_2"
        type: "documentation"
        description: "The design keeps decisions, signals, and suppression as distinct concepts."
    status: "completed"

  - id: "phase3"
    name: "Expose generic tools and keep domain wrappers thin"
    objective: "Ensure product lanes consume the generic model instead of duplicating it."
    dependencies:
      - "phase2"
    changes:
      - file: "tools/thread"
        action: "update"
        lines: "all"
        content_spec: >
          Introduce or document generic post-handoff helpers under a neutral
          surface such as handoff or boundary, for example record signal, reduce
          state, and check suppression. Do not make docs or maintainer part of
          the generic tool namespace.
      - file: "tools/thread/handoff_state"
        action: "create"
        lines: "all"
        content_spec: >
          Provide a neutral thread.handoff_state tool that reduces generic
          handoff_signal records and suppression_record policy into a
          handoff_state, reports the active suppression record, and exposes the
          generic outbox-push and candidate-signal gates.
      - file: "../plans/sourcey-adoption-engine.md"
        action: "update"
        lines: "all"
        content_spec: >
          Reframe docs-signal as a Sourcey consumer of the generic handoff
          model. Sourcey may still expose docs-specific policy, but it should
          emit and consume the generic contracts.
      - file: "skills/issue-to-pr/SKILL.md"
        action: "update"
        lines: "all"
        content_spec: >
          Clarify that issue-to-pr owns packaging and push boundaries, while
          post-handoff signal capture is a separate generic concern that can be
          reused by Sourcey, skill-upstream, and future outreach lanes.
    acceptance_criteria:
      - id: "ac3_1"
        type: "documentation"
        description: "The design leaves Sourcey docs-signal as a thin wrapper name, not the platform primitive."
      - id: "ac3_2"
        type: "documentation"
        description: "The design allows future skill-upstream and outreach lanes to consume the same generic contracts."
    status: "completed"

