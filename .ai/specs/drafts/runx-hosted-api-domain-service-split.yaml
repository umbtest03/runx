spec_version: "1.1"
task_id: "runx-hosted-api-domain-service-split"
created: "2026-04-24T00:35:00Z"
updated: "2026-04-24T00:35:00Z"
status: "draft"

task:
  title: "Close residual hosted API domain-service cleanup"
  summary: >
    The hosted hot files have already been reduced to thin entrypoints. The
    remaining work is to lock in that shape, clean up any residual domain
    duplication, and make the structure hard to regress: route files should stay
    registrars over focused services, OpenAPI should stay assembled from helper
    modules, and public-site data/model/render responsibilities should remain
    separated.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "../cloud/packages/api"
      - "../cloud/apps/api"
      - "packages/cli"
      - "packages/core"
    files_impacted:
      - path: "../cloud/packages/api/src/index.ts"
        lines: "all"
        reason: "Keep the hosted app factory as top-level route wiring."
      - path: "../cloud/packages/api/src/*-routes.ts"
        lines: "all"
        reason: "Flat domain route registrars are the current hosted route shape."
      - path: "../cloud/packages/api/src/*-service.ts"
        lines: "all"
        reason: "Business logic should stay outside route registration."
      - path: "../cloud/packages/api/src/openapi*.ts"
        lines: "all"
        reason: "OpenAPI document assembly should stay split across helpers, schemas, and route catalog modules."
      - path: "../cloud/packages/api/src/public-site*.ts"
        lines: "all"
        reason: "Public-site loading, model shaping, page composition, and rendering should stay separated."
    invariants:
      - "Hosted API behavior stays stable."
      - "OpenAPI output shape stays stable."
      - "Public-site rendering stays deterministic and server-side."
  objectives:
    - "Preserve the current thin hosted entrypoints."
    - "Close residual duplicate behavior between routes and services."
    - "Keep OpenAPI generation and public-site rendering behind focused helper modules."
    - "Add structure checks that catch regression back toward hot files."
  scope:
    in_scope:
      - "Hosted route, service, OpenAPI, and public-site cleanup inside the current flat module layout."
      - "Structure validation that protects the current split."
      - "Swapping duplicate hosted behavior over to library code where available."
    out_of_scope:
      - "Changing public API contracts."
      - "Provider-integration rewrites beyond what modularization requires."
  dependencies:
    - "runx-verification-foundation-and-fast-lanes"
    - "runx-cli-kernel-final-split"
    - "runx-runner-local-facade-final-split"
  touchpoints:
    - area: "../cloud/packages/api/src/index.ts"
      description: "Hosted API registrar that should remain thin."
    - area: "../cloud/packages/api/src/openapi.ts"
      description: "Top-level OpenAPI document assembly over helper modules."
    - area: "../cloud/packages/api/src/public-site.ts"
      description: "Top-level public-site orchestration over data/model/render modules."
  risks:
    - description: "Cleanup across route/service boundaries can accidentally change auth or handler wiring."
      impact: "high"
      mitigation: "Keep fast hosted tests and targeted API route tests green after each cleanup slice."
    - description: "OpenAPI or public-site helper cleanup can drift document ordering, schema names, or rendered HTML."
      impact: "medium"
      mitigation: "Preserve the current document surface and keep existing API tests as the oracle."
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "packages/api/src/index.ts remains route registration only and stays at or below 150 lines."
      - id: "dod2"
        description: "packages/api/src/openapi.ts delegates to helper/schema/catalog modules and stays at or below 150 lines."
      - id: "dod3"
        description: "packages/api/src/public-site.ts delegates to public-site data/model/page/render modules and stays at or below 100 lines."
      - id: "dod4"
        description: "Hosted domains remain grouped in the current flat *-routes.ts and *-service.ts module style, with no duplicate routes/ or services/ tree introduced."
    validation:
      - id: "v1"
        type: "compile"
        description: "Cloud typecheck stays green."
        command: "pnpm typecheck"
        cwd: "../cloud"
        expected: "exit code 0"
      - id: "v2"
        type: "test"
        description: "Hosted fast lane stays green."
        command: "pnpm test:fast"
        cwd: "../cloud"
        expected: "exit code 0"
      - id: "v3"
        type: "boundary"
        description: "Hosted entrypoint files meet their final thin-entrypoint budgets."
        command: "test $(wc -l < packages/api/src/index.ts) -le 150 && test $(wc -l < packages/api/src/openapi.ts) -le 150 && test $(wc -l < packages/api/src/public-site.ts) -le 100"
        cwd: "../cloud"
        expected: "exit code 0"
      - id: "v4"
        type: "boundary"
        description: "Hosted code does not reintroduce duplicate routes/ or services/ trees beside the current flat modules."
        command: "test ! -d packages/api/src/routes && test ! -d packages/api/src/services"
        cwd: "../cloud"
        expected: "exit code 0"

planning_log:
  - timestamp: "2026-04-24T00:35:00Z"
    actor: "user"
    summary: "Asked for concrete execution specs for the remaining architectural work."
  - timestamp: "2026-04-24T00:35:00Z"
    actor: "agent"
    summary: "Scoped the hosted-side work to route-domain registrars, OpenAPI builders, and public-site service/render separation."
  - timestamp: "2026-04-25T14:31:49Z"
    actor: "agent"
    summary: "Rebased the draft on the current cloud state, where hosted API entrypoints are already thin and remaining work is regression-proof cleanup."

phases:
  - id: "phase1"
    name: "Codify current route registrar ownership"
    objective: "Keep the existing flat hosted route registrars focused on HTTP wiring over service functions."
    changes:
      - file: "../cloud/packages/api/src/index.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Keep this file as the hosted app factory and route-registration
          coordinator only. Do not move business logic back into the root
          entrypoint.
      - file: "../cloud/packages/api/src/*-routes.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Audit the existing flat domain route registrars and move any remaining
          reusable business behavior into service/helper modules.
      - file: "../cloud/packages/api/src/*-service.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Keep domain behavior reusable and testable outside HTTP registration.
    acceptance_criteria:
      - id: "ac1_1"
        type: "boundary"
        description: "Hosted API root stays thin after route cleanup."
        command: "test $(wc -l < packages/api/src/index.ts) -le 150"
        cwd: "../cloud"
        expected: "exit code 0"
      - id: "ac1_2"
        type: "boundary"
        description: "Cleanup keeps the current flat route/service module layout."
        command: "test ! -d packages/api/src/routes && test ! -d packages/api/src/services"
        cwd: "../cloud"
        expected: "exit code 0"
    status: "pending"

  - id: "phase2"
    name: "Consolidate OpenAPI builder ownership"
    objective: "Keep OpenAPI document assembly delegated to helper, schema, and route catalog modules."
    dependencies:
      - "phase1"
    changes:
      - file: "../cloud/packages/api/src/openapi.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Keep only top-level document assembly in this file. Route paths,
          schemas, and reusable response helpers should stay in the existing
          openapi-* modules.
      - file: "../cloud/packages/api/src/openapi-*.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Consolidate duplicated schema fragments, operation helpers, and route
          catalog entries without changing the emitted OpenAPI surface.
    acceptance_criteria:
      - id: "ac2_1"
        type: "test"
        description: "Hosted API tests that assert OpenAPI shape stay green."
        command: "pnpm exec vitest run packages/api/src/index.test.ts"
        cwd: "../cloud"
        expected: "exit code 0"
      - id: "ac2_2"
        type: "boundary"
        description: "OpenAPI root stays a thin document assembler."
        command: "test $(wc -l < packages/api/src/openapi.ts) -le 150"
        cwd: "../cloud"
        expected: "exit code 0"
    status: "pending"

  - id: "phase3"
    name: "Consolidate public-site model and render ownership"
    objective: "Keep public-site data shaping, page composition, and HTML rendering in focused modules."
    dependencies:
      - "phase2"
    changes:
      - file: "../cloud/packages/api/src/public-site.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Keep only top-level public-site orchestration in this file and leave
          data, model, pages, activity, and render responsibilities in focused
          public-site-* modules.
      - file: "../cloud/packages/api/src/public-site-*.ts"
        action: "update"
        lines: "all"
        content_spec: >
          Consolidate any remaining duplicated page-model, feed-shaping, or HTML
          rendering logic without changing server-rendered output.
    acceptance_criteria:
      - id: "ac3_1"
        type: "test"
        description: "Public-site and hosted boundary tests stay green."
        command: "pnpm exec vitest run tests/public-site-install-count.test.ts tests/workspace-boundary.test.ts"
        cwd: "../cloud"
        expected: "exit code 0"
      - id: "ac3_2"
        type: "boundary"
        description: "Hosted entrypoint files meet their final thin-entrypoint budgets."
        command: "test $(wc -l < packages/api/src/index.ts) -le 150 && test $(wc -l < packages/api/src/openapi.ts) -le 150 && test $(wc -l < packages/api/src/public-site.ts) -le 100"
        cwd: "../cloud"
        expected: "exit code 0"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git -C /home/kam/dev/runx/cloud checkout HEAD -- packages/api/src/index.ts 'packages/api/src/*-routes.ts' 'packages/api/src/*-service.ts'"
    phase2: "git -C /home/kam/dev/runx/cloud checkout HEAD -- packages/api/src/openapi.ts 'packages/api/src/openapi-*.ts'"
    phase3: "git -C /home/kam/dev/runx/cloud checkout HEAD -- packages/api/src/public-site.ts 'packages/api/src/public-site-*.ts'"

metadata:
  estimated_effort_hours: 8
  ai_model: "gpt-5"
  tags:
    - "cloud"
    - "api"
    - "openapi"
    - "public-site"
