[graph]
# Supply-chain policy must cover adapter feature flags as well as the default
# pure-kernel graph. Feature-gated runtime/network dependencies need the same
# reviewed exception path as default dependencies.
all-features = true

[bans]
multiple-versions = "allow"
# Default workspace ban for heavy async/network/application frameworks and
# deprecated YAML backends. Pure crates must never depend on these. Adapter or
# runtime-tier use requires a spec-reviewed, package-scoped exception before
# the crate is removed from this list.
deny = [
  { name = "async-std", reason = "No async runtime exception is approved for the Rust parity workspace." },
  { name = "axum", reason = "No HTTP server framework exception is approved for the Rust parity workspace." },
  { name = "clap", reason = "CLI parsing remains hand-rolled for the cargo-installed launcher boundary." },
  { name = "hyper", wrappers = ["reqwest", "hyper-rustls", "hyper-util"], reason = "No direct raw HTTP transport dependency; allowed only as reviewed reqwest transport internals." },
  { name = "reqwest", wrappers = ["runx-runtime"], reason = "Approved only inside runx-runtime async-http; pure crates must not depend on the HTTP client." },
  # rmcp is intentionally not banned: it is the canonical protocol engine for
  # runx-runtime's MCP adapter boundary. scripts/check-rust-crate-graph.mjs
  # keeps rmcp out of pure crates and the CLI.
  { name = "serde_yaml", reason = "Unapproved YAML backend; the parser backend is serde_norway." },
  { name = "serde_yml", reason = "Retired YAML backend candidate; the parser backend is serde_norway." },
  { name = "tokio", wrappers = ["runx-runtime", "reqwest", "rmcp", "hyper", "hyper-rustls", "hyper-util", "tokio-rustls", "tokio-stream", "tokio-util", "tower"], reason = "Approved only inside runx-runtime async-http/MCP adapter boundaries and reviewed transport internals; pure crates must not depend on tokio." },
  { name = "ureq", reason = "No HTTP client exception is approved; adapter-side HTTP needs a scoped spec first." },
]

[licenses]
allow = [
  "Apache-2.0",
  "BSD-3-Clause",
  "MIT",
  "Unicode-3.0",
]
confidence-threshold = 0.8
exceptions = [
  { name = "ring", version = "=0.17.14", allow = ["ISC"] },
  { name = "rustls-webpki", version = "=0.103.13", allow = ["ISC"] },
  { name = "untrusted", version = "=0.9.0", allow = ["ISC"] },
  { name = "webpki-root-certs", version = "=1.0.7", allow = ["CDLA-Permissive-2.0"] },
]

[sources]
unknown-git = "deny"
unknown-registry = "deny"
