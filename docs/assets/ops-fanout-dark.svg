  </circle>

  <circle r="3.1" fill="#ff2e88">
    <animateMotion dur="7s" begin="2.2s" repeatCount="indefinite" path="M322 225 C 388 225, 376 225, 442 225 C 528.9 225, 513.1 322, 600 322 C 707.8 322, 688.2 364, 796 364 C 902.7 364, 883.3 225, 990 225"/>
  </circle>

  <circle r="3.1" fill="#7ee787">
    <animateMotion dur="7s" begin="4.4s" repeatCount="indefinite" path="M322 225 C 388 225, 376 225, 442 225 C 528.9 225, 513.1 128, 600 128 C 716.6 128, 695.4 225, 812 225 C 909.9 225, 892.1 225, 990 225"/>
  </circle>

  <g class="seal-ring">
    <circle cx="990" cy="225" r="24" fill="none" stroke="#65b7ff" stroke-width="1.6" stroke-dasharray="4 7"/>
  </g>
  <circle cx="990" cy="225" r="15" fill="none" stroke="#65b7ff" stroke-opacity=".55" stroke-width="1.2"/>
  <circle cx="990" cy="225" r="7" fill="#65b7ff"/>
  <text class="name" x="990" y="267" text-anchor="middle">sealed</text>
  <text class="mono seal-text" x="990" y="285" text-anchor="middle">$ runx verify → ok</text>

  <path class="replay" d="M990 287 C 930 460, 412 458, 322 241" stroke="#65b7ff" stroke-opacity=".45" stroke-width="1.4" fill="none"/>
  <circle r="2.6" fill="#65b7ff" opacity=".8">
    <animateMotion dur="5s" repeatCount="indefinite" path="M990 287 C 930 460, 412 458, 322 241"/>
  </circle>
  <path id="rx-dark-replay-guide" d="M322 241 C 412 458, 930 460, 990 287" fill="none" stroke="none"/>
  <text class="small faint" dy="-6"><textPath href="#rx-dark-replay-guide" startOffset="42%">receipts feed the next run</textPath></text>
</svg>
