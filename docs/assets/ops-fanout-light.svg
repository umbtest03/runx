  </circle>

  <circle r="3.1" fill="#e0186f">
    <animateMotion dur="7s" begin="2.2s" repeatCount="indefinite" path="M344 225 C 397.9 225, 388.1 225, 442 225 C 528.9 225, 513.1 322, 600 322 C 707.8 322, 688.2 364, 796 364 C 902.7 364, 883.3 225, 990 225"/>
  </circle>

  <circle r="3.1" fill="#2f9e44">
