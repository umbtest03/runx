  <g class="seal-ring">
    <circle cx="990" cy="225" r="24" fill="none" stroke="#2563c4" stroke-width="1.6" stroke-dasharray="4 7"/>
  </g>
  <circle cx="990" cy="225" r="15" fill="none" stroke="#2563c4" stroke-opacity=".55" stroke-width="1.2"/>
  <circle cx="990" cy="225" r="7" fill="#2563c4"/>
  <text class="name" x="990" y="267" text-anchor="middle">sealed</text>
  <text class="mono seal-text" x="990" y="285" text-anchor="middle">$ runx verify → ok</text>

  <path class="replay" d="M990 287 C 930 460, 434 458, 344 241" stroke="#2563c4" stroke-opacity=".45" stroke-width="1.4" fill="none"/>
  <circle r="2.6" fill="#2563c4" opacity=".8">
    <animateMotion dur="5s" repeatCount="indefinite" path="M990 287 C 930 460, 434 458, 344 241"/>
  </circle>
  <path id="rx-light-replay-guide" d="M344 241 C 434 458, 930 460, 990 287" fill="none" stroke="none"/>
  <text class="small faint" dy="-6"><textPath href="#rx-light-replay-guide" startOffset="42%">receipts feed the next run</textPath></text>
</svg>
