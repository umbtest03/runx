<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">runx business ops trace</title>
  <desc id="desc">A runx business ops trace showing one command becoming a classified route, fanning into governed skill lanes, stopping consequential work at approval gates, linking child receipts into one graph receipt, and returning as a replay loop.</desc>
  <defs>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#ff2e88"/>
    </marker>
    <style>
      .bg { fill: #09090e; }
      .surface { fill: #101018; stroke: #302b37; stroke-width: 1.1; }
      .terminal { fill: #0d0d14; stroke: #42404d; stroke-width: 1.2; }
      .kernel { fill: #19101a; stroke: #ff2e88; stroke-width: 1.5; }
      .route { fill: #0e171b; stroke: #28d7c2; stroke-width: 1.2; }
      .lane { fill: #111119; stroke: #393341; stroke-width: 1.05; }
      .lane-hot { fill: #171016; stroke: #ffb84d; stroke-width: 1.05; }
      .proof { fill: #0d151f; stroke: #65b7ff; stroke-width: 1.15; }
      .pink-line { fill: none; stroke: #ff2e88; stroke-width: 1.55; marker-end: url(#arrow-pink); }
      .soft-line { fill: none; stroke: #716879; stroke-width: 1.1; stroke-linecap: round; stroke-linejoin: round; }
      .trace { fill: none; stroke: #5c5364; stroke-width: 1.15; stroke-linecap: round; stroke-linejoin: round; }
      .grid { fill: none; stroke: #1b1822; stroke-width: 1; }
      .dot { fill: #111119; stroke: #8e8397; stroke-width: 1.1; }
      .dot-pink { fill: #ff2e88; stroke: #ffd0e5; stroke-width: 1; }
      .dot-cyan { fill: #28d7c2; stroke: #bff9f0; stroke-width: 1; }
      .dot-blue { fill: #65b7ff; stroke: #d8efff; stroke-width: 1; }
      .gate { fill: #ffb84d; }
      .ink { fill: #f5f1ea; }
      .muted { fill: #c7beca; }
      .faint { fill: #8f8795; }
      .pink { fill: #ff2e88; }
      .cyan { fill: #28d7c2; }
      .blue { fill: #65b7ff; }
      .amber { fill: #ffb84d; }
      .h1 { font: 760 21px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .h2 { font: 740 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .body { font: 520 12.5px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font: 520 11px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { font: 700 9.5px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .06em; text-transform: uppercase; }
      .mono { font: 620 11.5px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>

  <rect class="bg" width="1120" height="520" rx="18"/>
  <path class="grid" d="M60 115 H1060 M60 185 H1060 M60 255 H1060 M60 325 H1060 M60 395 H1060"/>
  <path class="grid" d="M154 52 V462 M344 52 V462 M534 52 V462 M724 52 V462 M914 52 V462"/>

  <text class="label faint" x="64" y="47">execution trace</text>
  <text class="h1 ink" x="64" y="75">one business goal becomes a replayable chain of skills</text>
  <text class="body muted" x="64" y="99">safe work fans out. consequential work stops at gates. proof comes back as receipts.</text>

  <rect class="terminal" x="64" y="144" width="262" height="128" rx="16"/>
  <circle class="pink" cx="90" cy="168" r="4"/>
  <circle class="cyan" cx="106" cy="168" r="4"/>
  <circle class="blue" cx="122" cy="168" r="4"/>
  <text class="mono ink" x="88" y="202">$ runx skill business-ops</text>
  <text class="mono muted" x="88" y="226">signal: prepare API v2</text>
  <text class="mono faint" x="88" y="250">stop before live actions</text>

  <path class="pink-line" d="M326 208 H390"/>

  <rect class="kernel" x="390" y="139" width="190" height="138" rx="18"/>
  <text class="label faint" x="418" y="166">runx graph</text>
  <text class="h2 ink" x="418" y="195">classify route</text>
  <text class="body muted" x="418" y="219">authority, lanes, gates,</text>
  <text class="body muted" x="418" y="238">handoffs, readbacks</text>
  <circle class="dot-pink" cx="542" cy="166" r="5"/>

  <path class="pink-line" d="M580 208 H640"/>

  <rect class="route" x="640" y="154" width="178" height="108" rx="17"/>
  <text class="label faint" x="666" y="180">route packet</text>
  <text class="body ink" x="666" y="206">typed instructions</text>
  <text class="body muted" x="666" y="228">for each lane</text>
  <text class="small faint" x="666" y="248">not ambient trust</text>

  <path class="trace" d="M729 262 V306"/>
  <path class="trace" d="M167 306 H932"/>
  <path class="trace" d="M167 306 V330"/>
  <path class="trace" d="M415 306 V330"/>
  <path class="trace" d="M663 306 V330"/>
  <path class="trace" d="M932 306 V330"/>

  <rect class="lane" x="64" y="330" width="206" height="82" rx="15"/>
  <circle class="dot-cyan" cx="90" cy="356" r="5"/>
  <text class="label faint" x="106" y="360">draft lane</text>
  <text class="h2 ink" x="90" y="383">sourcey docs</text>
  <text class="small muted" x="90" y="402">draft from evidence</text>

  <rect class="lane-hot" x="312" y="330" width="206" height="82" rx="15"/>
  <path class="gate" d="M338 350 L346 358 L338 366 L330 358 Z"/>
  <text class="label faint" x="360" y="361">release gate</text>
  <text class="h2 ink" x="338" y="383">release.prepare</text>
  <text class="small muted" x="338" y="402">publish waits</text>

  <rect class="lane-hot" x="560" y="330" width="206" height="82" rx="15"/>
  <path class="gate" d="M586 350 L594 358 L586 366 L578 358 Z"/>
  <text class="label faint" x="608" y="361">operator gate</text>
  <text class="h2 ink" x="586" y="383">issue-to-pr</text>
  <text class="small muted" x="586" y="402">merge waits</text>

  <rect class="lane-hot" x="808" y="330" width="248" height="82" rx="15"/>
  <path class="gate" d="M834 350 L842 358 L834 366 L826 358 Z"/>
  <text class="label faint" x="856" y="361">send and spend gates</text>
  <text class="h2 ink" x="834" y="383">send-as + spend.quote</text>
  <text class="small muted" x="834" y="402">send and payment wait</text>

  <path class="soft-line" d="M932 306 V292 H956 V262"/>

  <rect class="proof" x="856" y="154" width="200" height="108" rx="17"/>
  <text class="label faint" x="884" y="180">receipt braid</text>
  <text class="body ink" x="884" y="206">child receipts link</text>
  <text class="body muted" x="884" y="228">into one graph receipt</text>
  <text class="small faint" x="884" y="248">replayable audit trail</text>
  <circle class="dot-blue" cx="1018" cy="180" r="5"/>

  <text class="label faint" x="856" y="458">receipt-backed replay</text>
  <text class="small muted" x="856" y="477">same route, same gates</text>
</svg>
