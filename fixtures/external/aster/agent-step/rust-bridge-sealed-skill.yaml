name: "aster-rust-bridge-sealed-skill"
kind: "agent_step"
runner: "aster-rust-bridge"
inputs:
  external_project: "aster"
  lane: "issue-triage"
  subject_locator: "runxhq/aster#issue/14"
  bridge:
    wrapper: "scripts/runx-agent-bridge.mjs"
    orchestrator: "scripts/aster-core.mjs"
    accepted_command:
      - "skill"
      - "<runx-root>/skills/issue-triage"
    continuation_shape:
      - "skill"
      - "<same-skill-path>"
      - "--run-id"
      - "<run_id>"
      - "--answers"
      - "<answersPath>"
  evidence:
    read_from:
      - "aster:README.md"
      - "aster:scripts/runx-agent-bridge.mjs"
      - "aster:scripts/runx-agent-bridge.test.mjs"
      - "aster:scripts/aster-core.mjs"
    local_facts:
      - "Aster accepts Rust-native runx skill <path> commands through scripts/runx-agent-bridge.mjs."
      - "Terminal skill reports must be runx.skill_run.v1 with status sealed."
      - "Terminal skill reports cite a stored runx.receipt.v1 receipt id."
      - "Continuation reruns the same runx skill <path> command with --run-id and --answers."
caller:
  answers:
    agent_step.aster-rust-bridge.output:
      schema: "runx.skill_run.v1"
      status: "sealed"
      run_id: "run_aster_issue_triage_14"
      receipt_id: "hrn_rcpt_aster_issue_triage_14"
      closure:
        disposition: "closed"
        reason_code: "process_closed"
        summary: "Aster issue-triage bridge run sealed with a canonical harness receipt."
      receipt:
        id: "hrn_rcpt_aster_issue_triage_14"
        schema: "runx.receipt.v1"
        harness:
          harness_id: "hrn_aster_issue_triage_14"
          state: "sealed"
        seal:
          disposition: "closed"
          reason_code: "process_closed"
          summary: "Aster bridge skill run sealed."
expect:
  status: "sealed"
  receipt:
    schema: "runx.receipt.v1"
    receipt_id: "hrn_rcpt_aster-rust-bridge-sealed-skill_aster-rust-bridge-sealed-skill"
    harness_id: "hrn_aster-rust-bridge-sealed-skill_aster-rust-bridge-sealed-skill"
    state: "sealed"
    disposition: "closed"
    reason_code: "process_closed"
    act_ids:
      - "act_aster-rust-bridge-sealed-skill"
    decision_ids:
      - "runx:decision:hrn_rcpt_aster-rust-bridge-sealed-skill_aster-rust-bridge-sealed-skill_journal"
metadata:
  external_project: "aster"
  source_case: "rust-bridge-sealed-skill"
  runner_kind: "agent_step"
  bridge_contract: "runx.skill_run.v1"
  receipt_contract: "runx.receipt.v1"
  aster_bridge_sources:
    - "README.md"
    - "scripts/runx-agent-bridge.mjs"
    - "scripts/runx-agent-bridge.test.mjs"
    - "scripts/aster-core.mjs"
