name: x402-pay-negative-authority-broader-child
steps:
  - id: quote
    skill: ../../skills/x402-pay-paid-echo-quote
    inputs:
      payment_signal:
        signal_type: payment_required
        challenge_id: ch_mock_paid_echo_broader_child
        amount_minor: 125
        currency: USD
        rail: mock
        counterparty: merchant:paid-echo
        operation: paid.echo
  - id: reserve
    skill: ../../skills/x402-pay-negative-authority-broader-child-reserve
    context:
      payment_quote_packet: quote.skill_claim.payment_quote_packet.data
  - id: approve-spend
    run:
      type: approval
    inputs:
      gate_id: spend-approval
      gate_type: payment
      reason: Approve broader-child authority fixture.
      amount_minor: 125
      currency: USD
    artifacts:
      wrap_as: payment_approval
  - id: fulfill
    skill: ../../skills/x402-pay-paid-echo-fulfill
    scopes:
      - payment:spend
    mutation: true
    idempotency_key: paid-echo-broader-child-fulfill
    context:
      reserved_payment_authority: reserve.skill_claim.payment_reservation_packet.data.reserved_payment_authority
      spend_capability_ref: reserve.skill_claim.payment_reservation_packet.data.spend_capability_ref
      idempotency: reserve.skill_claim.payment_reservation_packet.data.idempotency
policy:
  transitions:
    - to: fulfill
      field: approve-spend.payment_approval.data.approved
      equals: true
