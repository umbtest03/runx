name: x402-pay-ledger-governed-refusal
steps:
  - id: quote
    skill: ../../skills/x402-pay-paid-echo-quote
    inputs:
      payment_signal:
        signal_type: payment_required
        challenge_id: ch_mock_paid_echo_cap_exceeded
        amount_minor: 125
        currency: USD
        rail: mock
        counterparty: merchant:paid-echo
        operation: paid.echo
  - id: reserve
    skill: ../../skills/x402-pay-negative-cap-exceeded-reserve
    context:
      payment_quote_packet: quote.skill_claim.payment_quote_packet.data
  - id: approve-spend
    run:
      type: approval
    inputs:
      gate_id: spend-approval
      gate_type: payment
      reason: Approve cap-exceeded payment fixture.
      amount_minor: 125
      currency: USD
    artifacts:
      wrap_as: payment_approval
policy:
  transitions:
    - to: approve-spend
      field: reserve.skill_claim.payment_reservation_packet.data.spend_capability_ref.uri
      equals: runx:payment-capability:paid-echo-spend-1
