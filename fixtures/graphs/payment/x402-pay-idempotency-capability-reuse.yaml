name: x402-pay-idempotency-capability-reuse
steps:
  - id: quote
    skill: ../../skills/x402-pay-paid-echo-quote
    inputs:
      payment_signal:
        signal_type: payment_required
        challenge_id: ch_mock_paid_echo_001
        amount_minor: 125
        currency: USD
        rail: mock
        counterparty: merchant:paid-echo
        operation: paid.echo
  - id: reserve
    skill: ../../skills/x402-pay-idempotency-reserve
    context:
      payment_quote_packet: quote.skill_claim.payment_quote_packet.data
  - id: approve-spend
    run:
      type: approval
    inputs:
      gate_id: spend-approval
      gate_type: payment
      reason: Approve payment before paid echo.
      amount_minor: 125
      currency: USD
    artifacts:
      wrap_as: payment_approval
  - id: fulfill
    skill: ../../skills/x402-pay-idempotency-fulfill
    scopes:
      - payment:spend
    mutation: true
    idempotency_key: paid-echo-fulfill
    context:
      reserved_payment_authority: reserve.skill_claim.payment_reservation_packet.data.reserved_payment_authority
      spend_capability_ref: reserve.skill_claim.payment_reservation_packet.data.spend_capability_ref
      idempotency: reserve.skill_claim.payment_reservation_packet.data.idempotency
  - id: echo
    skill: ../../skills/x402-pay-paid-echo-tool
    inputs:
      message: hello from paid echo
    context:
      payment_capability_ref: fulfill.skill_claim.payment_rail_packet.data.credential_envelope.credential_ref
      payment_proof_ref: fulfill.skill_claim.payment_rail_packet.data.rail_proof.proof_ref
policy:
  transitions:
    - to: fulfill
      field: approve-spend.payment_approval.data.approved
      equals: true
