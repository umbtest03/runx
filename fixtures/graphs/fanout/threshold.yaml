name: fanout-threshold
owner: runx
fanout:
  groups:
    advisors:
      strategy: all
      on_branch_failure: halt
      threshold_gates:
        - step: risk
          field: risk_score
          above: 0.8
          action: pause
steps:
  - id: market
    mode: fanout
    fanout_group: advisors
    skill: ../../skills/json-output
    inputs:
      recommendation: go
  - id: risk
    mode: fanout
    fanout_group: advisors
    skill: ../../skills/json-output
    inputs:
      risk_score: 0.91
  - id: synthesize
    skill: ../../skills/echo
    context:
      message: market.recommendation
