name: fanout-generated-missing-skill
owner: runx
fanout:
  groups:
    advisors:
      strategy: quorum
      min_success: 2
      on_branch_failure: continue
steps:
  - id: market
    mode: fanout
    fanout_group: advisors
    skill: ../../../skills/json-output
    inputs:
      recommendation: go
  - id: missing
    mode: fanout
    fanout_group: advisors
    skill: ../../../skills/not-found
  - id: risk
    mode: fanout
    fanout_group: advisors
    skill: ../../../skills/json-output
    inputs:
      risk_score: 0.2
  - id: synthesize
    skill: ../../../skills/echo
    context:
      message: market.recommendation
