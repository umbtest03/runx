name: fanout-advisors
owner: runx
fanout:
  groups:
    advisors:
      strategy: quorum
      min_success: 2
      on_branch_failure: continue
      threshold_gates:
        - step: risk
          field: risk_score
          above: 0.8
          action: pause
steps:
  - id: market
    mode: fanout
    fanout_group: advisors
    skill: ../../skills/json-output
    inputs:
      recommendation: go
      confidence: 0.9
  - id: risk
    mode: fanout
    fanout_group: advisors
    skill: ../../skills/json-output
    inputs:
      recommendation: go
      risk_score: 0.4
  - id: finance
    mode: fanout
    fanout_group: advisors
    skill: ../../skills/failing
  - id: synthesize
    skill: ../../skills/echo
    context:
      message: market.recommendation
