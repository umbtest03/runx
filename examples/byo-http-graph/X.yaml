skill: byo-http-graph
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical

credentials:
  example-crm:
    provider: example-crm
    audience: http://127.0.0.1:8734
    auth:
      api_key:
        delivery:
          env: EXAMPLE_CRM_TOKEN

runners:
  main:
    default: true
    type: graph
    credential: example-crm
    inputs:
      account_id:
        type: string
        required: true
        description: Example CRM account id to fetch.
    graph:
      name: byo-http-graph
      steps:
        - id: read_account
          skill: ../byo-http-tool
          inputs:
            account_id: "$input.account_id"
