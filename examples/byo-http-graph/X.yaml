skill: byo-http-graph
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical

runners:
  main:
    default: true
    type: graph
    inputs:
      account_id:
        type: string
        required: true
        description: Example CRM account id to fetch.
    graph:
      name: byo-http-graph
      steps:
        - id: read_account
          skill: ../byo-http-tool
          inputs:
            account_id: "$input.account_id"
