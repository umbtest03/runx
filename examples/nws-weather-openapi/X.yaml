skill: nws-weather-openapi
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical

harness:
  cases:
    - name: nws-points-washington-monument
      runner: main
      inputs:
        lat: "38.8894"
        lon: "-77.0352"
      expect:
        status: sealed

runners:
  main:
    default: true
    type: graph
    inputs:
      lat:
        type: string
        required: true
        description: Latitude with no more than four decimal places.
      lon:
        type: string
        required: true
        description: Longitude with no more than four decimal places.
    graph:
      name: nws-weather-openapi
      steps:
        - id: points
          skill: ../nws-weather-points
          inputs:
            lat: "$input.lat"
            lon: "$input.lon"
