skill: github-mcp-hero
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical

harness:
  cases:
    - name: github-mcp-read-seals
      runner: read
      env:
        RUNX_PROVIDER_PERMISSION_GRANT_ID: github-mcp-demo-read
        RUNX_PROVIDER_PERMISSION_GRANTED_SCOPES: repo.read
      inputs:
        repository: runxhq/runx
        issue_number: "241"
      expect:
        status: sealed
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: closed
    - name: github-mcp-write-refused
      runner: write-refused
      env:
        RUNX_PROVIDER_PERMISSION_GRANT_ID: github-mcp-demo-read
        RUNX_PROVIDER_PERMISSION_GRANTED_SCOPES: repo.read
      inputs:
        repository: runxhq/runx
        issue_number: "241"
        comment_body: This mutation should be refused by the read-only grant.
      expect:
        status: policy_denied
        receipt:
          schema: runx.receipt.v1
          state: sealed
          disposition: blocked
          reason_code: authority_denied

runners:
  read:
    default: true
    type: graph
    inputs:
      repository:
        type: string
        required: true
        description: Repository slug to read.
      issue_number:
        type: string
        required: true
        description: Issue number to read.
    graph:
      name: github-mcp-read
      steps:
        - id: read_issue
          skill: ./read-issue
          scopes:
            - repo.read
          policy:
            provider_permission:
              grant_id: github-mcp-demo-read
              verb: read
          inputs:
            repository: "$input.repository"
            issue_number: "$input.issue_number"

  write-refused:
    type: graph
    inputs:
      repository:
        type: string
        required: true
        description: Repository slug to read and then attempt to mutate.
      issue_number:
        type: string
        required: true
        description: Issue number to read and then attempt to comment on.
      comment_body:
        type: string
        required: true
        description: Comment body that must not be sent under a read-only grant.
    graph:
      name: github-mcp-write-refused
      steps:
        - id: read_issue
          skill: ./read-issue
          scopes:
            - repo.read
          policy:
            provider_permission:
              grant_id: github-mcp-demo-read
              verb: read
          inputs:
            repository: "$input.repository"
            issue_number: "$input.issue_number"
        - id: comment_issue
          skill: ./write-comment
          scopes:
            - repo.write
          mutation: true
          idempotency_key: github-mcp-comment-refusal
          policy:
            provider_permission:
              grant_id: github-mcp-demo-read
              verb: write
          inputs:
            repository: "$input.repository"
            issue_number: "$input.issue_number"
            body: "$input.comment_body"
