skill: thread-outbox-provider-graph
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical

harness:
  cases:
    - name: push-and-fetch
      runner: main
      expect:
        status: sealed

runners:
  main:
    default: true
    type: graph
    graph:
      name: thread-outbox-provider-graph
      steps:
        - id: push
          skill: ../thread-outbox-provider-push
        - id: fetch
          skill: ../thread-outbox-provider-fetch
