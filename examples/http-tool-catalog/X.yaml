skill: http-tool-catalog
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public

harness:
  cases:
    - name: http-tool-get-pet
      runner: main
      inputs:
        id: p-42
      expect:
        status: sealed

runners:
  main:
    default: true
    type: graph
    inputs:
      id:
        type: string
        required: true
        description: The pet id to fetch.
    graph:
      name: http-tool-catalog
      steps:
        - id: call
          tool: demo.pet_get
          inputs:
            id: "$input.id"
