skill: external-adapter-graph
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public

harness:
  cases:
    - name: external-adapter-echo
      runner: main
      inputs:
        message: hello from the external adapter
      expect:
        status: sealed

runners:
  main:
    default: true
    type: graph
    inputs:
      message:
        type: string
        required: false
        description: Message echoed back through the adapter.
    graph:
      name: external-adapter-graph
      steps:
        - id: echo
          skill: ../external-adapter-tool
          inputs:
            message: "{{message}}"
