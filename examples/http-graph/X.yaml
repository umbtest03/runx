skill: http-graph
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public
  role: canonical

harness:
  cases:
    - name: http-get-pet
      runner: main
      inputs:
        id: p-42
      expect:
        status: sealed

runners:
  main:
    default: true
    type: graph
    inputs:
      id:
        type: string
        required: true
        description: The pet id to fetch.
    graph:
      name: http-graph
      steps:
        - id: call
          skill: ../http-tool
          inputs:
            id: "$input.id"
