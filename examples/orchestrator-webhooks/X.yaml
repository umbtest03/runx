skill: orchestrator-webhooks
version: "0.1.0"

catalog:
  kind: graph
  audience: operator
  visibility: public
  role: example

credentials:
  n8n:
    provider: n8n
    auth:
      bearer:
        delivery:
          env: N8N_WEBHOOK_TOKEN

runners:
  n8n:
    default: true
    type: graph
    credential: n8n
    inputs:
      handoff_scope:
        type: string
        required: false
        default: orchestrator.n8n.workflow.invoke
        description: Expected runx-to-n8n handoff scope for receiver-side validation.
      handoff_audience:
        type: string
        required: false
        default: n8n:workflow:runx-governed-effect
        description: Expected n8n workflow audience for receiver-side validation.
      event_id:
        type: string
        required: true
        description: Stable event id for downstream idempotency.
      source:
        type: string
        required: false
        default: runx
        description: Human-readable source label for the webhook receiver.
      payload:
        type: json
        required: true
        description: JSON payload to deliver to the workflow webhook.
    graph:
      name: orchestrator-webhooks
      steps:
        - id: post_to_n8n
          tool: orchestrators.n8n_webhook_post
          inputs:
            handoff_scope: "$input.handoff_scope"
            handoff_audience: "$input.handoff_audience"
            event_id: "$input.event_id"
            source: "$input.source"
            payload: "$input.payload"
