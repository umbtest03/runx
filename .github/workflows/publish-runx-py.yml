name: Publish runx-py

on:
  push:
    tags:
      - "runx-py-v*.*.*"

concurrency:
  group: publish-runx-py-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    defaults:
      run:
        working-directory: packages/sdk-python

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#runx-py-v}"
          PYPROJECT_VERSION=$(python3 -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_bytes())['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PYPROJECT_VERSION)"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

      - name: Run unit tests
        run: python3 -m unittest tests.test_runx -v

      - name: Install build tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install build twine

      - name: Build distribution
        run: |
          rm -rf dist build *.egg-info
          python3 -m build

      - name: Verify distribution metadata
        run: python3 -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: runx-py-dist
          path: packages/sdk-python/dist/**
          if-no-files-found: error

  publish-pypi:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: runx-py-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  github-release:
    needs: publish-pypi
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: runx-py-dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
