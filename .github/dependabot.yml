version: 2
# Automated, vulnerability-driven dependency updates for the OSS workspace.
# Security updates are raised continuously; version updates are batched weekly
# to keep noise low while ensuring advisories are surfaced as PRs.
updates:
  - package-ecosystem: cargo
    directory: /crates
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
